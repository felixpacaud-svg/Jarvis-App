// MAIL TAB — Gmail with AI triage
// ═══════════════════════════════════════════════════════════════
function MailTab({ gToken, onReauth }) {
  const [mails, setMails] = useState([]);
  const [classes, setClasses] = useState(sto.getJSON('j_mail_class', {}));
  const [loading, setLoading] = useState(false);
  const [classifying, setClassifying] = useState(false);
  const [err, setErr] = useState(null);
  const [filter, setFilter] = useState('all');
  const [lastFetch, setLastFetch] = useState(0);
  const hasAI = !!(sto.get('j_gk') || sto.get('j_groq'));

  const load = async (force = false) => {
    if (!gToken) { setErr('not_signed_in'); return; }
    if (!force && Date.now() - lastFetch < MAIL_CACHE_TTL) return;
    setLoading(true); setErr(null);
    const { mails: ms, expired, err: e } = await fetchGmail(gToken);
    if (expired) { setErr('expired'); setLoading(false); return; }
    if (e === 'scope') { setErr('scope'); setLoading(false); return; }
    if (e === 'api_disabled') { setErr('api_disabled'); setLoading(false); return; }
    if (e) { setErr(e); setLoading(false); return; }
    setMails(ms);
    setLastFetch(Date.now());
    setLoading(false);

    // Classify in background
    if (hasAI && ms.length > 0) {
      setClassifying(true);
      const c = await classifyMails(ms);
      setClasses(c);
      setClassifying(false);

      // Auto-log urgent mails to brain
      const newUrgent = ms.filter(m => c[m.id]?.priority === 'urgent');
      if (newUrgent.length > 0) {
        const existing = loadBrain();
        newUrgent.forEach(m => {
          const already = existing.some(b => b.sourceId === m.id);
          if (!already) {
            addBrainItem({
              title: `📧 ${m.subject}`,
              tags: ['urgent', 'email'],
              comment: `From: ${m.from.split('<')[0].trim()} · ${c[m.id]?.reason || ''}`,
              sourceId: m.id
            });
          }
        });
      }
    }
  };

  useEffect(() => { if (gToken) load(); }, [gToken]);

  const filtered = useMemo(() => {
    if (filter === 'all') return mails;
    if (filter === 'unread') return mails.filter(m => m.unread);
    if (filter === 'urgent') return mails.filter(m => classes[m.id]?.priority === 'urgent');
    if (filter === 'important') return mails.filter(m => ['urgent', 'important'].includes(classes[m.id]?.priority));
    return mails;
  }, [mails, classes, filter]);

  const counts = useMemo(() => ({
    urgent: mails.filter(m => classes[m.id]?.priority === 'urgent').length,
    important: mails.filter(m => classes[m.id]?.priority === 'important').length,
    unread: mails.filter(m => m.unread).length,
  }), [mails, classes]);

  const parseSender = (f) => {
    const m = f.match(/^(.+?)\s*<(.+?)>$/);
    if (m) return { name: m[1].replace(/"/g, '').trim(), email: m[2] };
    return { name: f, email: f };
  };
  const fmtDate = (iso) => {
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 60000;
    if (diff < 60) return Math.round(diff) + 'm';
    if (diff < 1440) return Math.round(diff / 60) + 'h';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  };
  const [viewing, setViewing] = useState(null);
  const [viewingBody, setViewingBody] = useState(null);

  const openMail = async (m) => {
    haptic.tick();
    setViewing(m);
    setViewingBody(null);
    if (m.unread) {
      markMailRead(gToken, m.id);
      setMails(prev => prev.map(x => x.id === m.id ? { ...x, unread: false } : x));
    }
    const body = await fetchMailBody(gToken, m.id);
    setViewingBody(body || { text: m.snippet, html: '', error: true });
  };

  const closeMail = () => { setViewing(null); setViewingBody(null); };

  // Manually set a mail's priority. Persists as userOverride so AI won't
  // re-flip it on next fetch. If demoting from urgent, also remove the
  // auto-logged Brain entry so the urgent list in Brain stays clean.
  const reclassify = (mailId, newPriority) => {
    haptic.tick();
    const current = sto.getJSON('j_mail_class', {});
    const prev = current[mailId] || {};
    const wasUrgent = prev.priority === 'urgent';
    current[mailId] = {
      ...prev,
      priority: newPriority,
      // Keep AI's highlight text if present (still useful context), but mark override
      highlight: prev.highlight || '',
      action: prev.action || 'none',
      deadline: prev.deadline || 'none',
      reason: prev.highlight || prev.reason || '',
      userOverride: true,
      source: 'user',
      ts: Date.now()
    };
    sto.setJSON('j_mail_class', current);
    setClasses({ ...current });
    // Clean up: if demoting from urgent, remove auto-added Brain entry
    if (wasUrgent && newPriority !== 'urgent') {
      const brain = loadBrain();
      const updated = brain.filter(b => b.sourceId !== mailId);
      if (updated.length < brain.length) { saveBrain(updated); bus.emit('j_brain'); }
    }
    toast(`Marked as ${newPriority}`, newPriority === 'urgent' ? 'red' : 'gn');
  };

  const openInGmail = (m) => {
    haptic.tick();
    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/.test(ua);
    const webUrl = `https://mail.google.com/mail/u/0/#inbox/${m.id}`;
    if (isIOS) {
      // iOS: open Gmail scheme, fallback to web after timeout
      window.location.href = `googlegmail://`;
      setTimeout(() => window.open(webUrl, '_blank'), 400);
    } else {
      // Android (Samsung Internet / Chrome): https URL auto-opens Gmail via App Links if installed
      window.open(webUrl, '_blank');
    }
  };

  const convertToTask = (m) => {
    // Map mail priority → task priority. Default 'med' if unclassified.
    const cls = classes[m.id] || {};
    const taskPrio = cls.priority === 'urgent' ? 'high'
                   : cls.priority === 'important' ? 'med'
                   : cls.priority === 'low' ? 'low' : 'med';
    // Deadline: today for urgent, tomorrow for important, +3 days otherwise
    const dueDays = cls.priority === 'urgent' ? 0 : cls.priority === 'important' ? 1 : 3;
    const due = new Date(Date.now() + dueDays * 864e5).toISOString().slice(0, 10);
    const senderName = (m.from || '').replace(/<.*$/, '').replace(/"/g, '').trim();
    const title = `Reply: ${m.subject}`.slice(0, 120);
    const notes = `From ${senderName || m.from}${cls.highlight ? ' — ' + cls.highlight : ''}`;
    addTask({
      title,
      priority: taskPrio,
      due,
      notes,
      source: 'mail:' + m.id
    });
    haptic.success();
    toast('Task created — see Brief', 'gn');
    closeMail();
  };

  if (!gToken) {
    return (
      <div style={{ padding: '18px 14px' }} className="fade">
        <div style={{ fontFamily:'var(--display)', fontSize:30, fontWeight:300, letterSpacing:'-0.01em' }}>
          <span style={{ color:'var(--t2)' }}>Mail</span> <span style={{ color:'var(--blue)' }}>Triage</span>
        </div>
        <div className="hud hud-gold-bdr" style={{ padding:20, textAlign:'center', marginTop:20 }}>
          <IMail size={28} color="var(--blue)" sw={1.4}/>
          <div style={{ fontSize:13, color:'var(--t2)', marginTop:12, lineHeight:1.5 }}>Sign in with Google to enable mail triage.</div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--gold)', marginTop:8 }}>Tap ⚙️ → Sign in with Google</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      {viewing && (
        <div className="ov" onClick={e => e.target === e.currentTarget && closeMail()}>
          <div className="sp" style={{ maxHeight:'92vh' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:10, marginBottom:14 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', fontWeight:700, letterSpacing:'.12em', marginBottom:3 }}>{parseSender(viewing.from).name.toUpperCase().slice(0, 30)}</div>
                <div style={{ fontFamily:'var(--hd)', fontSize:17, fontWeight:600, lineHeight:1.3 }}>{viewing.subject}</div>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:3 }}>
                  {parseSender(viewing.from).email} · {new Date(viewing.date).toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })}
                </div>
              </div>
              <button onClick={closeMail} style={{ background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:8, width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0 }}>
                <IClose size={14} color="var(--t2)" sw={2}/>
              </button>
            </div>
            {classes[viewing.id]?.highlight && (
              <div className="hud hud-gold-bdr" style={{ padding:'10px 12px', marginBottom:12 }}>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', fontWeight:700, letterSpacing:'.1em', marginBottom:4 }}>JARVIS ASSESSMENT</div>
                <div style={{ fontSize:13, color:'var(--t)', lineHeight:1.4 }}>{classes[viewing.id].highlight}</div>
              </div>
            )}

            {/* Priority override — tap to reclassify. Persists as userOverride so AI won't flip it back. */}
            <div style={{ marginBottom:12 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:7 }}>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:700, letterSpacing:'.1em' }}>
                  PRIORITY
                </div>
                <div style={{ fontFamily:'var(--mn)', fontSize:8, color: classes[viewing.id]?.userOverride ? 'var(--gold)' : 'var(--t4)', fontWeight:600, letterSpacing:'.1em' }}>
                  {classes[viewing.id]?.userOverride ? '● YOUR CALL' : classes[viewing.id]?.source === 'ai' ? '○ AI GUESS' : classes[viewing.id]?.source === 'gmail-label' ? '○ GMAIL' : '○ UNSET'}
                </div>
              </div>
              <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
                {[
                  { k:'urgent',    l:'Urgent' },
                  { k:'important', l:'Important' },
                  { k:'routine',   l:'Routine' },
                  { k:'low',       l:'Low' },
                ].map(p => {
                  const active = (classes[viewing.id]?.priority || null) === p.k;
                  return (
                    <button key={p.k} onClick={() => reclassify(viewing.id, p.k)}
                      className={`mpr-chip${active ? ' on-' + p.k : ''}`}>
                      {p.l}
                    </button>
                  );
                })}
              </div>
            </div>

            <div style={{ background:'var(--bg)', border:'1px solid var(--bdr)', borderRadius:10, padding:'14px', maxHeight:'45vh', overflowY:'auto', marginBottom:12 }}>
              {!viewingBody ? (
                <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, padding:20 }}>
                  <div className="dp"><span/><span/><span/></div>
                  <span style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--gold)' }}>Decrypting message…</span>
                </div>
              ) : viewingBody.text ? (
                <div style={{ fontSize:13, color:'var(--t2)', lineHeight:1.55, whiteSpace:'pre-wrap', wordBreak:'break-word', fontFamily:'var(--bd)' }}>{viewingBody.text}</div>
              ) : viewingBody.html ? (
                <div style={{ fontSize:13, color:'var(--t2)', lineHeight:1.5 }} dangerouslySetInnerHTML={{ __html: viewingBody.html }}/>
              ) : (
                <div style={{ fontSize:12, color:'var(--t3)' }}>{viewing.snippet}</div>
              )}
            </div>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
              <button onClick={() => convertToTask(viewing)} style={{ flex:'1 1 100%', padding:12, background:'var(--bg3)', border:'1px solid var(--bdrGold)', borderRadius:10, color:'var(--gold)', fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.1em', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                <IPlus size={13} color="var(--gold)" sw={2.5}/> CREATE TASK FROM THIS MAIL
              </button>
              <button onClick={() => openInGmail(viewing)} style={{ flex:1, padding:12, background:'linear-gradient(135deg, var(--red), var(--gold))', border:'none', borderRadius:10, color:'#fff', fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.1em', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                <IExternalLink size={13} color="#fff" sw={2}/> OPEN IN GMAIL
              </button>
              <button onClick={closeMail} style={{ padding:'12px 16px', background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:10, color:'var(--t2)', fontFamily:'var(--hd)', fontSize:12, fontWeight:600, letterSpacing:'.1em', cursor:'pointer' }}>CLOSE</button>
            </div>
          </div>
        </div>
      )}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
        <div>
          <div style={{ fontFamily:'var(--display)', fontSize:30, fontWeight:300, letterSpacing:'-0.01em' }}>
            <span style={{ color:'var(--t2)' }}>Mail</span> <span style={{ color:'var(--blue)' }}>Triage</span>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', marginTop:3, fontWeight:500 }}>
            LAST 7 DAYS · {mails.length} IN INBOX
          </div>
        </div>
        <button onClick={() => load(true)} disabled={loading} aria-label="Refresh"
          style={{ background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:8, width:34, height:34, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IRefresh size={14} color={loading?'var(--t4)':'var(--blue)'} sw={2}/>
        </button>
      </div>

      {err === 'expired' && (
        <div className="hud hud-red-bdr" style={{ padding:14, marginBottom:12 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--redHot)', fontWeight:700 }}>SESSION EXPIRED</div>
          <div style={{ fontSize:12, color:'var(--t2)', marginTop:6 }}>Tap ⚙️ → Sign in with Google to reconnect.</div>
        </div>
      )}
      {err === 'scope' && (
        <div className="hud hud-red-bdr" style={{ padding:14, marginBottom:12 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--redHot)', fontWeight:700 }}>GMAIL ACCESS NOT GRANTED</div>
          <div style={{ fontSize:12, color:'var(--t2)', marginTop:6 }}>Your current Google session doesn't include Gmail permission.</div>
          <button onClick={onReauth} style={{ marginTop:10, padding:'8px 12px', background:'var(--bg3)', border:'1px solid var(--bdrGold)', borderRadius:8, cursor:'pointer', color:'var(--gold)', fontFamily:'var(--hd)', fontSize:11, fontWeight:600, letterSpacing:'.1em' }}>RE-AUTHORIZE</button>
        </div>
      )}
      {err === 'api_disabled' && (
        <div className="hud hud-red-bdr" style={{ padding:14, marginBottom:12 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--redHot)', fontWeight:700 }}>GMAIL API NOT ENABLED</div>
          <div style={{ fontSize:12, color:'var(--t2)', marginTop:6, lineHeight:1.5 }}>Enable the Gmail API in your Google Cloud project:</div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--gold)', marginTop:6, wordBreak:'break-all' }}>console.cloud.google.com → APIs & Services → Library → "Gmail API" → Enable</div>
        </div>
      )}
      {err && !['expired','scope','api_disabled','not_signed_in'].includes(err) && (
        <div className="hud hud-red-bdr" style={{ padding:12, marginBottom:12 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--redHot)', fontWeight:700 }}>ERROR</div>
          <div style={{ fontSize:11, color:'var(--t2)', marginTop:4 }}>{err}</div>
        </div>
      )}

      {mails.length > 0 && (() => {
        const classified = mails.map(m => ({ ...m, cls: classes[m.id] })).filter(m => m.cls);
        const needInput = classified.filter(m => ['reply', 'decide', 'confirm'].includes(m.cls.action) && m.cls.priority !== 'low');
        const urgent = classified.filter(m => m.cls.priority === 'urgent');
        const important = classified.filter(m => m.cls.priority === 'important');
        const dontForget = classified.filter(m => ['today', 'tomorrow', 'this_week'].includes(m.cls.deadline));
        const dedupe = (arr, exclude) => {
          const seen = new Set(exclude.map(m => m.id));
          return arr.filter(m => !seen.has(m.id) && !seen.add(m.id));
        };
        const uniqueInput = urgent.length > 0 ? dedupe(needInput, urgent) : needInput;
        const uniqueImportant = dedupe(important, [...urgent, ...uniqueInput]);
        const uniqueForget = dedupe(dontForget, [...urgent, ...uniqueInput, ...uniqueImportant]);
        const totalFlagged = urgent.length + uniqueInput.length + uniqueImportant.length + uniqueForget.length;
        if (totalFlagged === 0 && classifying) return null;
        if (totalFlagged === 0) {
          return (
            <div className="hud" style={{ padding:14, marginBottom:12, borderColor:'rgba(34,197,94,0.3)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <ICheck size={14} color="var(--gn)" sw={2.5}/>
                <div style={{ fontFamily:'var(--hd)', fontSize:11, color:'var(--gn)', fontWeight:700, letterSpacing:'.1em' }}>INBOX CLEAR</div>
              </div>
              <div style={{ fontSize:12, color:'var(--t3)', marginTop:6 }}>Nothing needs your attention right now, sir.</div>
            </div>
          );
        }
        const Section = ({ title, color, icon, items, tone }) => {
          if (items.length === 0) return null;
          return (
            <div className="hud" style={{ padding:'12px 14px', marginBottom:8, borderColor: tone === 'red' ? 'var(--bdr2)' : tone === 'gold' ? 'var(--bdrGold)' : 'var(--bdr)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8 }}>
                {icon}
                <div style={{ fontFamily:'var(--hd)', fontSize:11, color, fontWeight:700, letterSpacing:'.12em' }}>{title}</div>
                <div style={{ flex:1 }}/>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:600 }}>{items.length}</div>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {items.slice(0, 5).map(m => {
                  const sender = parseSender(m.from);
                  return (
                    <div key={m.id} onClick={()=>openMail(m)} style={{ cursor:'pointer', paddingLeft:10, borderLeft:`2px solid ${color}` }}>
                      {m.cls.highlight && (
                        <div style={{ fontSize:12, color:'var(--t)', lineHeight:1.4, fontWeight:500 }}>{m.cls.highlight}</div>
                      )}
                      <div style={{ display:'flex', gap:6, alignItems:'center', marginTop:3, fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>
                        <span style={{ color:'var(--t3)', fontWeight:500, maxWidth:120, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{sender.name}</span>
                        <span>·</span>
                        <span>{fmtDate(m.date)}</span>
                        {m.cls.action && m.cls.action !== 'none' && (
                          <><span>·</span><span style={{ color, fontWeight:700, textTransform:'uppercase' }}>{m.cls.action}</span></>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        };
        return (
          <div style={{ marginBottom:6 }}>
            <Section title="NEEDS YOUR INPUT" color="var(--redHot)" tone="red" items={urgent.filter(m => ['reply','decide','confirm','pay'].includes(m.cls.action))}
              icon={<IZap size={12} color="var(--redHot)" sw={2.5}/>}/>
            <Section title="URGENT" color="var(--redHot)" tone="red" items={urgent.filter(m => !['reply','decide','confirm','pay'].includes(m.cls.action))}
              icon={<IFlame size={12} color="var(--redHot)" sw={2}/>}/>
            <Section title="ACTION NEEDED" color="var(--gold)" tone="gold" items={uniqueInput}
              icon={<ICheck size={12} color="var(--gold)" sw={2.5}/>}/>
            <Section title="IMPORTANT" color="var(--gold)" tone="gold" items={uniqueImportant}
              icon={<IPin size={12} color="var(--gold)" sw={1.75}/>}/>
            <Section title="DON'T FORGET" color="var(--blue)" tone="blue" items={uniqueForget}
              icon={<IBell size={12} color="var(--blue)" sw={1.75}/>}/>
          </div>
        );
      })()}

      {mails.length > 0 && (
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:6, marginBottom:12 }}>
          <div className="hud hud-red-bdr" style={{ padding:'8px 10px', textAlign:'center', cursor:'pointer' }} onClick={()=>{haptic.tick(); setFilter('urgent');}}>
            <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--redHot)', fontWeight:700, letterSpacing:'.1em' }}>URGENT</div>
            <div style={{ fontFamily:'var(--hd)', fontSize:22, fontWeight:500, color:'var(--redHot)', lineHeight:1, marginTop:2 }}>{counts.urgent}</div>
          </div>
          <div className="hud" style={{ padding:'8px 10px', textAlign:'center', cursor:'pointer', borderColor:'var(--bdrGold)' }} onClick={()=>{haptic.tick(); setFilter('important');}}>
            <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--gold)', fontWeight:700, letterSpacing:'.1em' }}>IMPORTANT</div>
            <div style={{ fontFamily:'var(--hd)', fontSize:22, fontWeight:500, color:'var(--gold)', lineHeight:1, marginTop:2 }}>{counts.urgent + counts.important}</div>
          </div>
          <div className="hud" style={{ padding:'8px 10px', textAlign:'center', cursor:'pointer' }} onClick={()=>{haptic.tick(); setFilter('unread');}}>
            <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--blue)', fontWeight:700, letterSpacing:'.1em' }}>UNREAD</div>
            <div style={{ fontFamily:'var(--hd)', fontSize:22, fontWeight:500, color:'var(--blue)', lineHeight:1, marginTop:2 }}>{counts.unread}</div>
          </div>
        </div>
      )}

      {mails.length > 0 && (
        <div className="sx" style={{ display:'flex', gap:5, marginBottom:10, paddingBottom:6 }}>
          {[{k:'all',l:'All'},{k:'urgent',l:'Urgent'},{k:'important',l:'Important'},{k:'unread',l:'Unread'}].map(f => (
            <button key={f.k} className="pl" onClick={()=>{haptic.tick(); setFilter(f.k);}}
              style={filter===f.k ? { borderColor:'var(--blue)', color:'var(--blue)', background:'rgba(59,130,246,0.07)' } : {}}>
              {f.l}
            </button>
          ))}
        </div>
      )}

      {!hasAI && mails.length > 0 && (
        <div className="hud" style={{ padding:10, marginBottom:10, borderColor:'var(--bdrGold)' }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--gold)', fontWeight:700 }}>⚠ AI TRIAGE DISABLED</div>
          <div style={{ fontSize:11, color:'var(--t3)', marginTop:4 }}>Add a Groq or Gemini key in ⚙️ to enable priority classification.</div>
        </div>
      )}

      {classifying && (
        <div style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 10px', marginBottom:8 }}>
          <div className="dp"><span/><span/><span/></div>
          <span style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--gold)' }}>AI triaging mail…</span>
        </div>
      )}

      {loading && mails.length === 0 ? (
        <div style={{ textAlign:'center', padding:40 }}>
          <div className="dp"><span/><span/><span/></div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t4)', marginTop:10 }}>Loading inbox…</div>
        </div>
      ) : filtered.length === 0 ? (
        <div className="hud" style={{ padding:20, textAlign:'center' }}>
          <div style={{ fontSize:12, color:'var(--t3)' }}>
            {mails.length === 0 ? 'Inbox empty (last 3 days)' : `No ${filter} mail`}
          </div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
          {filtered.map(m => {
            const cls = classes[m.id];
            const sender = parseSender(m.from);
            const pri = cls?.priority || 'unclassified';
            const color = pri === 'urgent' ? 'var(--redHot)' : pri === 'important' ? 'var(--gold)' : pri === 'routine' ? 'var(--t3)' : pri === 'low' ? 'var(--t4)' : 'var(--blue)';
            return (
              <div key={m.id} className="hud news-card" style={{ padding:'10px 12px', cursor:'pointer', borderColor: pri === 'urgent' ? 'var(--bdr2)' : 'var(--bdr)' }} onClick={()=>openMail(m)}>
                <div style={{ display:'flex', gap:8, alignItems:'flex-start' }}>
                  <div style={{ width:3, minHeight:30, borderRadius:2, background:color, flexShrink:0 }}/>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', gap:8, marginBottom:2 }}>
                      <span style={{ fontSize:11, fontWeight: m.unread ? 700 : 500, color: m.unread ? 'var(--t)' : 'var(--t2)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{sender.name}</span>
                      <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', flexShrink:0 }}>{fmtDate(m.date)}</span>
                    </div>
                    <div style={{ fontSize:13, fontWeight: m.unread ? 600 : 400, lineHeight:1.3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{m.subject}</div>
                    <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{m.snippet.slice(0, 100)}</div>
                    {cls && (
                      <div style={{ display:'flex', alignItems:'center', gap:4, marginTop:4 }}>
                        <span style={{ fontFamily:'var(--mn)', fontSize:8, fontWeight:700, letterSpacing:'.08em', color, padding:'1px 6px', border:`1px solid ${color}`, borderRadius:3, background:`${color}15` }}>
                          {pri.toUpperCase()}
                        </span>
                        {cls.reason && <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{cls.reason}</span>}
                      </div>
                    )}
                  </div>
                  {m.unread && <div style={{ width:6, height:6, borderRadius:'50%', background:'var(--blue)', flexShrink:0, marginTop:4, boxShadow:'0 0 4px var(--blue)' }}/>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// FINANCE TAB
// ═══════════════════════════════════════════════════════════════
function FinTab() {
  const [pf, setPf] = useState(loadPortfolio());
  const [prices, setPrices] = useState(loadPriceCache());
  const [fx, setFx] = useState(sto.getJSON('j_fx_cache', null));
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [loading, setLoading] = useState(false);

  const refresh = async () => {
    const key = sto.get('j_ak');
    if (!key) { toast('Add Alpha Vantage key in ⚙️', 'red'); return; }
    setLoading(true);
    for (const p of pf) {
      if (p.symbol) await fetchPrice(p.symbol, key, true);
    }
    setPrices(loadPriceCache());
    setLoading(false);
    toast('Prices refreshed', 'gn');
    haptic.tick();
  };

  useEffect(() => {
    const key = sto.get('j_ak');
    if (!key) return;
    (async () => {
      for (const p of pf) {
        if (p.symbol) await fetchPrice(p.symbol, key);
      }
      setPrices(loadPriceCache());
    })();
    fetchFX().then(d => d && setFx(d));
  }, []);

  const saveHolding = (h) => {
    const newPf = h.id ? pf.map(x => x.id === h.id ? h : x) : [...pf, { ...h, id: uid() }];
    setPf(newPf); savePortfolio(newPf); setEditing(null); setAdding(false);
    toast(h.id ? 'Holding updated' : 'Holding added', 'gn');
    haptic.success();
  };
  const delHolding = (id) => {
    const newPf = pf.filter(x => x.id !== id);
    setPf(newPf); savePortfolio(newPf); setEditing(null);
    toast('Holding removed', 'gold');
    haptic.tick();
  };

  const lines = pf.map(p => {
    const pr = prices[p.symbol];
    const value = pr ? p.units * pr.price : p.units * p.costBasis;
    const cost = p.units * p.costBasis;
    const gain = value - cost;
    const gainPct = cost > 0 ? (gain / cost * 100) : 0;
    return { ...p, live: !!pr, price: pr?.price || p.costBasis, value, cost, gain, gainPct };
  });
  const totalVal = lines.reduce((s, x) => s + x.value, 0);
  const totalCost = lines.reduce((s, x) => s + x.cost, 0);
  const totalGain = totalVal - totalCost;
  const totalPct = totalCost > 0 ? (totalGain / totalCost * 100) : 0;
  const maxVal = Math.max(...lines.map(l => l.value), 1);
  const hasKey = !!sto.get('j_ak');

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ marginBottom:16, display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', fontWeight:700 }}>PORTFOLIO VALUE</div>
          <div style={{ fontFamily:'var(--hd)', fontSize:36, fontWeight:400, marginTop:4, background:'linear-gradient(135deg, var(--gold), var(--red))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }}>
            €{totalVal.toLocaleString('fr-FR', { maximumFractionDigits:0 })}
          </div>
          {totalCost > 0 && (
            <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:4 }}>
              <span style={{ fontFamily:'var(--mn)', fontSize:12, color:totalGain>=0?'var(--gn)':'var(--redHot)', fontWeight:500 }}>
                {totalGain>=0?'+':''}€{totalGain.toLocaleString('fr-FR', { maximumFractionDigits:0 })}
              </span>
              <span style={{ fontFamily:'var(--mn)', fontSize:10, color:totalGain>=0?'var(--gn)':'var(--redHot)' }}>
                {totalGain>=0?'+':''}{totalPct.toFixed(1)}%
              </span>
            </div>
          )}
        </div>
        <button onClick={refresh} disabled={loading || !hasKey} aria-label="Refresh prices"
          style={{ background:'var(--bg3)', border:'1px solid var(--bdrGold)', borderRadius:8, width:36, height:36, cursor:hasKey?'pointer':'not-allowed', display:'flex', alignItems:'center', justifyContent:'center', opacity:hasKey?1:0.5 }}>
          <IRefresh size={15} color={loading?'var(--t4)':'var(--gold)'} sw={2}/>
        </button>
      </div>

      {!hasKey && (
        <div className="hud hud-red-bdr" style={{ padding:12, marginBottom:14 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--redHot)', fontWeight:700, letterSpacing:'.1em' }}>NO PRICE FEED</div>
          <div style={{ fontSize:11, color:'var(--t2)', marginTop:4 }}>Add Alpha Vantage key in ⚙️ to enable live prices.</div>
        </div>
      )}

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--gold)', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span>Holdings</span>
        <button onClick={()=>{ haptic.tick(); setAdding(true); }} style={{ background:'none', border:'1px solid var(--bdrGold)', borderRadius:6, padding:'4px 8px', cursor:'pointer', display:'flex', alignItems:'center', gap:3, fontFamily:'var(--hd)', fontSize:10, color:'var(--gold)', fontWeight:600, letterSpacing:'.08em' }}>
          <IPlus size={10} color="var(--gold)" sw={2.5}/> ADD
        </button>
      </div>

      {(adding || editing) && (
        <HoldingForm holding={editing} onSave={saveHolding} onCancel={()=>{setEditing(null); setAdding(false);}} onDelete={editing ? ()=>delHolding(editing.id) : null}/>
      )}

      {pf.length === 0 ? (
        <div className="hud" style={{ padding:14, textAlign:'center', marginBottom:14 }}>
          <div style={{ fontSize:12, color:'var(--t3)' }}>No holdings yet. Tap ADD to create one.</div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:5, marginBottom:16 }}>
          {lines.map((x, i) => (
            <div key={i} onClick={()=>{ haptic.tick(); setEditing(x); }} className="hud" style={{ padding:'10px 12px', cursor:'pointer' }}>

      </div>
      <div className="hud" style={{ padding:0, overflow:'hidden' }}>
        {fx ? [
          { p:'CHF / EUR', r:fx.chfEur, note:'Salary conversion' },
          { p:'CHF / USD', r:fx.chfUsd, note:'Dollar holdings' },
          { p:'USD / EUR', r:fx.usdEur, note:'SPY exposure' },
        ].map((f, i, a) => (
          <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'11px 14px', borderBottom:i<a.length-1?'1px solid var(--bdr)':'none' }}>

  );
}

function HoldingForm({ holding, onSave, onCancel, onDelete }) {
  const [name, setName] = useState(holding?.name || '');
  const [symbol, setSymbol] = useState(holding?.symbol || '');
  const [units, setUnits] = useState(holding?.units ?? '');
  const [cost, setCost] = useState(holding?.costBasis ?? '');

  const save = () => {
    if (!name.trim() || !symbol.trim()) { toast('Name and symbol required', 'red'); return; }
    onSave({ id: holding?.id, name: name.trim(), symbol: symbol.trim().toUpperCase(), units: parseFloat(units) || 0, costBasis: parseFloat(cost) || 0 });
  };

  return (
    <div className="hud hud-gold-bdr glow-gold" style={{ padding:14, marginBottom:12 }}>
      <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, color:'var(--gold)', letterSpacing:'.12em', marginBottom:10 }}>
        {holding ? 'EDIT HOLDING' : 'NEW HOLDING'}
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
        <input className="ipt" value={name} onChange={e=>setName(e.target.value)} placeholder="Name (e.g. Accenture)"/>
        <input className="ipt" value={symbol} onChange={e=>setSymbol(e.target.value)} placeholder="Symbol (e.g. ACN)" autoCapitalize="characters"/>
        <div style={{ display:'flex', gap:6 }}>
          <input className="ipt" value={units} onChange={e=>setUnits(e.target.value)} placeholder="Units" type="number" step="any" inputMode="decimal"/>
          <input className="ipt" value={cost} onChange={e=>setCost(e.target.value)} placeholder="Avg cost" type="number" step="any" inputMode="decimal"/>
        </div>
      </div>
      <div style={{ display:'flex', gap:6, marginTop:10 }}>
        <button onClick={save} style={{ flex:1, padding:10, background:'linear-gradient(135deg, var(--gold), var(--red))', border:'none', borderRadius:8, color:'#fff', fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.1em', cursor:'pointer' }}>SAVE</button>
        <button onClick={onCancel} style={{ padding:'10px 14px', background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:8, color:'var(--t2)', fontFamily:'var(--hd)', fontSize:12, fontWeight:600, letterSpacing:'.1em', cursor:'pointer' }}>CANCEL</button>
        {onDelete && <button onClick={onDelete} style={{ padding:'10px 12px', background:'rgba(184,57,44,0.1)', border:'1px solid var(--bdr2)', borderRadius:8, cursor:'pointer', display:'flex', alignItems:'center' }}><ITrash size={13} color="var(--redHot)" sw={2}/></button>}
      </div>
    </div>
  );
}

// CALENDAR TAB
// ═══════════════════════════════════════════════════════════════
function CalTab({ gToken, gEvents }) {
  const localEvs = useStore('j_events', loadEvents);
  const [weekOffset, setWeekOffset] = useState(0);
  const [selectedDate, setSelectedDate] = useState(new Date().toISOString().slice(0,10));

  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() + weekOffset * 7);
  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    return d.toISOString().slice(0, 10);
  });

  const allEvs = [...localEvs, ...gEvents].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const evsByDate = {};
  allEvs.forEach(e => { if (!evsByDate[e.date]) evsByDate[e.date] = []; evsByDate[e.date].push(e); });

  const selectedEvs = evsByDate[selectedDate] || [];
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const jumpToToday = () => { haptic.tick(); setWeekOffset(0); setSelectedDate(todayStr); };

  const removeEv = (id) => {
    if (typeof id === 'string' && id.startsWith('g_')) return;
    deleteEvent(id);
    haptic.tick();
    toast('Event removed', 'gold');
  };

  const monthLabel = (() => {
    const first = new Date(days[0] + 'T12:00');
    const last = new Date(days[6] + 'T12:00');
    if (first.getMonth() === last.getMonth()) {
      return first.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' }).toUpperCase();
    }
    return `${first.toLocaleDateString('en-GB', { month: 'short' })} – ${last.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' })}`.toUpperCase();
  })();

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
        <div>
          <div style={{ fontFamily:'var(--display)', fontSize:30, fontWeight:300, letterSpacing:'-0.01em' }}>
            <span style={{ color:'var(--t2)' }}>Calendar</span>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', marginTop:3 }}>{monthLabel}</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          {weekOffset !== 0 && (
            <button onClick={jumpToToday} style={{ background:'none', border:'1px solid var(--bdrGold)', borderRadius:6, padding:'4px 10px', cursor:'pointer', fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', fontWeight:600 }}>TODAY</button>
          )}
          <div style={{ fontFamily:'var(--mn)', fontSize:8, color:gToken?'var(--gn)':'var(--t4)', display:'flex', alignItems:'center', gap:3, fontWeight:700 }}>
            <span style={{ width:5, height:5, borderRadius:'50%', background:gToken?'var(--gn)':'var(--t4)', boxShadow:gToken?'0 0 4px var(--gn)':'none' }}/>
            {gToken ? 'SYNC' : 'LOCAL'}
          </div>
        </div>
      </div>

      <div style={{ display:'flex', alignItems:'center', gap:4, marginBottom:12 }}>
        <button onClick={()=>{ haptic.tick(); setWeekOffset(weekOffset-1); }} aria-label="Previous week"
          style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:8, width:32, height:32, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IChevL size={14} color="var(--t2)" sw={2}/>
        </button>
        <div style={{ flex:1, display:'flex', gap:3, overflow:'hidden' }}>
          {days.map((date) => {
            const d = new Date(date + 'T12:00');
            const isToday = date === todayStr;
            const isSelected = date === selectedDate;
            const hasEvs = !!evsByDate[date];
            return (
              <div key={date}
                className={`cal-day${isToday?' today':''}${isSelected?' selected':''} ${hasEvs?'has-events':''}`}
                onClick={() => { haptic.tick(); setSelectedDate(date); }}
                style={{ flex:1 }}>
                <div style={{ fontFamily:'var(--mn)', fontSize:8, color:isSelected?'var(--red)':isToday?'var(--gold)':'var(--t4)', fontWeight:700 }}>
                  {dayNames[d.getDay()].toUpperCase()}
                </div>
                <div style={{ fontFamily:'var(--hd)', fontSize:18, fontWeight:isSelected?700:400, color:isSelected?'var(--t)':isToday?'var(--gold)':'var(--t2)', marginTop:2 }}>
                  {d.getDate()}
                </div>
              </div>
            );
          })}
        </div>
        <button onClick={()=>{ haptic.tick(); setWeekOffset(weekOffset+1); }} aria-label="Next week"
          style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:8, width:32, height:32, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IChevR size={14} color="var(--t2)" sw={2}/>
        </button>
      </div>

      <div style={{ display:'flex', gap:8, marginBottom:14 }}>
        <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:9, fontFamily:'var(--mn)', color:'var(--gold)', fontWeight:600 }}>
          <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--gold)' }}/>Jarvis ({localEvs.length})
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:9, fontFamily:'var(--mn)', color:'var(--gn)', fontWeight:600 }}>
          <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--gn)' }}/>Google ({gEvents.length})
        </div>
      </div>

      <div style={{ fontFamily:'var(--mn)', fontSize:9, color:selectedDate===todayStr?'var(--gold)':'var(--t3)', letterSpacing:'.12em', marginBottom:8, fontWeight:700 }}>
        {selectedDate === todayStr ? 'TODAY · ' : ''}{new Date(selectedDate+'T12:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}).toUpperCase()}
        <span style={{ color:'var(--t4)', fontWeight:400 }}> · {selectedEvs.length} event{selectedEvs.length!==1?'s':''}</span>
      </div>

      {selectedEvs.length === 0 ? (
        <div className="hud" style={{ padding:20, textAlign:'center' }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t3)', letterSpacing:'.1em' }}>NO EVENTS</div>
          <div style={{ fontSize:11, color:'var(--t4)', marginTop:6 }}>Ask Jarvis to schedule something</div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
          {selectedEvs.map((e, j) => (
            <div key={j} className="hud" style={{ padding:'10px 12px', display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:3, height:28, borderRadius:2, background:e.src==='google'?'var(--gn)':'var(--gold)', flexShrink:0 }}/>
              <span style={{ fontFamily:'var(--mn)', fontSize:11, color:'var(--t3)', width:40, flexShrink:0, fontWeight:500 }}>{e.time==='00:00'?'All day':e.time}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:500 }}>{e.title}</div>
                {e.endTime && e.time !== '00:00' && <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:1 }}>→ {e.endTime}</div>}
                {e.notes && <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{e.notes}</div>}
              </div>
              {e.src !== 'google' && (
                <button onClick={()=>removeEv(e.id)} aria-label="Delete event" style={{ background:'none', border:'none', cursor:'pointer', padding:4, display:'flex' }}>
                  <ITrash size={11} color="var(--t4)" sw={1.75}/>
                </button>
              )}
            </div>
          ))}
        </div>
      )}

      {(() => {
        const upcomingDates = Object.keys(evsByDate).filter(d => d > selectedDate).sort().slice(0, 5);
        if (upcomingDates.length === 0) return null;
        return (
          <div style={{ marginTop:18 }}>
            <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--red)', marginBottom:8 }}>Upcoming</div>
            {upcomingDates.map((date, i) => (
              <div key={i} onClick={() => { haptic.tick(); setSelectedDate(date); const diff = Math.floor((new Date(date+'T12:00') - new Date(todayStr+'T12:00')) / (7 * 864e5)); setWeekOffset(diff); }}
                className="hud" style={{ padding:'8px 12px', marginBottom:4, cursor:'pointer', display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', fontWeight:700, width:60, flexShrink:0 }}>
                  {new Date(date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric'}).toUpperCase()}
                </div>
                <div style={{ fontSize:12, color:'var(--t2)', flex:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                  {evsByDate[date].map(e => e.title).join(' · ')}
                </div>
                <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{evsByDate[date].length}</span>
              </div>
            ))}
          </div>
        );
      })()}
    </div>
  );
}

// BRAIN TAB
// ═══════════════════════════════════════════════════════════════
function BrainTab() {
  const items = useStore('j_brain', loadBrain);
  const [search, setSearch] = useState('');
  const [tagFilter, setTagFilter] = useState('all');

  const allTags = useMemo(() => {
    const tc = {};
    items.forEach(i => (i.tags || []).forEach(t => { tc[t] = (tc[t] || 0) + 1; }));
    return Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0, 10).map(([t])=>t);
  }, [items]);

  const filtered = items.filter(i => {
    const q = search.toLowerCase().trim();
    const matchQ = !q || i.title?.toLowerCase().includes(q) || i.comment?.toLowerCase().includes(q) || (i.tags||[]).some(t=>t.toLowerCase().includes(q));
    const matchT = tagFilter === 'all' || (i.tags || []).includes(tagFilter);
    return matchQ && matchT;
  });

  const del = (id) => { deleteBrainItem(id); haptic.tick(); toast('Deleted', 'gold'); };

  const fmtDate = (iso) => {
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 60000;
    if (diff < 60) return Math.round(diff) + 'm ago';
    if (diff < 1440) return Math.round(diff/60) + 'h ago';
    if (diff < 10080) return Math.round(diff/1440) + 'd ago';
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  };

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ marginBottom:14, display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style={{ fontFamily:'var(--display)', fontSize:30, fontWeight:300, letterSpacing:'-0.01em' }}>
            <span style={{ color:'var(--t2)' }}>Second</span> <span style={{ color:'var(--gold)' }}>Brain</span>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', marginTop:3, fontWeight:500 }}>
            {items.length} ENTR{items.length===1?'Y':'IES'} · AUTO-LOGGED FROM CHAT
          </div>
        </div>
        <IBrain size={26} color="var(--gold)" sw={1.3}/>
      </div>

      <input className="ipt" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search entries…" style={{ marginBottom:10, padding:'10px 12px', fontSize:12 }}/>

      {allTags.length > 0 && (
        <div className="sx" style={{ display:'flex', gap:5, marginBottom:12, paddingBottom:6 }}>
          <button className="pl" onClick={()=>{ haptic.tick(); setTagFilter('all'); }}
            style={tagFilter==='all' ? { borderColor:'var(--gold)', color:'var(--gold)', background:'rgba(232,154,58,0.07)' } : {}}>
            All
          </button>
          {allTags.slice(0, 8).map(t => (
            <button key={t} className="pl" onClick={()=>{ haptic.tick(); setTagFilter(t); }}
              style={tagFilter===t ? { borderColor:'var(--gold)', color:'var(--gold)', background:'rgba(232,154,58,0.07)' } : {}}>
              #{t}
            </button>
          ))}
        </div>
      )}

      {filtered.length === 0 ? (
        <div className="hud hud-gold-bdr" style={{ padding:18, textAlign:'center', marginTop:8 }}>
          <IBrain size={26} color="var(--gold)" sw={1.3}/>
          <div style={{ fontSize:13, color:'var(--t2)', marginTop:10, marginBottom:4, fontWeight:500 }}>
            {items.length === 0 ? 'Your brain is empty' : 'No matches'}
          </div>
          <div style={{ fontSize:11, color:'var(--t3)', lineHeight:1.5 }}>
            {items.length === 0 ? 'Tell Jarvis things to remember.' : 'Try different keywords or filters.'}
          </div>
          {items.length === 0 && (
            <div style={{ marginTop:12, padding:10, background:'var(--bg)', borderRadius:8, textAlign:'left' }}>
              <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', letterSpacing:'.1em', fontWeight:700, marginBottom:6 }}>EXAMPLES</div>
              <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t3)', lineHeight:1.7 }}>
                "Log: read great article on RL agents"<br/>
                "Remember: Christian suggested using pandas"<br/>
                "Note: try fasted morning runs"<br/>
                "Mélanie wants to visit Italy in May"
              </div>
            </div>
          )}
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
          {filtered.map((it) => (
            <div key={it.id} className="hud" style={{ padding:'10px 12px' }}>
              <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:500, lineHeight:1.4 }}>{it.title}</div>
                  {it.comment && <div style={{ fontSize:11, color:'var(--t3)', marginTop:4, lineHeight:1.4 }}>{it.comment}</div>}
                  <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:6, flexWrap:'wrap' }}>
                    <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{fmtDate(it.ts)}</span>
                    {(it.tags || []).map((t, j) => (
                      <span key={j} className="tag">#{t}</span>
                    ))}
                  </div>
                </div>
                <button onClick={()=>del(it.id)} aria-label="Delete" style={{ background:'none', border:'none', cursor:'pointer', padding:4, display:'flex' }}>
                  <ITrash size={12} color="var(--t4)" sw={1.75}/>
                </button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

        <div className="hud hud-red-bdr glow-red scan" style={{ padding:18, marginBottom:14, textAlign:'center', position:'relative' }}>
          <div className="particles"><span/><span/><span/><span/><span/></div>
          <div style={{ position:'relative', zIndex:1 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', letterSpacing:'.15em', marginBottom:6, fontWeight:700 }}>COUNTDOWN</div>
          <div style={{ fontFamily:'var(--hd)', fontSize:72, fontWeight:300, lineHeight:1, color:'var(--gold)', textShadow:'0 0 24px rgba(232,154,58,0.35)' }}>{days}</div>
          <div style={{ fontFamily:'var(--hd)', fontSize:13, color:'var(--t2)', letterSpacing:'.2em', marginTop:4, fontWeight:600 }}>
            DAY{days!==1?'S':''} REMAINING
          </div>
          <div style={{ marginTop:12, padding:'8px 12px', background:'var(--bg)', borderRadius:8 }}>
            <div style={{ display:'flex', justifyContent:'space-between', fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', marginBottom:4, fontWeight:500 }}>
              <span>TRAINING PROGRESS</span>
              <span style={{ color:'var(--gold)', fontWeight:700 }}>WEEK {weeksDone} / {weeksTotal}</span>
            </div>
            <div className="bf"><div className="bff" style={{ width:`${trainingProgress}%` }}/></div>
          </div>
          </div>
        </div>
      )}

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--gold)', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span>This Week</span>
        <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:400 }}>{thisWeekRuns.length} RUN{thisWeekRuns.length!==1?'S':''}</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:3, marginBottom:16 }}>
        {weekAhead.map((date) => {
          const d = new Date(date + 'T12:00');
          const hasRun = !!evsByDate[date];
          const isToday = date === todayStr;
          return (
            <div key={date} className={`wk${isToday?' td':''}${hasRun?' dn':''}`}>
              <div style={{ fontFamily:'var(--mn)', fontSize:7, color:isToday?'var(--gold)':'var(--t4)', fontWeight:700, letterSpacing:'.05em' }}>
                {dayNames[d.getDay()].toUpperCase()}
              </div>
              <div style={{ fontFamily:'var(--hd)', fontSize:14, fontWeight:600, color:hasRun?'var(--gn)':isToday?'var(--gold)':'var(--t2)', marginTop:2 }}>
                {d.getDate()}
              </div>
              {hasRun && <div style={{ width:4, height:4, borderRadius:'50%', background:'var(--gn)', margin:'3px auto 0', boxShadow:'0 0 4px var(--gn)' }}/>}
            </div>
          );
        })}
      </div>

      {nextRun && (
        <div className="hud hud-gold-bdr glow-gold" style={{ padding:12, marginBottom:14 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
            <IFlame size={12} color="var(--gold)" sw={1.75}/>
            <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', letterSpacing:'.12em', fontWeight:700 }}>NEXT RUN</span>
          </div>
          <div style={{ fontSize:14, fontWeight:500 }}>{nextRun.title}</div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t3)', marginTop:3 }}>
            {nextRun.date === todayStr ? 'TODAY' : new Date(nextRun.date + 'T12:00').toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'short' }).toUpperCase()}
            {nextRun.time !== '00:00' && ` · ${nextRun.time}`}
          </div>
        </div>
      )}

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--red)', marginBottom:8 }}>Upcoming Runs</div>

      {upcoming.length === 0 ? (
        <div className="hud" style={{ padding:14, textAlign:'center' }}>
          <div style={{ fontSize:12, color:'var(--t3)', marginBottom:4 }}>
            {gToken ? 'No runs scheduled' : 'Connect Google Calendar to sync Garmin'}
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', lineHeight:1.5 }}>
            Runs are detected from your calendar by keywords:<br/>
            run · km · tempo · long run · interval · training
          </div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
          {upcoming.map((e, i) => (
            <div key={i} className="hud" style={{ padding:'10px 12px', display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:3, height:28, borderRadius:2, background:e.src==='google'?'var(--gn)':'var(--red)', flexShrink:0 }}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{e.title}</div>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', marginTop:2 }}>
                  {e.date === todayStr ? 'TODAY' : new Date(e.date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}).toUpperCase()}
                  {e.time !== '00:00' && ` · ${e.time}`}
                </div>
              </div>
              {e.src === 'google' && <span style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--gn)', fontWeight:700, letterSpacing:'.08em' }}>GCAL</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
// ═══════════════════════════════════════════════════════════════
// MEMOIZED TAB COMPONENTS — Phase F.9 perf pass
// React.memo prevents Jarvis-only state changes (the 60s time tick,
// online toggle, showSet/showMore) from cascading re-renders into
// every tab subtree. Tabs still re-render correctly when their own
// props or internal state change.
// Hoisting note: function declarations above are hoisted to module
// top, so wrapping them here (after declaration but before MOUNT)
// is safe.
// Note: RunTab is currently unused (Marathon tab removed from nav);
// no wrapper needed until/unless it returns to the JSX.
// ═══════════════════════════════════════════════════════════════
const MChatTab  = React.memo(ChatTab);
const MBriefTab = React.memo(BriefTab);
const MTasksTab = React.memo(TasksTab);
const MMailTab  = React.memo(MailTab);
const MNewsTab  = React.memo(NewsTab);
const MFinTab   = React.memo(FinTab);
const MCalTab   = React.memo(CalTab);
const MBrainTab = React.memo(BrainTab);

// ═══════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(<Jarvis/>);
</script>
</body>
</html>
