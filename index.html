// GOOGLE CALENDAR
// ═══════════════════════════════════════════════════════════════
const GCID = '1022045416372-q8dcqrmpoc7nuc32vuiom5bbdrtcnsak.apps.googleusercontent.com';
const GSCOPE = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/gmail.readonly';

const fetchGCal = async (token) => {
  const past = new Date(Date.now() - 30 * 864e5).toISOString();
  const end = new Date(Date.now() + 90 * 864e5).toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(past)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime&maxResults=250`;
  try {
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { sto.del('j_gtoken'); sto.del('j_gtoken_exp'); return { events: [], expired: true }; }
    if (!res.ok) return { events: [], expired: false };
    const d = await res.json();
    const events = (d.items || []).map(ev => ({
      id: 'g_' + ev.id,
      title: ev.summary || '(No title)',
      date: (ev.start.dateTime || ev.start.date || '').slice(0, 10),
      time: ev.start.dateTime ? ev.start.dateTime.slice(11, 16) : '00:00',
      endTime: ev.end?.dateTime ? ev.end.dateTime.slice(11, 16) : '',
      notes: ev.location || (ev.description ? ev.description.slice(0, 80) : ''),
      src: 'google'
    }));
    return { events, expired: false };
  } catch { return { events: [], expired: false }; }
};

// ═══════════════════════════════════════════════════════════════
// GMAIL — fetch recent messages + classify priority
// ═══════════════════════════════════════════════════════════════
const decodeB64Url = (s) => {
  try { return atob(s.replace(/-/g, '+').replace(/_/g, '/')); } catch { return ''; }
};

const fetchGmail = async (token) => {
  try {
    const listRes = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?q=newer_than:7d+in:inbox&maxResults=50', {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (listRes.status === 401) return { mails: [], expired: true, err: null };
    if (listRes.status === 403) {
      const j = await listRes.json().catch(()=>({}));
      return { mails: [], expired: false, err: j.error?.message?.includes('insufficient') ? 'scope' : 'api_disabled' };
    }
    if (!listRes.ok) return { mails: [], expired: false, err: 'HTTP ' + listRes.status };
    const list = await listRes.json();
    const ids = (list.messages || []).map(m => m.id);
    if (ids.length === 0) return { mails: [], expired: false, err: null };

    const cache = sto.getJSON('j_mail_cache', {});
    const newIds = ids.filter(id => !cache[id]);

    // Limit parallel fetches
    const chunks = [];
    for (let i = 0; i < newIds.length; i += 6) chunks.push(newIds.slice(i, i + 6));
    for (const chunk of chunks) {
      const results = await Promise.all(chunk.map(async id => {
        try {
          const r = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date&metadataHeaders=To&metadataHeaders=List-Unsubscribe`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (!r.ok) return null;
          const d = await r.json();
          const h = (d.payload?.headers || []).reduce((acc, x) => { acc[x.name.toLowerCase()] = x.value; return acc; }, {});
          const labels = d.labelIds || [];
          const category = labels.find(l => l.startsWith('CATEGORY_'))?.replace('CATEGORY_', '').toLowerCase() || 'primary';
          return {
            id: d.id,
            threadId: d.threadId,
            from: h.from || '',
            subject: h.subject || '(no subject)',
            date: h.date || '',
            snippet: d.snippet || '',
            unread: labels.includes('UNREAD'),
            starred: labels.includes('STARRED'),
            important: labels.includes('IMPORTANT'),
            category,
            hasUnsub: !!h['list-unsubscribe'],
            fetchedAt: Date.now()
          };
        } catch { return null; }
      }));
      results.forEach(m => { if (m) cache[m.id] = m; });
    }

    // Prune cache — only keep mails still in inbox list
    const kept = {};
    ids.forEach(id => { if (cache[id]) kept[id] = cache[id]; });
    sto.setJSON('j_mail_cache', kept);

    const mails = ids.map(id => kept[id]).filter(Boolean)
      .sort((a, b) => new Date(b.date) - new Date(a.date));
    return { mails, expired: false, err: null };
  } catch (e) {
    return { mails: [], expired: false, err: 'Network: ' + e.message };
  }
};

// Fetch the full body of a mail
const fetchMailBody = async (token, id) => {
  const cache = sto.getJSON('j_mail_bodies', {});
  if (cache[id]) return cache[id];
  try {
    const r = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}?format=full`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!r.ok) return null;
    const d = await r.json();
    const walk = (part) => {
      if (!part) return { text: '', html: '' };
      let text = '', html = '';
      if (part.body?.data) {
        const decoded = decodeB64Url(part.body.data);
        if (part.mimeType === 'text/plain') text = decoded;
        else if (part.mimeType === 'text/html') html = decoded;
      }
      if (part.parts) part.parts.forEach(p => { const sub = walk(p); text = text || sub.text; html = html || sub.html; });
      return { text, html };
    };
    const { text, html } = walk(d.payload);
    // Sanitize HTML with DOMPurify if available, otherwise fall back to a
    // conservative regex strip. DOMPurify removes all script-execution
    // vectors (onerror, javascript:, embedded SVG handlers, iframes…).
    let cleanHtml;
    if (typeof window !== 'undefined' && window.DOMPurify) {
      cleanHtml = window.DOMPurify.sanitize(html, {
        FORBID_TAGS: ['script', 'style', 'iframe', 'object', 'embed', 'form', 'input', 'button'],
        FORBID_ATTR: ['onerror', 'onload', 'onclick', 'onmouseover', 'onfocus', 'onblur', 'srcdoc', 'formaction'],
        ALLOW_DATA_ATTR: false
      });
    } else {
      cleanHtml = html
        .replace(/<script[\s\S]*?<\/script>/gi, '')
        .replace(/<style[\s\S]*?<\/style>/gi, '')
        .replace(/<iframe[\s\S]*?<\/iframe>/gi, '')
        .replace(/\son\w+\s*=\s*"[^"]*"/gi, '')
        .replace(/\son\w+\s*=\s*'[^']*'/gi, '')
        .replace(/javascript:/gi, '');
    }
    const body = { text: text.slice(0, 5000), html: cleanHtml.slice(0, 15000), fetchedAt: Date.now() };
    const next = { ...cache, [id]: body };
    // Keep cache small: last 30 bodies
    const keys = Object.keys(next).sort((a, b) => next[b].fetchedAt - next[a].fetchedAt).slice(0, 30);
    const trimmed = {};
    keys.forEach(k => { trimmed[k] = next[k]; });
    sto.setJSON('j_mail_bodies', trimmed);
    return body;
  } catch { return null; }
};

// Mark mail as read on Gmail (removes UNREAD label)
const markMailRead = async (token, id) => {
  try {

const classifyMails = async (mails) => {
  if (mails.length === 0) return sto.getJSON('j_mail_class', {});
  const cache = sto.getJSON('j_mail_class', {});

  // Pre-classify using Gmail's own signals — no LLM call needed
  mails.forEach(m => {
    // Respect Felix's manual overrides: never reclassify if he's set it himself.
    if (cache[m.id]?.userOverride) return;
    if (cache[m.id] && cache[m.id].highlight !== undefined) return;
    // Promotions category → low priority, no need for LLM
    if (m.category === 'promotions') {
      cache[m.id] = { priority: 'low', action: 'none', highlight: '', deadline: 'none', reason: 'Promotion', source: 'gmail-label', ts: Date.now() };
    } else if (m.category === 'social') {
      cache[m.id] = { priority: 'low', action: 'none', highlight: '', deadline: 'none', reason: 'Social', source: 'gmail-label', ts: Date.now() };
    } else if (m.hasUnsub && !m.important && m.category !== 'primary') {
      cache[m.id] = { priority: 'routine', action: 'none', highlight: '', deadline: 'none', reason: 'Newsletter', source: 'gmail-label', ts: Date.now() };
    }
  });
  sto.setJSON('j_mail_class', cache);

  // Only LLM-classify mails that aren't already pre-classified AND not user-overridden
  const need = mails.filter(m => (!cache[m.id] || cache[m.id].highlight === undefined) && !cache[m.id]?.userOverride);
  if (need.length === 0) return cache;
  if (!sto.get('j_groq') && !sto.get('j_gk')) return cache;

  const batch = need.slice(0, 20);
  const prompt = `Triage emails for Felix — network financial analyst at MSC Air Cargo Geneva, engaged to Mélanie, watches markets/Middle East, commutes Massongy→Chêne-Bougerie. Gmail already flagged these as Primary category. For EACH email output JSON with:

- priority: "urgent" (action needed <24h, money/security, boss request, deadline today, Mélanie urgent, travel issues) | "important" (read today, work-relevant, personal appointments, financial updates) | "routine" (FYI only, newsletters, confirmations) | "low" (automated, notifications)
- action: "reply" | "review" | "decide" | "pay" | "confirm" | "none" — what Felix actually needs to DO
- highlight: ONE concise sentence (max 14 words) describing WHY this matters OR what action is needed. Write it TO Felix in plain language like a trusted assistant would speak. Examples: "Your boss wants feedback on the Q3 analysis by tomorrow", "Mélanie reminds you about dinner Saturday", "Payment confirmation from Interactive Brokers — €1,247 received". If it's low priority, leave empty string.
- deadline: "today" | "tomorrow" | "this_week" | "none" — if the email implies a time pressure

Gmail's "Important" signal is ALREADY CONSIDERED — just focus on what Felix needs to do.

Reply with ONLY a valid JSON array, NO markdown, NO prose. Format: [{"id":"...","priority":"...","action":"...","highlight":"...","deadline":"..."}]

Emails:
${batch.map((m, i) => `ID: ${m.id}
From: ${m.from}
Subject: ${m.subject}
${m.important ? '(Gmail flagged IMPORTANT)' : ''}
Snippet: ${m.snippet.slice(0, 220)}`).join('\n---\n')}`;

  try {
    const { text } = await callAI([{ r: 'u', t: prompt }]);
    if (!text) return cache;
    const match = text.match(/\[[\s\S]*\]/);
    if (match) {
      const arr = JSON.parse(match[0]);
      arr.forEach(item => {
        if (item.id && item.priority && !cache[item.id]?.userOverride) {
          cache[item.id] = {
            priority: item.priority,
            action: item.action || 'none',
            highlight: item.highlight || '',
            deadline: item.deadline || 'none',
            reason: item.highlight || '',
            source: 'ai',
            ts: Date.now()
          };
        }
      });
      sto.setJSON('j_mail_class', cache);
    }
  } catch {}
  return cache;
};

// ═══════════════════════════════════════════════════════════════
// NEWS
// Focus: surface only the real highlights Felix cares about.
// Trust-score + recency ranking + strict dedupe + capped count.
// No CORS proxy (GNews supports CORS directly — proxies cause more
// failures than they fix and GNews is rate-limited aggressively).
// ═══════════════════════════════════════════════════════════════
const NEWS_CACHE_TTL = 30 * 60 * 1000;

// Top-tier wire services + quality outlets. Matched by domain substring so
// subdomains and AMP mirrors score correctly. Everything not listed → 30.
const TRUSTED_SOURCES = {
  100: ['reuters.com', 'apnews.com', 'afp.com', 'bloomberg.com', 'ft.com', 'wsj.com', 'economist.com'],
  90:  ['bbc.com', 'bbc.co.uk', 'nytimes.com', 'washingtonpost.com', 'theguardian.com', 'aljazeera.com', 'dw.com', 'lemonde.fr', 'politico.eu'],
  80:  ['cnbc.com', 'cnn.com', 'politico.com', 'axios.com', 'npr.org', 'swissinfo.ch', 'rts.ch', 'letemps.ch', 'rfi.fr', 'france24.com'],
  60:  ['forbes.com', 'businessinsider.com', 'techcrunch.com', 'theverge.com', 'arstechnica.com', 'nature.com', 'scientificamerican.com', 'handelsblatt.com'],
};

const sourceScore = (article) => {
  const url = (article.source?.url || article.url || '').toLowerCase();
  for (const [score, domains] of Object.entries(TRUSTED_SOURCES)) {
    if (domains.some(d => url.includes(d))) return parseInt(score);
  }
  return 30; // unknown — kept but deprioritised
};

// Normalize title to first-10-words-lowercased-alphanum, stripping " | Source" suffixes.
// Used for dedupe so the same story from Reuters / AFP / BBC collapses to one entry.
const normalizeTitle = (t) => (t || '').toLowerCase()
  .replace(/\s*[\|\-–—]\s*[^|\-–—]{1,60}$/g, '')
  .replace(/[^a-z0-9 ]/g, ' ')
  .split(/\s+/).filter(Boolean).slice(0, 10).join(' ').trim();

// Rank: 60% source trust + 40% recency (linear, 4 points lost per hour of age).
// Dedupe by normalized title. Cap to keep focus tight — breaking = top 5 only.
const rankAndFilterArticles = (articles, category = 'general') => {
  const now = Date.now();
  const recency = (a) => {
    const age = (now - new Date(a.publishedAt).getTime()) / 3600000;
    return Math.max(0, 100 - age * 4);
  };
  const scored = articles
    .filter(a => a && a.title && a.url)
    .map(a => ({ a, score: sourceScore(a) * 0.6 + recency(a) * 0.4 }));
  scored.sort((x, y) => y.score - x.score);
  const seen = new Set();
  const out = [];
  for (const { a } of scored) {
    const k = normalizeTitle(a.title);
    if (k && !seen.has(k)) { seen.add(k); out.push(a); }
  }
  const limit = category === 'general' ? 5 : 6;
  return out.slice(0, limit);
};

const fetchNews = async (category = 'general', searchQuery = null, force = false) => {
  const key = sto.get('j_nk');
  if (!key) return { articles: [], ts: 0, err: 'no_key' };
  const cacheKey = `j_news_${searchQuery || category}`;
  const cached = sto.getJSON(cacheKey, null);
  if (!force && cached && cached.articles?.length > 0 && Date.now() - cached.ts < NEWS_CACHE_TTL) return cached;

  // Helper: on any failure, keep serving good cached articles rather than
  // wiping them out. This is the key fix for "news disappears on refresh".
  const keepOld = (errMsg) => {
    if (cached?.articles?.length > 0) return { ...cached, err: errMsg, staleWarn: true };
    return { articles: [], ts: Date.now(), err: errMsg };
  };

  try {
    const url = searchQuery
      ? `https://gnews.io/api/v4/search?q=${encodeURIComponent(searchQuery)}&lang=en&max=10&sortby=publishedAt&apikey=${key}`
      : `https://gnews.io/api/v4/top-headlines?category=${category}&lang=en&max=10&apikey=${key}`;
    // Phase F.2: retry transient network failures (Wi-Fi switching,
    // brief DNS hiccups). Throws after 3 attempts; caller's catch
    // falls back to cached articles via keepOld.
    let res;
    let lastErr;
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        res = await fetch(url, { cache: 'no-store' });
        lastErr = null;
        break;
      } catch (e) {
        lastErr = e;
        if (attempt < 2) await new Promise(r => setTimeout(r, 400 * (attempt + 1)));
      }
    }
    if (lastErr) throw lastErr;
    if (res.status === 401) return keepOld('Invalid GNews key');
    if (res.status === 403) return keepOld('GNews quota exceeded (100/day free tier)');
    if (res.status === 429) return keepOld('GNews rate limited');
    if (!res.ok)             return keepOld(`HTTP ${res.status}`);
    const d = await res.json();
    if (!d.articles || d.articles.length === 0) return keepOld(d.errors?.[0] || 'No articles returned');
    const ranked = rankAndFilterArticles(d.articles, category);
    const result = { articles: ranked, ts: Date.now(), err: null };
    sto.setJSON(cacheKey, result);
    return result;
  } catch (e) {
    return keepOld('Network: ' + e.message);
  }
};

// ═══════════════════════════════════════════════════════════════
// GEMINI — with retry
// ═══════════════════════════════════════════════════════════════
const callGemini = async (key, messages, useSearch = false, attempt = 1) => {
  const body = {
    contents: messages.map(m => ({ role: m.r === 'u' ? 'user' : 'model', parts: [{ text: m.t }] })),
    generationConfig: { maxOutputTokens: 2048, temperature: 0.7 }
  };
  if (useSearch) body.tools = [{ google_search: {} }];
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const d = await res.json();
    if (!res.ok) {
      if (res.status >= 500 && attempt < 2) {
        await new Promise(r => setTimeout(r, 800));
        return callGemini(key, messages, useSearch, attempt + 1);
      }
      return { text: `⚠ ${d.error?.message || 'API error ' + res.status}`, sources: [] };
    }
    let sources = [];
    try {
      const gm = d.candidates?.[0]?.groundingMetadata;
      if (gm?.groundingChunks) {
        sources = gm.groundingChunks.filter(c => c.web?.uri)
          .map(c => ({ title: c.web.title || new URL(c.web.uri).hostname, url: c.web.uri }))
          .slice(0, 6);
      }
      if (sources.length === 0 && gm?.searchEntryPoint?.renderedContent) {
        const urls = [...(gm.searchEntryPoint.renderedContent.matchAll(/href="([^"]+)"/g))];
        sources = urls.map(m => { try { return { title: new URL(m[1]).hostname, url: m[1] }; } catch { return null; } }).filter(Boolean).slice(0, 4);
      }
    } catch {}
    const text = d.candidates?.[0]?.content?.parts?.map(p => p.text).filter(Boolean).join('') || 'No response.';
    return { text, sources };
  } catch (e) {
    if (attempt < 2) {
      await new Promise(r => setTimeout(r, 600));
      return callGemini(key, messages, useSearch, attempt + 1);
    }
    return { text: '⚠ Connection failed, sir. Check your network.', sources: [], provider: 'gemini', error: true };
  }
};

// ═══════════════════════════════════════════════════════════════
// GROQ — Llama 3.3 70B primary, Llama 3.1 8B instant fallback
// OpenAI-compatible API. Free: 1000 req/day on 70B, 14400/day on 8B.
// ═══════════════════════════════════════════════════════════════
const GROQ_MODELS = {
  quality: 'llama-3.3-70b-versatile',  // 1000/day, 30 RPM — best quality
  fast: 'llama-3.1-8b-instant'          // 14400/day — rate-limit fallback
};

// Track Groq rate-limit state per model — avoids hammering when limited
const groqLimitState = { perModel: {} };
const isGroqLimited = (model) => {
  const s = groqLimitState.perModel[model];
  return s && Date.now() < s.until;
};
const markGroqLimited = (model, retryAfterSec = 60) => {
  groqLimitState.perModel[model] = { until: Date.now() + retryAfterSec * 1000 };
};

const callGroq = async (key, messages, model = GROQ_MODELS.quality) => {
  // Convert Claude/Gemini-style messages to OpenAI format
  const oaiMessages = messages.map(m => ({
    role: m.r === 'u' ? 'user' : m.r === 'a' ? 'assistant' : 'system',
    content: m.t
  }));
  // First message is usually the system prompt wrapped as 'assistant' — fix that
  if (oaiMessages[0]?.role === 'assistant' && messages[0]?.t?.includes('J.A.R.V.I.S.')) {
    oaiMessages[0].role = 'system';
  }
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${key}` },
      body: JSON.stringify({ model, messages: oaiMessages, max_tokens: 2048, temperature: 0.7 })
    });
    if (res.status === 429) {
      const retryAfter = parseInt(res.headers.get('retry-after') || '60');
      markGroqLimited(model, retryAfter);
      return { text: null, sources: [], provider: 'groq', model, status: 429, rateLimited: true };
    }
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      return { text: null, sources: [], provider: 'groq', model, status: res.status, error: d.error?.message || `HTTP ${res.status}` };
    }
    const d = await res.json();
    const content = d.choices?.[0]?.message?.content || '';
    return { text: content, sources: [], provider: 'groq', model, status: 200 };
  } catch (e) {
    return { text: null, sources: [], provider: 'groq', model, error: 'Network: ' + e.message };
  }
};

// ═══════════════════════════════════════════════════════════════
// AI ROUTER — Groq primary, Gemini for search, silent failover
// Strategy:
// 1. If needsSearch → Gemini (Groq has no web grounding)
// 2. Else try Groq 70B
// 3. On 429 → Groq 8B Instant
// 4. On any other Groq failure → Gemini
// 5. No keys → helpful error message
// ═══════════════════════════════════════════════════════════════
const callAI = async (messages, options = {}) => {
  const { needsSearch = false } = options;
  const gk = sto.get('j_gk');
  const groqKey = sto.get('j_groq');

  // Search-grounded queries MUST use Gemini (Groq cannot browse)
  if (needsSearch && gk) return callGemini(gk, messages, true);

  // Primary: Groq 70B (unless rate-limited)
  if (groqKey && !isGroqLimited(GROQ_MODELS.quality)) {
    const r = await callGroq(groqKey, messages, GROQ_MODELS.quality);
    if (r.text) return r;
    // 429 → try Groq 8B Instant
    if (r.rateLimited && !isGroqLimited(GROQ_MODELS.fast)) {
      const f = await callGroq(groqKey, messages, GROQ_MODELS.fast);
      if (f.text) return f;
    }
  } else if (groqKey && !isGroqLimited(GROQ_MODELS.fast)) {
    // 70B limited but 8B may still work
    const f = await callGroq(groqKey, messages, GROQ_MODELS.fast);
    if (f.text) return f;
  }

  // Final fallback: Gemini
  if (gk) return callGemini(gk, messages, needsSearch);

  return { text: '⚠ No AI provider configured, sir. Add a Groq or Gemini key in Settings.', sources: [], provider: 'none', error: true };
};

- high: time-critical, work-deliverable, money/security, deadline within 2 days
- med: this week, important but not urgent
- low: errand, nice-to-have, no hard deadline

When Felix says "remember"/"log"/"note"/"save" — OR mentions something worth remembering (NOT a task) — append:
[[NOTE:{"title":"Short summary","tags":["tag1","tag2"],"comment":"optional context"}]]

AUTO-MEMORY (NOTE only — do NOT auto-create tasks): save when Felix mentions someone told/shared/recommended something, an idea/insight/decision, Mélanie said/asked something, work changes, or new info about people. Do NOT save trivial exchanges.

Rules:
- "tonight" = today. "tomorrow" = today+1. "next Monday" = upcoming Monday.
- For events with no time given, use "00:00".
- For tasks with no time given, dueTime = null.
- Confirm in natural language BEFORE the tag.
- ALWAYS include the tag when appropriate — the system depends on it.
- Never mention or display the tags themselves.
- One reply can contain multiple tags.
- Do not invent tasks Felix did not ask for. Tasks must come from his explicit intent.`;
};

// ═══════════════════════════════════════════════════════════════
// VOICE OUTPUT (Phase D) — Web Speech Synthesis
//
// Jarvis speaks briefings, urgent reminders, and self-test confirmations
// when voice output is enabled. Off by default. Setting persisted in
// j_voice_pref. Choose a British male voice when available; otherwise
// fall back to whatever the platform offers.
//
// Notes:
//   - Speech requires a user gesture on iOS Safari before first speak()
//     will produce sound. The first tap anywhere in the app primes it.
//   - Volume is set to 0.7 so speech doesn't dominate ambient audio.
//   - Speech is canceled before each new utterance to avoid pile-up.
// ═══════════════════════════════════════════════════════════════
const VOICE_PREF_KEY = 'j_voice_pref';
const isVoiceEnabled = () => sto.get(VOICE_PREF_KEY) === '1';
const setVoiceEnabled = (v) => sto.set(VOICE_PREF_KEY, v ? '1' : '0');

let _cachedVoice = null;
let _voicePrimed = false;
const pickVoice = () => {
  if (!('speechSynthesis' in window)) return null;
  if (_cachedVoice) return _cachedVoice;
  const voices = window.speechSynthesis.getVoices() || [];
  if (!voices.length) return null;
  // Preference order: British male → British any → English male → English any
  const matchers = [
    v => /en-GB/i.test(v.lang) && /male|david|daniel|oliver|arthur|gordon/i.test(v.name),
    v => /en-GB/i.test(v.lang),
    v => /en-/i.test(v.lang) && /male|google uk|alex|fred/i.test(v.name),
    v => /en-/i.test(v.lang),
  ];
  for (const m of matchers) {
    const found = voices.find(m);
    if (found) { _cachedVoice = found; return found; }
  }
  _cachedVoice = voices[0];
  return _cachedVoice;
};

// Prime on first user gesture — required by Safari/iOS to allow speech later
if (typeof document !== 'undefined') {
  document.addEventListener('pointerdown', () => {
    if (_voicePrimed || !('speechSynthesis' in window)) return;
    try {
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0; window.speechSynthesis.speak(u);
      _voicePrimed = true;
    } catch {}
    // Voices on Chrome load asynchronously
    if (window.speechSynthesis && !window.speechSynthesis.getVoices().length) {
      window.speechSynthesis.onvoiceschanged = () => { _cachedVoice = null; pickVoice(); };
    }
  }, { once: true });
}

const speak = (text, opts = {}) => {
  if (!isVoiceEnabled() || !('speechSynthesis' in window) || !text) return false;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = pickVoice();
    if (v) u.voice = v;
    u.lang = v?.lang || 'en-GB';
    u.rate = opts.rate ?? 1.05;
    u.pitch = opts.pitch ?? 0.95;
    u.volume = opts.volume ?? 0.7;
    window.speechSynthesis.speak(u);
    return true;
  } catch { return false; }
};

const speakBriefing = (slot, body) => {
  if (!isVoiceEnabled()) return;
  const intro = slot === 'morning'
    ? 'Good morning, sir. '
    : slot === 'evening'
      ? 'Good evening, sir. '
      : '';
  // Strip mid-dot separators that look fine on screen but read awkwardly
  const cleaned = (body || '').replace(/\s*·\s*/g, '. ').replace(/\s+/g, ' ').trim();
  speak(intro + cleaned);
};

// ═══════════════════════════════════════════════════════════════
// NOTIFICATIONS — four-layer architecture, no backend, free.
//
// L1. Notification Triggers (Chrome Android PWA): TimestampTrigger
//     queues notifications at the OS level so they fire even when
//     the app is fully closed. Feature-detected; absent on Firefox/iOS.
//
// L2. Foreground tick: setInterval(30s) running in the page itself,
//     fires Notification for anything due in the next 5 min that L1
//     didn't already handle. Works while app is open or in tab-bg.
//
// L3. Catch-up on focus: when the app opens / regains focus, fires
//     any briefing slot that's due-but-not-shown today. Always works.
//
// L4. In-app urgency surface (handled by Brief tab in Phase B): the
//     canonical safety net. Even if every OS notification fails,
//     overdue items glow when Felix opens the app.
//
// State persistence (j_notif_state):
//   { lastBriefingMorn: 'YYYY-MM-DD',  // last morning briefing date
//     lastBriefingEve:  'YYYY-MM-DD',  // last evening briefing date
//     fired: { [evId]: timestamp } }   // foreground-tick dedupe
// ═══════════════════════════════════════════════════════════════
const NOTIF_STATE_KEY = 'j_notif_state';
const loadNotifState = () => sto.getJSON(NOTIF_STATE_KEY, { lastBriefingMorn: '', lastBriefingEve: '', fired: {} });
const saveNotifState = (s) => sto.setJSON(NOTIF_STATE_KEY, s);

const supportsTriggers = () => {
  try { return 'showTrigger' in Notification.prototype; } catch { return false; }
};
const isPermitted = () => typeof Notification !== 'undefined' && Notification.permission === 'granted';

// Show a notification immediately via the SW registration so it is
// consistent across mobile/desktop and rendered with our HUD icon.
const showNow = async (title, options = {}) => {
  if (!isPermitted()) return false;
  try {
    const reg = await navigator.serviceWorker.ready;
    await reg.showNotification(title, {
      icon: './jarvis-icon.svg',
      badge: './jarvis-icon.svg',
      vibrate: [120, 60, 120],
      data: { url: './' },
      ...options
    });
    return true;
  } catch {
    try { new Notification(title, options); return true; } catch { return false; }
  }
};

// Schedule a notification at a specific timestamp using the Notification
// Triggers API. Returns true if successfully queued at OS level, false
// otherwise (caller should rely on L2/L3 fallbacks).
const scheduleAt = async (title, when, options = {}) => {
  if (!isPermitted() || !supportsTriggers()) return false;
  if (when <= Date.now()) return false;
  try {
    const reg = await navigator.serviceWorker.ready;
    await reg.showNotification(title, {
      icon: './jarvis-icon.svg',
      badge: './jarvis-icon.svg',
      vibrate: [120, 60, 120],
      data: { url: './' },
      ...options,
      showTrigger: new TimestampTrigger(when)
    });
    return true;
  } catch { return false; }
};

// Cancel previously-scheduled notifications matching a tag. We use this
// before re-scheduling to keep the queue idempotent.
const cancelByTag = async (tag) => {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const list = await reg.getNotifications({ tag, includeTriggered: true });
    list.forEach(n => n.close());
  } catch {}
};

// Cancel any tag matching a prefix (used to clear all scheduled briefings).
const cancelByPrefix = async (prefix) => {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const list = await reg.getNotifications({ includeTriggered: true });
    list.forEach(n => { if ((n.tag || '').startsWith(prefix)) n.close(); });
  } catch {}
};

// Build the body string for a morning briefing using current weather + today's events.
const buildMorningBody = () => {
  const w = sto.getJSON('j_weather', null);
  const today = new Date().toISOString().slice(0, 10);
  const upcoming = loadEvents().filter(e => e.date === today).length;
  return [
    w ? `${w.temp}°C · ${w.desc}` : null,
    upcoming ? `${upcoming} event${upcoming > 1 ? 's' : ''} today` : null,
    'Briefing ready, sir.'
  ].filter(Boolean).join(' · ');
};

// Schedule the next 7 days of morning + evening briefings via L1.
// Re-run on every app open so the queue stays full as days roll forward.
const scheduleBriefings = async () => {
  if (!isPermitted()) return;
  await cancelByPrefix('briefing-morning-');
  await cancelByPrefix('briefing-evening-');
  if (!supportsTriggers()) return; // L1 unavailable; L3 (catch-up) covers this
  const now = Date.now();
  for (let d = 0; d < 7; d++) {
    const morn = new Date(); morn.setDate(morn.getDate() + d); morn.setHours(7, 0, 0, 0);
    if (morn.getTime() > now) {
      await scheduleAt('J.A.R.V.I.S. · Morning Briefing', morn.getTime(), {
        body: buildMorningBody(),
        tag: 'briefing-morning-' + morn.toISOString().slice(0, 10),
        data: { url: './?tab=home' }
      });
    }
    const eve = new Date(); eve.setDate(eve.getDate() + d); eve.setHours(19, 0, 0, 0);
    if (eve.getTime() > now) {
      await scheduleAt('J.A.R.V.I.S. · Evening Summary', eve.getTime(), {
        body: 'Evening summary ready, sir. Review today and plan tomorrow.',
        tag: 'briefing-evening-' + eve.toISOString().slice(0, 10),
        data: { url: './?tab=home' }
      });
    }
  }
};

// Schedule a 10-min-before reminder for a single event via L1.
// Idempotent: tag = 'reminder-<id>', so re-running doesn't duplicate.
const scheduleEventReminder = async (ev) => {
  if (!isPermitted() || !ev?.id) return;
  const when = new Date(ev.date + 'T' + (ev.time || '09:00')).getTime();
  if (!isFinite(when)) return;
  const fireAt = when - 10 * 60 * 1000;
  await cancelByTag('reminder-' + ev.id);
  if (fireAt <= Date.now()) return;
  if (fireAt > Date.now() + 30 * 864e5) return; // > 30 days out, skip for now
  await scheduleAt('J.A.R.V.I.S. · ' + ev.title, fireAt, {
    body: `In 10 min${ev.time && ev.time !== '00:00' ? ' at ' + ev.time : ''}${ev.notes ? ' · ' + ev.notes : ''}`,
    tag: 'reminder-' + ev.id,
    requireInteraction: true,
    data: { url: './?tab=calendar' }
  });
};
const cancelEventReminder = (id) => cancelByTag('reminder-' + id);

// Reschedule reminders for all stored events. Called on init and when
// the events store changes via the bus.
const rescheduleAllEventReminders = async () => {
  if (!isPermitted()) return;
  const evs = loadEvents();
  for (const ev of evs) await scheduleEventReminder(ev);
};

// L2 — Foreground tick: catches anything L1 missed (no triggers support,
// or scheduled too late). Runs every 30s while page is alive. Also wakes
// snoozed tasks and fires reminders for tasks with a due time.
let foregroundTickHandle = null;
const foregroundTick = async () => {
  if (!isPermitted()) return;
  wakeSnoozedTasks();
  const state = loadNotifState();
  const now = Date.now();
  let dirty = false;

  // Event reminders (10 min before)
  for (const ev of loadEvents()) {
    if (state.fired[ev.id]) continue;
    const when = new Date(ev.date + 'T' + (ev.time || '09:00')).getTime();
    if (!isFinite(when)) continue;
    const fireAt = when - 10 * 60 * 1000;
    if (now >= fireAt && now < when) {
      const minsLeft = Math.max(1, Math.round((when - now) / 60000));
      await showNow('J.A.R.V.I.S. · ' + ev.title, {
        body: `In ${minsLeft} min${ev.notes ? ' · ' + ev.notes : ''}`,
        tag: 'reminder-' + ev.id,
        requireInteraction: true,
        data: { url: './?tab=calendar' }
      });
      state.fired[ev.id] = now;
      dirty = true;
    }
  }

  // Task reminders (10 min before dueTime, only if open + has dueTime today)
  const todayStr = new Date().toISOString().slice(0, 10);
  for (const t of loadTasks()) {
    if (t.status !== 'open' || !t.dueTime || t.due !== todayStr) continue;
    const key = 'task-' + t.id;
    if (state.fired[key]) continue;
    const when = new Date(t.due + 'T' + t.dueTime).getTime();
    if (!isFinite(when)) continue;
    const fireAt = when - 10 * 60 * 1000;
    if (now >= fireAt && now < when) {
      await showNow('J.A.R.V.I.S. · ' + t.title, {
        body: `Due in ${Math.max(1, Math.round((when - now) / 60000))} min${t.notes ? ' · ' + t.notes : ''}`,
        tag: 'task-reminder-' + t.id,
        requireInteraction: true,
        data: { url: './?tab=home' }
      });
      state.fired[key] = now;
      dirty = true;
    }
  }

  // Overdue digest — once per day, after 9am, only if there are overdue items
  if (state.lastOverdueDigest !== todayStr && new Date().getHours() >= 9) {
    const overdue = loadTasks().filter(isOverdue);
    if (overdue.length > 0) {
      const top = overdue.slice(0, 3).map(t => t.title).join(', ');
      const body = top + (overdue.length > 3 ? ` (+${overdue.length - 3} more)` : '') + ' — sir, your attention please.';
      await showNow('J.A.R.V.I.S. · ' + overdue.length + ' overdue', {
        body,
        tag: 'overdue-' + todayStr,
        requireInteraction: true,
        data: { url: './?tab=home' }
      });
      speak(`Sir, ${overdue.length} overdue ${overdue.length > 1 ? 'tasks' : 'task'}. ${top}.`);
      state.lastOverdueDigest = todayStr;
      dirty = true;
    }
  }

  // Garbage-collect fired entries older than 7 days
  Object.keys(state.fired).forEach(k => {
    if (now - state.fired[k] > 7 * 864e5) { delete state.fired[k]; dirty = true; }
  });
  if (dirty) saveNotifState(state);
};
const startForegroundTick = () => {
  if (foregroundTickHandle) clearInterval(foregroundTickHandle);
  foregroundTick();
  foregroundTickHandle = setInterval(foregroundTick, 30 * 1000);
};

// L3 — Catch-up briefings: fire today's slot if it's overdue + unshown.
// Also speaks the briefing aloud (Phase D) if voice-output is enabled.
const catchUpBriefings = async () => {
  if (!isPermitted()) return;
  const state = loadNotifState();
  const today = new Date().toISOString().slice(0, 10);
  const hr = new Date().getHours();
  let dirty = false;
  if (hr >= 7 && state.lastBriefingMorn !== today) {
    const body = buildMorningBody();
    await showNow('J.A.R.V.I.S. · Morning Briefing', {
      body,
      tag: 'briefing-catchup-m-' + today,
      data: { url: './?tab=home' }
    });
    speakBriefing('morning', body);
    state.lastBriefingMorn = today; dirty = true;
  }
  if (hr >= 19 && state.lastBriefingEve !== today) {
    const body = 'Evening summary ready, sir. Review today and plan tomorrow.';
    await showNow('J.A.R.V.I.S. · Evening Summary', {
      body,
      tag: 'briefing-catchup-e-' + today,
      data: { url: './?tab=home' }
    });
    speakBriefing('evening', body);
    state.lastBriefingEve = today; dirty = true;
  }
  if (dirty) saveNotifState(state);
};

// One-shot self-test, called from Settings. Reports whether each layer
// is functional and fires immediate + 10-second-trigger notifications.
const notifSelfTest = async () => {
  if (!('Notification' in window)) {
    return { ok: false, reason: 'This browser does not support notifications.', triggers: false };
  }
  if (Notification.permission === 'denied') {
    return { ok: false, reason: 'Notifications are blocked. Enable them in your browser site settings.', triggers: false };
  }
  if (Notification.permission !== 'granted') {
    const p = await Notification.requestPermission();
    if (p !== 'granted') return { ok: false, reason: 'Permission denied.', triggers: false };
  }
  const triggers = supportsTriggers();
  const ok = await showNow('J.A.R.V.I.S. · Self-test', {
    body: triggers
      ? 'Online, sir. Background scheduling supported on this device.'
      : 'Online — but background scheduling is not supported here. Briefings will still fire when you open the app.',
    tag: 'selftest-now',
    vibrate: [80, 40, 80, 40, 80]
  });
  if (triggers) {
    await scheduleAt('J.A.R.V.I.S. · Trigger test (10s)', Date.now() + 10000, {
      body: 'If you see this 10 seconds after the first one, background scheduling is working correctly.',
      tag: 'selftest-trigger'
    });
  }
  return { ok, reason: ok ? null : 'showNotification call failed.', triggers };
};

// Top-level init — run once on app mount when permission is granted.
let _notifInited = false;
const initNotifications = async () => {
  if (_notifInited) return; _notifInited = true;
  if (!isPermitted()) return;
  await scheduleBriefings();
  await rescheduleAllEventReminders();
  startForegroundTick();
  catchUpBriefings();
  // Re-run when the page regains focus (also re-fills the L1 queue)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) { catchUpBriefings(); scheduleBriefings(); }
  });
  // Reschedule whenever the events store mutates (chat-added, manual, etc.)
  bus.on('j_events', () => { rescheduleAllEventReminders(); });
};

// Backwards-compat shims: older code paths still call these names.
const scheduleLocalNotifications = () => initNotifications();
const scheduleReminder = (ev) => scheduleEventReminder(ev);

// ═══════════════════════════════════════════════════════════════
// HAPTICS + VOICE + TOAST
// ═══════════════════════════════════════════════════════════════
const haptic = {
  tap: () => { try { navigator.vibrate?.(8); } catch {} },
  tick: () => { try { navigator.vibrate?.(4); } catch {} },
  success: () => { try { navigator.vibrate?.([12, 40, 12]); } catch {} },
  warn: () => { try { navigator.vibrate?.([40, 30, 40]); } catch {} },
};

// ─── Voice language preference (Phase F) ─────────────────────
// Stored as 'auto' (use navigator.language) or an explicit BCP-47
// tag like 'en-GB' / 'fr-FR'. Felix speaks both English and French,
// and navigator.language is unreliable on some Samsung builds.
const VOICE_LANG_KEY = 'j_voice_lang';
const loadVoiceLang = () => sto.get(VOICE_LANG_KEY) || 'auto';
const saveVoiceLang = (l) => sto.set(VOICE_LANG_KEY, l);
const resolvedVoiceLang = () => {
  const pref = loadVoiceLang();
  if (pref && pref !== 'auto') return pref;
  return navigator.language || 'en-GB';
};

const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
const useVoice = (onResult) => {
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);
  const start = useCallback(() => {
    if (!SpeechRec) return false;
    try {
      const r = new SpeechRec();
      r.lang = resolvedVoiceLang();
      r.interimResults = false;
      r.maxAlternatives = 1;
      r.continuous = false;
      r.onresult = (e) => { const txt = e.results?.[0]?.[0]?.transcript; if (txt) onResult(txt); };
      r.onerror = () => setListening(false);
      r.onend = () => setListening(false);
      r.start();
      recRef.current = r;
      setListening(true);
      haptic.tick();
      return true;
    } catch { setListening(false); return false; }
  }, [onResult]);
  const stop = useCallback(() => { try { recRef.current?.stop(); } catch {} setListening(false); }, []);
  return { listening, start, stop, supported: !!SpeechRec };
};

const toastBus = { listeners: new Set() };
const toast = (msg, kind = 'gold') => { toastBus.listeners.forEach(fn => fn({ id: uid(), msg, kind, at: Date.now() })); };

// ═══════════════════════════════════════════════════════════════
// LIVING HUD (Phase D.1 — Atelier+)
// ─── Tap acknowledgement system ──────────────────────────────────
//
// Every tap anywhere produces a ripple. Two flavours:
//   - Hit (interactive): tight, brighter, faster — confirms action
//   - Miss (empty surface): wider, dimmer, slower — confirms presence
//
// No dot, no reticle — felt like a target sight. Just water-physics:
// pebble on stone vs. pebble in pond. Both reach you, different feel.
// ═══════════════════════════════════════════════════════════════
if (typeof document !== 'undefined') {
  const reduceMotion = window.matchMedia?.('(prefers-reduced-motion: reduce)').matches;

  const spawnRipple = (x, y, kind /* 'hit' | 'miss' */) => {
    if (reduceMotion) return;
    const r = document.createElement('div');
    r.className = 'd-ripple ' + (kind === 'miss' ? 'd-ripple-miss' : 'd-ripple-hit');
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    document.body.appendChild(r);
    // Phase F.6: another 15% shrink. 530ms hit / 750ms miss.
    setTimeout(() => r.remove(), kind === 'miss' ? 750 : 530);
  };

  // Detects whether an element (or its ancestors) is interactive.
  const isInteractive = (target) => {
    let el = target;
    while (el && el !== document.body) {
      if (el.tagName === 'BUTTON' || el.tagName === 'A' || el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') return el;
      if (el.getAttribute?.('role') === 'button') return el;
      if (el.classList?.contains('hud') || el.classList?.contains('pl') || el.classList?.contains('nb') || el.classList?.contains('cal-day') || el.classList?.contains('news-card') || el.classList?.contains('tk-row') || el.classList?.contains('tt-stat') || el.classList?.contains('tt-chip') || el.classList?.contains('bm-row')) return el;
      el = el.parentElement;
    }
    return null;
  };

  document.addEventListener('pointerdown', (e) => {
    const hit = isInteractive(e.target);
    if (hit) {
      const r = hit.getBoundingClientRect();
      hit.style.setProperty('--x', ((e.clientX - r.left) / r.width * 100) + '%');
      hit.style.setProperty('--y', ((e.clientY - r.top) / r.height * 100) + '%');
      if (!hit.classList.contains('rip')) hit.classList.add('rip');
      spawnRipple(e.clientX, e.clientY, 'hit');
    } else {
      // Empty tap: wider ripple, soft haptic, no other cue
      spawnRipple(e.clientX, e.clientY, 'miss');
      try { navigator.vibrate?.(6); } catch {}
    }
  }, { passive: true });

  // ─── Device tilt parallax — kept dampened ────────────────────
  if (!reduceMotion) {
    const smoothed = { x: 0, y: 0 };
    const handleOri = (e) => {
      const gx = Math.max(-15, Math.min(15, (e.gamma || 0))) / 15 * 0.5;
      const gy = Math.max(-15, Math.min(15, ((e.beta || 0) - 30))) / 15 * 0.5;
      smoothed.x = smoothed.x * 0.92 + gx * 0.08;
      smoothed.y = smoothed.y * 0.92 + gy * 0.08;
      document.documentElement.style.setProperty('--tilt-x', smoothed.x.toFixed(3));
      document.documentElement.style.setProperty('--tilt-y', smoothed.y.toFixed(3));
    };
    const attachOri = () => {
      try {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission().then(r => {
            if (r === 'granted') window.addEventListener('deviceorientation', handleOri, { passive: true });
          }).catch(()=>{});
        } else {
          window.addEventListener('deviceorientation', handleOri, { passive: true });
        }
      } catch {}
    };
    document.addEventListener('pointerdown', () => attachOri(), { once: true });
    attachOri();
  }

  // ─── Ambient breathe — softer than Phase C ───────────────────
  if (!reduceMotion) {
    const runPulse = () => {
      try {
        const cards = document.querySelectorAll('.app .hud:not(.no-pulse), .app .reactor');
        if (cards.length) {
          const pick = cards[Math.floor(Math.random() * cards.length)];
          pick.classList.add('breathe-now');
          setTimeout(() => pick.classList.remove('breathe-now'), 1800);
        }
      } catch {}
      setTimeout(runPulse, 4500 + Math.random() * 4500);
    };
    setTimeout(runPulse, 4000);
  }

// BOOT SEQUENCE
// ═══════════════════════════════════════════════════════════════
function Boot({ onDone }) {
  const [leaving, setLeaving] = useState(false);
  useEffect(() => {
    const t1 = setTimeout(() => setLeaving(true), 2500);
    const t2 = setTimeout(() => onDone(), 2900);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [onDone]);
  const skip = () => { setLeaving(true); setTimeout(onDone, 300); };
  const greeting = (() => {
    const h = new Date().getHours();
    return h < 5 ? 'STANDING BY, SIR' : h < 12 ? 'GOOD MORNING, SIR' : h < 18 ? 'GOOD AFTERNOON, SIR' : 'GOOD EVENING, SIR';
  })();
  return (
    <div className={`boot${leaving ? ' out' : ''}`} onClick={skip}>
      <div className="boot-lines"/>
      <div className="boot-reactor"><div className="boot-core"/></div>
      <div className="boot-text">Jarvis</div>
      <div className="boot-sub">SYSTEMS ONLINE</div>
      <div className="boot-ready">{greeting}</div>
      <div className="boot-skip">TAP TO CONTINUE</div>
    </div>
  );
}

// TOAST HOST
// ═══════════════════════════════════════════════════════════════
function ToastHost() {
  const [items, setItems] = useState([]);
  useEffect(() => {
    const add = (t) => {
      setItems(prev => [...prev, t]);
      setTimeout(() => setItems(prev => prev.map(p => p.id === t.id ? { ...p, leaving: true } : p)), 2400);
      setTimeout(() => setItems(prev => prev.filter(p => p.id !== t.id)), 2800);
    };
    toastBus.listeners.add(add);
    return () => toastBus.listeners.delete(add);
  }, []);
  return (
    <div className="toast-stack">
      {items.map(t => (
        <div key={t.id} className={`toast ${t.kind}${t.leaving?' leave':''}`}>
          {t.kind === 'gn' ? <ICheck size={12} color="var(--gn)" sw={2.5}/> :
           t.kind === 'red' ? <IZap size={12} color="var(--redHot)" sw={2}/> :
           <IZap size={12} color="var(--gold)" sw={2}/>}
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
function Jarvis() {
  const initialTab = (() => {
    try {
      const p = new URLSearchParams(location.search).get('tab');
      const valid = ['chat','home','tasks','mail','news','finance','calendar','brain'];
      return valid.includes(p) ? p : 'home';
    } catch { return 'home'; }
  })();

  const [booted, setBooted] = useState(sessionStorage.getItem('j_booted') === '1');
  const [tab, setTabState] = useState(initialTab);
  const [time, setTime] = useState(new Date());
  const [showSet, setShowSet] = useState(false);
  const [showMore, setShowMore] = useState(false);
  const [hasKey, setHasKey] = useState(!!sto.get('j_gk'));
  const [gToken, setGToken] = useState(null);
  const [gEvents, setGEvents] = useState([]);
  const [online, setOnline] = useState(navigator.onLine);
  const [urgency, setUrgency] = useState(() => computeUrgency());
  const tokenRef = useRef(null);

  // Recompute urgency whenever tasks or mail-classifications change.
  // Drives: bottom-nav badge, has-overdue body class, urgency banner.
  useEffect(() => {
    const recalc = () => setUrgency(computeUrgency());
    const offTasks = bus.on('j_tasks', recalc);
    const offMail = bus.on('j_mail_class', recalc);
    const offMailC = bus.on('j_mail_cache', recalc);
    // Recompute every 5min to catch passively-overdue tasks
    const iv = setInterval(recalc, 5 * 60 * 1000);
    return () => { offTasks(); offMail(); offMailC(); clearInterval(iv); };
  }, []);

  const setTab = useCallback((t) => { haptic.tap(); bumpTab(t); setTabState(t); }, []);

  useEffect(() => { const t = setInterval(() => setTime(new Date()), 60000); return () => clearInterval(t); }, []);

  useEffect(() => {
    const on = () => { setOnline(true); toast('Network online', 'gn'); };
    const off = () => { setOnline(false); toast('Network offline', 'red'); };
    window.addEventListener('online', on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);

  // Phase F.3: keyboard detection — focus events alone weren't enough.
  // Diagnostic from the v5.1.2 build proved that on Chrome Android, the
  // input can stay FOCUSED after the keyboard is dismissed (back button,
  // system gesture). So focus alone gave false-YES "keyboard is open".
  //
  // Fix: require BOTH "an input is focused" AND "viewport is shrunk" to
  // call the keyboard open. When either condition is false, treat as
  // closed and restore .app.scrollTop to 0 (Chrome scrolls .app to bring
  // the focused input into view; it does NOT scroll back on close).
  useEffect(() => {
    if (typeof document === 'undefined') return;
    const isInputEl = (el) => {
      if (!el) return false;
      const t = el.tagName;
      return t === 'INPUT' || t === 'TEXTAREA' || el.isContentEditable;
    };
    let baselineH = window.innerHeight;
    // Capture baseline when keyboard is definitely closed
    const refreshBaseline = () => {
      if (!isInputEl(document.activeElement)) {
        const h = window.visualViewport?.height || window.innerHeight;
        if (h > baselineH) baselineH = h;
      }
    };
    const baselineWatch = setInterval(refreshBaseline, 500);
    setTimeout(() => clearInterval(baselineWatch), 5000);

    const setOpen = (v) => {
      const wasOpen = document.body.classList.contains('keyboard-open');
      document.body.classList.toggle('keyboard-open', v);
      // On close, restore .app scroll. Chrome scrolls .app to bring the
      // focused input into view but never scrolls back.
      if (wasOpen && !v) {
        const app = document.querySelector('.app');
        if (app && app.scrollTop > 0) {
          // Smooth scroll back to top
          try { app.scrollTo({ top: 0, behavior: 'smooth' }); }
          catch { app.scrollTop = 0; }
        }
        // Also reset window scroll defensively
        if (window.scrollY > 0) {
          try { window.scrollTo({ top: 0, behavior: 'smooth' }); }
          catch { window.scrollTo(0, 0); }
        }
      }
    };

    const evaluate = () => {
      const focused = isInputEl(document.activeElement);
      const vv = window.visualViewport;
      const currentH = vv ? vv.height : window.innerHeight;
      // Keyboard is "really open" only if BOTH: (a) an input has focus
      // AND (b) the viewport has shrunk by at least 100px from baseline.
      // 100px > URL-bar transitions (~60-80px), < any keyboard.
      const viewportShrunk = (baselineH - currentH) > 100;
      setOpen(focused && viewportShrunk);
    };

    // Re-evaluate on every relevant signal
    document.addEventListener('focusin', evaluate);
    document.addEventListener('focusout', () => setTimeout(evaluate, 50));
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', evaluate);
      window.visualViewport.addEventListener('scroll', evaluate);
    }
    window.addEventListener('resize', evaluate);

    // Safety net: every 500ms, re-evaluate. Catches anything we missed.
    const safety = setInterval(evaluate, 500);

    const onVis = () => { if (document.hidden) setOpen(false); };
    document.addEventListener('visibilitychange', onVis);

    return () => {
      clearInterval(baselineWatch);
      clearInterval(safety);
      document.removeEventListener('focusin', evaluate);
      document.removeEventListener('focusout', evaluate);
      document.removeEventListener('visibilitychange', onVis);
      if (window.visualViewport) {
        window.visualViewport.removeEventListener('resize', evaluate);
        window.visualViewport.removeEventListener('scroll', evaluate);
      }
      window.removeEventListener('resize', evaluate);
      document.body.classList.remove('keyboard-open');
    };
  }, []);

  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        // Check for updates on mount
        reg.update();
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'activated' && navigator.serviceWorker.controller) {
              toast('Jarvis updated — reloading', 'gold');
              setTimeout(() => location.reload(), 800);
            }
          });
        });
      }).catch(() => {});
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return; reloaded = true;
        location.reload();
      });
    }
  }, []);

  useEffect(() => { if (booted) { try { sessionStorage.setItem('j_booted', '1'); } catch {} } }, [booted]);

  // Google OAuth
  useEffect(() => {
    const savedToken = sto.get('j_gtoken');
    const savedExp = parseInt(sto.get('j_gtoken_exp') || '0');
    if (savedToken && Date.now() < savedExp) setGToken(savedToken);

    const init = () => {
      if (window.google?.accounts?.oauth2) {
        tokenRef.current = window.google.accounts.oauth2.initTokenClient({
          client_id: GCID, scope: GSCOPE,
          callback: (resp) => {
            if (resp.access_token) {
              setGToken(resp.access_token);
              sto.set('j_gtoken', resp.access_token);
              sto.set('j_gtoken_exp', String(Date.now() + (resp.expires_in || 3600) * 1000));
              toast('Google Calendar linked', 'gn');
              haptic.success();
            }
          }
        });
        if (!savedToken || Date.now() >= savedExp) {
          try { tokenRef.current.requestAccessToken({ prompt: '' }); } catch {}
        }
      }
    };
    const iv = setInterval(() => { if (window.google) { init(); clearInterval(iv); } }, 500);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (!gToken) { setGEvents([]); return; }
    const run = () => fetchGCal(gToken).then(({ events, expired }) => {
      if (expired) { setGToken(null); toast('Google session expired — tap ⚙️ to re-link', 'red'); }
      else setGEvents(events);
    });
    run();
    const iv = setInterval(run, 5 * 60000);
    return () => clearInterval(iv);
  }, [gToken]);

  useEffect(() => { initNotifications(); }, []);

  const signIn = useCallback(() => tokenRef.current?.requestAccessToken({ prompt: 'consent' }), []);
  const signOut = useCallback(() => {
    if (gToken) try { window.google?.accounts?.oauth2?.revoke(gToken); } catch {}
    setGToken(null);
    sto.del('j_gtoken');
    sto.del('j_gtoken_exp');
    toast('Google disconnected', 'gold');
  }, [gToken]);

  const rawDtr = Math.ceil((raceDate - time) / 864e5);
  const dtr = Math.max(rawDtr, 0);
  const raceDone = rawDtr <= 0;

  const h = time.getHours();
  const gr = h < 5 ? 'Late night' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';

  const tabs = [
    { id:'chat', I:IChat, l:'Chat' },
    { id:'home', I:IHome, l:'Brief' },
    { id:'tasks', I:IList, l:'Tasks' },
    { id:'mail', I:IMail, l:'Mail' },
    { id:'news', I:INews, l:'News' },
    { id:'finance', I:ITrend, l:'Fin' },
    { id:'calendar', I:ICal, l:'Cal' },
  ];
  const moreTabs = [
    { id:'brain', I:IBrain, l:'Brain' },
  ];

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape' && showSet) setShowSet(false); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showSet]);

  if (!booted) {
    return (<Boot onDone={() => setBooted(true)}/>);
  }

    <div className={`app${urgency.hasOverdue ? ' has-overdue' : ''}`}>
      <div className="scan-bg"/>
      <div className="hud-frame"><span/><span/><span/><span/></div>

      <header className="hdr">
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div className="reactor" aria-hidden="true">
            <div className="reactor-filaments"/>
            <div className="reactor-core"/>
          </div>
          <div>
            <div className="hdr-t">Jarvis</div>
            <div className="hdr-sub">
              <span style={{ color:'var(--ice)', fontWeight:600 }}>{time.toTimeString().slice(0,5)}</span>
              <span style={{ color:'var(--t4)', margin:'0 6px' }}>·</span>
              <span style={{ color:'var(--t3)' }}>{time.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })}</span>
              <span style={{ color:'var(--t5)', margin:'0 6px' }}>·</span>
              <span style={{ color:'var(--t4)', fontSize:8 }}>v{JARVIS_VERSION}</span>
            </div>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', display:'flex', alignItems:'center', gap:4, fontWeight:500 }}>
            <span style={{ width:5, height:5, borderRadius:'50%', background: !online ? 'var(--redHot)' : hasKey ? 'var(--gn)' : 'var(--warn)', boxShadow:`0 0 6px ${!online?'var(--redHot)':hasKey?'var(--gn)':'var(--warn)'}`, animation:'pg 2s infinite' }}/>
            {!online ? 'OFFLINE' : hasKey ? 'ONLINE' : 'STANDBY'}
          </div>
          <button onClick={()=>{ haptic.tap(); setShowMore(true); }} aria-label="More"
            style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:8, padding:6, cursor:'pointer', display:'flex' }}>
            <IMore size={14} color="var(--t2)" sw={2}/>
          </button>
          <button onClick={()=>{ haptic.tap(); setShowSet(true); }} aria-label="Settings"
            style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:8, padding:6, cursor:'pointer', display:'flex', position:'relative' }}>
            <IGear size={14} color="var(--gold)" sw={1.5}/>
            {!hasKey && <div style={{ position:'absolute', top:-2, right:-2, width:6, height:6, background:'var(--gold)', borderRadius:'50%', boxShadow:'0 0 6px var(--gold)', animation:'pg 2s infinite' }}/>}
          </button>
        </div>
      </header>

      <div className={`content fade${tab==='chat'?' no-pad':''}`} key={tab}>
        {tab==='chat' && <MChatTab gr={gr} dtr={dtr} raceDone={raceDone} gEvents={gEvents}/>}
        {tab==='home' && <MBriefTab gr={gr} dtr={dtr} raceDone={raceDone} gEvents={gEvents} gToken={gToken} urgency={urgency} setTab={setTab}/>}
        {tab==='tasks' && <MTasksTab urgency={urgency}/>}
        {tab==='mail' && <MMailTab gToken={gToken} onReauth={signIn}/>}
        {tab==='news' && <MNewsTab/>}
        {tab==='finance' && <MFinTab/>}
        {tab==='calendar' && <MCalTab gToken={gToken} gEvents={gEvents}/>}
        {tab==='brain' && <MBrainTab/>}
      </div>

      <nav className="nav">
        <div className="nav-in">
          {tabs.map(({id, I, l}) => {
            // Show attention badge on Brief tab when there's overdue / urgent stuff.
            // Show smaller badge on Tasks tab too — different feel, same data.
            const briefBadge = id === 'home' && urgency.totalAttention > 0;
            const tasksBadge = id === 'tasks' && urgency.overdueCount > 0;
            return (
              <button key={id} className={`nb${tab===id?' on':''}`} onClick={()=>setTab(id)} aria-label={l} style={{ position:'relative' }}>
                <I size={15} color={tab===id?'var(--gold)':'var(--t4)'} sw={tab===id?2:1.5}/>
                <span className="nl" style={{ color:tab===id?'var(--gold)':'var(--t4)' }}>{l}</span>
                {briefBadge && <span className="nb-badge">{urgency.totalAttention > 99 ? '99+' : urgency.totalAttention}</span>}
                {tasksBadge && <span className="nb-badge">{urgency.overdueCount > 99 ? '99+' : urgency.overdueCount}</span>}
              </button>
            );
          })}
        </div>
      </nav>

      {showSet && <SetPanel
        close={()=>{ setShowSet(false); setHasKey(!!sto.get('j_gk')); }}
        gToken={gToken} onSignIn={signIn} onSignOut={signOut}
      />}
      {showMore && <MoreSheet
        close={()=>setShowMore(false)}
        moreTabs={moreTabs}
        currentTab={tab}
        onPickTab={(id)=>{ setTab(id); setShowMore(false); }}
      />}

      <ToastHost/>
    </div>
  );
}
// ═══════════════════════════════════════════════════════════════
// SETTINGS PANEL
// ═══════════════════════════════════════════════════════════════
function SetPanel({ close, gToken, onSignIn, onSignOut }) {
  const [gk, setGk] = useState(sto.get('j_gk') || '');
  const [groqK, setGroqK] = useState(sto.get('j_groq') || '');
  const [ak, setAk] = useState(sto.get('j_ak') || '');
  const [nk, setNk] = useState(sto.get('j_nk') || '');
  const [sg, setSg] = useState(false);
  const [sgr, setSgr] = useState(false);
  const [sa, setSa] = useState(false);
  const [sn, setSn] = useState(false);
  const [ok, setOk] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [sysChecks, setSysChecks] = useState(null);
  const [sysRunning, setSysRunning] = useState(false);
  const [notifPerm, setNotifPerm] = useState(typeof Notification !== 'undefined' ? Notification.permission : 'default');
  const [voiceOn, setVoiceOnState] = useState(isVoiceEnabled());
  const [voiceLang, setVoiceLang] = useState(loadVoiceLang());

  const save = () => {
    if (gk.trim()) sto.set('j_gk', gk.trim()); else sto.del('j_gk');
    if (groqK.trim()) sto.set('j_groq', groqK.trim()); else sto.del('j_groq');
    if (ak.trim()) sto.set('j_ak', ak.trim()); else sto.del('j_ak');
    if (nk.trim()) sto.set('j_nk', nk.trim()); else sto.del('j_nk');
    setOk(true);
    haptic.success();
    toast('Configuration saved', 'gn');
    setTimeout(() => { setOk(false); close(); }, 900);
  };

  const requestNotif = async () => {
    if (!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    setNotifPerm(perm);
    if (perm === 'granted') {
      await initNotifications();
      haptic.success();
      const triggers = supportsTriggers();
      try {
        const reg = await navigator.serviceWorker.ready;
        await reg.showNotification('Jarvis activated', {
          body: triggers
            ? 'Background scheduling online. Briefings 7:00 / 19:00, sir.'
            : 'Foreground only on this browser. Briefings will fire when you open the app.',
          icon: 'jarvis-icon.svg'
        });
      } catch {}
    }
  };

  const [selfTestRunning, setSelfTestRunning] = useState(false);
  const [selfTestResult, setSelfTestResult] = useState(null);
  const runSelfTest = async () => {
    setSelfTestRunning(true);
    setSelfTestResult(null);
    haptic.tick();
    const r = await notifSelfTest();
    setSelfTestResult(r);
    setNotifPerm(typeof Notification !== 'undefined' ? Notification.permission : 'default');
    setSelfTestRunning(false);
    if (r.ok) haptic.success(); else haptic.warn();
  };

  const exportData = () => {
    const data = {
      version: 4,
      exportedAt: new Date().toISOString(),
      events: loadEvents(),
      tasks: loadTasks(),
      brain: loadBrain(),
      portfolio: loadPortfolio(),
      chat: loadChat(),
      usage: loadUsage(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `jarvis-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast('Backup downloaded', 'gn');
  };

  const importData = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (d.events) saveEvents(d.events);
        if (d.tasks) saveTasks(d.tasks);
        if (d.brain) saveBrain(d.brain);
        if (d.portfolio) savePortfolio(d.portfolio);
        if (d.chat) saveChat(d.chat);
        toast(`Restored: ${d.events?.length||0} events · ${d.tasks?.length||0} tasks · ${d.brain?.length||0} notes`, 'gn');
        haptic.success();
      } catch { toast('Invalid backup file', 'red'); haptic.warn(); }
    };
    r.readAsText(file);
  };

  const clearAll = () => {
    if (!confirmClear) { setConfirmClear(true); setTimeout(()=>setConfirmClear(false), 4000); return; }
    ['j_events','j_tasks','j_brain','j_chat','j_prices','j_news_general','j_news_world','j_news_business','j_news_technology','j_news_science','j_mail_cache','j_mail_class','j_mail_bodies']
      .forEach(k => sto.del(k));
    bus.emit('j_events'); bus.emit('j_tasks'); bus.emit('j_brain'); bus.emit('j_chat');
    toast('Local data cleared', 'gold');
    setConfirmClear(false);
  };

  const runSystemCheck = async () => {
    setSysRunning(true);
    haptic.tick();
    const r = {};

    // 1. Groq (primary)
    const groqKey = sto.get('j_groq');
    if (!groqKey) r.groq = { ok: false, msg: 'No key configured — chat will use Gemini' };
    else {
      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${groqKey}` },
          body: JSON.stringify({ model: GROQ_MODELS.quality, messages: [{ role: 'user', content: 'ok' }], max_tokens: 5 })
        });
        if (res.ok) r.groq = { ok: true, msg: 'Llama 3.3 70B responding — primary chat ready' };
        else if (res.status === 401) r.groq = { ok: false, msg: 'Invalid key (401)' };
        else if (res.status === 429) r.groq = { ok: false, msg: 'Rate limited — fallback to Gemini active' };
        else {
          const d = await res.json().catch(() => ({}));
          r.groq = { ok: false, msg: `${res.status}: ${(d.error?.message || 'Failed').slice(0, 80)}` };
        }
      } catch (e) { r.groq = { ok: false, msg: 'Network: ' + e.message }; }
    }

    // 2. Gemini (fallback)
    const gk = sto.get('j_gk');
    if (!gk) r.gemini = { ok: false, msg: 'No key — needed for news search + Groq fallback' };
    else {
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${gk}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: 'Say ok' }] }], generationConfig: { maxOutputTokens: 10 } })
        });
        if (res.ok) r.gemini = { ok: true, msg: 'Fallback ready — used for news search' };
        else {
          const d = await res.json().catch(()=>({}));
          r.gemini = { ok: false, msg: `${res.status}: ${(d.error?.message || 'Failed').slice(0, 80)}` };
        }
      } catch (e) { r.gemini = { ok: false, msg: 'Network: ' + e.message }; }
    }

    // 2. Alpha Vantage
    const ak = sto.get('j_ak');
    if (!ak) r.alpha = { ok: false, msg: 'No key configured' };
    else {
      try {
        const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=SPY&apikey=${ak}`);
        const d = await res.json();
        if (d['Global Quote']?.['05. price']) r.alpha = { ok: true, msg: `SPY $${parseFloat(d['Global Quote']['05. price']).toFixed(2)} — live` };
        else if (d.Note) r.alpha = { ok: false, msg: 'Daily limit hit (25 req/day on free tier)' };
        else if (d.Information) r.alpha = { ok: false, msg: 'Rate limit: ' + d.Information.slice(0, 70) };
        else if (d['Error Message']) r.alpha = { ok: false, msg: 'Invalid key or symbol' };
        else r.alpha = { ok: false, msg: 'Empty response — check key' };
      } catch (e) { r.alpha = { ok: false, msg: 'Network: ' + e.message }; }
    }

    // 3. GNews
    const nk = sto.get('j_nk');
    if (!nk) r.gnews = { ok: false, msg: 'No key configured' };
    else {
      try {
        const res = await resilientFetch(`https://gnews.io/api/v4/top-headlines?category=general&lang=en&max=1&apikey=${nk}`);
        if (res.status === 401) r.gnews = { ok: false, msg: 'Invalid key (401 Unauthorized)' };
        else if (res.status === 403) r.gnews = { ok: false, msg: 'Forbidden (403) — check plan' };
        else if (res.status === 429) r.gnews = { ok: false, msg: 'Rate limited (429) — too many requests' };
        else if (!res.ok) r.gnews = { ok: false, msg: `HTTP ${res.status}` };
        else {
          const d = await res.json();
          if (d.articles?.length > 0) r.gnews = { ok: true, msg: `${d.articles.length} article${d.articles.length>1?'s':''} returned — feed live` };
          else if (d.errors) r.gnews = { ok: false, msg: d.errors.join('; ').slice(0, 80) };
          else r.gnews = { ok: false, msg: 'Empty response' };
        }
      } catch (e) { r.gnews = { ok: false, msg: 'Network/CORS: ' + e.message }; }
    }

    // 4. Google OAuth + scopes
    const gt = sto.get('j_gtoken');
    if (!gt) r.google = { ok: false, msg: 'Not signed in' };
    else {
      try {
        const res = await fetch('https://www.googleapis.com/oauth2/v3/tokeninfo?access_token=' + gt);
        if (res.ok) {
          const d = await res.json();
          const scopes = (d.scope || '').split(' ').map(s => s.replace('https://www.googleapis.com/auth/', ''));
          const hasCal = scopes.some(s => s.includes('calendar'));
          const hasMail = scopes.some(s => s.includes('gmail'));
          r.google = {
            ok: hasCal || hasMail,
            msg: `Scopes: ${hasCal?'Calendar✓':'Calendar✗'} ${hasMail?'Gmail✓':'Gmail✗'}${!hasMail ? ' — re-sign in for Gmail':''}`
          };
        } else {
          r.google = { ok: false, msg: 'Token expired or revoked — re-sign in' };
        }
      } catch (e) { r.google = { ok: false, msg: 'Network: ' + e.message }; }
    }

    // 5. Calendar API
    if (gt) {
      try {
        const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary', { headers: { Authorization: `Bearer ${gt}` } });
        if (res.ok) {
          const d = await res.json();
          r.calendar = { ok: true, msg: `Primary: ${d.summary || d.id}` };
        } else if (res.status === 403) r.calendar = { ok: false, msg: 'Calendar API not enabled in Cloud project' };
        else if (res.status === 401) r.calendar = { ok: false, msg: 'Token rejected — re-sign in' };
        else r.calendar = { ok: false, msg: `HTTP ${res.status}` };
      } catch (e) { r.calendar = { ok: false, msg: 'Network: ' + e.message }; }
    } else r.calendar = { ok: false, msg: 'Requires Google sign-in' };

    // 6. Gmail API
    if (gt) {
      try {
        const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/profile', { headers: { Authorization: `Bearer ${gt}` } });
        if (res.ok) {
          const d = await res.json();
          r.gmail = { ok: true, msg: `${d.emailAddress} · ${d.messagesTotal || 0} messages` };
        } else if (res.status === 403) {
          const d = await res.json().catch(()=>({}));
          if (d.error?.message?.toLowerCase().includes('insufficient')) r.gmail = { ok: false, msg: 'Gmail scope not granted — re-sign in' };
          else r.gmail = { ok: false, msg: 'Gmail API not enabled in Cloud project' };
        }
        else if (res.status === 401) r.gmail = { ok: false, msg: 'Token rejected — re-sign in' };
        else r.gmail = { ok: false, msg: `HTTP ${res.status}` };
      } catch (e) { r.gmail = { ok: false, msg: 'Network: ' + e.message }; }
    } else r.gmail = { ok: false, msg: 'Requires Google sign-in' };

    // 7. Weather
    try {
      const res = await resilientFetch('https://api.open-meteo.com/v1/forecast?latitude=46.2044&longitude=6.1432&current=temperature_2m');
      if (res.ok) {
        const d = await res.json();
        r.weather = { ok: true, msg: `${Math.round(d.current?.temperature_2m || 0)}°C — Geneva live` };
      } else r.weather = { ok: false, msg: `HTTP ${res.status}` };
    } catch (e) { r.weather = { ok: false, msg: 'Network: ' + e.message }; }

    // 8. FX
    try {
      const res = await resilientFetch('https://api.frankfurter.app/latest?from=CHF&to=EUR');
      if (res.ok) {
        const d = await res.json();
        r.fx = { ok: true, msg: `CHF/EUR ${d.rates?.EUR?.toFixed(4)} — live` };
      } else r.fx = { ok: false, msg: `HTTP ${res.status}` };
    } catch (e) { r.fx = { ok: false, msg: 'Network: ' + e.message }; }

    setSysChecks(r);
    setSysRunning(false);
    const failed = Object.values(r).filter(x => !x.ok).length;
    if (failed === 0) { haptic.success(); toast('All systems operational', 'gn'); }
    else { haptic.warn(); toast(`${failed} system${failed>1?'s':''} need attention`, 'red'); }
  };

  return (
    <div className="ov" onClick={e => e.target === e.currentTarget && close()}>
      <div className="sp">
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22 }}>
          <div>
            <div style={{ fontFamily:'var(--hd)', fontSize:20, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--gold)' }}>Configuration</div>
            <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', marginTop:3 }}>Stored locally on this device only</div>
          </div>
          <button onClick={close} aria-label="Close"
            style={{ background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:8, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
            <IClose size={14} color="var(--t2)" sw={2}/>
          </button>
        </div>

        <div style={{ marginBottom:14 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--cyan)', marginBottom:6 }}>
            Groq API Key <span style={{ color:'var(--t3)', fontWeight:400 }}>— primary chat (Llama 3.3 70B)</span>
          </div>
          <div className="ki">
            <input type={sgr?'text':'password'} value={groqK} onChange={e=>setGroqK(e.target.value)} placeholder="gsk_…" autoCapitalize="off" autoCorrect="off" spellCheck="false"/>
            <button onClick={()=>setSgr(!sgr)} aria-label="Toggle visibility" style={{ background:'none', border:'none', cursor:'pointer', display:'flex' }}>
              {sgr ? <IEyeOff size={14} color="var(--t3)" sw={1.5}/> : <IEye size={14} color="var(--t3)" sw={1.5}/>}
            </button>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:4 }}>console.groq.com · 1000 req/day free · auto-fallback to Gemini</div>
        </div>

        <div style={{ marginBottom:14 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--red)', marginBottom:6 }}>
            Gemini API Key <span style={{ color:'var(--t3)', fontWeight:400 }}>— news + fallback</span>
          </div>
          <div className="ki">
            <input type={sg?'text':'password'} value={gk} onChange={e=>setGk(e.target.value)} placeholder="Paste Gemini key…" autoCapitalize="off" autoCorrect="off" spellCheck="false"/>
            <button onClick={()=>setSg(!sg)} aria-label="Toggle visibility" style={{ background:'none', border:'none', cursor:'pointer', display:'flex' }}>
              {sg ? <IEyeOff size={14} color="var(--t3)" sw={1.5}/> : <IEye size={14} color="var(--t3)" sw={1.5}/>}
            </button>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:4 }}>Get yours at aistudio.google.com · free</div>
        </div>

        <div style={{ marginBottom:14 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--gold)', marginBottom:6 }}>
            Alpha Vantage Key <span style={{ color:'var(--t3)', fontWeight:400 }}>— stock prices</span>
          </div>
          <div className="ki">
            <input type={sa?'text':'password'} value={ak} onChange={e=>setAk(e.target.value)} placeholder="Paste Alpha Vantage key…" autoCapitalize="off" autoCorrect="off" spellCheck="false"/>
            <button onClick={()=>setSa(!sa)} aria-label="Toggle visibility" style={{ background:'none', border:'none', cursor:'pointer', display:'flex' }}>
              {sa ? <IEyeOff size={14} color="var(--t3)" sw={1.5}/> : <IEye size={14} color="var(--t3)" sw={1.5}/>}
            </button>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:4 }}>alphavantage.co · 25 req/day</div>
        </div>

        <div style={{ marginBottom:14 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--blue)', marginBottom:6 }}>
            GNews API Key <span style={{ color:'var(--t3)', fontWeight:400 }}>— news feed</span>
          </div>
          <div className="ki">
            <input type={sn?'text':'password'} value={nk} onChange={e=>setNk(e.target.value)} placeholder="Paste GNews key…" autoCapitalize="off" autoCorrect="off" spellCheck="false"/>
            <button onClick={()=>setSn(!sn)} aria-label="Toggle visibility" style={{ background:'none', border:'none', cursor:'pointer', display:'flex' }}>
              {sn ? <IEyeOff size={14} color="var(--t3)" sw={1.5}/> : <IEye size={14} color="var(--t3)" sw={1.5}/>}
            </button>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:4 }}>gnews.io · 100 req/day</div>
        </div>

        <div style={{ marginBottom:14 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--gn)', marginBottom:6 }}>
            Google Calendar <span style={{ color:'var(--t3)', fontWeight:400 }}>— live events + Garmin</span>
          </div>
          {gToken ? (
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 12px', background:'rgba(34,197,94,0.08)', border:'1px solid rgba(34,197,94,0.3)', borderRadius:10 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
