<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Storage ────────────────────────────────────────────────────
const _m = {};
const sto = {
  get: (k) => { try { return localStorage.getItem(k); } catch { return _m[k] || null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch { _m[k] = v; } },
  del: (k) => { try { localStorage.removeItem(k); } catch { delete _m[k]; } },
  getJSON: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) || d; } catch { return d; } },
  setJSON: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ─── Event Store ────────────────────────────────────────────────
const loadEvents = () => sto.getJSON('j_events', []);
const saveEvents = (evs) => sto.setJSON('j_events', evs);
const addEvent = (ev) => {
  const evs = loadEvents();
  evs.push({ ...ev, id: Date.now() + Math.random(), src: 'jarvis' });
  evs.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  saveEvents(evs);
};
const deleteEvent = (id) => saveEvents(loadEvents().filter(e => e.id !== id));

// ─── Brain Store ────────────────────────────────────────────────
const loadBrain = () => sto.getJSON('j_brain', []);
const saveBrain = (b) => sto.setJSON('j_brain', b);
const addBrainItem = (it) => {
  const b = loadBrain();
  b.unshift({ ...it, id: Date.now() + Math.random(), ts: new Date().toISOString() });
  saveBrain(b);
};
const deleteBrainItem = (id) => saveBrain(loadBrain().filter(i => i.id !== id));

// ─── Portfolio Store ────────────────────────────────────────────
const loadPortfolio = () => sto.getJSON('j_portfolio', [
  { id: 1, name: 'Accenture', symbol: 'ACN', units: 0, costBasis: 0 },
  { id: 2, name: 'iShares MSCI World', symbol: 'IWDA.AMS', units: 0, costBasis: 0 },
  { id: 3, name: 'SPDR S&P 500', symbol: 'SPY', units: 0, costBasis: 0 },
]);
const savePortfolio = (p) => sto.setJSON('j_portfolio', p);

// ─── Price cache ────────────────────────────────────────────────
const loadPriceCache = () => sto.getJSON('j_prices', {});
const savePriceCache = (c) => sto.setJSON('j_prices', c);
const CACHE_TTL = 60 * 60 * 1000;

// ─── Event tag parsing ──────────────────────────────────────────
const parseEvents = (text) => {
  const m = [...text.matchAll(/\[\[EVENT:(\{[^\]]+\})\]\]/g)];
  return m.map(x => { try { return JSON.parse(x[1]); } catch { return null; } }).filter(Boolean);
};
const parseNotes = (text) => {
  const m = [...text.matchAll(/\[\[NOTE:(\{[^\]]+\})\]\]/g)];
  return m.map(x => { try { return JSON.parse(x[1]); } catch { return null; } }).filter(Boolean);
};
const stripTags = (t) => t.replace(/\[\[(EVENT|NOTE):\{[^\]]+\}\]\]/g, '').trim();

// ─── Google Calendar ────────────────────────────────────────────
const GCID = '1022045416372-q8dcqrmpoc7nuc32vuiom5bbdrtcnsak.apps.googleusercontent.com';
const GSCOPE = 'https://www.googleapis.com/auth/calendar.readonly';

const fetchGCal = async (token) => {
  const past = new Date(Date.now() - 30 * 864e5).toISOString(); // 30 days back for history
  const end = new Date(Date.now() + 60 * 864e5).toISOString(); // 60 days forward
  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(past)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime&maxResults=250`;
  try {
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { sto.del('j_gtoken'); sto.del('j_gtoken_exp'); return []; }
    if (!res.ok) return [];
    const d = await res.json();
    return (d.items || []).map(ev => ({
      id: 'g_' + ev.id,
      title: ev.summary || '(No title)',
      date: (ev.start.dateTime || ev.start.date || '').slice(0, 10),
      time: ev.start.dateTime ? ev.start.dateTime.slice(11, 16) : '00:00',
      endTime: ev.end?.dateTime ? ev.end.dateTime.slice(11, 16) : '',
      notes: ev.location || '',
      src: 'google'
    }));
  } catch { return []; }
};

// ─── Alpha Vantage ──────────────────────────────────────────────
const fetchPrice = async (symbol, key) => {
  const cache = loadPriceCache();
  const cached = cache[symbol];
  if (cached && Date.now() - cached.ts < CACHE_TTL) return cached;
  try {
    const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${key}`);
    const d = await res.json();
    const q = d['Global Quote'];
    if (!q || !q['05. price']) return cached || null;
    const priceData = {
      price: parseFloat(q['05. price']),
      change: parseFloat(q['09. change']) || 0,
      changePct: parseFloat((q['10. change percent'] || '0').replace('%','')) || 0,
      ts: Date.now()
    };
    cache[symbol] = priceData;
    savePriceCache(cache);
    return priceData;
  } catch { return cached || null; }
};

// ─── FX Rates (with cache + fallback) ───────────────────────────
const FX_CACHE_TTL = 30 * 60 * 1000; // 30 min
const fetchFX = async () => {
  const cached = sto.getJSON('j_fx_cache', null);
  if (cached && Date.now() - cached.ts < FX_CACHE_TTL) return cached;
  // Try Frankfurter first
  try {
    const [r1, r2] = await Promise.all([
      fetch('https://api.frankfurter.app/latest?from=CHF&to=EUR,USD'),
      fetch('https://api.frankfurter.app/latest?from=USD&to=EUR')
    ]);
    if (r1.ok && r2.ok) {
      const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
      const fx = { chfEur: d1.rates.EUR, chfUsd: d1.rates.USD, usdEur: d2.rates.EUR, ts: Date.now() };
      sto.setJSON('j_fx_cache', fx);
      return fx;
    }
  } catch {}
  // Fallback: ExchangeRate API
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/CHF');
    if (r.ok) {
      const d = await r.json();
      const fx = { chfEur: d.rates.EUR, chfUsd: d.rates.USD, usdEur: d.rates.EUR / d.rates.USD, ts: Date.now() };
      sto.setJSON('j_fx_cache', fx);
      return fx;
    }
  } catch {}
  return cached || null;
};

// ─── Weather ────────────────────────────────────────────────────
const fetchWeather = async () => {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=46.2044&longitude=6.1432&current=temperature_2m,weathercode,apparent_temperature&hourly=precipitation_probability&timezone=Europe%2FParis');
    const d = await res.json();
    const c = d.current;
    const codes = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Rain showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
    const maxRain = Math.max(...(d.hourly?.precipitation_probability?.slice(0, 12) || [0]));
    const w = { temp: Math.round(c.temperature_2m), feels: Math.round(c.apparent_temperature), desc: codes[c.weathercode] || 'Clear', rainProb: maxRain, ts: Date.now() };
    sto.setJSON('j_weather', w);
    return w;
  } catch { return sto.getJSON('j_weather', null); }
};

// ─── News API (GNews) ───────────────────────────────────────────
const NEWS_CACHE_TTL = 30 * 60 * 1000; // 30 min
const fetchNews = async (category = 'general', searchQuery = null) => {
  const key = sto.get('j_nk');
  if (!key) return null;
  const cacheKey = `j_news_${searchQuery || category}`;
  const cached = sto.getJSON(cacheKey, null);
  if (cached && Date.now() - cached.ts < NEWS_CACHE_TTL) return cached;
  try {
    let url;
    if (searchQuery) {
      url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(searchQuery)}&lang=en&max=10&apikey=${key}`;
    } else {
      url = `https://gnews.io/api/v4/top-headlines?category=${category}&lang=en&max=10&apikey=${key}`;
    }
    const res = await fetch(url);
    if (!res.ok) return cached || null;
    const d = await res.json();
    const result = { articles: d.articles || [], ts: Date.now() };
    sto.setJSON(cacheKey, result);
    return result;
  } catch { return cached || null; }
};

// ─── Notifications ──────────────────────────────────────────────
const scheduleLocalNotifications = async () => {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  const reg = await navigator.serviceWorker.ready;
  const now = new Date();
  const today7am = new Date(now); today7am.setHours(7, 0, 0, 0);
  const today7pm = new Date(now); today7pm.setHours(19, 0, 0, 0);
  const tomorrow7am = new Date(today7am); tomorrow7am.setDate(tomorrow7am.getDate() + 1);
  
  let morning = (now < today7am ? today7am : tomorrow7am).getTime() - now.getTime();
  let evening = now < today7pm ? today7pm.getTime() - now.getTime() : -1;

  const w = sto.getJSON('j_weather', null);
  const weatherStr = w ? `${w.temp}°C ${w.desc}` : '';
  
  reg.active?.postMessage({
    type: 'SCHEDULE_NOTIFICATIONS',
    morning,
    evening,
    briefingData: {
      morning: weatherStr ? `${weatherStr}. Check your schedule and news.` : 'Your morning briefing is ready.',
      evening: 'Evening summary ready. Review your day and plan tomorrow.'
    }
  });
};

// ─── Gemini API ─────────────────────────────────────────────────
const callGemini = async (key, messages, useSearch = false) => {
  const body = {
    contents: messages.map(m => ({ role: m.r === 'u' ? 'user' : 'model', parts: [{ text: m.t }] })),
    generationConfig: { maxOutputTokens: 2048 }
  };
  if (useSearch) body.tools = [{ google_search: {} }];
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const d = await res.json();
  
  // Extract source links from grounding metadata
  let sources = [];
  try {
    const gm = d.candidates?.[0]?.groundingMetadata;
    if (gm?.groundingChunks) {
      sources = gm.groundingChunks
        .filter(c => c.web?.uri)
        .map(c => ({ title: c.web.title || c.web.uri, url: c.web.uri }))
        .slice(0, 5);
    }
    if (sources.length === 0 && gm?.searchEntryPoint?.renderedContent) {
      const urlMatches = [...(gm.searchEntryPoint.renderedContent.matchAll(/href="([^"]+)"/g))];
      sources = urlMatches.map(m => ({ title: new URL(m[1]).hostname, url: m[1] })).slice(0, 3);
    }
  } catch {}
  
  const text = d.candidates?.[0]?.content?.parts?.[0]?.text || d.error?.message || 'No response.';
  return { text, sources };
};

// ─── System Prompt ──────────────────────────────────────────────
const getSYS = () => {
  const today = new Date();
  const todayStr = today.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const todayISO = today.toISOString().slice(0, 10);
  const brainItems = loadBrain().slice(0, 15);
  const brainContext = brainItems.length > 0
    ? '\n\nRecent Brain entries (things Felix asked you to remember):\n' + brainItems.map(b => `- ${b.title}${b.comment ? ' — ' + b.comment : ''}`).join('\n')
    : '';
  
  return `You are J.A.R.V.I.S. — Felix's personal AI assistant. Modeled after Tony Stark's AI: intelligent, dry British wit, unflappably competent. Address him as "sir" occasionally.

RESPONSE STYLE: Provide thorough, helpful answers. For simple questions, be concise. For complex topics (news analysis, market discussion, technical questions), give detailed responses with context, analysis, and actionable takeaways. When discussing news or current events, mention specific sources and suggest what to read further. Don't artificially limit your response length — answer naturally.

Today is ${todayStr} (${todayISO}).

Felix: Network financial analyst at MSC Air Cargo, Geneva. French resident, Massongy 74140. Engaged to Mélanie. Commutes ~45min to Chêne-Bougerie, Switzerland, leaves 7:45am/5:45pm. Investments: Accenture, World ETF, SP500 ETF, Europe ETF, gold. PEA + assurance vie. Watches CHF/EUR/USD, fuel prices. Marathon Nov 8 2026 Lake Maggiore. Follows Middle East news closely and global events with market impact. Tends to forget things.${brainContext}

CRITICAL — STRUCTURED ACTIONS:

When Felix mentions anything with a date/time (meeting, dinner, appointment, reminder, task, call), you MUST append this EXACT tag at the END of your response:
[[EVENT:{"title":"Short title","date":"YYYY-MM-DD","time":"HH:MM","notes":"optional detail"}]]

Example: User says "dinner tomorrow at 8pm" on 2026-04-19 → you append:
[[EVENT:{"title":"Dinner","date":"2026-04-20","time":"20:00","notes":""}]]

When Felix says anything like "remember", "log", "note", "save", or mentions something worth keeping, you MUST append:
[[NOTE:{"title":"Short summary","tags":["tag1","tag2"],"comment":"optional context"}]]

Example: User says "remember Christian shared an article on AI" → you append:
[[NOTE:{"title":"Christian shared article on AI","tags":["AI","Work","Christian"],"comment":"Worth following up"}]]

AUTOMATIC MEMORY — even if Felix does NOT say "remember" or "log", you MUST detect and save things worth remembering. Append a [[NOTE:...]] tag when Felix:
- Mentions someone told him something, shared something, or recommended something
- Shares an idea, insight, or plan he's thinking about
- Mentions a decision he made or is considering
- Talks about something he learned, discovered, or found interesting
- Mentions a name, contact, or person in a professional or personal context with new info
- Discusses a change in his work, investments, projects, or personal life
- Mentions something Mélanie said or asked him to do

Do NOT save trivial conversational exchanges (greetings, "how are you", simple factual questions). Only save things that have future value — things he'd want to recall later.

Rules:
- "tonight" = today's date
- "tomorrow" = today + 1 day
- "next Monday" = the upcoming Monday from today
- If no time given, use "00:00"
- Always confirm what you did in natural language before the tag
- ALWAYS include the tag — the system depends on it
- Never show these tags as visible text`;
};

.ki input{flex:1;background:none;border:none;outline:none;color:var(--t);font-family:var(--mn);font-size:12px}
.ki input::placeholder{color:var(--t4)}
.svb{width:100%;padding:14px;border:none;border-radius:10px;font-family:var(--hd);font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .3s}

.ipt{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:8px 10px;color:var(--t);font-family:var(--mn);font-size:12px;outline:none;width:100%;transition:border-color 0.2s}
.ipt:focus{border-color:var(--gold)}

.src-link{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.25);border-radius:5px;font-size:10px;font-family:var(--mn);color:var(--blue);text-decoration:none;font-weight:500;margin:2px 3px 2px 0;transition:all .2s}
.src-link:active{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.4)}

.news-card{cursor:pointer;transition:transform 0.15s}
.news-card:active{transform:scale(0.98)}

.cal-day{cursor:pointer;transition:all 0.15s;min-width:44px;padding:8px 4px;text-align:center;border-radius:10px;border:1px solid transparent;flex-shrink:0}
.cal-day:active{transform:scale(0.95)}
.cal-day.today{border-color:var(--gold);background:rgba(255,180,0,0.06)}
.cal-day.selected{border-color:var(--red);background:rgba(230,57,70,0.08);box-shadow:0 0 8px rgba(230,57,70,0.12)}
.cal-day.has-events::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--gold);margin:3px auto 0}

.save-btn{background:none;border:1px solid var(--bdr);border-radius:5px;padding:2px 6px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;font-family:var(--mn);font-size:8px;color:var(--t3);transition:all 0.2s;margin-top:4px}
.save-btn:active{border-color:var(--gold);color:var(--gold)}
.save-btn.saved{border-color:var(--gn);color:var(--gn)}
`;

// ─── Main App ───────────────────────────────────────────────────
function Jarvis() {
  const [tab, setTab] = useState('chat');
  const [time, setTime] = useState(new Date());
  const [showSet, setShowSet] = useState(false);
  const [hasKey, setHasKey] = useState(!!sto.get('j_gk'));
  const [gToken, setGToken] = useState(null);
  const [gEvents, setGEvents] = useState([]);
  const tokenRef = useRef(null);

  useEffect(() => { const t = setInterval(() => setTime(new Date()), 30000); return () => clearInterval(t); }, []);

  // Service Worker registration
  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  }, []);

  // Google OAuth — with token persistence
  useEffect(() => {
    // Try restoring saved token
    const savedToken = sto.get('j_gtoken');
    const savedExp = parseInt(sto.get('j_gtoken_exp') || '0');
    if (savedToken && Date.now() < savedExp) {
      setGToken(savedToken);
    }

    const init = () => {
      if (window.google?.accounts?.oauth2) {
        tokenRef.current = window.google.accounts.oauth2.initTokenClient({
          client_id: GCID, scope: GSCOPE,
          callback: (resp) => {
            if (resp.access_token) {
              setGToken(resp.access_token);
              sto.set('j_gtoken', resp.access_token);
              sto.set('j_gtoken_exp', String(Date.now() + (resp.expires_in || 3600) * 1000));
            }
          }
        });
        // Try silent re-auth if token expired
        if (!savedToken || Date.now() >= savedExp) {
          try { tokenRef.current.requestAccessToken({ prompt: '' }); } catch {}
        }
      }
    };
    const iv = setInterval(() => { if (window.google) { init(); clearInterval(iv); } }, 500);
    return () => clearInterval(iv);
  }, []);

  // Fetch Google Calendar events when token ready
  useEffect(() => {
    if (!gToken) { setGEvents([]); return; }
    fetchGCal(gToken).then(setGEvents);
    const iv = setInterval(() => fetchGCal(gToken).then(setGEvents), 5 * 60000);
    return () => clearInterval(iv);
  }, [gToken]);

  // Schedule notifications
  useEffect(() => { scheduleLocalNotifications(); }, []);

  const signIn = () => tokenRef.current?.requestAccessToken({ prompt: 'consent' });
  const signOut = () => {
    if (gToken) window.google?.accounts?.oauth2?.revoke(gToken);
    setGToken(null);
    sto.del('j_gtoken');
    sto.del('j_gtoken_exp');
  };

  const dtr = Math.ceil((new Date('2026-11-08') - time) / 864e5);
  const h = time.getHours();
  const gr = h < 5 ? 'Late night' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';

  const tabs = [
    { id:'chat', I:IChat, l:'Chat' },
    { id:'home', I:IHome, l:'Brief' },
    { id:'news', I:INews, l:'News' },
    { id:'finance', I:ITrend, l:'Fin' },
    { id:'calendar', I:ICal, l:'Cal' },
    { id:'brain', I:IBrain, l:'Brain' },
    { id:'marathon', I:IRun, l:'Run' },
  ];

  return (
    <div className="app">
      <style>{CSS}</style>
      <header className="hdr">
        <div>
          <div className="hdr-t">Jarvis</div>
          <div className="hdr-sub">
            {time.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })} · {time.toTimeString().slice(0,5)}
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', display:'flex', alignItems:'center', gap:4, fontWeight:500 }}>
            <span style={{ width:5, height:5, borderRadius:'50%', background:hasKey?'var(--gn)':'var(--redHot)', boxShadow:`0 0 6px ${hasKey?'var(--gn)':'var(--redHot)'}`, animation:'pg 2s infinite' }}/>
            {hasKey ? 'ONLINE' : 'OFFLINE'}
          </div>
          <button onClick={()=>setShowSet(true)} style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:8, padding:6, cursor:'pointer', display:'flex', position:'relative' }}>
            <IGear size={14} color="var(--gold)" sw={1.5}/>
            {!hasKey && <div style={{ position:'absolute', top:-2, right:-2, width:6, height:6, background:'var(--gold)', borderRadius:'50%', boxShadow:'0 0 6px var(--gold)', animation:'pg 2s infinite' }}/>}
          </button>
        </div>
      </header>

      <div className="content fade" key={tab}>
        {tab==='chat' && <ChatTab gr={gr} dtr={dtr} gEvents={gEvents}/>}
        {tab==='home' && <BriefTab gr={gr} dtr={dtr} gEvents={gEvents} gToken={gToken}/>}
        {tab==='news' && <NewsTab/>}
        {tab==='finance' && <FinTab/>}
        {tab==='calendar' && <CalTab gToken={gToken} gEvents={gEvents}/>}
        {tab==='brain' && <BrainTab/>}
        {tab==='marathon' && <RunTab days={dtr} gEvents={gEvents} gToken={gToken}/>}
      </div>

      <nav className="nav">
        <div className="nav-in">
          {tabs.map(({id, I, l}) => (
            <button key={id} className="nb" onClick={()=>setTab(id)}>
              <I size={15} color={tab===id?'var(--gold)':'var(--t4)'} sw={tab===id?2:1.5}/>
              <span className="nl" style={{ color:tab===id?'var(--gold)':'var(--t4)' }}>{l}</span>
            </button>
          ))}
        </div>
      </nav>

      {showSet && <SetPanel close={()=>{ setShowSet(false); setHasKey(!!sto.get('j_gk')); }} gToken={gToken} onSignIn={signIn} onSignOut={signOut}/>}
    </div>
  );
}

// ─── Settings ───────────────────────────────────────────────────
function SetPanel({ close, gToken, onSignIn, onSignOut }) {
  const [gk, setGk] = useState(sto.get('j_gk') || '');
  const [ak, setAk] = useState(sto.get('j_ak') || '');
  const [nk, setNk] = useState(sto.get('j_nk') || '');
  const [sg, setSg] = useState(false);
  const [sa, setSa] = useState(false);
  const [sn, setSn] = useState(false);
  const [ok, setOk] = useState(false);
  const [notifPerm, setNotifPerm] = useState(typeof Notification !== 'undefined' ? Notification.permission : 'default');

  const save = () => {
    if (gk.trim()) sto.set('j_gk', gk.trim()); else sto.del('j_gk');
    if (ak.trim()) sto.set('j_ak', ak.trim()); else sto.del('j_ak');
    if (nk.trim()) sto.set('j_nk', nk.trim()); else sto.del('j_nk');
    setOk(true);
    setTimeout(() => { setOk(false); close(); }, 900);
  };

  const requestNotif = async () => {
    if (!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    setNotifPerm(perm);
    if (perm === 'granted') {
      scheduleLocalNotifications();
      new Notification('Jarvis activated', { body: 'Briefings scheduled for 7:00 and 19:00, sir.', icon: '/jarvis-icon.svg' });
    }
  };

  return (
    <div className="ov" onClick={e => e.target === e.currentTarget && close()}>
      <div className="sp fade">
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22 }}>
          <div>
            <div style={{ fontFamily:'var(--hd)', fontSize:20, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--gold)' }}>Configuration</div>
            <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', marginTop:3 }}>Stored locally on this device only</div>
          </div>
          <button onClick={close} style={{ background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:8, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
            <IClose size={14} color="var(--t2)" sw={2}/>
          </button>
        </div>

        {/* Gemini Key */}
        <div style={{ marginBottom:14 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--red)', marginBottom:6 }}>
            Gemini API Key <span style={{ color:'var(--t3)', fontWeight:400 }}>— AI brain</span>
          </div>
          <div className="ki">
            <input type={sg?'text':'password'} value={gk} onChange={e=>setGk(e.target.value)} placeholder="Paste Gemini key…"/>
            <button onClick={()=>setSg(!sg)} style={{ background:'none', border:'none', cursor:'pointer', display:'flex' }}>
              {sg ? <IEyeOff size={14} color="var(--t3)" sw={1.5}/> : <IEye size={14} color="var(--t3)" sw={1.5}/>}
            </button>
          </div>
        </div>

        {/* Alpha Vantage Key */}
        <div style={{ marginBottom:14 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--gold)', marginBottom:6 }}>
            Alpha Vantage Key <span style={{ color:'var(--t3)', fontWeight:400 }}>— stock prices</span>
          </div>
          <div className="ki">
            <input type={sa?'text':'password'} value={ak} onChange={e=>setAk(e.target.value)} placeholder="Paste Alpha Vantage key…"/>
            <button onClick={()=>setSa(!sa)} style={{ background:'none', border:'none', cursor:'pointer', display:'flex' }}>
              {sa ? <IEyeOff size={14} color="var(--t3)" sw={1.5}/> : <IEye size={14} color="var(--t3)" sw={1.5}/>}
            </button>
          </div>
        </div>

        {/* GNews Key */}
        <div style={{ marginBottom:14 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--blue)', marginBottom:6 }}>
            GNews API Key <span style={{ color:'var(--t3)', fontWeight:400 }}>— news feed</span>
          </div>
          <div className="ki">
            <input type={sn?'text':'password'} value={nk} onChange={e=>setNk(e.target.value)} placeholder="Paste GNews key…"/>

// ─── Chat Tab ───────────────────────────────────────────────────
function ChatTab({ gr, dtr, gEvents }) {
  const [msgs, setMsgs] = useState([
    { r:'a', t:`${gr}, sir. All systems operational. How may I assist?`, ts:new Date().toTimeString().slice(0,5), sources:[] }
  ]);
  const [inp, setInp] = useState('');
  const [ld, setLd] = useState(false);
  const [savedMsgs, setSavedMsgs] = useState({});
  const er = useRef(null);
  useEffect(() => { er.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs]);

  const saveToBrain = (msgText, idx) => {
    addBrainItem({
      title: msgText.length > 100 ? msgText.slice(0, 100) + '…' : msgText,
      tags: ['chat', 'saved'],
      comment: 'Saved from chat conversation'
    });
    setSavedMsgs(prev => ({ ...prev, [idx]: true }));
  };

  const send = async () => {
    if (!inp.trim() || ld) return;
    const ts = new Date().toTimeString().slice(0,5);
    const next = [...msgs, { r:'u', t:inp.trim(), ts, sources:[] }];
    setMsgs(next); setInp(''); setLd(true);

    const key = sto.get('j_gk');
    if (!key) {
      setMsgs([...next, { r:'a', t:"No Gemini key detected, sir. Tap the ⚙️ gear icon to configure.", ts:new Date().toTimeString().slice(0,5), sources:[] }]);
      setLd(false); return;
    }

    const wantsNews = /news|latest|update|happen|happening|breaking|market|middle east|today|recent|war|conflict|election|price|rate|economy|stock|geopolit/i.test(inp);

    try {
      const sysMsg = { r:'a', t: getSYS() };
      const convo = [sysMsg, ...next];
      const { text: reply, sources } = await callGemini(key, convo, wantsNews);

      const events = parseEvents(reply);
      const notes = parseNotes(reply);
      events.forEach(e => addEvent(e));
      notes.forEach(n => addBrainItem(n));

      let confirm = '';
      if (events.length) confirm += `\n✓ ${events.length} event${events.length>1?'s':''} added`;
      if (notes.length) confirm += `\n✓ ${notes.length} note${notes.length>1?'s':''} logged`;

      setMsgs([...next, { r:'a', t:stripTags(reply) + confirm, ts:new Date().toTimeString().slice(0,5), sources }]);
    } catch (e) {
      setMsgs([...next, { r:'a', t:'Connection lost, sir. Try again.', ts:new Date().toTimeString().slice(0,5), sources:[] }]);
    }
    setLd(false);
  };

  // Next event
  const now = new Date();
  const todayISO = now.toISOString().slice(0,10);
  const nowTime = now.toTimeString().slice(0,5);
  const allEvs = [...loadEvents(), ...gEvents].filter(e => e.date > todayISO || (e.date === todayISO && e.time > nowTime)).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const nextEv = allEvs[0];
  const fmtNext = nextEv ? (nextEv.date === todayISO ? `TODAY ${nextEv.time}` : `${new Date(nextEv.date+'T12:00').toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase()} ${nextEv.time}`) : null;

  return (
    <div className="ch-w">
      <div className="ch-m">
        {/* Live status strip */}
        <div className="sx" style={{ display:'flex', gap:6 }}>
          <div className="hud hud-red glow-red" style={{ minWidth:90, padding:'8px 10px', flexShrink:0 }}>
            <div style={{ fontFamily:'var(--mn)', fontSize:7, color:'var(--t3)', letterSpacing:'.12em', fontWeight:700 }}>MARATHON</div>
            <div style={{ fontFamily:'var(--hd)', fontSize:24, fontWeight:600, color:'var(--gold)', lineHeight:1 }}>{dtr}</div>
            <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--t3)', marginTop:2 }}>DAYS</div>
          </div>
          {nextEv && (
            <div className="hud" style={{ minWidth:130, padding:'8px 10px', flexShrink:0, borderColor:'var(--bdrGold)' }}>
              <div style={{ fontFamily:'var(--mn)', fontSize:7, color:'var(--gold)', letterSpacing:'.1em', fontWeight:700 }}>NEXT · {fmtNext}</div>
              <div style={{ fontSize:12, marginTop:2, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{nextEv.title}</div>
            </div>
          )}
          <WeatherChip/>
        </div>

        {/* Messages */}
        {msgs.map((m, i) => (
          <div key={i} style={{ marginLeft:m.r==='u'?32:0, marginRight:m.r==='a'?16:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
              <span style={{ fontFamily:'var(--hd)', fontSize:10, letterSpacing:'.15em', textTransform:'uppercase', color:m.r==='u'?'var(--red)':'var(--gold)', fontWeight:700 }}>
                {m.r==='u'?'You':'Jarvis'}
              </span>
              <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{m.ts}</span>
            </div>
            <div style={{ fontSize:14, lineHeight:1.65, color:m.r==='u'?'var(--t)':'var(--t2)', whiteSpace:'pre-wrap' }}>{m.t}</div>
            {/* Source links */}
            {m.sources && m.sources.length > 0 && (
              <div style={{ marginTop:6, display:'flex', flexWrap:'wrap', gap:2 }}>
                {m.sources.map((s, j) => (
                  <a key={j} href={s.url} target="_blank" rel="noopener" className="src-link">
                    <IExternalLink size={9} color="var(--blue)" sw={2}/>
                    {s.title?.length > 25 ? s.title.slice(0,25)+'…' : (s.title || 'Source')}
                  </a>
                ))}
              </div>
            )}
            {/* Save to Brain button for assistant messages */}
            {m.r === 'a' && i > 0 && (
              <button className={`save-btn ${savedMsgs[i] ? 'saved' : ''}`} onClick={() => saveToBrain(m.t, i)}>
                {savedMsgs[i] ? <><ICheck size={9} color="var(--gn)" sw={2}/> Saved</> : <><ISave size={9} color="var(--t3)" sw={1.5}/> Save to Brain</>}
              </button>
            )}
          </div>
        ))}
        {ld && <div style={{ marginRight:32 }}>
          <span style={{ fontFamily:'var(--hd)', fontSize:10, letterSpacing:'.15em', textTransform:'uppercase', color:'var(--gold)', fontWeight:700 }}>Jarvis</span>
          <div className="dp" style={{ marginTop:5 }}><span/><span/><span/></div>
        </div>}
        <div ref={er}/>
      </div>

      <div className="ch-i">
        <div className="pls sx">
          {['What\'s my schedule?', 'Middle East news', 'Market update', 'Log: interesting idea...'].map((p,i) => (
            <button key={i} className="pl" onClick={()=>setInp(p)}>{p}</button>
          ))}
        </div>
        <div className="cf">
          <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Talk to Jarvis…"/>
          <button className="sb" onClick={send} disabled={!inp.trim()||ld}>
            <ISend size={16} color={inp.trim()&&!ld?'var(--gold)':'var(--t4)'} sw={1.75}/>
          </button>
        </div>
      </div>
    </div>
  );
}

function BriefNewsSection() {

  }, []);

    const d = (Date.now() - new Date(iso).getTime()) / 60000;

  if (!hasKey) return null;

        </div>
        <div className="hud hud-gold-bdr" style={{ padding:20, textAlign:'center', marginTop:20 }}>
          <INews size={28} color="var(--blue)" sw={1.5}/>
          <div style={{ fontSize:13, color:'var(--t2)', marginTop:12, lineHeight:1.5 }}>Add a GNews API key to activate the news feed.</div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--gold)', marginTop:8 }}>Free at gnews.io · Tap ⚙️ to configure</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
        <div>
          <div style={{ fontFamily:'var(--hd)', fontSize:26, fontWeight:400 }}>
            <span style={{ color:'var(--t2)' }}>News</span> <span style={{ color:'var(--blue)' }}>Feed</span>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', marginTop:3, fontWeight:500 }}>LIVE HEADLINES</div>
        </div>
        <button onClick={() => loadNews(cat)} style={{ background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:8, width:34, height:34, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IRefresh size={14} color={loading?'var(--t4)':'var(--blue)'} sw={2}/>
        </button>
      </div>

      {/* Category pills */}
      <div className="sx" style={{ display:'flex', gap:5, paddingBottom:12 }}>
        {categories.map((c) => (
          <button key={c.id} className="pl" onClick={()=>setCat(c.id)}
            style={cat===c.id ? { borderColor:'var(--blue)', color:'var(--blue)', background:'rgba(59,130,246,0.07)' } : {}}>
            {c.label}
          </button>
        ))}
      </div>

      {/* Articles */}
      {loading && !news ? (
        <div style={{ textAlign:'center', padding:40 }}>
          <div className="dp"><span/><span/><span/></div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t4)', marginTop:10 }}>Scanning feeds…</div>
        </div>
      ) : news?.articles?.length > 0 ? (
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {/* Hero article */}
          {news.articles[0] && (
            <a href={news.articles[0].url} target="_blank" rel="noopener" style={{ textDecoration:'none', color:'inherit' }}>
              <div className="hud news-card glow-red" style={{ overflow:'hidden' }}>
                {news.articles[0].image && (
                  <div style={{ width:'100%', height:160, background:`url(${news.articles[0].image}) center/cover`, position:'relative' }}>
                    <div style={{ position:'absolute', inset:0, background:'linear-gradient(transparent 40%, var(--bg2))' }}/>
                    <div style={{ position:'absolute', top:8, left:8 }}>
                      <span className="tag tag-red" style={{ fontSize:8, fontWeight:700 }}>BREAKING</span>
                    </div>
                  </div>
                )}
                <div style={{ padding:'10px 12px' }}>
                  <div style={{ fontSize:15, fontWeight:600, lineHeight:1.35, marginBottom:6 }}>{news.articles[0].title}</div>
                  <div style={{ fontSize:11, color:'var(--t3)', lineHeight:1.4, marginBottom:6 }}>{news.articles[0].description?.slice(0, 120)}…</div>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{news.articles[0].source?.name}</span>
                    <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{ago(news.articles[0].publishedAt)}</span>
                  </div>
                </div>
              </div>
            </a>
          )}

          {/* Remaining articles */}
          {news.articles.slice(1).map((a, i) => (
            <a key={i} href={a.url} target="_blank" rel="noopener" style={{ textDecoration:'none', color:'inherit' }}>
              <div className="hud news-card" style={{ padding:'10px 12px', display:'flex', gap:10 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:500, lineHeight:1.35, marginBottom:5 }}>{a.title}</div>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{a.source?.name}</span>
                    <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{ago(a.publishedAt)}</span>
                  </div>
                </div>
                {a.image && (
                  <div style={{ width:64, height:64, borderRadius:6, background:`url(${a.image}) center/cover`, flexShrink:0, border:'1px solid var(--bdr)' }}/>
                )}
              </div>
            </a>
          ))}
        </div>
      ) : (
        <div className="hud" style={{ padding:20, textAlign:'center' }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t3)' }}>No articles found for this category.</div>
        </div>
      )}
    </div>
  );
}

// ─── Finance Tab ────────────────────────────────────────────────
function FinTab() {
  const [pf, setPf] = useState(loadPortfolio());
  const [prices, setPrices] = useState(loadPriceCache());
  const [fx, setFx] = useState(null);
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [loading, setLoading] = useState(false);

  const refresh = async () => {
    const key = sto.get('j_ak');
    if (!key) return;
    setLoading(true);
    for (const p of pf) {
      if (p.symbol) await fetchPrice(p.symbol, key);
    }
    setPrices(loadPriceCache());
    setLoading(false);
  };

  useEffect(() => { refresh(); fetchFX().then(setFx); }, []);

  const saveHolding = (h) => {
    const newPf = h.id ? pf.map(x => x.id === h.id ? h : x) : [...pf, { ...h, id: Date.now() }];
    setPf(newPf); savePortfolio(newPf); setEditing(null); setAdding(false);
  };
  const delHolding = (id) => {
    const newPf = pf.filter(x => x.id !== id);
    setPf(newPf); savePortfolio(newPf); setEditing(null);
  };

  const lines = pf.map(p => {
    const pr = prices[p.symbol];
    const value = pr ? p.units * pr.price : p.units * p.costBasis;
    const cost = p.units * p.costBasis;
    const gain = value - cost;
    const gainPct = cost > 0 ? (gain / cost * 100) : 0;
    return { ...p, live: !!pr, price: pr?.price || p.costBasis, value, cost, gain, gainPct };
  });
  const totalVal = lines.reduce((s, x) => s + x.value, 0);
  const totalCost = lines.reduce((s, x) => s + x.cost, 0);
  const totalGain = totalVal - totalCost;
  const totalPct = totalCost > 0 ? (totalGain / totalCost * 100) : 0;
  const maxVal = Math.max(...lines.map(l => l.value), 1);
  const hasKey = !!sto.get('j_ak');

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ marginBottom:16, display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', fontWeight:700 }}>PORTFOLIO VALUE</div>
          <div style={{ fontFamily:'var(--hd)', fontSize:36, fontWeight:400, marginTop:4, background:'linear-gradient(135deg, var(--gold), var(--red))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }}>
            €{totalVal.toLocaleString('fr-FR', { maximumFractionDigits:0 })}
          </div>
          {totalCost > 0 && (
            <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:4 }}>
              <span style={{ fontFamily:'var(--mn)', fontSize:12, color:totalGain>=0?'var(--gn)':'var(--redHot)', fontWeight:500 }}>
                {totalGain>=0?'+':''}€{totalGain.toLocaleString('fr-FR', { maximumFractionDigits:0 })}
              </span>
              <span style={{ fontFamily:'var(--mn)', fontSize:10, color:totalGain>=0?'var(--gn)':'var(--redHot)' }}>
                {totalGain>=0?'+':''}{totalPct.toFixed(1)}%
              </span>
            </div>
          )}
        </div>
        <button onClick={refresh} disabled={loading || !hasKey} style={{ background:'var(--bg3)', border:'1px solid var(--bdrGold)', borderRadius:8, width:36, height:36, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IRefresh size={15} color={loading?'var(--t4)':'var(--gold)'} sw={2}/>
        </button>
      </div>

      {!hasKey && (
        <div className="hud hud-red-bdr" style={{ padding:12, marginBottom:14 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--redHot)', fontWeight:700, letterSpacing:'.1em' }}>NO PRICE FEED</div>
          <div style={{ fontSize:11, color:'var(--t2)', marginTop:4 }}>Add Alpha Vantage key in ⚙️ to enable live prices.</div>
        </div>
      )}

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--gold)', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span>Holdings</span>
        <button onClick={()=>setAdding(true)} style={{ background:'none', border:'1px solid var(--bdrGold)', borderRadius:6, padding:'4px 8px', cursor:'pointer', display:'flex', alignItems:'center', gap:3, fontFamily:'var(--hd)', fontSize:10, color:'var(--gold)', fontWeight:600, letterSpacing:'.08em' }}>
          <IPlus size={10} color="var(--gold)" sw={2.5}/> ADD
        </button>
      </div>

      {(adding || editing) && (
        <HoldingForm holding={editing} onSave={saveHolding} onCancel={()=>{setEditing(null); setAdding(false);}} onDelete={editing ? ()=>delHolding(editing.id) : null}/>
      )}

      {pf.length === 0 ? (
        <div className="hud" style={{ padding:14, textAlign:'center', marginBottom:14 }}>
          <div style={{ fontSize:12, color:'var(--t3)' }}>No holdings yet. Tap ADD to create one.</div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:5, marginBottom:16 }}>
          {lines.map((x, i) => (
            <div key={i} onClick={()=>setEditing(x)} className="hud" style={{ padding:'10px 12px', cursor:'pointer' }}>
              <div style={{ display:'flex', justifyContent:'space-between' }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:500 }}>{x.name}</div>
                  <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', marginTop:2 }}>
                    {x.symbol} · {x.units} units {x.live && <span style={{ color:'var(--gn)' }}>· LIVE</span>}
                  </div>
                </div>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontFamily:'var(--mn)', fontSize:13, fontWeight:500 }}>€{x.value.toLocaleString('fr-FR', { maximumFractionDigits:0 })}</div>
                  {x.cost > 0 && (
                    <div style={{ fontFamily:'var(--mn)', fontSize:10, color:x.gain>=0?'var(--gn)':'var(--redHot)' }}>
                      {x.gain>=0?'+':''}{x.gainPct.toFixed(1)}%
                    </div>
                  )}
                </div>
              </div>
              <div className="bf" style={{ marginTop:6 }}><div className="bff" style={{ width:`${(x.value/maxVal)*100}%` }}/></div>
            </div>
          ))}
        </div>
      )}

      {/* FX */}
      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--red)', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span>Live FX</span>
        {fx && <span style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--t4)', fontWeight:400 }}>{new Date(fx.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>}
      </div>
      <div className="hud" style={{ padding:0, overflow:'hidden' }}>
        {fx ? [
          { p:'CHF / EUR', r:fx.chfEur, note:'Salary conversion' },
          { p:'CHF / USD', r:fx.chfUsd, note:'Dollar holdings' },
          { p:'USD / EUR', r:fx.usdEur, note:'SPY exposure' },
        ].map((f, i, a) => (
          <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'11px 14px', borderBottom:i<a.length-1?'1px solid var(--bdr)':'none' }}>
            <div>
              <div style={{ fontSize:13, fontWeight:500 }}>{f.p}</div>
              <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{f.note}</div>
            </div>
            <div style={{ fontFamily:'var(--mn)', fontSize:14, color:'var(--gold)', fontWeight:500 }}>{f.r.toFixed(4)}</div>
          </div>
        )) : <div style={{ padding:14, fontFamily:'var(--mn)', fontSize:10, color:'var(--t4)' }}>Loading FX rates…</div>}
      </div>
    </div>
  );
}

function HoldingForm({ holding, onSave, onCancel, onDelete }) {
  const [name, setName] = useState(holding?.name || '');
  const [symbol, setSymbol] = useState(holding?.symbol || '');
  const [units, setUnits] = useState(holding?.units || '');
  const [cost, setCost] = useState(holding?.costBasis || '');

  const save = () => {
    if (!name.trim() || !symbol.trim()) return;
    onSave({ id: holding?.id, name: name.trim(), symbol: symbol.trim().toUpperCase(), units: parseFloat(units) || 0, costBasis: parseFloat(cost) || 0 });
  };

  return (
    <div className="hud hud-gold-bdr glow-gold" style={{ padding:14, marginBottom:12 }}>
      <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, color:'var(--gold)', letterSpacing:'.12em', marginBottom:10 }}>
        {holding ? 'EDIT HOLDING' : 'NEW HOLDING'}
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
        <input className="ipt" value={name} onChange={e=>setName(e.target.value)} placeholder="Name (e.g. Accenture)"/>
        <input className="ipt" value={symbol} onChange={e=>setSymbol(e.target.value)} placeholder="Symbol (e.g. ACN)"/>
        <div style={{ display:'flex', gap:6 }}>
          <input className="ipt" value={units} onChange={e=>setUnits(e.target.value)} placeholder="Units" type="number" step="any"/>
          <input className="ipt" value={cost} onChange={e=>setCost(e.target.value)} placeholder="Avg cost" type="number" step="any"/>
        </div>
      </div>
      <div style={{ display:'flex', gap:6, marginTop:10 }}>
        <button onClick={save} style={{ flex:1, padding:10, background:'linear-gradient(135deg, var(--gold), var(--red))', border:'none', borderRadius:8, color:'#fff', fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.1em', cursor:'pointer' }}>SAVE</button>
        <button onClick={onCancel} style={{ padding:'10px 14px', background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:8, color:'var(--t2)', fontFamily:'var(--hd)', fontSize:12, fontWeight:600, letterSpacing:'.1em', cursor:'pointer' }}>CANCEL</button>
        {onDelete && <button onClick={onDelete} style={{ padding:'10px 12px', background:'rgba(230,57,70,0.1)', border:'1px solid var(--bdr2)', borderRadius:8, cursor:'pointer', display:'flex', alignItems:'center' }}><ITrash size={13} color="var(--redHot)" sw={2}/></button>}
      </div>
    </div>
  );
}

// ─── Calendar Tab (Rebuilt) ─────────────────────────────────────
function CalTab({ gToken, gEvents }) {
  const [localEvs, setLocalEvs] = useState(loadEvents());
  const [weekOffset, setWeekOffset] = useState(0);
  const [selectedDate, setSelectedDate] = useState(new Date().toISOString().slice(0,10));
  useEffect(() => { const iv = setInterval(()=>setLocalEvs(loadEvents()), 2000); return ()=>clearInterval(iv); }, []);

  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  // Generate 7 days starting from today + weekOffset*7
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() + weekOffset * 7);
  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    return d.toISOString().slice(0, 10);
  });

  const allEvs = [...localEvs, ...gEvents].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const evsByDate = {};
  allEvs.forEach(e => { if (!evsByDate[e.date]) evsByDate[e.date] = []; evsByDate[e.date].push(e); });

  const selectedEvs = evsByDate[selectedDate] || [];

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const jumpToToday = () => { setWeekOffset(0); setSelectedDate(todayStr); };

  const removeEv = (id) => {
    if (typeof id === 'string' && id.startsWith('g_')) return;
    deleteEvent(id); setLocalEvs(loadEvents());
  };

  const monthLabel = (() => {
    const first = new Date(days[0] + 'T12:00');
    const last = new Date(days[6] + 'T12:00');
    if (first.getMonth() === last.getMonth()) {
      return first.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' }).toUpperCase();
    }
    return `${first.toLocaleDateString('en-GB', { month: 'short' })} – ${last.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' })}`.toUpperCase();
  })();

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      {/* Header */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
        <div>
          <div style={{ fontFamily:'var(--hd)', fontSize:26, fontWeight:400 }}>
            <span style={{ color:'var(--t2)' }}>Calendar</span>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', marginTop:3 }}>{monthLabel}</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          {weekOffset !== 0 && (
            <button onClick={jumpToToday} style={{ background:'none', border:'1px solid var(--bdrGold)', borderRadius:6, padding:'4px 10px', cursor:'pointer', fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', fontWeight:600 }}>TODAY</button>
          )}
          <div style={{ fontFamily:'var(--mn)', fontSize:8, color:gToken?'var(--gn)':'var(--t4)', display:'flex', alignItems:'center', gap:3, fontWeight:700 }}>
            <span style={{ width:5, height:5, borderRadius:'50%', background:gToken?'var(--gn)':'var(--t4)', boxShadow:gToken?'0 0 4px var(--gn)':'none' }}/>
            {gToken ? 'SYNC' : 'LOCAL'}
          </div>
        </div>
      </div>

      {/* Week navigation */}
      <div style={{ display:'flex', alignItems:'center', gap:4, marginBottom:12 }}>
        <button onClick={()=>setWeekOffset(weekOffset-1)}
          style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:8, width:32, height:32, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IChevL size={14} color="var(--t2)" sw={2}/>
        </button>
        <div style={{ flex:1, display:'flex', gap:3, overflow:'hidden' }}>
          {days.map((date) => {
            const d = new Date(date + 'T12:00');
            const isToday = date === todayStr;
            const isSelected = date === selectedDate;
            const hasEvs = !!evsByDate[date];
            return (
              <div key={date}
                className={`cal-day${isToday?' today':''}${isSelected?' selected':''} ${hasEvs?'has-events':''}`}
                onClick={() => setSelectedDate(date)}
                style={{ flex:1 }}>
                <div style={{ fontFamily:'var(--mn)', fontSize:8, color:isSelected?'var(--red)':isToday?'var(--gold)':'var(--t4)', fontWeight:700 }}>
                  {dayNames[d.getDay()].toUpperCase()}
                </div>
                <div style={{ fontFamily:'var(--hd)', fontSize:18, fontWeight:isSelected?700:400, color:isSelected?'var(--t)':isToday?'var(--gold)':'var(--t2)', marginTop:2 }}>
                  {d.getDate()}
                </div>
              </div>
            );
          })}
        </div>
        <button onClick={()=>setWeekOffset(weekOffset+1)}
          style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:8, width:32, height:32, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IChevR size={14} color="var(--t2)" sw={2}/>
        </button>
      </div>

      {/* Legend */}
      <div style={{ display:'flex', gap:8, marginBottom:14 }}>
        <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:9, fontFamily:'var(--mn)', color:'var(--gold)', fontWeight:600 }}>
          <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--gold)' }}/>Jarvis ({localEvs.length})
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:9, fontFamily:'var(--mn)', color:'var(--gn)', fontWeight:600 }}>
          <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--gn)' }}/>Google ({gEvents.length})
        </div>
      </div>

      {/* Selected date header */}
      <div style={{ fontFamily:'var(--mn)', fontSize:9, color:selectedDate===todayStr?'var(--gold)':'var(--t3)', letterSpacing:'.12em', marginBottom:8, fontWeight:700 }}>
        {selectedDate === todayStr ? 'TODAY · ' : ''}{new Date(selectedDate+'T12:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}).toUpperCase()}
        <span style={{ color:'var(--t4)', fontWeight:400 }}> · {selectedEvs.length} event{selectedEvs.length!==1?'s':''}</span>
      </div>

      {/* Events for selected date */}
      {selectedEvs.length === 0 ? (
        <div className="hud" style={{ padding:20, textAlign:'center' }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t3)', letterSpacing:'.1em' }}>NO EVENTS</div>
          <div style={{ fontSize:11, color:'var(--t4)', marginTop:6 }}>Ask Jarvis to schedule something</div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
          {selectedEvs.map((e, j) => (
            <div key={j} className="hud" style={{ padding:'10px 12px', display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:3, height:28, borderRadius:2, background:e.src==='google'?'var(--gn)':'var(--gold)', flexShrink:0 }}/>
              <span style={{ fontFamily:'var(--mn)', fontSize:11, color:'var(--t3)', width:40, flexShrink:0, fontWeight:500 }}>{e.time==='00:00'?'All day':e.time}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:500 }}>{e.title}</div>
                {e.endTime && e.time !== '00:00' && <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:1 }}>→ {e.endTime}</div>}
                {e.notes && <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{e.notes}</div>}
              </div>
              {e.src !== 'google' && (
                <button onClick={()=>removeEv(e.id)} style={{ background:'none', border:'none', cursor:'pointer', padding:4, display:'flex' }}>
                  <ITrash size={11} color="var(--t4)" sw={1.75}/>
                </button>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Upcoming overview (next few days with events) */}
      {(() => {
        const upcomingDates = Object.keys(evsByDate).filter(d => d > selectedDate).sort().slice(0, 5);
        if (upcomingDates.length === 0) return null;
        return (
          <div style={{ marginTop:18 }}>
            <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--red)', marginBottom:8 }}>Upcoming</div>
            {upcomingDates.map((date, i) => (
              <div key={i} onClick={() => { setSelectedDate(date); const diff = Math.floor((new Date(date+'T12:00') - new Date(todayStr+'T12:00')) / (7 * 864e5)); setWeekOffset(diff); }}
                className="hud" style={{ padding:'8px 12px', marginBottom:4, cursor:'pointer', display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', fontWeight:700, width:60, flexShrink:0 }}>
                  {new Date(date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric'}).toUpperCase()}
                </div>
                <div style={{ fontSize:12, color:'var(--t2)', flex:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                  {evsByDate[date].map(e => e.title).join(' · ')}
                </div>
                <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{evsByDate[date].length}</span>
              </div>
            ))}
          </div>
        );
      })()}
    </div>
  );
}

// ─── Brain Tab ──────────────────────────────────────────────────
function BrainTab() {
  const [items, setItems] = useState(loadBrain());
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  useEffect(() => { const iv = setInterval(()=>setItems(loadBrain()), 2000); return ()=>clearInterval(iv); }, []);

  const allTags = [...new Set(items.flatMap(i => i.tags || []))].map(t => t.toLowerCase()).filter(Boolean);
  const tags = ['all', ...allTags.slice(0, 8)];
  const vis = items.filter(x => {
    const matchTag = filter === 'all' || (x.tags || []).some(t => t.toLowerCase() === filter);
    const matchSearch = !search || x.title.toLowerCase().includes(search.toLowerCase()) || (x.comment||'').toLowerCase().includes(search.toLowerCase());
    return matchTag && matchSearch;
  });

  const remove = (id) => { deleteBrainItem(id); setItems(loadBrain()); };
  const ago = (iso) => {
    const d = (Date.now() - new Date(iso).getTime()) / 60000;
    if (d < 60) return Math.round(d) + 'm';
    if (d < 1440) return Math.round(d/60) + 'h';
    return Math.round(d/1440) + 'd';
  };

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ marginBottom:14 }}>
        <div style={{ fontFamily:'var(--hd)', fontSize:26, fontWeight:400 }}>
          <span style={{ color:'var(--t2)' }}>Second</span> <span style={{ color:'var(--gold)' }}>Brain</span>
        </div>
        <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', marginTop:3, fontWeight:500 }}>MEMORY ARCHIVE · {items.length} ENTRIES</div>
      </div>

      {items.length > 0 && (
        <input className="ipt" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search notes…" style={{ marginBottom:10, fontFamily:'var(--bd)', fontSize:13, padding:'10px 12px' }}/>
      )}

      {allTags.length > 0 && (
        <div className="sx" style={{ display:'flex', gap:5, paddingBottom:10 }}>
          {tags.map((t, i) => (
            <button key={i} onClick={()=>setFilter(t)} className="pl" style={filter===t ? { borderColor:'var(--gold)', color:'var(--gold)', background:'rgba(255,180,0,0.07)' } : {}}>#{t}</button>
          ))}
        </div>
      )}

      {items.length === 0 ? (
        <div className="hud hud-gold-bdr" style={{ padding:'18px 16px', textAlign:'center' }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--gold)', letterSpacing:'.12em', fontWeight:700 }}>EMPTY ARCHIVE</div>
          <div style={{ fontSize:12, color:'var(--t2)', marginTop:8, lineHeight:1.5 }}>Tell Jarvis to remember things:</div>
          <div style={{ fontFamily:'var(--mn)', fontSize:11, color:'var(--t3)', marginTop:6, lineHeight:1.6 }}>
            "Log: saw great article on AI"<br/>
            "Remember: Christian suggested X"<br/>
            "Note: try fasted runs"
          </div>
          <div style={{ fontSize:11, color:'var(--t4)', marginTop:10 }}>You can also tap <strong>Save to Brain</strong> on any chat message.</div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          {vis.map((x, i) => (
            <div key={i} className="hud" style={{ padding:'10px 12px' }}>
              <div style={{ display:'flex', gap:8, alignItems:'flex-start' }}>
                <div style={{ width:28, height:28, borderRadius:6, background:'rgba(255,180,0,0.08)', border:'1px solid var(--bdr)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <IHash size={12} color="var(--gold)" sw={1.75}/>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, lineHeight:1.4, fontWeight:500 }}>{x.title}</div>
                  <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', marginTop:2 }}>{ago(x.ts)} ago</div>
                  {x.comment && <div style={{ fontSize:11, color:'var(--t2)', fontStyle:'italic', marginTop:6, borderLeft:'2px solid var(--bdrGold)', paddingLeft:8 }}>{x.comment}</div>}
                  {x.tags?.length > 0 && (
                    <div style={{ display:'flex', gap:3, marginTop:6, flexWrap:'wrap' }}>
                      {x.tags.map((t, j) => <span key={j} className="tag">{t.toLowerCase()}</span>)}
                    </div>
                  )}
                </div>
                <button onClick={()=>remove(x.id)} style={{ background:'none', border:'none', cursor:'pointer', padding:4, display:'flex' }}>
                  <ITrash size={11} color="var(--t4)" sw={1.75}/>
                </button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Marathon Tab ───────────────────────────────────────────────
function RunTab({ days, gEvents, gToken }) {
  const keywords = ['run','running','km','tempo','easy','long run','interval','trail','garmin','training','jog','course','sortie','cardio'];
  const runs = gEvents.filter(e => keywords.some(k => e.title.toLowerCase().includes(k)));

  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const monday = new Date(today); monday.setDate(today.getDate() - ((today.getDay()+6)%7));
  const weekDays = Array.from({length:7}, (_,i) => { const d=new Date(monday); d.setDate(monday.getDate()+i); return d.toISOString().slice(0,10); });
  const dayLabels = ['M','T','W','T','F','S','S'];

  const upcomingRuns = runs.filter(e => e.date >= todayStr).slice(0, 5);
  const nextRun = upcomingRuns[0];

  const fmtDate = (iso) => new Date(iso+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div className="hud hud-red-bdr scan glow-red" style={{ padding:20, marginBottom:14, position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:-30, right:-30, width:130, height:130, background:'var(--red)', opacity:0.06, filter:'blur(50px)', borderRadius:'50%' }}/>
        <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', letterSpacing:'.14em', marginBottom:6, fontWeight:700 }}>LAKE MAGGIORE · NOVEMBER 8</div>
        <div style={{ display:'flex', alignItems:'baseline', gap:10 }}>
          <span style={{ fontFamily:'var(--hd)', fontSize:62, fontWeight:400, lineHeight:1, background:'linear-gradient(135deg, var(--gold), var(--red))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }}>{days}</span>
          <span style={{ fontFamily:'var(--hd)', fontSize:20, fontWeight:300, color:'var(--t3)' }}>days</span>
        </div>
        <div style={{ fontSize:11, color:'var(--t2)', marginTop:8 }}>{Math.floor(days/7)} weeks · {(days%7)} days remaining</div>
      </div>

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--gold)', marginBottom:7, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span>This Week</span>
        <span style={{ fontFamily:'var(--mn)', fontSize:9, color:gToken?'var(--gn)':'var(--t4)', fontWeight:500 }}>
          {gToken ? 'GARMIN SYNCED' : 'CONNECT GOOGLE'}
        </span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4, marginBottom:16 }}>
        {weekDays.map((date, i) => {
          const hasRun = runs.some(e => e.date === date);
          const isToday = date === todayStr;
          const isPast = date < todayStr;
          return (
            <div key={i} className={`wk${isToday?' td':''}${isPast && hasRun ?' dn':''}`}>
              <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--t4)', textTransform:'uppercase', fontWeight:700 }}>{dayLabels[i]}</div>
              <div style={{ fontSize:10, marginTop:3, color:isToday?'var(--gold)':(isPast && hasRun)?'var(--gn)':hasRun?'var(--t2)':'var(--t4)', fontWeight:500 }}>
                {hasRun ? 'Run' : '──'}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--red)', marginBottom:7 }}>Upcoming Sessions</div>
      {!gToken ? (
        <div className="hud" style={{ padding:14 }}>
          <div style={{ fontSize:12, color:'var(--t3)' }}>Connect Google Calendar to see your Garmin training plan.</div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--gold)', marginTop:6 }}>Tap ⚙️ → Sign in with Google</div>
        </div>
      ) : upcomingRuns.length === 0 ? (
        <div className="hud" style={{ padding:14 }}>
          <div style={{ fontSize:12, color:'var(--t3)' }}>No upcoming runs scheduled.</div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t4)', marginTop:4 }}>Ensure Garmin Connect → Google Calendar sync is active.</div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:5, marginBottom:14 }}>
          {upcomingRuns.map((r, i) => (
            <div key={i} className="hud" style={{ padding:'10px 12px', display:'flex', alignItems:'center', gap:9 }}>
              <div style={{ width:3, height:22, borderRadius:2, background:'var(--gn)', flexShrink:0 }}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:700 }}>
                  {fmtDate(r.date)} {r.time !== '00:00' ? '· ' + r.time : ''}
                </div>
                <div style={{ fontSize:12, marginTop:2, fontWeight:500 }}>{r.title}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {nextRun && (
        <div className="hud hud-gold-bdr glow-gold" style={{ padding:14, marginTop:14 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:5 }}>
            <IFlame size={12} color="var(--gold)" sw={1.75}/>
            <span style={{ fontFamily:'var(--mn)', fontSize:9, letterSpacing:'.12em', color:'var(--gold)', fontWeight:700 }}>NEXT RUN</span>
          </div>
          <div style={{ fontFamily:'var(--hd)', fontSize:18, fontWeight:500 }}>{nextRun.title}</div>
          <div style={{ fontSize:11, color:'var(--t2)', marginTop:3 }}>
            {new Date(nextRun.date+'T12:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}
            {nextRun.time !== '00:00' ? ' · ' + nextRun.time : ''}
          </div>
          {nextRun.notes && <div style={{ fontSize:11, color:'var(--t3)', marginTop:5 }}>{nextRun.notes}</div>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Jarvis/>);
</script>
</body>
</html>
