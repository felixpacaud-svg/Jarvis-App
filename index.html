<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#0a0507" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jarvis" />
  <meta name="format-detection" content="telephone=no" />
  <title>J.A.R.V.I.S.</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="jarvis-icon.svg" />
  <link rel="apple-touch-icon" href="jarvis-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://generativelanguage.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter+Tight:wght@300;400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <style id="jarvis-styles">
:root {
  /* ═══════════════════════════════════════════════════════════
   * PRESENCE — v5.0 visual language
   *
   * ONE committed palette. No picker, no hedging.
   * Refined-luxury industrial — the bridge between Iron Man's HUD
   * and a high-end synthesizer panel. Materials feel real.
   *
   * Three voices, used distinctly:
   *   AMBER (--gold)  → action, attention, primary chrome
   *   CRIMSON (--red) → warning, urgency, overdue
   *   ICE   (--ice)  → DATA — every number, percentage, timestamp
   *
   * The ice voice is the differentiator. Without it, the UI is
   * monochrome warm. With it, data feels like data.
   * ═══════════════════════════════════════════════════════════ */

  /* Backgrounds — deep warm-black with progressive elevation */
  --bg:#0a0807;
  --bg2:#161210;
  --bg3:#1e1814;
  --bg4:#2a221c;
  --bg-tint:#221a13;

  /* Borders — used very sparingly; light is the structure */
  --bdr:rgba(232,154,58,0.10);
  --bdr2:rgba(184,57,44,0.22);
  --bdrGold:rgba(232,154,58,0.38);

  /* CRIMSON — deeper, more committed than v4.8 */
  --red:#b8392c;
  --redHot:#d85540;
  --redDark:#6b1a14;

  /* AMBER — saturation pushed back up. This is the "Jarvis is here" color. */
  --gold:#e89a3a;
  --goldBright:#ffb557;
  --goldDeep:#a06820;

  /* ICE — the data voice. Cooler than v4.8 to maximize separation from amber. */
  --ice:#5fb8d4;
  --iceBright:#7fd4ee;
  --iceDeep:#2d7d96;

  /* Status / utility */
  --gn:#6fc486;
  --warn:#e89a3a;
  --blue:#3b82f6;
  --cyan:#5fb8d4;

  /* Text — warm bone, never pure white */
  --t:#f4ead7;
  --t2:#d4c0a0;
  --t3:#94836b;
  --t4:#5d4d3e;
  --t5:#352a22;

  /* Strategic warm-white highlight used on small details only */
  --hi:#fff6e6;

  /* Typography — four-font hierarchy is the silent differentiator */
  --display:'Cormorant Garamond',serif;     /* Greeting, large titles */
  --hd:'Rajdhani',sans-serif;                /* HUD labels, small caps */
  --bd:'Inter Tight',sans-serif;             /* Body copy, refined sans */
  --mn:'JetBrains Mono',monospace;           /* Data, numbers, IDs */

  /* Glass material */
  --glass-bg:rgba(35,25,18,0.62);
  --glass-bg-strong:rgba(48,34,24,0.78);
  --glass-blur:20px;
  --glass-edge-top:0 1px 0 0 rgba(255,246,230,0.07) inset;
  --glass-edge-bot:0 -1px 0 0 rgba(0,0,0,0.20) inset;

  /* Atmospheric layer — RGB triplets used by .app::before
   * High enough opacity to be VISIBLE, not subliminal */
  --atm1:232,154,58;       /* warm gold pool */
  --atm2:184,57,44;        /* deep crimson pool */
  --atm3:95,184,212;       /* cool ice pool */
  --atm1-a:0.22;           /* gold — primary, strong */
  --atm2-a:0.16;           /* red — supporting */
  --atm3-a:0.09;           /* ice — accent */

  --safe-bot:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body,#root{height:100%;background:var(--bg);color:var(--t);font-family:var(--bd);overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
input,textarea,button{font-family:inherit;color:inherit}
button{user-select:none}

.app{max-width:480px;margin:0 auto;height:100svh;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--bg);transition:filter 1s ease-out}

/* ═══════════════════════════════════════════════════════════
 * ATMOSPHERIC LAYER — three-tier system that creates real depth
 *
 * Tier 1 (.app::before): two strong warm light pools
 *   — top-left: gold, top-right: deep crimson
 *   These are STRONG. You should see them with your eyes closed.
 *
 * Tier 2 (.app + .atm-caustic): slow-moving caustics (light patterns
 *   like underwater light on a pool floor). Built from CSS conic
 *   gradients with rotation. Adds genuine "alive" without neurons.
 *
 * Tier 3 (.app::after): warm noise/grain, blended in to make the
 *   surface feel like material rather than pixels.
 * ═══════════════════════════════════════════════════════════ */
.app::before{
  content:'';position:absolute;inset:-10%;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle 50% at 20% 15%, rgba(var(--atm1), var(--atm1-a)) 0%, transparent 65%),
    radial-gradient(circle 45% at 85% 75%, rgba(var(--atm2), var(--atm2-a)) 0%, transparent 65%),
    radial-gradient(circle 35% at 65% 110%, rgba(var(--atm3), var(--atm3-a)) 0%, transparent 70%);
  animation:atmDrift 28s ease-in-out infinite;
  filter:blur(2px);
}
.app::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  opacity:0.55;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.6 0 0 0 0 0.45 0 0 0 0 0.3 0 0 0 0.42 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* Caustics — slow underwater-light-on-pool-floor pattern.
 * Built into .scan-bg as an extra layer so we don't need new DOM. */
.scan-bg::before{
  content:'';position:absolute;inset:-25%;pointer-events:none;z-index:0;
  background:
    conic-gradient(from 35deg at 30% 40%, transparent 0deg, rgba(var(--atm1),0.10) 60deg, transparent 120deg, transparent 360deg),
    conic-gradient(from 215deg at 70% 65%, transparent 0deg, rgba(var(--atm2),0.08) 80deg, transparent 160deg, transparent 360deg);
  filter:blur(28px);
  animation:caustics 38s linear infinite;
  opacity:0.7;
}
.scan-bg::after{
  /* Single faint scan sweep — kept for technical-instrument feel */
  content:'';position:absolute;left:-10%;right:-10%;top:-5%;
  height:1.5px;
  background:linear-gradient(90deg,transparent 25%,rgba(var(--atm1),.30) 50%,transparent 75%);
  box-shadow:0 0 24px rgba(var(--atm1),.15);
  animation:sweepDown 18s linear infinite;
  opacity:0.5;
  filter:blur(0.5px);
}
@keyframes atmDrift{
  0%,100%{transform:rotate(0deg) scale(1)}
  50%{transform:rotate(2deg) scale(1.05)}
}
@keyframes caustics{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}
@keyframes sweepDown{0%{top:-5%;opacity:0}10%{opacity:.5}90%{opacity:.5}100%{top:105%;opacity:0}}
@keyframes sweepUp{0%{bottom:-5%;opacity:0}10%{opacity:.45}90%{opacity:.45}100%{bottom:105%;opacity:0}}

/* When overdue items exist, the whole app warms toward crimson */
.app.has-overdue{filter:hue-rotate(-4deg) saturate(1.10) brightness(0.97)}

/* Corner brackets — refined */
.hud-frame{position:absolute;inset:0;pointer-events:none;z-index:3;opacity:0.55}
.hud-frame span{position:absolute;width:16px;height:16px;border:1px solid var(--gold);opacity:0.45}
.hud-frame span:nth-child(1){top:12px;left:12px;border-right:none;border-bottom:none}
.hud-frame span:nth-child(2){top:12px;right:12px;border-left:none;border-bottom:none}
.hud-frame span:nth-child(3){bottom:calc(12px + var(--safe-bot));left:12px;border-right:none;border-top:none}
.hud-frame span:nth-child(4){bottom:calc(12px + var(--safe-bot));right:12px;border-left:none;border-top:none}

.hdr{padding:calc(12px + var(--safe-top)) 18px 12px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(184,57,44,0.10),transparent 70%);border-bottom:1px solid rgba(232,154,58,0.08);flex-shrink:0;z-index:2;position:relative}
.hdr::after{content:'';position:absolute;bottom:0;left:18%;right:18%;height:1px;background:linear-gradient(90deg,transparent,rgba(232,154,58,0.5),transparent);box-shadow:0 0 4px rgba(232,154,58,0.3)}
.hdr-t{
  font-family:var(--display);font-weight:400;font-style:italic;
  font-size:30px;letter-spacing:0.005em;line-height:1;
  background:linear-gradient(135deg, var(--hi) 0%, var(--gold) 35%, var(--goldDeep) 75%, var(--red) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(232,154,58,0.35));
}
.hdr-sub{font-family:var(--mn);font-size:9px;color:var(--t3);letter-spacing:.12em;margin-top:2px;font-weight:500}

/* ═══════════════════════════════════════════════════════════
 * THE REACTOR — hero element
 *
 * Multi-layer build:
 *   .reactor              — outer halo (breathing glow)
 *   .reactor::before      — ring 1, slow clockwise
 *   .reactor::after       — ring 2, faster counter-clockwise
 *   .reactor-core         — solid core with hot center
 *   .reactor-filaments    — radial light streaks ("light through fog")
 *
 * State responses:
 *   default    — slow breath, subtle rotation
 *   .has-overdue (on .app) — faster breath, redder tone
 *   .speaking  — rapid pulse, intensified core
 *   .thinking  — filaments speed up
 *
 * Sized at 38px so it has actual presence in the header without
 * crowding the title. This is the single most-seen element of the
 * app — it gets the budget.
 * ═══════════════════════════════════════════════════════════ */
.reactor{
  width:38px;height:38px;position:relative;flex-shrink:0;
  /* Outer halo — breathes warmly */
  background:radial-gradient(circle, transparent 38%, rgba(232,154,58,0.18) 50%, transparent 78%);
  border-radius:50%;
  animation:reactorBreath 4.2s ease-in-out infinite;
}
/* Ring 1 — clockwise, slow, primary gold */
.reactor::before{
  content:'';position:absolute;inset:5px;border-radius:50%;
  border:1px solid transparent;
  background:
    conic-gradient(from 0deg, transparent 0deg, rgba(232,154,58,0.85) 30deg, rgba(255,181,87,1) 60deg, rgba(232,154,58,0.85) 90deg, transparent 120deg, transparent 360deg) border-box;
  -webkit-mask:linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:reactorRing1 6.5s linear infinite;
  filter:drop-shadow(0 0 4px rgba(232,154,58,0.6));
}
/* Ring 2 — counter-clockwise, faster, ice accent */
.reactor::after{
  content:'';position:absolute;inset:1.5px;border-radius:50%;
  border:1px solid transparent;
  background:
    conic-gradient(from 180deg, transparent 0deg, rgba(95,184,212,0.55) 40deg, rgba(127,212,238,0.85) 80deg, rgba(95,184,212,0.55) 120deg, transparent 160deg, transparent 360deg) border-box;
  -webkit-mask:linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:reactorRing2 4.2s linear infinite reverse;
  filter:drop-shadow(0 0 3px rgba(95,184,212,0.5));
  opacity:0.85;
}
/* Solid core with hot bright center — drawn as a child div */
.reactor-core{
  position:absolute;inset:11px;border-radius:50%;
  background:
    radial-gradient(circle at 50% 45%,
      rgba(255,255,255,0.95) 0%,
      rgba(255,246,230,0.85) 18%,
      rgba(255,181,87,0.85) 38%,
      rgba(232,154,58,0.65) 60%,
      rgba(160,104,32,0.4) 80%,
      transparent 100%);
  box-shadow:
    0 0 6px rgba(255,246,230,0.7),
    0 0 14px rgba(232,154,58,0.55),
    0 0 22px rgba(232,154,58,0.30),
    inset 0 0 4px rgba(255,255,255,0.5);
  animation:reactorCore 2.6s ease-in-out infinite;
}
/* Light filaments — radial streaks suggesting "light through fog" */
.reactor-filaments{
  position:absolute;inset:-3px;border-radius:50%;pointer-events:none;
  background:
    conic-gradient(from 0deg,
      transparent 0deg, rgba(232,154,58,0.18) 8deg, transparent 16deg,
      transparent 60deg, rgba(232,154,58,0.12) 68deg, transparent 76deg,
      transparent 120deg, rgba(232,154,58,0.18) 128deg, transparent 136deg,
      transparent 180deg, rgba(232,154,58,0.12) 188deg, transparent 196deg,
      transparent 240deg, rgba(232,154,58,0.18) 248deg, transparent 256deg,
      transparent 300deg, rgba(232,154,58,0.12) 308deg, transparent 316deg,
      transparent 360deg);
  animation:reactorFilaments 14s linear infinite;
  filter:blur(1.5px);
  opacity:0.7;
}

@keyframes reactorBreath{
  0%,100%{box-shadow:0 0 0 0 rgba(232,154,58,0)}
  50%{box-shadow:0 0 18px 2px rgba(232,154,58,0.18)}
}
/* Phase F.2: mechanical-eye pupil. A small inner highlight that drifts
 * around the core on an 11-second loop, with subtle scale variance.
 * Reads as "Jarvis is aware" without being literal. */
.reactor-core::before{
  content:'';position:absolute;inset:30%;border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,255,255,0.95) 0%,
    rgba(255,248,230,0.75) 32%,
    rgba(255,200,120,0.30) 70%,
    transparent 100%);
  filter:blur(0.5px);
  animation:reactorLook 11s ease-in-out infinite;
  pointer-events:none;
}
@keyframes reactorLook{
  0%,100%{transform:translate(0, 0) scale(1)}
  14%{transform:translate(1.6px, -1.4px) scale(1.06)}
  28%{transform:translate(2.2px, 0.2px) scale(1.00)}
  42%{transform:translate(1.6px, 1.4px) scale(1.06)}
  56%{transform:translate(-1.4px, 1.4px) scale(1.00)}
  70%{transform:translate(-2.2px, 0.2px) scale(1.06)}
  84%{transform:translate(-1.4px, -1.4px) scale(1.00)}
}
@keyframes reactorRing1{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes reactorRing2{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes reactorCore{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(0.88);opacity:0.92}
}
@keyframes reactorFilaments{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

/* Overdue state — reactor warms toward crimson, breathes faster */
.app.has-overdue .reactor{animation-duration:1.6s}
.app.has-overdue .reactor-core{
  background:
    radial-gradient(circle at 50% 45%,
      rgba(255,246,230,0.95) 0%,
      rgba(255,181,87,0.7) 25%,
      rgba(216,85,64,0.7) 55%,
      rgba(184,57,44,0.5) 80%,
      transparent 100%);
  box-shadow:
    0 0 8px rgba(255,246,230,0.5),
    0 0 18px rgba(216,85,64,0.65),
    0 0 28px rgba(184,57,44,0.40),
    inset 0 0 4px rgba(255,255,255,0.5);
  animation-duration:1.4s;
}
.app.has-overdue .reactor::before{filter:drop-shadow(0 0 5px rgba(216,85,64,0.7));animation-duration:4s}

/* Speaking state — added by JS when speech is active */
.reactor.speaking .reactor-core{animation-duration:0.6s}
.reactor.speaking .reactor-filaments{animation-duration:6s}

.content{flex:1;overflow-y:auto;position:relative;z-index:1;padding-bottom:calc(68px + var(--safe-bot))}
.content::-webkit-scrollbar{display:none}
.content.no-pad{padding-bottom:0;display:flex;flex-direction:column;overflow:hidden}

.nav{
  border-top:1px solid rgba(232,154,58,0.08);
  background:linear-gradient(180deg, rgba(20,14,10,0.85) 0%, rgba(10,8,7,0.97) 100%);
  backdrop-filter:blur(20px) saturate(1.1);
  -webkit-backdrop-filter:blur(20px) saturate(1.1);
  flex-shrink:0;z-index:2;
  box-shadow:0 -12px 32px -16px rgba(184,57,44,0.45), inset 0 1px 0 rgba(255,246,230,0.04);
  padding-bottom:var(--safe-bot);
  position:relative;
}
.nav::before{
  content:'';position:absolute;top:0;left:18%;right:18%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,154,58,0.4),transparent);
  box-shadow:0 0 4px rgba(232,154,58,0.3);
}
.nav-in{display:flex;justify-content:space-around;padding:8px 2px 10px}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;background:none;border:none;cursor:pointer;padding:4px 0;position:relative;transition:transform 0.15s}
.nb:active{transform:scale(0.92)}
.nl{font-family:var(--hd);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.nb.on::before{
  content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:28px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--goldBright) 50%,var(--gold) 70%,transparent);
  border-radius:2px;
  box-shadow:0 0 8px var(--gold), 0 0 16px rgba(232,154,58,0.4);
}
.nb.on::after{
  content:'';position:absolute;inset:0;border-radius:8px;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 100%, rgba(232,154,58,0.10), transparent);
}

/* Phase F.2: hide bottom nav while the virtual keyboard is open.
 * Without this, the nav renders as a dark bar between the chat
 * input and the top of the keyboard. body.keyboard-open is toggled
 * by the focus-event listener in the Jarvis component. */
.nav{transition:transform .22s cubic-bezier(.2,.7,.3,1)}
body.keyboard-open .nav{
  transform:translateY(100%);
  pointer-events:none;
}

/* ═══════════════════════════════════════════════════════════
 * CARDS — frosted glass plates that visibly float
 *
 * Fill is more translucent (so atmospheric light bleeds through).
 * Blur is heavier (20px). Top rim is much brighter (you should SEE
 * the glass edge catching light). Drop shadow is layered (12px ambient
 * + 4px contact + a faint gold ground glow).
 * ═══════════════════════════════════════════════════════════ */
.hud{
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(1.15);
  -webkit-backdrop-filter:blur(20px) saturate(1.15);
  border:1px solid rgba(232,154,58,0.06);
  border-radius:14px;
  position:relative;
  overflow:hidden;
  box-shadow:
    inset 0 1px 0 0 rgba(255,246,230,0.10),
    inset 0 -1px 0 0 rgba(0,0,0,0.25),
    0 14px 32px -16px rgba(0,0,0,0.75),
    0 5px 10px -5px rgba(0,0,0,0.4),
    0 0 28px -16px rgba(232,154,58,0.20);
}

/* Top-edge highlight — the bright "glass top catching light".
 * Made VISIBLE deliberately. The card needs an upper rim that reads. */
.hud::before{
  content:'';position:absolute;top:0;left:6%;right:6%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--atm1),0.75),transparent);
  opacity:0.95;pointer-events:none;
  box-shadow:0 0 6px rgba(var(--atm1),0.4);
}
/* Bottom-edge subtle warmth — the card's own light spilling onto its edge */
.hud::after{
  content:'';position:absolute;bottom:0;left:14%;right:14%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--atm1),0.22),transparent);
  opacity:0.7;pointer-events:none;
}
.hud-red::before{background:linear-gradient(90deg,transparent,rgba(var(--atm2),0.75),transparent);box-shadow:0 0 6px rgba(var(--atm2),0.4)}
.hud-gold-bdr{border-color:rgba(232,154,58,0.24)}
.hud-red-bdr{border-color:rgba(184,57,44,0.24)}

.fade{animation:fd .35s ease-out}
@keyframes fd{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.glow-gold{box-shadow:inset 0 1px 0 0 rgba(255,246,230,0.10), inset 0 -1px 0 0 rgba(0,0,0,0.25), 0 14px 32px -16px rgba(0,0,0,0.75), 0 0 32px -10px rgba(232,154,58,0.30)}
.glow-red{box-shadow:inset 0 1px 0 0 rgba(255,246,230,0.10), inset 0 -1px 0 0 rgba(0,0,0,0.25), 0 14px 32px -16px rgba(0,0,0,0.75), 0 0 32px -10px rgba(184,57,44,0.30)}

.scan{position:relative;overflow:hidden}
.scan::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,rgba(232,154,58,0.35),transparent);animation:sl 7s linear infinite;opacity:0.18;pointer-events:none}
@keyframes sl{from{top:0}to{top:100%}}

@keyframes pg{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ps{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* Element-anchored ripple structural class.
 * Visual is rendered by the JS-added .rip::after rule in the Phase-D
 * atelier section below, which uses subtler colors than v4.7. */
.rip{position:relative;overflow:hidden;isolation:isolate}

/* Thinking — arc reactor HUD targeting pulse behind text */
.thinking{position:relative;display:inline-flex;align-items:center;gap:8px}
.thinking-rings{width:22px;height:22px;position:relative}
.thinking-rings::before,.thinking-rings::after{content:'';position:absolute;inset:0;border:1.5px solid var(--gold);border-radius:50%;border-top-color:transparent;border-right-color:transparent;animation:thinkSpin 1.4s linear infinite}
.thinking-rings::after{inset:4px;border-color:var(--red);border-top-color:transparent;border-left-color:transparent;animation:thinkSpin 0.9s linear infinite reverse}
@keyframes thinkSpin{to{transform:rotate(360deg)}}
.thinking-text{font-family:var(--mn);font-size:10px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;font-weight:700;animation:thinkGlow 1.6s ease-in-out infinite}
@keyframes thinkGlow{0%,100%{text-shadow:0 0 2px var(--gold)}50%{text-shadow:0 0 12px var(--gold)}}

/* Ambient floating particles for hero cards */
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:inherit;z-index:0}
.particles span{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);opacity:0;animation:floatUp 8s linear infinite}
.particles span:nth-child(1){left:12%;animation-delay:0s;animation-duration:7s}
.particles span:nth-child(2){left:28%;animation-delay:1.5s;animation-duration:9s;background:var(--red);box-shadow:0 0 6px var(--red)}
.particles span:nth-child(3){left:47%;animation-delay:3s;animation-duration:6s}
.particles span:nth-child(4){left:68%;animation-delay:0.8s;animation-duration:8s;background:var(--red);box-shadow:0 0 6px var(--red)}
.particles span:nth-child(5){left:85%;animation-delay:4s;animation-duration:7.5s}
@keyframes floatUp{
  0%{bottom:-10px;opacity:0;transform:translateX(0)}
  10%{opacity:0.8}
  50%{transform:translateX(8px)}
  90%{opacity:0.3}
  100%{bottom:110%;opacity:0;transform:translateX(-8px)}
}

/* Tap-to-reveal ambient glow when interacting */
.tap-glow{position:relative}
.tap-glow::before{content:'';position:absolute;inset:-2px;border-radius:inherit;background:linear-gradient(45deg,var(--gold),var(--red),var(--gold));opacity:0;z-index:-1;filter:blur(8px);transition:opacity .25s}
.tap-glow:active::before{opacity:0.4}

.ch-w{display:flex;flex-direction:column;flex:1;min-height:0;height:100%}
.ch-m{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:14px;min-height:0}
.ch-m::-webkit-scrollbar{display:none}
.ch-i{padding:8px 14px 10px;border-top:1px solid var(--bdr);flex-shrink:0;background:rgba(10,5,7,0.85);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.cf{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:14px;padding:10px 14px;transition:border-color .3s,box-shadow .3s;box-shadow:inset 0 1px 0 rgba(232,154,58,0.05)}
.cf:focus-within{border-color:var(--gold);box-shadow:0 0 16px rgba(232,154,58,0.18),inset 0 1px 0 rgba(232,154,58,0.08)}
.cf input{flex:1;background:none;border:none;outline:none;color:var(--t);font-family:var(--bd);font-size:14px;font-weight:500;min-width:0}
.cf input::placeholder{color:var(--t4)}
.sb{background:none;border:none;cursor:pointer;display:flex;padding:4px}
.mic{background:none;border:none;cursor:pointer;display:flex;padding:4px;position:relative}
.mic.on::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--redHot);animation:pg 1.2s infinite}
.pls{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px}.pls::-webkit-scrollbar{display:none}
.pl{white-space:nowrap;font-size:10px;padding:6px 11px;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--t2);cursor:pointer;font-family:var(--bd);font-weight:500;transition:all 0.18s;flex-shrink:0}
.pl:active{border-color:var(--gold);background:var(--bg4);color:var(--gold)}
.dp span{display:inline-block;width:5px;height:5px;background:var(--gold);border-radius:50%;margin:0 2px;animation:ps 1.4s ease-in-out infinite}
.dp span:nth-child(2){animation-delay:.2s}.dp span:nth-child(3){animation-delay:.4s}

.sx{overflow-x:auto;-webkit-overflow-scrolling:touch}.sx::-webkit-scrollbar{display:none}
.tag{font-size:9px;font-family:var(--mn);color:var(--gold);background:rgba(232,154,58,.08);border:1px solid rgba(232,154,58,.2);padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:.04em}
.tag-red{color:var(--redHot);background:rgba(216,85,64,.08);border-color:rgba(216,85,64,.25)}

.bf{height:3px;background:rgba(232,154,58,.1);border-radius:2px;overflow:hidden}
.bff{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--red));transition:width .6s cubic-bezier(.4,0,.2,1)}

.wk{border-radius:7px;padding:6px 3px;text-align:center;border:1px solid var(--bdr);background:var(--bg2);transition:all 0.2s}
.wk.td{border-color:var(--gold);background:rgba(232,154,58,.06);box-shadow:0 0 8px rgba(232,154,58,.12)}
.wk.dn{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.05)}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:50;display:flex;flex-direction:column;justify-content:flex-end;animation:fadeBg .25s ease-out}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
.sp{background:linear-gradient(180deg,var(--bg2),var(--bg));border-top:1px solid var(--bdrGold);border-radius:20px 20px 0 0;padding:22px 18px calc(40px + var(--safe-bot));max-height:90vh;overflow-y:auto;box-shadow:0 -20px 50px rgba(184,57,44,0.2);animation:slideUp .35s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(20%);opacity:0}to{transform:translateY(0);opacity:1}}
.sp::-webkit-scrollbar{display:none}
.ki{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;transition:border-color .3s}
.ki:focus-within{border-color:var(--gold)}
.ki input{flex:1;background:none;border:none;outline:none;color:var(--t);font-family:var(--mn);font-size:12px;min-width:0}
.ki input::placeholder{color:var(--t4)}
.svb{width:100%;padding:14px;border:none;border-radius:10px;font-family:var(--hd);font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .3s}

.ipt{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:8px 10px;color:var(--t);font-family:var(--mn);font-size:12px;outline:none;width:100%;transition:border-color 0.2s}
.ipt:focus{border-color:var(--gold)}

.src-link{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.25);border-radius:5px;font-size:10px;font-family:var(--mn);color:var(--blue);text-decoration:none;font-weight:500;margin:2px 3px 2px 0;transition:all .2s}
.src-link:active{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.4)}

.news-card{cursor:pointer;transition:transform 0.15s}
.news-card:active{transform:scale(0.98)}

.cal-day{cursor:pointer;transition:all 0.15s;min-width:44px;padding:8px 4px;text-align:center;border-radius:10px;border:1px solid transparent;flex-shrink:0}
.cal-day:active{transform:scale(0.95)}
.cal-day.today{border-color:var(--gold);background:rgba(232,154,58,0.06)}
.cal-day.selected{border-color:var(--red);background:rgba(184,57,44,0.08);box-shadow:0 0 8px rgba(184,57,44,0.12)}
.cal-day.has-events::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--gold);margin:3px auto 0}

.save-btn{background:none;border:1px solid var(--bdr);border-radius:5px;padding:3px 7px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-family:var(--mn);font-size:9px;color:var(--t3);transition:all 0.2s;margin-top:6px;letter-spacing:.04em;font-weight:500}
.save-btn:active{border-color:var(--gold);color:var(--gold)}
.save-btn.saved{border-color:var(--gn);color:var(--gn)}

.toast-stack{position:fixed;top:calc(18px + var(--safe-top));left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:6px;pointer-events:none;width:90%;max-width:380px}
.toast{pointer-events:auto;background:linear-gradient(135deg,rgba(24,10,12,0.95),rgba(36,20,23,0.95));border:1px solid var(--bdrGold);border-radius:10px;padding:10px 14px;font-family:var(--mn);font-size:12px;color:var(--t);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 8px 24px rgba(0,0,0,0.5),0 0 16px rgba(232,154,58,0.15);animation:toastIn .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:8px;font-weight:500}
.toast.gn{border-color:rgba(34,197,94,0.4);box-shadow:0 8px 24px rgba(0,0,0,0.5),0 0 16px rgba(34,197,94,0.18)}
.toast.red{border-color:var(--bdr2);box-shadow:0 8px 24px rgba(0,0,0,0.5),0 0 16px rgba(184,57,44,0.18)}
.toast.leave{animation:toastOut .3s ease-in forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-16px) scale(0.96)}}

.boot{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%, #15110d 0%, #050302 70%);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;overflow:hidden}
.boot::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 50% 50%, rgba(232,154,58,0.12), transparent 70%);
  animation:bootGlow 3s ease-out forwards;
}
@keyframes bootGlow{0%{opacity:0;transform:scale(0.5)}30%{opacity:1}100%{opacity:0.6;transform:scale(1.1)}}
.boot-reactor{width:120px;height:120px;position:relative;animation:bootSpin 2.5s ease-out forwards}
.boot-reactor::before{
  content:'';position:absolute;inset:-26px;border-radius:50%;
  border:1.5px solid var(--gold);opacity:0;
  box-shadow:0 0 24px rgba(232,154,58,0.4);
  animation:bootRing 2.2s ease-out .3s forwards;
}
.boot-reactor::after{
  content:'';position:absolute;inset:-50px;border-radius:50%;
  border:1px solid var(--red);opacity:0;
  animation:bootRing 2.2s ease-out .6s forwards;
}
.boot-core{
  position:absolute;inset:24px;border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,255,255,0.95) 0%,
    var(--goldBright) 25%,
    var(--gold) 55%,
    rgba(160,104,32,0.4) 80%,
    transparent 100%);
  box-shadow:
    0 0 24px rgba(255,246,230,0.5),
    0 0 50px rgba(232,154,58,0.6),
    0 0 90px rgba(184,57,44,0.4);
  animation:bootPulse 1.6s ease-in-out infinite;
}
@keyframes bootSpin{from{transform:rotate(-180deg) scale(0.3);opacity:0}to{transform:rotate(0) scale(1);opacity:1}}
@keyframes bootRing{0%{opacity:0;transform:scale(0.5)}45%{opacity:1}100%{opacity:0;transform:scale(1.6)}}
@keyframes bootPulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(0.86);filter:brightness(1.35)}}
.boot-text{
  font-family:var(--display);font-style:italic;font-weight:300;
  letter-spacing:0.005em;
  color:var(--hi);font-size:48px;line-height:1;
  background:linear-gradient(135deg, var(--hi) 0%, var(--gold) 50%, var(--red) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 14px rgba(232,154,58,0.45));
  opacity:0;animation:bootText .8s ease-out 1.2s forwards;
}
.boot-sub{
  font-family:var(--mn);font-size:10px;color:var(--ice);letter-spacing:.4em;
  margin-top:-22px;opacity:0;font-weight:600;
  animation:bootText .6s ease-out 1.7s forwards;
  text-shadow:0 0 8px rgba(95,184,212,0.4);
}
.boot-ready{
  font-family:var(--hd);font-size:11px;letter-spacing:.3em;color:var(--red);
  margin-top:-14px;opacity:0;font-weight:700;
  animation:bootText .5s ease-out 2.1s forwards;
}
@keyframes bootText{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.boot-lines{position:absolute;left:24px;right:24px;top:50%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;animation:bootLine 1.2s ease-out 1s forwards}
.boot-lines::before,.boot-lines::after{content:'';position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent)}
.boot-lines::before{top:-50px}.boot-lines::after{top:50px}
@keyframes bootLine{from{opacity:0;transform:scaleX(0)}to{opacity:0.5;transform:scaleX(1)}}
.boot.out{animation:bootOut .5s ease-in forwards}
@keyframes bootOut{to{opacity:0;pointer-events:none;filter:blur(8px)}}
.boot-skip{position:absolute;bottom:calc(34px + var(--safe-bot));font-family:var(--mn);font-size:9px;color:var(--t4);letter-spacing:.2em;opacity:0;animation:bootText .4s ease-out 2.3s forwards}

/* ═══════════════════════════════════════════════════════════════
   VIBRANT HUD v4.4 — depth, tilt parallax, ambient breathing,
   tap crosshairs, random-pulse neurons. Overrides appended last
   so they win any specificity battle without rewriting originals.
   ═══════════════════════════════════════════════════════════════ */
:root{--tilt-x:0;--tilt-y:0}

/* Depth layering: each layer responds to device tilt at its own scale,
   giving parallax and a proper "3D around Iron Man" feel. */
.app::before{transform:translate3d(calc(var(--tilt-x)*3px),calc(var(--tilt-y)*3px),0);transition:transform .4s cubic-bezier(.2,.9,.3,1),background .6s}
.app::after{transform:translate3d(calc(var(--tilt-x)*5px),calc(var(--tilt-y)*5px),0);animation:ambBreath 7s ease-in-out infinite}
.hud{transform:translate3d(calc(var(--tilt-x)*5px),calc(var(--tilt-y)*5px),0);transition:transform .3s cubic-bezier(.2,.9,.3,1),box-shadow .3s,border-color .25s}
.hud-frame span{transform:translate3d(calc(var(--tilt-x)*-9px),calc(var(--tilt-y)*-9px),0);transition:transform .25s cubic-bezier(.2,.9,.3,1);animation:cornerPulse 3.5s ease-in-out infinite}
/* Reactor ignores tilt parallax — it's the anchor; everything moves around IT */

@keyframes ambBreath{
  0%,100%{background:radial-gradient(ellipse at top,rgba(184,57,44,.12),transparent 70%);opacity:1}
  50%{background:radial-gradient(ellipse at top,rgba(232,154,58,.14),transparent 75%);opacity:.82}
}
@keyframes cornerPulse{0%,100%{opacity:.5;filter:none}50%{opacity:.95;filter:drop-shadow(0 0 4px var(--gold))}}

/* Ambient scan layer wrapper. The actual visual lives on ::before
 * (caustics) and ::after (sweep) defined earlier in the atmospheric
 * section above. */
.scan-bg{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}

/* ═══ PHASE D — ATELIER INTERACTION LAYER ═══
 *
 * .breathe-now: replaces the old .pulse-now — a slower, gentler warm
 * inhale rather than a hard glow. JS picks one card every 5–9s.
 */
.breathe-now{animation:breatheNow 1.8s cubic-bezier(.4,0,.2,1)!important}
@keyframes breatheNow{
  0%{box-shadow:0 6px 16px -8px rgba(0,0,0,.6),inset 0 1px 0 0 rgba(240,230,214,0.04)}
  40%{box-shadow:0 6px 16px -8px rgba(0,0,0,.6),inset 0 0 0 1px rgba(232,154,58,.18),0 0 28px rgba(232,154,58,.20)}
  100%{box-shadow:0 6px 16px -8px rgba(0,0,0,.6),inset 0 1px 0 0 rgba(240,230,214,0.04)}
}

/* ─── Ripple system (Phase D.1) ──────────────────────────────
 * Every tap → a ripple. Two flavours:
 *   .d-ripple-hit:  tight, brighter, faster — confirms an action
 *   .d-ripple-miss: wider, slower, dimmer — confirms presence on
 *                   surfaces that have no action to take.
 *
 * No more dot/ack. The wider miss-ripple does the job alone, and
 * reads as "water spreading over an undisturbed surface" rather than
 * "tiny target dot rising up". Both are theme-aware via --atm1.
 */
.d-ripple{position:fixed;width:0;height:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);border-radius:50%;mix-blend-mode:screen}
/* Phase F.6: another 15% shrink per Felix. Hit 153px in 530ms, miss
 * 208px in 750ms. Same gradient & settling fade (true water ripple,
 * transparent center, bright leading edge at the 50% gradient mark). */
.d-ripple-hit{
  background:radial-gradient(circle,
    transparent 0%,
    transparent 38%,
    rgba(var(--atm1),0.55) 50%,
    rgba(var(--atm1),0.20) 62%,
    transparent 78%);
  animation:dRippleHit .53s cubic-bezier(.2,.7,.3,1) forwards;
}
.d-ripple-miss{
  background:radial-gradient(circle,
    transparent 0%,
    transparent 40%,
    rgba(var(--atm1),0.32) 50%,
    rgba(var(--atm1),0.13) 60%,
    transparent 75%);
  animation:dRippleMiss .75s cubic-bezier(.2,.6,.3,1) forwards;
}
@keyframes dRippleHit{
  0%{width:0;height:0;opacity:0}
  16%{opacity:1}
  55%{opacity:0.7}
  100%{width:153px;height:153px;opacity:0}
}
@keyframes dRippleMiss{
  0%{width:0;height:0;opacity:0}
  18%{opacity:0.85}
  55%{opacity:0.5}
  100%{width:208px;height:208px;opacity:0}
}

/* Phase F.2: element-anchored ripple removed. The viewport-level water
 * ripple already marks the tap point; doubling it inside the element
 * produced a second hot-center gradient that read as a scope reticle. */
.rip::after{display:none}
@keyframes elemRip{0%{opacity:0}100%{opacity:0}}

/* Backwards-compat alias for Phase B/C code that referenced .pulse-now */
.pulse-now{animation:breatheNow 1.8s cubic-bezier(.4,0,.2,1)!important}

/* Mail priority override chips */
.mpr-chip{padding:7px 12px;border-radius:7px;cursor:pointer;font-family:var(--mn);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--bg3);border:1px solid var(--bdr);color:var(--t3);transition:all .18s;display:inline-flex;align-items:center;gap:5px}
.mpr-chip:active{transform:scale(.94)}
.mpr-chip.on-urgent{background:rgba(216,85,64,.10);border-color:var(--redHot);color:var(--redHot);box-shadow:0 0 10px rgba(216,85,64,.2)}
.mpr-chip.on-important{background:rgba(232,154,58,.08);border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px rgba(232,154,58,.18)}
.mpr-chip.on-routine{background:rgba(160,136,118,.1);border-color:var(--t3);color:var(--t2)}
.mpr-chip.on-low{background:var(--bg4);border-color:var(--t4);color:var(--t3)}

/* Stale-data amber banner — less alarming than the red error banner */
.news-stale{background:rgba(232,154,58,.06);border:1px solid rgba(232,154,58,.25);border-radius:7px;padding:7px 11px;margin-bottom:8px;font-family:var(--mn);font-size:10px;color:var(--gold);display:flex;align-items:center;gap:6px;font-weight:600;letter-spacing:.05em}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
  .hud,.hud-frame span,.reactor,.app::before,.app::after{transform:none!important}
}

/* ═══ PHASE B — TASKS / BRIEF / URGENCY ═══ */

/* Reactor pulse speeds up when there are overdue items */
.app.has-overdue .reactor{animation-duration:1.2s !important; box-shadow: 0 0 18px rgba(184,57,44,0.5), 0 0 32px rgba(184,57,44,0.25) !important}

/* Bottom nav badge — count of overdue + urgent mail, visible everywhere */
.nb-badge{position:absolute;top:4px;right:50%;margin-right:-22px;background:linear-gradient(135deg,var(--red),var(--redHot));color:#fff;font-family:var(--mn);font-size:8.5px;font-weight:800;letter-spacing:.04em;padding:1px 5px;border-radius:8px;box-shadow:0 0 8px rgba(184,57,44,.7);min-width:14px;text-align:center;line-height:1.4;animation:badgePulse 1.6s ease-in-out infinite}
@keyframes badgePulse{0%,100%{transform:scale(1);box-shadow:0 0 8px rgba(184,57,44,.7)}50%{transform:scale(1.08);box-shadow:0 0 14px rgba(184,57,44,.9)}}

/* Urgency banner above Brief content — gold normally, red when overdue exists */
.urg-banner{
  display:flex;align-items:center;gap:11px;padding:12px 16px;
  border-radius:12px;margin-bottom:18px;
  font-family:var(--bd);font-size:13.5px;font-weight:500;letter-spacing:0.005em;
  border:1px solid;position:relative;overflow:hidden;
  backdrop-filter:blur(16px) saturate(1.1);
  -webkit-backdrop-filter:blur(16px) saturate(1.1);
}
.urg-banner::before{
  content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,transparent,currentColor,transparent);
  opacity:0.4;
}
.urg-banner.tone-gold{
  background:linear-gradient(135deg,rgba(232,154,58,.12),rgba(232,154,58,.02));
  border-color:rgba(232,154,58,.30);color:var(--gold);
  box-shadow:0 0 22px -8px rgba(232,154,58,.30), inset 0 1px 0 rgba(255,246,230,0.05);
}
.urg-banner.tone-red{
  background:linear-gradient(135deg,rgba(184,57,44,.16),rgba(184,57,44,.03));
  border-color:rgba(184,57,44,.40);color:var(--redHot);
  box-shadow:0 0 24px -6px rgba(184,57,44,.35), inset 0 1px 0 rgba(255,246,230,0.05);
}
.urg-banner.tone-gn{
  background:linear-gradient(135deg,rgba(111,196,134,.10),rgba(111,196,134,.02));
  border-color:rgba(111,196,134,.30);color:var(--gn);
  box-shadow:0 0 22px -8px rgba(111,196,134,.18), inset 0 1px 0 rgba(255,246,230,0.05);
}
.urg-banner-dot{
  width:8px;height:8px;border-radius:50%;background:currentColor;
  box-shadow:0 0 10px currentColor, 0 0 4px currentColor;
  flex-shrink:0;animation:pg 1.8s ease-in-out infinite;
}

/* Brief edge glow — pulses red around the visible viewport when overdue */
.app.has-overdue .scan-bg::before{content:'';position:fixed;inset:0;pointer-events:none;border:2px solid transparent;box-shadow:inset 0 0 60px rgba(184,57,44,.18);animation:edgePulse 3s ease-in-out infinite;z-index:1}
@keyframes edgePulse{0%,100%{box-shadow:inset 0 0 60px rgba(184,57,44,.10)}50%{box-shadow:inset 0 0 100px rgba(184,57,44,.22)}}

/* Quick capture input row */
.qc-wrap{
  display:flex;gap:8px;
  background:var(--glass-bg);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(232,154,58,0.10);
  border-radius:12px;padding:8px;margin-bottom:14px;
  align-items:center;
  transition:border-color .2s, box-shadow .2s;
  box-shadow:0 4px 12px -8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,246,230,0.04);
}
.qc-wrap:focus-within{border-color:rgba(232,154,58,0.32);box-shadow:0 0 0 3px rgba(232,154,58,.10), 0 4px 14px -6px rgba(232,154,58,0.20), inset 0 1px 0 rgba(255,246,230,0.06)}
.qc-input{flex:1;background:transparent;border:none;outline:none;color:var(--t);font-family:var(--bd);font-size:14px;padding:7px 10px;letter-spacing:0.005em}
.qc-input::placeholder{color:var(--t4);font-style:italic;font-family:var(--display);font-size:14px}
.qc-go{
  background:linear-gradient(135deg,var(--gold) 0%,var(--goldBright) 100%);
  border:none;border-radius:9px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 0 12px rgba(232,154,58,.35), inset 0 1px 0 rgba(255,255,255,0.4);
  transition:transform .15s, box-shadow .2s;
}
.qc-go:active{transform:scale(.92)}
.qc-go:disabled{opacity:.4;cursor:wait}
/* Phase F — voice mic button in the Brief quick-capture row */
.qc-mic{
  background:var(--bg3);border:1px solid var(--bdr);border-radius:9px;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;position:relative;
  transition:border-color .15s,background .15s,transform .12s;
}
.qc-mic:active{transform:scale(.92)}
.qc-mic.on{border-color:var(--redHot);background:rgba(216,85,64,.10);box-shadow:0 0 12px rgba(216,85,64,.25)}
.qc-mic.on::after{
  content:'';position:absolute;inset:-3px;border-radius:11px;
  border:1.5px solid var(--redHot);opacity:.6;
  animation:pg 1.2s infinite;pointer-events:none;
}

/* Task row — big tap target, prioritised by colour */
.tk-row{
  display:flex;align-items:flex-start;gap:11px;padding:13px 14px;
  background:var(--glass-bg);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(232,154,58,0.06);
  border-radius:11px;margin-bottom:8px;position:relative;
  transition:background .2s,border-color .2s,box-shadow .25s;
  box-shadow:0 4px 12px -8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,246,230,0.04);
}
.tk-row::before{content:'';position:absolute;left:0;top:14%;bottom:14%;width:3px;border-radius:0 2px 2px 0;background:transparent}
.tk-row:active{background:var(--bg3)}
.tk-row.prio-high::before{background:linear-gradient(180deg,var(--redHot),var(--red));box-shadow:0 0 8px rgba(216,85,64,0.5)}
.tk-row.prio-med::before{background:linear-gradient(180deg,var(--goldBright),var(--gold));box-shadow:0 0 8px rgba(232,154,58,0.4)}
.tk-row.prio-low::before{background:var(--t4)}
.tk-row.is-overdue{
  border-color:rgba(184,57,44,0.30);
  background:linear-gradient(135deg,rgba(184,57,44,.10),var(--glass-bg));
  box-shadow:0 4px 14px -8px rgba(184,57,44,.4), inset 0 1px 0 rgba(255,246,230,0.04);
}
.tk-row.is-done{opacity:.42}
.tk-row.is-done .tk-title{text-decoration:line-through}
.tk-check{
  flex-shrink:0;width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--t4);background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;
  transition:border-color .15s,background .15s,transform .12s,box-shadow .2s;
  margin-top:1px;
}
.tk-check:hover{border-color:var(--gold);box-shadow:0 0 8px rgba(232,154,58,0.3)}
.tk-check:active{transform:scale(.85)}
.tk-check.checked{
  background:linear-gradient(135deg,var(--gn),#3d8a55);
  border-color:var(--gn);
  box-shadow:0 0 10px rgba(111,196,134,.5);
}
.tk-body{flex:1;min-width:0}
.tk-title{font-family:var(--bd);font-size:14px;font-weight:500;color:var(--t);line-height:1.4;letter-spacing:0.005em}
.tk-meta{display:flex;gap:9px;margin-top:6px;flex-wrap:wrap;align-items:center}
.tk-prio{font-family:var(--mn);font-size:8.5px;font-weight:700;letter-spacing:.10em;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.tk-prio.p-high{background:rgba(184,57,44,.14);color:var(--redHot);border:1px solid rgba(184,57,44,.32)}
.tk-prio.p-med{background:rgba(232,154,58,.12);color:var(--gold);border:1px solid rgba(232,154,58,.32)}
.tk-prio.p-low{background:rgba(87,77,62,.30);color:var(--t3);border:1px solid rgba(87,77,62,.5)}
.tk-due{font-family:var(--mn);font-size:10px;color:var(--ice);font-weight:600;letter-spacing:.04em}
.tk-due.is-overdue{color:var(--redHot);text-shadow:0 0 6px rgba(184,57,44,.4)}
.tk-due.is-today{color:var(--gold)}
.tk-snooze{font-family:var(--mn);font-size:9px;color:var(--t4);font-weight:500;font-style:italic;letter-spacing:.04em}
.tk-actions{display:flex;gap:4px;align-items:center}
.tk-act{background:transparent;border:1px solid transparent;border-radius:6px;padding:4px 6px;cursor:pointer;display:flex;align-items:center;color:var(--t3);transition:color .15s,border-color .15s,background .15s}
.tk-act:hover{color:var(--gold);border-color:var(--bdr)}
.tk-act.danger:hover{color:var(--redHot);border-color:rgba(184,57,44,.3)}

/* Section heading inside Brief */
.b-sec{margin-bottom:22px}
.b-sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(232,154,58,0.06);position:relative}
.b-sec-h::after{content:'';position:absolute;bottom:-1px;left:0;width:32px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);box-shadow:0 0 4px var(--gold)}
.b-sec-t{font-family:var(--hd);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px}
.b-sec-c{font-family:var(--mn);font-size:9px;color:var(--ice);font-weight:600;letter-spacing:.10em}
.b-sec-empty{font-family:var(--display);font-size:14px;color:var(--t3);font-style:italic;padding:14px 4px;letter-spacing:0.005em}

/* Mail summary row inside Brief — compact urgent-only view */
.bm-row{
  display:flex;align-items:flex-start;gap:10px;padding:12px 14px;
  background:var(--glass-bg);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(184,57,44,0.12);
  border-radius:11px;margin-bottom:8px;cursor:pointer;
  position:relative;
  box-shadow:0 4px 12px -8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,246,230,0.04);
  transition:border-color .15s, transform .12s;
}
.bm-row::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:3px;border-radius:0 2px 2px 0;background:linear-gradient(180deg,var(--redHot),var(--red));box-shadow:0 0 8px rgba(216,85,64,0.5)}
.bm-row:active{transform:scale(0.99)}
.bm-from{font-family:var(--mn);font-size:9px;color:var(--gold);font-weight:700;letter-spacing:.10em;margin-bottom:3px;text-transform:uppercase}
.bm-subj{font-family:var(--bd);font-size:13px;color:var(--t);font-weight:500;line-height:1.35;letter-spacing:0.005em}
.bm-hi{font-family:var(--display);font-size:12px;color:var(--t2);margin-top:4px;font-style:italic;line-height:1.4}

/* Event row inside Brief — compact today-only view */
.be-row{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  background:var(--glass-bg);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(232,154,58,0.06);
  border-radius:11px;margin-bottom:7px;
  box-shadow:0 4px 12px -8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,246,230,0.04);
}
.be-time{font-family:var(--mn);font-size:12px;font-weight:600;color:var(--ice);min-width:48px;letter-spacing:.02em}
.be-title{font-family:var(--bd);font-size:13px;color:var(--t);flex:1;font-weight:500;letter-spacing:0.005em}
.be-src{font-family:var(--mn);font-size:8px;color:var(--t4);font-weight:700;letter-spacing:.10em;text-transform:uppercase}

/* ═══ PHASE C — TASKS TAB ═══ */

/* Sticky controls header */
.tt-controls{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 70%,rgba(10,5,7,0.85));margin:-18px -14px 14px;padding:14px 14px 8px;backdrop-filter:blur(8px)}

/* Stat strip — open / overdue / today / done. Tap each to filter. */
.tt-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.tt-stat{background:var(--bg2);border:1px solid var(--bdr);border-radius:9px;padding:8px 6px;cursor:pointer;text-align:center;transition:border-color .15s,background .15s,transform .12s;position:relative}
.tt-stat:active{transform:scale(.96)}
.tt-stat.active{border-color:var(--bdrGold);background:rgba(232,154,58,.06);box-shadow:0 0 12px rgba(232,154,58,.10)}
.tt-stat.alert{border-color:rgba(184,57,44,.4);background:rgba(184,57,44,.06)}
.tt-stat.alert.active{box-shadow:0 0 14px rgba(184,57,44,.20)}
.tt-stat-n{font-family:var(--hd);font-size:22px;font-weight:600;line-height:1;color:var(--t)}
.tt-stat.alert .tt-stat-n{color:var(--redHot)}
.tt-stat-l{font-family:var(--mn);font-size:8px;color:var(--t3);font-weight:700;letter-spacing:.10em;margin-top:3px;text-transform:uppercase}

/* Filter chips row */
.tt-chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tt-chips::-webkit-scrollbar{display:none}
.tt-chip{flex-shrink:0;background:var(--bg2);border:1px solid var(--bdr);color:var(--t3);font-family:var(--mn);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 11px;border-radius:14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.tt-chip:active{transform:scale(.94)}
.tt-chip.on{background:rgba(232,154,58,.10);border-color:var(--gold);color:var(--gold);box-shadow:0 0 8px rgba(232,154,58,.15)}
.tt-chip-n{background:rgba(160,136,118,.15);font-size:8.5px;padding:1px 5px;border-radius:7px;font-weight:800}
.tt-chip.on .tt-chip-n{background:rgba(232,154,58,.18)}

/* Sort + search + add row */
.tt-tools{display:flex;gap:6px;margin-top:8px;align-items:center}
.tt-tool-btn{flex-shrink:0;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:border-color .15s,color .15s,background .15s}
.tt-tool-btn:hover{border-color:var(--bdrGold);color:var(--gold)}
.tt-tool-btn.on{border-color:var(--bdrGold);color:var(--gold);background:rgba(232,154,58,.08)}
.tt-search{flex:1;display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:0 10px;height:34px;transition:border-color .15s,box-shadow .15s}
.tt-search:focus-within{border-color:var(--bdrGold);box-shadow:0 0 0 3px rgba(232,154,58,.08)}
.tt-search input{flex:1;background:transparent;border:none;outline:none;color:var(--t);font-family:var(--bd);font-size:13px}
.tt-search input::placeholder{color:var(--t4);font-style:italic}

/* Sort menu — small popover under sort button */
.tt-sort-menu{position:absolute;top:42px;right:0;background:var(--bg2);border:1px solid var(--bdrGold);border-radius:10px;padding:6px;z-index:20;box-shadow:0 6px 20px rgba(0,0,0,.5);min-width:160px}
.tt-sort-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-family:var(--mn);font-size:11px;color:var(--t2);font-weight:600;letter-spacing:.04em}
.tt-sort-item:hover{background:var(--bg3);color:var(--t)}
.tt-sort-item.on{background:rgba(232,154,58,.10);color:var(--gold)}

/* Group headers — Overdue / Today / Tomorrow / This week / Later / No date */
.tt-group{margin-top:14px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.tt-group-l{font-family:var(--hd);font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.tt-group.alert .tt-group-l{color:var(--redHot)}
.tt-group-c{font-family:var(--mn);font-size:8.5px;color:var(--t4);font-weight:700;letter-spacing:.08em}
.tt-group-line{flex:1;height:1px;background:linear-gradient(90deg,var(--bdr),transparent)}
.tt-group.alert .tt-group-line{background:linear-gradient(90deg,rgba(184,57,44,.3),transparent)}

/* Empty state */
.tt-empty{text-align:center;padding:40px 20px;color:var(--t3)}
.tt-empty-i{opacity:.4;margin-bottom:12px}
.tt-empty-t{font-family:var(--hd);font-size:14px;font-weight:600;color:var(--t2);margin-bottom:4px}
.tt-empty-s{font-family:var(--mn);font-size:11px;color:var(--t3);font-style:italic}

/* Floating add button */
.tt-fab{position:fixed;bottom:84px;right:18px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold) 0%,var(--goldBright) 100%);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 18px rgba(232,154,58,.4),0 0 0 0 rgba(232,154,58,.6);z-index:30;transition:transform .15s,box-shadow .25s;animation:fabBreathe 3.5s ease-in-out infinite}
.tt-fab:active{transform:scale(.92)}
.tt-fab:hover{box-shadow:0 6px 24px rgba(232,154,58,.55),0 0 0 4px rgba(232,154,58,.15)}
@keyframes fabBreathe{0%,100%{box-shadow:0 4px 18px rgba(232,154,58,.4),0 0 0 0 rgba(232,154,58,.4)}50%{box-shadow:0 4px 22px rgba(232,154,58,.55),0 0 0 8px rgba(232,154,58,0)}}
.tt-fab.in-bulk{background:linear-gradient(135deg,var(--redHot),var(--red));animation:none}

/* Inline edit panel — appears under a long-pressed task */
.tt-edit{background:var(--bg3);border:1px solid var(--bdrGold);border-radius:11px;padding:14px;margin-bottom:10px;animation:fd .25s ease-out;box-shadow:0 0 18px rgba(232,154,58,.10)}
.tt-edit-row{margin-bottom:10px}
.tt-edit-l{font-family:var(--mn);font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.10em;margin-bottom:5px;text-transform:uppercase}
.tt-edit-input,.tt-edit-textarea{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:9px 11px;color:var(--t);font-family:var(--bd);font-size:13.5px;outline:none;transition:border-color .15s,box-shadow .15s;box-sizing:border-box}
.tt-edit-input:focus,.tt-edit-textarea:focus{border-color:var(--bdrGold);box-shadow:0 0 0 3px rgba(232,154,58,.10)}
.tt-edit-textarea{resize:vertical;min-height:60px;font-family:var(--bd);font-size:12.5px;line-height:1.45}
.tt-edit-prio{display:flex;gap:5px}
.tt-edit-prio button{flex:1;background:var(--bg);border:1px solid var(--bdr);color:var(--t3);font-family:var(--mn);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px;border-radius:8px;cursor:pointer;transition:all .15s}
.tt-edit-prio button:active{transform:scale(.95)}
.tt-edit-prio button.on-high{background:rgba(184,57,44,.12);border-color:var(--redHot);color:var(--redHot);box-shadow:0 0 8px rgba(184,57,44,.18)}
.tt-edit-prio button.on-med{background:rgba(232,154,58,.10);border-color:var(--gold);color:var(--gold);box-shadow:0 0 8px rgba(232,154,58,.15)}
.tt-edit-prio button.on-low{background:var(--bg4);border-color:var(--t3);color:var(--t2)}
.tt-edit-due-row{display:flex;gap:6px}
.tt-edit-due-row > *{flex:1}
.tt-edit-quick{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.tt-edit-quick button{background:var(--bg);border:1px dashed var(--bdr);color:var(--t3);font-family:var(--mn);font-size:9px;font-weight:600;letter-spacing:.05em;padding:5px 10px;border-radius:13px;cursor:pointer;transition:all .15s}
.tt-edit-quick button:active{transform:scale(.94)}
.tt-edit-quick button:hover{border-color:var(--bdrGold);color:var(--gold);border-style:solid}
.tt-edit-actions{display:flex;gap:6px;margin-top:6px}
.tt-edit-actions button{flex:1;padding:11px;border-radius:9px;font-family:var(--hd);font-size:11.5px;font-weight:700;letter-spacing:.10em;cursor:pointer;border:1px solid;text-transform:uppercase;transition:all .15s}
.tt-edit-actions button:active{transform:scale(.97)}
.tt-edit-save{background:linear-gradient(135deg,var(--gold),var(--goldBright));border-color:transparent;color:#1a0e08}
.tt-edit-cancel{background:var(--bg);border-color:var(--bdr);color:var(--t2)}

/* Bulk action bar — bottom of screen when in bulk mode */
.tt-bulk-bar{position:fixed;bottom:64px;left:0;right:0;background:linear-gradient(180deg,rgba(36,20,23,.96),rgba(24,10,12,.98));border-top:1px solid var(--bdrGold);padding:12px 14px;display:flex;align-items:center;gap:8px;z-index:25;backdrop-filter:blur(12px);box-shadow:0 -4px 18px rgba(232,154,58,.12);animation:slideUpBulk .22s ease-out}
@keyframes slideUpBulk{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.tt-bulk-count{font-family:var(--hd);font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.04em;flex:1}
.tt-bulk-act{background:var(--bg3);border:1px solid var(--bdr);color:var(--t2);font-family:var(--mn);font-size:9.5px;font-weight:700;letter-spacing:.08em;padding:8px 11px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;text-transform:uppercase}
.tt-bulk-act:hover{border-color:var(--bdrGold);color:var(--gold)}
.tt-bulk-act.danger:hover{border-color:rgba(184,57,44,.5);color:var(--redHot)}
.tt-bulk-close{background:transparent;border:1px solid var(--bdr);color:var(--t3);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

/* Bulk-mode task row tweaks */
.tk-row.bulk-selected{border-color:var(--gold);background:rgba(232,154,58,.06);box-shadow:0 0 10px rgba(232,154,58,.10)}
.tk-row.in-bulk{cursor:pointer}

/* Long-press feedback */
.tk-row.pressing{background:var(--bg3);border-color:var(--bdrGold);box-shadow:0 0 12px rgba(232,154,58,.18)}

/* MORE sheet — overflow menu accessible from header */
.more-sheet{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-start;justify-content:flex-end;padding:60px 14px 0}
.more-panel{background:var(--bg2);border:1px solid var(--bdrGold);border-radius:12px;min-width:200px;padding:8px;box-shadow:0 8px 28px rgba(0,0,0,.6),0 0 24px rgba(232,154,58,.10);animation:fd .2s ease-out}
.more-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--t2);font-family:var(--bd);font-size:14px;font-weight:500;transition:background .15s,color .15s}
.more-item:hover{background:var(--bg3);color:var(--t)}
.more-item.on{background:rgba(232,154,58,.10);color:var(--gold)}
.more-divider{height:1px;background:var(--bdr);margin:6px 0}

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const JARVIS_VERSION = '5.1.9';
const JARVIS_BUILD = 'PERFORMANCE';

// ═══════════════════════════════════════════════════════════════
// STORAGE — in-memory fallback + reactive event bus
// ═══════════════════════════════════════════════════════════════
const _mem = {};
const sto = {
  get: (k) => { try { return localStorage.getItem(k); } catch { return _mem[k] ?? null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch { _mem[k] = v; } },
  del: (k) => { try { localStorage.removeItem(k); } catch { delete _mem[k]; } },
  getJSON: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  setJSON: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch { _mem[k] = JSON.stringify(v); } bus.emit(k); },
};

const listeners = {};
const bus = {
  on: (key, fn) => { (listeners[key] = listeners[key] || new Set()).add(fn); return () => listeners[key]?.delete(fn); },
  emit: (key) => { listeners[key]?.forEach(fn => { try { fn(); } catch {} }); },
};

// Resilient fetch: tries direct, then CORS proxies if the browser blocks it.
// Also uses cachebuster to bypass any stale SW cache.
const resilientFetch = async (url, opts = {}) => {
  const bust = url.includes('?') ? '&_=' : '?_=';
  const bustedUrl = url + bust + Date.now();
  try {
    const r = await fetch(bustedUrl, { ...opts, cache: 'no-store' });
    if (r.ok || (r.status >= 400 && r.status < 500)) return r;
  } catch (e) { /* fall through */ }
  // Proxy fallback — only for GET requests with no custom headers
  if (!opts.method || opts.method === 'GET') {
    for (const prefix of ['https://corsproxy.io/?', 'https://api.allorigins.win/raw?url=']) {
      try {
        const r = await fetch(prefix + encodeURIComponent(url), { cache: 'no-store' });
        if (r.ok) return r;
      } catch {}
    }
  }
  throw new Error('Network unreachable');
};

// Geolocation — cached for 6 hours, falls back to Geneva
const GEO_CACHE_TTL = 6 * 60 * 60 * 1000;
const getLocation = async (force = false) => {
  const cached = sto.getJSON('j_geo', null);
  if (!force && cached && Date.now() - cached.ts < GEO_CACHE_TTL) return cached;
  if (!navigator.geolocation) return cached || { lat: 46.2044, lng: 6.1432, city: 'Geneva', ts: 0 };
  return new Promise(resolve => {
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        let city = 'Unknown';
        try {
          const r = await resilientFetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m`);
          if (r.ok) {
            const d = await r.json();
            city = d.timezone?.split('/')[1]?.replace(/_/g, ' ') || 'Unknown';
          }
        } catch {}
        const geo = { lat, lng, city, ts: Date.now() };
        sto.setJSON('j_geo', geo);
        resolve(geo);
      },
      () => resolve(cached || { lat: 46.2044, lng: 6.1432, city: 'Geneva', ts: 0 }),
      { timeout: 8000, maximumAge: GEO_CACHE_TTL }
    );
  });
};

const useStore = (key, loader) => {
  const [val, setVal] = useState(loader);
  useEffect(() => bus.on(key, () => setVal(loader())), [key]);
  useEffect(() => {
    const onStorage = (e) => { if (e.key === key) setVal(loader()); };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, [key]);
  return val;
};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

// ═══════════════════════════════════════════════════════════════
// STORES
// ═══════════════════════════════════════════════════════════════
const loadEvents = () => sto.getJSON('j_events', []);
const saveEvents = (evs) => sto.setJSON('j_events', evs);
const addEvent = (ev) => {
  const evs = loadEvents();
  const dup = evs.find(e => e.title === ev.title && e.date === ev.date && e.time === ev.time);
  if (dup) return dup.id;
  const id = uid();
  evs.push({ ...ev, id, src: 'jarvis', createdAt: Date.now() });
  evs.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  saveEvents(evs);
  return id;
};
const deleteEvent = (id) => saveEvents(loadEvents().filter(e => e.id !== id));

const loadBrain = () => sto.getJSON('j_brain', []);
const saveBrain = (b) => sto.setJSON('j_brain', b);
const addBrainItem = (it) => {
  const b = loadBrain();
  const now = Date.now();
  const recent = b.find(x => x.title?.toLowerCase().trim() === it.title?.toLowerCase().trim() && (now - new Date(x.ts).getTime()) < 60000);
  if (recent) return recent.id;
  const id = uid();
  b.unshift({ ...it, id, ts: new Date().toISOString() });
  saveBrain(b.slice(0, 500));
  return id;
};
const deleteBrainItem = (id) => saveBrain(loadBrain().filter(i => i.id !== id));

// ─── TASKS ──────────────────────────────────────────────────────
// Tasks are the action layer. Events have a precise time (dinner at
// 20:00); tasks have a deadline and a state machine (open → done).
//
// Shape:
//   { id, title, notes, priority: 'high'|'med'|'low',
//     due: 'YYYY-MM-DD',          // required
//     dueTime: 'HH:MM' | null,    // optional, enables 10-min reminder
//     status: 'open'|'done'|'snoozed',
//     snoozeUntil: ISO | null,
//     source: 'manual'|'chat'|'mail:<id>'|'brief',
//     createdAt: epoch_ms,
//     doneAt: epoch_ms | null }
const loadTasks = () => sto.getJSON('j_tasks', []);
const saveTasks = (t) => sto.setJSON('j_tasks', t);
const addTask = (t) => {
  const tasks = loadTasks();
  // Phase F: De-dupe within 60s — but ONLY against open/snoozed tasks. Done
  // tasks shouldn't block new ones (required for recurring spawn-on-done
  // when the user marks done within 60s of the previous instance creation).
  const now = Date.now();
  const recent = tasks.find(x =>
    x.status !== 'done' &&
    x.title?.toLowerCase().trim() === t.title?.toLowerCase().trim() &&
    (now - x.createdAt) < 60000
  );
  if (recent) return recent.id;
  const id = uid();
  const todayISO = new Date().toISOString().slice(0, 10);
  tasks.unshift({
    id,
    title: t.title || '(untitled)',
    notes: t.notes || '',
    priority: ['high','med','low'].includes(t.priority) ? t.priority : 'med',
    due: t.due || todayISO,
    dueTime: t.dueTime || null,
    status: 'open',
    snoozeUntil: null,
    source: t.source || 'manual',
    recur: t.recur || null,
    createdAt: now,
    doneAt: null
  });
  saveTasks(tasks.slice(0, 500));
  return id;
};
const updateTask = (id, patch) => {
  const tasks = loadTasks().map(t => t.id === id ? { ...t, ...patch } : t);
  saveTasks(tasks);
};
const completeTask = (id) => {
  // Phase F: capture task BEFORE updating, then spawn next recur instance
  const task = loadTasks().find(t => t.id === id);
  updateTask(id, { status: 'done', doneAt: Date.now() });
  if (task?.recur) spawnNextRecur(task);
};
const uncompleteTask = (id) => updateTask(id, { status: 'open', doneAt: null });
const deleteTask = (id) => saveTasks(loadTasks().filter(t => t.id !== id));
const snoozeTask = (id, untilISO) => updateTask(id, { status: 'snoozed', snoozeUntil: untilISO });

// ─── RECURRENCE (Phase F) ───────────────────────────────────────
// recur shape on a task:
//   { type: 'daily'|'weekdays'|'weekly'|'monthly',
//     days: ['mon','tue',...],     // only meaningful for type='weekly'
//     times: ['08:00','20:00'],    // 0+ times-of-day; spawns one instance per time
//     endDate: 'YYYY-MM-DD'|null }
//
// Strategy: template-spawns-instances. Each spawned instance is a real
// task record carrying the same `recur` block. When marked done, we
// compute and spawn the next occurrence — no upfront calendar pollution.
const DOW = ['sun','mon','tue','wed','thu','fri','sat'];

const nextOccurrence = (task) => {
  if (!task.recur) return null;
  const r = task.recur;
  const currentDate = task.due;
  const currentTime = task.dueTime;

  // Multi-time same-day: if there's a later time today, use it
  if (r.times && r.times.length > 1 && currentTime) {
    const sortedTimes = [...r.times].sort();
    const idx = sortedTimes.indexOf(currentTime);
    if (idx >= 0 && idx < sortedTimes.length - 1) {
      return { due: currentDate, dueTime: sortedTimes[idx + 1] };
    }
  }

  // Otherwise advance to next valid date
  const d = new Date(currentDate + 'T00:00');
  if (r.type === 'daily') {
    d.setDate(d.getDate() + 1);
  } else if (r.type === 'weekdays') {
    do { d.setDate(d.getDate() + 1); } while (d.getDay() === 0 || d.getDay() === 6);
  } else if (r.type === 'weekly') {
    const targetDows = (r.days || []).map(name => DOW.indexOf(name)).filter(n => n >= 0).sort();
    if (targetDows.length === 0) {
      d.setDate(d.getDate() + 7);
    } else {
      let safety = 0;
      do {
        d.setDate(d.getDate() + 1);
        safety++;
        if (safety > 14) break;
      } while (!targetDows.includes(d.getDay()));
    }
  } else if (r.type === 'monthly') {
    d.setMonth(d.getMonth() + 1);
  } else {
    return null;
  }

  const newDate = d.toISOString().slice(0, 10);
  if (r.endDate && newDate > r.endDate) return null;
  const newTime = r.times && r.times.length > 0 ? [...r.times].sort()[0] : null;
  return { due: newDate, dueTime: newTime };
};

const spawnNextRecur = (task) => {
  if (!task?.recur) return;
  const next = nextOccurrence(task);
  if (!next) return;
  addTask({
    title: task.title,
    notes: task.notes,
    priority: task.priority,
    due: next.due,
    dueTime: next.dueTime,
    source: task.source || 'manual',
    recur: task.recur,
  });
};

// Wake snoozed tasks whose snoozeUntil has passed. Called on init + tick.
const wakeSnoozedTasks = () => {
  const tasks = loadTasks();
  const now = Date.now();
  let changed = false;
  const updated = tasks.map(t => {
    if (t.status === 'snoozed' && t.snoozeUntil && new Date(t.snoozeUntil).getTime() <= now) {
      changed = true;
      return { ...t, status: 'open', snoozeUntil: null };
    }
    return t;
  });
  if (changed) saveTasks(updated);
};

// Helpers used everywhere — single source of truth for "what's overdue"
const todayISO = () => new Date().toISOString().slice(0, 10);
const isOverdue = (t) => t.status === 'open' && t.due < todayISO();
const isDueToday = (t) => t.status === 'open' && t.due === todayISO();
const isOpen = (t) => t.status === 'open';
const priorityWeight = (p) => p === 'high' ? 0 : p === 'med' ? 1 : 2;
const sortByUrgency = (a, b) => {
  // Overdue first, then due today, then by priority, then by due date asc
  const aOver = isOverdue(a) ? 0 : isDueToday(a) ? 1 : 2;
  const bOver = isOverdue(b) ? 0 : isDueToday(b) ? 1 : 2;
  if (aOver !== bOver) return aOver - bOver;
  if (a.priority !== b.priority) return priorityWeight(a.priority) - priorityWeight(b.priority);
  return (a.due || '').localeCompare(b.due || '');
};

// Aggregate urgency snapshot used by the main shell for nav badge,
// body-class-driven aliveness, and the Brief urgency banner.
const computeUrgency = () => {
  const tasks = loadTasks();
  const overdue = tasks.filter(isOverdue);
  const dueToday = tasks.filter(isDueToday);
  const mailClass = sto.getJSON('j_mail_class', {});
  const mailCache = sto.getJSON('j_mail_cache', {});
  const urgentMail = Object.keys(mailCache).filter(id =>
    mailClass[id]?.priority === 'urgent' && mailCache[id]?.unread
  ).length;
  return {
    overdueCount: overdue.length,
    dueTodayCount: dueToday.length,
    urgentMailCount: urgentMail,
    totalAttention: overdue.length + urgentMail,
    hasOverdue: overdue.length > 0
  };
};

// ═══════════════════════════════════════════════════════════════
// TAG PARSING — brace-walking parser (handles arrays inside JSON)
// ═══════════════════════════════════════════════════════════════
const extractTag = (text, tagName) => {
  const results = [];
  const re = new RegExp(`\\[\\[${tagName}:`, 'g');
  let m;
  while ((m = re.exec(text)) !== null) {
    const start = m.index + m[0].length;
    let depth = 0, i = start, inStr = false, esc = false, started = false;
    for (; i < text.length; i++) {
      const c = text[i];
      if (esc) { esc = false; continue; }
      if (c === '\\') { esc = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c === '{') { depth++; started = true; }
      else if (c === '}') { depth--; if (started && depth === 0) { i++; break; } }
    }
    if (depth === 0 && text.slice(i, i+2) === ']]') {
      try { results.push(JSON.parse(text.slice(start, i))); } catch {}
    }
  }
  return results;
};
const parseEvents = (text) => extractTag(text, 'EVENT');
const parseNotes = (text) => extractTag(text, 'NOTE');
const parseTasks = (text) => extractTag(text, 'TASK');

const stripTags = (text) => {
  let out = '', i = 0;
  while (i < text.length) {
    const mEv = text.indexOf('[[EVENT:', i);
    const mNt = text.indexOf('[[NOTE:', i);
    const mTk = text.indexOf('[[TASK:', i);
    const candidates = [
      mEv !== -1 ? { idx: mEv, len: 8 } : null,
      mNt !== -1 ? { idx: mNt, len: 7 } : null,
      mTk !== -1 ? { idx: mTk, len: 7 } : null,
    ].filter(Boolean).sort((a, b) => a.idx - b.idx);
    const next = candidates[0] || null;
    if (!next) { out += text.slice(i); break; }
    out += text.slice(i, next.idx);
    let j = next.idx + next.len, depth = 0, inStr = false, esc = false, started = false;
    for (; j < text.length; j++) {
      const c = text[j];
      if (esc) { esc = false; continue; }
      if (c === '\\') { esc = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c === '{') { depth++; started = true; }
      else if (c === '}') { depth--; if (started && depth === 0) { j++; break; } }
    }
    if (text.slice(j, j+2) === ']]') j += 2;
    i = j;
  }
  return out.replace(/\n{3,}/g, '\n\n').trim();
};
