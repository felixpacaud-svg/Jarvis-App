<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// Storage with in-memory fallback
const _mem = {};
const sto = {
  get: (k) => { try { const v = localStorage.getItem(k); return v; } catch { return _mem[k] || null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch { _mem[k] = v; } },
};

// ─── Event Store ────────────────────────────────────────────────
const loadEvents = () => { try { return JSON.parse(localStorage.getItem('j_events') || '[]'); } catch { return []; } };
const saveEvents = (evs) => { try { localStorage.setItem('j_events', JSON.stringify(evs)); } catch {} };
const addEvent = (ev) => {
  const evs = loadEvents();
  const id = Date.now() + Math.random();
  evs.push({ ...ev, id, src: 'jarvis' });
  evs.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  saveEvents(evs);
};
const deleteEvent = (id) => { saveEvents(loadEvents().filter(e => e.id !== id)); };
const parseEventTags = (text) => {
  const matches = [...text.matchAll(/\[\[EVENT:(\{[^\]]+\})\]\]/g)];
  return matches.map(m => { try { return JSON.parse(m[1]); } catch { return null; } }).filter(Boolean);
};
const stripEventTags = (text) => text.replace(/\[\[EVENT:\{[^\]]+\}\]\]/g, '').trim();

// ─── SVG Icons ──────────────────────────────────────────────────
const X = ({ children, size = 18, color = "currentColor", sw = 1.5 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{ display: 'block', flexShrink: 0 }}>{children}</svg>
);
const IHome = (p) => <X {...p}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" /><polyline points="9,22 9,12 15,12 15,22" /></X>;
const IChat = (p) => <X {...p}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" /></X>;
const ITrend = (p) => <X {...p}><polyline points="23,6 13.5,15.5 8.5,10.5 1,18" /><polyline points="17,6 23,6 23,12" /></X>;
const ICal = (p) => <X {...p}><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></X>;
const IBrain = (p) => <X {...p}><circle cx="12" cy="12" r="10"/><path d="M12 2a7 7 0 017 7c0 2-1 3.5-2.5 5s-2.5 3-2.5 5h-4c0-2-1-3.5-2.5-5S5 11 5 9a7 7 0 017-7z"/></X>;
const IRun = (p) => <X {...p}><polyline points="22,12 18,12 15,21 9,3 6,12 2,12" /></X>;
const ISend = (p) => <X {...p}><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22,2 15,22 11,13 2,9" /></X>;
const IGear = (p) => <X {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" /></X>;
const IClose = (p) => <X {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></X>;
const IUp = (p) => <X {...p}><line x1="7" y1="17" x2="17" y2="7" /><polyline points="7,7 17,7 17,17" /></X>;
const IDn = (p) => <X {...p}><line x1="7" y1="7" x2="17" y2="17" /><polyline points="17,7 17,17 7,17" /></X>;
const IBook = (p) => <X {...p}><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z" /><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z" /></X>;
const IZap = (p) => <X {...p}><polygon points="13,2 3,14 12,14 11,22 21,10 12,10" /></X>;
const IUser = (p) => <X {...p}><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" /><circle cx="12" cy="7" r="4" /></X>;
const IFlame = (p) => <X {...p}><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 3z" /></X>;
const IPin = (p) => <X {...p}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" /><circle cx="12" cy="10" r="3" /></X>;
const IHash = (p) => <X {...p}><line x1="4" y1="9" x2="20" y2="9" /><line x1="4" y1="15" x2="20" y2="15" /><line x1="10" y1="3" x2="8" y2="21" /><line x1="16" y1="3" x2="14" y2="21" /></X>;
const IEye = (p) => <X {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></X>;
const IEyeOff = (p) => <X {...p}><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" /><line x1="1" y1="1" x2="23" y2="23" /></X>;
const ICheck = (p) => <X {...p}><polyline points="20,6 9,17 4,12" /></X>;

const SYS = `You are J.A.R.V.I.S. — Felix's personal AI assistant. Modeled after Tony Stark's AI: intelligent, dry wit, competent. Concise — phone screen.

Felix: Network financial analyst, MSC Air Cargo Geneva. French resident, Massongy 74140. Engaged to Mélanie, commute ~45min to Chêne-Bougerie. Investments: Accenture, World ETF, SP500 ETF, Europe ETF, gold. PEA + assurance vie, ~€12k. Watches CHF/EUR/USD, fuel prices. Marathon Nov 8 2026 Lake Maggiore. Follows Middle East news, global events. Forgets things especially Mélanie's requests. Sees psychologist every 2-3 weeks.

Help: schedule, log ideas (tag them), reminders, finance/news, track Mélanie, draft messages, summarise. Say "sir" occasionally. Be sharp not cheesy.

CRITICAL — When the user mentions creating an event, appointment, meeting, reminder or any scheduled item, you MUST include a machine-readable tag at the END of your reply in this exact format (no spaces inside brackets):
[[EVENT:{"title":"Event title","date":"YYYY-MM-DD","time":"HH:MM","notes":"optional"}]]

Today's date is always inferred from context. For relative dates like "tonight", "tomorrow", "next Monday" calculate the actual date. If no time given use "00:00". Always include this tag when scheduling — it is how the calendar gets updated. You may include multiple EVENT tags if needed.`;

const GCLIENT_ID = '1022045416372-q8dcqrmpoc7nuc32vuiom5bbdrtcnsak.apps.googleusercontent.com';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';

// Fetch Google Calendar events for next 7 days
const fetchGCalEvents = async (token) => {
  const now = new Date().toISOString();
  const end = new Date(Date.now() + 7 * 864e5).toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(now)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime&maxResults=50`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!res.ok) return [];
  const d = await res.json();
  return (d.items || []).map(ev => ({
    id: 'g_' + ev.id,
    title: ev.summary || '(No title)',
    date: (ev.start.dateTime || ev.start.date || '').slice(0, 10),
    time: ev.start.dateTime ? ev.start.dateTime.slice(11, 16) : '00:00',
    notes: ev.location || '',
    src: 'google'
  }));
};

// ─── Styles ─────────────────────────────────────────────────────
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#060b18;--bg2:#0c1526;--bg3:#111d33;
  --bdr:rgba(0,180,255,0.12);--bdr2:rgba(0,180,255,0.25);
  --cy:#00c8ff;--gd:#f0c040;--rd:#ff4757;--gn:#2ed573;
  --t:#e0f0ff;--t2:#a0bcd4;--t3:#607890;--t4:#3a5068;
  --hd:'Rajdhani',sans-serif;--bd:'Exo 2',sans-serif;--mn:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;background:var(--bg);color:var(--t);font-family:var(--bd);overflow:hidden}

.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--bg)}
.app::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,180,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,255,0.02) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}

.hdr{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(0,200,255,0.05),transparent);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:2;position:relative}
.hdr-t{font-family:var(--hd);font-weight:700;font-size:20px;letter-spacing:.3em;text-transform:uppercase;background:linear-gradient(135deg,var(--cy),var(--gd));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.content{flex:1;overflow-y:auto;position:relative;z-index:1;padding-bottom:72px}
.content::-webkit-scrollbar{display:none}

.nav{border-top:1px solid var(--bdr);background:rgba(6,11,24,0.95);backdrop-filter:blur(12px);flex-shrink:0;z-index:2}
.nav-in{display:flex;justify-content:space-around;padding:8px 4px 12px}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;background:none;border:none;cursor:pointer;padding:4px 0}
.nl{font-family:var(--hd);font-size:9px;letter-spacing:.12em;text-transform:uppercase}

.hud{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;position:relative;overflow:hidden}
.hud::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cy),transparent);opacity:0.3}
.hudg::before{background:linear-gradient(90deg,transparent,var(--gd),transparent)}
.fade{animation:fadeU .3s ease-out}@keyframes fadeU{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.glow{box-shadow:0 0 8px rgba(0,200,255,0.08)}
.scan{position:relative;overflow:hidden}
.scan::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cy),transparent);animation:sl 4s linear infinite;opacity:0.12}
@keyframes sl{from{top:0}to{top:100%}}

.ch-w{display:flex;flex-direction:column;height:calc(100dvh-100px)}
.ch-m{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:12px}
.ch-m::-webkit-scrollbar{display:none}
.ch-i{padding:8px 14px 14px;border-top:1px solid var(--bdr);flex-shrink:0}
.cf{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:10px 14px;transition:border-color .3s}
.cf:focus-within{border-color:var(--bdr2)}
.cf input{flex:1;background:none;border:none;outline:none;color:var(--t);font-family:var(--bd);font-size:14px}
.cf input::placeholder{color:var(--t4)}
.sb{background:none;border:none;cursor:pointer;display:flex;padding:0}
.pls{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px}.pls::-webkit-scrollbar{display:none}
.pl{white-space:nowrap;font-size:10px;padding:5px 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--t2);cursor:pointer;font-family:var(--bd)}
.dp span{display:inline-block;width:5px;height:5px;background:var(--cy);border-radius:50%;margin:0 2px;animation:ps 1.4s ease-in-out infinite}
.dp span:nth-child(2){animation-delay:.2s}.dp span:nth-child(3){animation-delay:.4s}

@keyframes pg{0%,100%{opacity:1}50%{opacity:.4}}
.sx{overflow-x:auto;-webkit-overflow-scrolling:touch}.sx::-webkit-scrollbar{display:none}
.tag{font-size:9px;font-family:var(--mn);color:var(--cy);background:rgba(0,200,255,.07);border:1px solid rgba(0,200,255,.15);padding:2px 6px;border-radius:3px}
.bf{height:3px;background:rgba(0,200,255,.12);border-radius:2px;overflow:hidden}
.bff{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cy),var(--gd))}
.wk{border-radius:6px;padding:5px 3px;text-align:center;border:1px solid var(--bdr);background:var(--bg2)}
.wk.td{border-color:var(--cy);background:rgba(0,200,255,.04);box-shadow:0 0 6px rgba(0,200,255,.08)}
.wk.dn{border-color:rgba(46,213,115,.3);background:rgba(46,213,115,.04)}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:50;display:flex;flex-direction:column;justify-content:flex-end}

.sp::-webkit-scrollbar{display:none}
.ki{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;transition:border-color .3s}
.ki:focus-within{border-color:var(--bdr2)}
.ki input{flex:1;background:none;border:none;outline:none;color:var(--t);font-family:var(--mn);font-size:12px}
.ki input::placeholder{color:var(--t4)}
.svb{width:100%;padding:13px;border:none;border-radius:10px;font-family:var(--hd);font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .3s}
`;

// ─── Main ───────────────────────────────────────────────────────
function Jarvis() {
  const [tab, setTab] = useState('chat');
  const [time, setTime] = useState(new Date());
  const [showSet, setShowSet] = useState(false);
  const [hasKey, setHasKey] = useState(!!sto.get('j_gk'));
  const [gToken, setGToken] = useState(null);
  const [gUser, setGUser] = useState(sto.get('j_guser') || null);
  const tokenClientRef = useRef(null);

  useEffect(() => { const t = setInterval(() => setTime(new Date()), 30000); return () => clearInterval(t); }, []);

  // Init Google token client once GIS script loads
  useEffect(() => {
    const init = () => {
      if (window.google && window.google.accounts) {
        tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
          client_id: GCLIENT_ID,
          scope: GCAL_SCOPE,
          callback: (resp) => {
            if (resp.access_token) {
              setGToken(resp.access_token);
            }
          }
        });
      }
    };
    const t = setInterval(() => { if (window.google) { init(); clearInterval(t); } }, 500);
    return () => clearInterval(t);
  }, []);

  const signInGoogle = () => {
    if (tokenClientRef.current) tokenClientRef.current.requestAccessToken({ prompt: 'consent' });
  };

  const signOutGoogle = () => {
    if (gToken) window.google?.accounts?.oauth2?.revoke(gToken);
    setGToken(null); setGUser(null); sto.del('j_guser');
  };

  const dtr = Math.ceil((new Date('2026-11-08') - time) / 864e5);
  const h = time.getHours();
  const gr = h < 5 ? 'Late night' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';

  const tabs = [
    { id: 'chat', I: IChat, l: 'Chat' }, { id: 'home', I: IHome, l: 'Brief' },
    { id: 'finance', I: ITrend, l: 'Fin' }, { id: 'calendar', I: ICal, l: 'Cal' },
    { id: 'brain', I: IBrain, l: 'Brain' }, { id: 'marathon', I: IRun, l: 'Run' },
  ];

  return (
    <div className="app">
      <style>{CSS}</style>
      <header className="hdr">
        <div>
          <div className="hdr-t">Jarvis</div>
          <div style={{ fontFamily: 'var(--mn)', fontSize: 9, color: 'var(--t3)', letterSpacing: '.08em', marginTop: 1 }}>
            {time.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })} · {time.toTimeString().slice(0, 5)}
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ fontFamily: 'var(--mn)', fontSize: 9, color: 'var(--t3)', display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ width: 5, height: 5, borderRadius: '50%', background: hasKey ? 'var(--gn)' : 'var(--rd)', boxShadow: `0 0 6px ${hasKey ? 'var(--gn)' : 'var(--rd)'}`, animation: 'pg 2s infinite' }} />
            {hasKey ? 'ONLINE' : 'OFFLINE'}
          </div>
          <button onClick={() => setShowSet(true)} style={{ background: 'none', border: '1px solid var(--bdr)', borderRadius: 8, padding: 6, cursor: 'pointer', display: 'flex', position: 'relative' }}>
            <IGear size={14} color="var(--t2)" sw={1.5} />
            {!hasKey && <div style={{ position: 'absolute', top: -2, right: -2, width: 6, height: 6, background: 'var(--cy)', borderRadius: '50%', boxShadow: '0 0 6px var(--cy)', animation: 'pg 2s infinite' }} />}
          </button>
        </div>
      </header>

      <div className="content fade" key={tab}>
        {tab === 'chat' && <ChatTab gr={gr} dtr={dtr} />}
        {tab === 'home' && <BriefTab gr={gr} dtr={dtr} />}
        {tab === 'finance' && <FinTab />}
        {tab === 'calendar' && <CalTab gToken={gToken} />}
        {tab === 'brain' && <BrainTab />}
        {tab === 'marathon' && <RunTab days={dtr} />}
      </div>

      <nav className="nav">
        <div className="nav-in">
          {tabs.map(({ id, I, l }) => (
            <button key={id} className="nb" onClick={() => setTab(id)}>
              <I size={16} color={tab === id ? 'var(--cy)' : 'var(--t4)'} sw={tab === id ? 2 : 1.5} />
              <span className="nl" style={{ color: tab === id ? 'var(--cy)' : 'var(--t4)' }}>{l}</span>
            </button>
          ))}
        </div>
      </nav>

      {showSet && <SetPanel close={() => { setShowSet(false); setHasKey(!!sto.get('j_gk')); }} gToken={gToken} gUser={gUser} onSignIn={signInGoogle} onSignOut={signOutGoogle} />}
    </div>
  );
}

// ─── Settings ───────────────────────────────────────────────────
function SetPanel({ close, gToken, gUser, onSignIn, onSignOut }) {
  const [gk, setGk] = useState(sto.get('j_gk') || '');
  const [ak, setAk] = useState(sto.get('j_ak') || '');
  const [sg, setSg] = useState(false);
  const [sa, setSa] = useState(false);
  const [ok, setOk] = useState(false);

  const save = () => {
    if (gk.trim()) sto.set('j_gk', gk.trim());
    if (ak.trim()) sto.set('j_ak', ak.trim());
    setOk(true);
    setTimeout(() => { setOk(false); close(); }, 900);
  };

  return (
    <div className="ov" onClick={e => e.target === e.currentTarget && close()}>
      <div className="sp fade">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div>
            <div style={{ fontFamily: 'var(--hd)', fontSize: 18, fontWeight: 600, letterSpacing: '.12em', textTransform: 'uppercase' }}>Configuration</div>
            <div style={{ fontFamily: 'var(--mn)', fontSize: 9, color: 'var(--t3)', marginTop: 2 }}>Keys stored locally on device only</div>
          </div>
          <button onClick={close} style={{ background: 'var(--bg3)', border: '1px solid var(--bdr)', borderRadius: 8, width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
            <IClose size={14} color="var(--t2)" sw={2} />
          </button>
        </div>

        <div style={{ marginBottom: 16 }}>
          <div style={{ fontFamily: 'var(--hd)', fontSize: 11, fontWeight: 600, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--cy)', marginBottom: 6 }}>
            Gemini API Key <span style={{ color: 'var(--t3)', fontWeight: 400 }}>— chat + news</span>
          </div>

// ─── Calendar ──────────────────────────────────────────────────
function CalTab({ gToken }) {
  const [localEvs, setLocalEvs] = useState(loadEvents());
  const [gEvs, setGEvs] = useState([]);
  const [gLoading, setGLoading] = useState(false);

  useEffect(() => {
    const iv = setInterval(() => setLocalEvs(loadEvents()), 2000);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (!gToken) { setGEvs([]); return; }
    setGLoading(true);
    fetchGCalEvents(gToken)
      .then(evs => { setGEvs(evs); setGLoading(false); })
      .catch(() => setGLoading(false));
    const iv = setInterval(() => {
      fetchGCalEvents(gToken).then(setGEvs).catch(() => {});
    }, 5 * 60000);
    return () => clearInterval(iv);
  }, [gToken]);

  const evs = [...localEvs, ...gEvs].sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));

  const today = new Date();
  const fmt = (d) => d.toISOString().slice(0,10);
  const days = [0,1,2,3,4,5,6].map(i => {
    const d = new Date(today); d.setDate(today.getDate()+i);
    return { date: fmt(d), label: i===0 ? 'TODAY · ' : '', d };
  });

  const grouped = days.map(day => ({
    ...day,
    events: evs.filter(e => e.date === day.date).sort((a,b)=>a.time.localeCompare(b.time))
  })).filter(day => day.events.length > 0);

  const fmtDay = (d, label) => {
    const s = d.d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' }).toUpperCase();
    return label + s;
  };

  const removeEv = (id) => { deleteEvent(id); setEvs(loadEvents()); };

  return (
    <div style={{ padding: '18px 14px' }} className="fade">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
        <div style={{ fontFamily: 'var(--hd)', fontSize: 24, fontWeight: 300 }}>
          <span style={{ color: 'var(--t2)' }}>This</span> <span style={{ color: 'var(--cy)' }}>Week</span>
        </div>
        <div style={{ fontFamily: 'var(--mn)', fontSize: 8, color: gToken ? 'var(--gn)' : 'var(--t4)', display: 'flex', alignItems: 'center', gap: 3, marginTop: 6 }}>
          <span style={{ width: 4, height: 4, borderRadius: '50%', background: gToken ? 'var(--gn)' : 'var(--t4)' }} />
          {gToken ? (gLoading ? 'SYNCING…' : 'GOOGLE LIVE') : 'NO GOOGLE'}
        </div>
      </div>
      <div style={{ display: 'flex', gap: 5, marginBottom: 12, flexWrap: 'wrap' }}>
        {[{ n: 'Jarvis', c: 'var(--cy)' }, { n: 'Google', c: 'var(--gn)' }].map((s, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '3px 8px', border: '1px solid var(--bdr)', borderRadius: 5, fontSize: 9, fontFamily: 'var(--mn)', color: 'var(--t3)' }}>
            <span style={{ width: 4, height: 4, borderRadius: '50%', background: s.c }} />{s.n}
          </div>
        ))}
      </div>
      {grouped.length === 0 ? (
        <div className="hud" style={{ padding: 20, textAlign: 'center' }}>
          <div style={{ fontFamily: 'var(--mn)', fontSize: 10, color: 'var(--t3)', letterSpacing:'.1em' }}>NO EVENTS SCHEDULED</div>
          <div style={{ fontSize: 11, color: 'var(--t4)', marginTop: 6 }}>Tell Jarvis to schedule something</div>
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {grouped.map((day, i) => (
            <div key={i}>
              <div style={{ fontFamily: 'var(--mn)', fontSize: 8, color: 'var(--t3)', letterSpacing:'.1em', marginBottom: 5 }}>{fmtDay(day, day.label)}</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
                {day.events.map((e, j) => (
                  <div key={j} className="hud" style={{ padding: '8px 9px', display: 'flex', alignItems: 'center', gap: 7 }}>
                    <div style={{ width: 2, height: 18, borderRadius: 1, background: e.src==='google' ? 'var(--gn)' : 'var(--cy)', flexShrink: 0 }} />
                    <span style={{ fontFamily: 'var(--mn)', fontSize: 9, color: 'var(--t3)', width: 32, flexShrink: 0 }}>{e.time === '00:00' ? '──' : e.time}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 11, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{e.title}</div>
                      {e.notes && <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{e.notes}</div>}
                    </div>
                    <button onClick={() => removeEv(e.id)} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--t4)', fontSize:14, padding:'0 2px', lineHeight:1 }}>×</button>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
