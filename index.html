                <span style={{ width:7, height:7, borderRadius:'50%', background:'var(--gn)', boxShadow:'0 0 6px var(--gn)' }}/>
                <span style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--gn)', fontWeight:700 }}>CONNECTED</span>
              </div>
              <button onClick={onSignOut} style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:6, padding:'4px 10px', cursor:'pointer', fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)' }}>Disconnect</button>
            </div>
          ) : (
            <button onClick={onSignIn} style={{ width:'100%', padding:12, background:'var(--bg3)', border:'1px solid rgba(34,197,94,0.4)', borderRadius:10, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:10, fontFamily:'var(--hd)', fontSize:13, fontWeight:600, letterSpacing:'.08em', textTransform:'uppercase', color:'var(--gn)' }}>
              <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Sign in with Google
            </button>
          )}
        </div>

        <div style={{ marginBottom:18 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--warn)', marginBottom:6 }}>
            Notifications <span style={{ color:'var(--t3)', fontWeight:400 }}>— 7am / 7pm briefing + reminders</span>
          </div>
          {notifPerm === 'granted' ? (
            <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 12px', background:'rgba(245,158,11,0.08)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:10 }}>
              <IBell size={14} color="var(--warn)" sw={1.75}/>
              <span style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--warn)', fontWeight:700 }}>NOTIFICATIONS ACTIVE</span>
              <span style={{ marginLeft:'auto', fontFamily:'var(--mn)', fontSize:9, color: supportsTriggers() ? 'var(--gn)' : 'var(--t3)', fontWeight:600 }}>
                {supportsTriggers() ? '● BACKGROUND OK' : '○ FOREGROUND ONLY'}
              </span>
            </div>
          ) : notifPerm === 'denied' ? (
            <div style={{ padding:'10px 12px', background:'rgba(184,57,44,0.08)', border:'1px solid var(--bdr2)', borderRadius:10 }}>
              <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--redHot)', fontWeight:700 }}>BLOCKED BY BROWSER</div>
              <div style={{ fontSize:11, color:'var(--t3)', marginTop:4 }}>Enable in your browser's site settings.</div>
            </div>
          ) : (
            <button onClick={requestNotif} style={{ width:'100%', padding:12, background:'var(--bg3)', border:'1px solid rgba(245,158,11,0.4)', borderRadius:10, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8, fontFamily:'var(--hd)', fontSize:13, fontWeight:600, letterSpacing:'.08em', textTransform:'uppercase', color:'var(--warn)' }}>
              <IBell size={16} color="var(--warn)" sw={1.75}/>
              Enable Notifications
            </button>
          )}
          {notifPerm === 'granted' && (
            <>
              <button onClick={runSelfTest} disabled={selfTestRunning}
                style={{ width:'100%', marginTop:8, padding:10, background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:10, cursor:selfTestRunning?'wait':'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8, fontFamily:'var(--hd)', fontSize:11, fontWeight:600, letterSpacing:'.08em', textTransform:'uppercase', color:'var(--t2)', opacity:selfTestRunning?0.6:1 }}>
                {selfTestRunning
                  ? <><div className="dp"><span/><span/><span/></div> Testing…</>
                  : <>Run notification self-test</>}
              </button>
              {selfTestResult && (
                <div style={{ marginTop:8, padding:'8px 10px', background:selfTestResult.ok?'rgba(34,197,94,0.06)':'rgba(184,57,44,0.06)', border:`1px solid ${selfTestResult.ok?'rgba(34,197,94,0.25)':'rgba(184,57,44,0.25)'}`, borderRadius:8 }}>
                  <div style={{ fontFamily:'var(--mn)', fontSize:9, fontWeight:700, color:selfTestResult.ok?'var(--gn)':'var(--redHot)' }}>
                    {selfTestResult.ok ? '● TEST PASSED' : '○ TEST FAILED'}
                  </div>
                  <div style={{ fontSize:10, color:'var(--t3)', marginTop:3 }}>
                    {selfTestResult.ok
                      ? (selfTestResult.triggers
                          ? 'Immediate notification fired. A second one will fire in 10s — if it appears, background scheduling is working.'
                          : 'Immediate notification fired. This browser does not support background scheduling, so briefings rely on app-open catch-up.')
                      : selfTestResult.reason}
                  </div>
                </div>
              )}
              <div style={{ marginTop:8, fontSize:10, color:'var(--t3)', lineHeight:1.5 }}>
                <span style={{ color:'var(--t2)', fontWeight:600 }}>How this works:</span> on Chrome Android with the PWA installed, briefings and reminders are queued at the OS level and fire even when the app is closed. On other browsers, they fire when you open the app (catch-up) or while the app is open (foreground). No backend, no cost.
              </div>
            </>
          )}
        </div>

        {/* ─── Voice output (Phase D) ─── */}
        <div style={{ marginBottom:18 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--gold)', marginBottom:6 }}>
            Voice <span style={{ color:'var(--t3)', fontWeight:400 }}>— Jarvis speaks briefings aloud</span>
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <button onClick={() => { setVoiceEnabled(!voiceOn); setVoiceOnState(!voiceOn); haptic.tick(); }}
              style={{ flex:1, padding:'10px 12px', background:voiceOn?'rgba(232,154,58,0.10)':'var(--bg3)', border:`1px solid ${voiceOn?'var(--bdrGold)':'var(--bdr)'}`, borderRadius:10, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'space-between', fontFamily:'var(--hd)', fontSize:12, fontWeight:600, letterSpacing:'.08em', textTransform:'uppercase', color:voiceOn?'var(--gold)':'var(--t2)' }}>
              <span style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ width:8, height:8, borderRadius:'50%', background:voiceOn?'var(--gold)':'var(--t4)', boxShadow:voiceOn?'0 0 8px rgba(232,154,58,0.5)':'none', animation:voiceOn?'pg 2s infinite':'none' }}/>
                Voice {voiceOn ? 'enabled' : 'disabled'}
              </span>
            </button>
            <button onClick={() => { speak('Online, sir. Voice systems nominal.'); haptic.tick(); }}
              disabled={!voiceOn}
              style={{ padding:'10px 14px', background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:10, cursor:voiceOn?'pointer':'not-allowed', fontFamily:'var(--mn)', fontSize:10, fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase', color:'var(--t2)', opacity:voiceOn?1:0.4 }}>
              Test
            </button>
          </div>
          {/* Phase F — speech recognition language preference */}
          <div style={{ marginTop:10, display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
            <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:700, letterSpacing:'.10em', textTransform:'uppercase' }}>
              Recognition lang
            </span>
            {[
              { v: 'auto', l: 'AUTO' },
              { v: 'en-GB', l: 'EN-GB' },
              { v: 'fr-FR', l: 'FR-FR' },
            ].map(o => {
              const active = voiceLang === o.v;
              return (
                <button key={o.v}
                  onClick={() => { saveVoiceLang(o.v); setVoiceLang(o.v); haptic.tick(); }}
                  style={{
                    padding:'5px 10px',
                    fontFamily:'var(--mn)', fontSize:9, fontWeight:700,
                    letterSpacing:'.08em',
                    borderRadius:6,
                    border:'1px solid',
                    background: active ? 'rgba(232,154,58,.10)' : 'var(--bg3)',
                    borderColor: active ? 'var(--bdrGold)' : 'var(--bdr)',
                    color: active ? 'var(--gold)' : 'var(--t2)',
                    cursor:'pointer',
                  }}>
                  {o.l}
                </button>
              );
            })}
          </div>
          <div style={{ marginTop:8, fontSize:10, color:'var(--t3)', lineHeight:1.5 }}>
            When enabled, Jarvis speaks the morning and evening briefings aloud, plus the daily overdue digest. Picks a British male voice when available. Off by default. Recognition language affects voice <em>input</em> (mic in Brief and Chat).
          </div>
        </div>

        <div style={{ marginBottom:18 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--gold)', marginBottom:6, display:'flex', alignItems:'center', gap:6 }}>
            System Check <span style={{ color:'var(--t3)', fontWeight:400 }}>— diagnose what's failing</span>
          </div>
          <button onClick={runSystemCheck} disabled={sysRunning}
            style={{ width:'100%', padding:12, background:'var(--bg3)', border:'1px solid var(--bdrGold)', borderRadius:10, cursor:sysRunning?'wait':'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8, fontFamily:'var(--hd)', fontSize:13, fontWeight:600, letterSpacing:'.08em', textTransform:'uppercase', color:'var(--gold)', opacity:sysRunning?0.6:1 }}>
            {sysRunning ? <><div className="dp"><span/><span/><span/></div> Running diagnostics…</> : <><IRefresh size={14} color="var(--gold)" sw={2}/> Run System Check</>}
          </button>
          {sysChecks && (
            <div style={{ marginTop:10, background:'var(--bg)', border:'1px solid var(--bdr)', borderRadius:10, overflow:'hidden' }}>
              {[
                { key:'groq', label:'Groq AI (primary)' },
                { key:'gemini', label:'Gemini AI (fallback)' },
                { key:'alpha', label:'Alpha Vantage' },
                { key:'gnews', label:'GNews' },
                { key:'google', label:'Google OAuth' },
                { key:'calendar', label:'Calendar API' },
                { key:'gmail', label:'Gmail API' },
                { key:'weather', label:'Weather' },
                { key:'fx', label:'FX Rates' },
              ].map((row, i, arr) => {
                const c = sysChecks[row.key];
                if (!c) return null;
                return (
                  <div key={row.key} style={{ padding:'8px 12px', borderBottom:i<arr.length-1?'1px solid var(--bdr)':'none', display:'flex', alignItems:'center', gap:10 }}>
                    <span style={{ width:8, height:8, borderRadius:'50%', background:c.ok?'var(--gn)':'var(--redHot)', boxShadow:`0 0 6px ${c.ok?'var(--gn)':'var(--redHot)'}`, flexShrink:0 }}/>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, color:c.ok?'var(--gn)':'var(--redHot)', letterSpacing:'.08em' }}>{row.label.toUpperCase()}</div>
                      <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t2)', marginTop:2, lineHeight:1.3, wordBreak:'break-word' }}>{c.msg}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div style={{ marginBottom:18 }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--cyan)', marginBottom:6 }}>Data</div>
          <div style={{ display:'flex', gap:6 }}>
            <button onClick={exportData} style={{ flex:1, padding:10, background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:8, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6, fontFamily:'var(--hd)', fontSize:11, fontWeight:600, letterSpacing:'.1em', color:'var(--cyan)' }}>
              <IDownload size={12} color="var(--cyan)" sw={2}/> EXPORT
            </button>
            <label style={{ flex:1, padding:10, background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:8, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6, fontFamily:'var(--hd)', fontSize:11, fontWeight:600, letterSpacing:'.1em', color:'var(--t2)' }}>
              <ISave size={12} color="var(--t2)" sw={1.75}/> IMPORT
              <input type="file" accept="application/json" onChange={importData} style={{ display:'none' }}/>
            </label>
            <button onClick={clearAll} style={{ flex:1, padding:10, background: confirmClear?'rgba(184,57,44,0.18)':'var(--bg3)', border:`1px solid ${confirmClear?'var(--redHot)':'var(--bdr)'}`, borderRadius:8, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6, fontFamily:'var(--hd)', fontSize:11, fontWeight:600, letterSpacing:'.1em', color: confirmClear?'var(--redHot)':'var(--t3)' }}>
              <IEraser size={12} color={confirmClear?'var(--redHot)':'var(--t3)'} sw={1.75}/> {confirmClear?'CONFIRM?':'CLEAR'}
            </button>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:6 }}>
            Export JSON backup · Import restores · Clear wipes local data (keys kept)
          </div>
        </div>

        <button onClick={save} className="svb"
          style={{ background:ok?'var(--gn)':'linear-gradient(135deg, var(--red), var(--gold))', color:'#fff', boxShadow: ok?'none':'0 0 16px rgba(232,154,58,0.3)' }}>
          {ok ? <><ICheck size={16} color="#fff" sw={2.5}/> Systems Updated</> : 'Save Configuration'}
        </button>
      </div>
    </div>
  );
}
// ═══════════════════════════════════════════════════════════════
// CHAT TAB — voice input, persistent, retry, clear
// ═══════════════════════════════════════════════════════════════
function ChatTab({ gr, dtr, raceDone, gEvents }) {
  const loadInitial = () => {
    const saved = loadChat();
    if (saved.length) return saved;
    return [{ r:'a', t:`${gr}, sir. All systems operational. How may I assist?`, ts:new Date().toTimeString().slice(0,5), sources:[], id: uid() }];
  };
  const [msgs, setMsgs] = useState(loadInitial);
  const [inp, setInp] = useState('');
  const [ld, setLd] = useState(false);
  const [savedMsgs, setSavedMsgs] = useState({});
  const er = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { saveChat(msgs); }, [msgs]);
  // Phase F.8: was er.current?.scrollIntoView({behavior:'smooth'}). That
  // was the chat-tab "black bar" bug: scrollIntoView walks every
  // scrollable ancestor and Chrome scrolls overflow:hidden ancestors
  // programmatically. .app got scrolled by ~80px (header height),
  // pushing the header off the top of the viewport and exposing a
  // black band at the bottom. The keyboard-close handler reset
  // .app.scrollTop=0, which is why a keyboard cycle "fixed" it.
  // Diagnosis confirmed via F.6/F.7 magenta diag bar:
  // app:758@scr:80 hdr:81@-80. Fix: scroll only .ch-m, never the app.
  useEffect(() => {
    const m = er.current?.parentElement;
    if (m) m.scrollTo({ top: m.scrollHeight, behavior: 'smooth' });
  }, [msgs, ld]);
  useEffect(() => {
    // Phase F: skip auto-focus on touch devices. Focusing the input opens
    // the keyboard, which collapses the dvh-sized flex layout and pushes
    // the header off-screen. Desktop (no virtual keyboard) still benefits.
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) return;
    setTimeout(() => inputRef.current?.focus({ preventScroll: true }), 100);
  }, []);

  const voice = useVoice((txt) => {
    // Phase F: auto-submit voice input. Web Speech API's natural ~800ms
    // silence detection IS the trigger here — `onresult` only fires once
    // the user has stopped talking, so by the time we get `txt` they're done.
    setInp('');
    haptic.tap();
    sendFromText(txt.trim(), msgs);
  });

  const saveToBrain = (msgText, idx) => {
    addBrainItem({
      title: msgText.length > 100 ? msgText.slice(0, 100) + '…' : msgText,
      tags: ['chat', 'saved'],
      comment: 'Saved from chat conversation'
    });
    setSavedMsgs(prev => ({ ...prev, [idx]: true }));
    haptic.success();
    toast('Saved to Brain', 'gn');
  };

  const sendFromText = async (text, base) => {
    const ts = new Date().toTimeString().slice(0,5);
    const userMsg = { r:'u', t:text.trim(), ts, sources:[], id: uid() };
    const next = [...base, userMsg];
    setMsgs(next); setLd(true);
    logQuery(text.trim());

    const gk = sto.get('j_gk');
    const groqKey = sto.get('j_groq');
    if (!gk && !groqKey) {
      setMsgs([...next, { r:'a', t:"No AI provider configured, sir. Tap ⚙️ and add a Groq or Gemini key.", ts:new Date().toTimeString().slice(0,5), sources:[], id: uid() }]);
      setLd(false); return;
    }

    const wantsNews = /\b(news|latest|update|happen|happening|breaking|market|middle east|today|recent|war|conflict|election|price|rate|economy|stock|geopolit|actualit)/i.test(text);

    try {
      const history = next.slice(-20).map(m => ({ r: m.r, t: m.t }));
      const sysMsg = { r:'a', t: getSYS() };
      const convo = [sysMsg, ...history];
      const { text: reply, sources, provider, model } = await callAI(convo, { needsSearch: wantsNews });
      if (!reply) throw new Error('No response');

      const events = parseEvents(reply);
      const notes = parseNotes(reply);
      const tasks = parseTasks(reply);
      events.forEach(e => { const id = addEvent(e); if (id) scheduleEventReminder({ ...e, id }); });
      notes.forEach(n => addBrainItem(n));
      tasks.forEach(t => addTask({ ...t, source: 'chat' }));

      let confirm = '';
      if (events.length) confirm += `\n\n✓ ${events.length} event${events.length>1?'s':''} added to calendar`;
      if (tasks.length) confirm += `\n✓ ${tasks.length} task${tasks.length>1?'s':''} added to today's brief`;
      if (notes.length) confirm += `\n✓ ${notes.length} note${notes.length>1?'s':''} saved to Brain`;
      const tot = events.length + notes.length + tasks.length;
      if (tot) { haptic.success(); toast(`${tot} item${tot>1?'s':''} logged`, 'gn'); }

      setMsgs([...next, { r:'a', t:stripTags(reply) + confirm, ts:new Date().toTimeString().slice(0,5), sources: sources || [], provider, model, id: uid() }]);
    } catch (e) {
      haptic.warn();
      setMsgs([...next, { r:'a', t:'⚠ Connection lost, sir. Tap retry to try again.', ts:new Date().toTimeString().slice(0,5), sources:[], failed: true, id: uid() }]);
    }
    setLd(false);
  };

  const send = () => {
    if (!inp.trim() || ld) return;
    const text = inp.trim();
    setInp('');
    haptic.tap();
    sendFromText(text, msgs);
  };

  const retry = () => {
    const lastUserIdx = [...msgs].reverse().findIndex(m => m.r === 'u');
    if (lastUserIdx === -1) return;
    const idx = msgs.length - 1 - lastUserIdx;
    const q = msgs[idx].t;
    const base = msgs.slice(0, idx);
    setMsgs(base);
    setTimeout(() => sendFromText(q, base), 100);
  };

  const clearChatHistory = () => {
    clearChat();
    setMsgs([{ r:'a', t:`${gr}, sir. Ready when you are.`, ts:new Date().toTimeString().slice(0,5), sources:[], id: uid() }]);
    haptic.tick();
    toast('Chat cleared', 'gold');
  };

  const now = new Date();
  const todayISO = now.toISOString().slice(0,10);
  const nowTime = now.toTimeString().slice(0,5);
  const localEvs = useStore('j_events', loadEvents);
  const allEvs = [...localEvs, ...gEvents]
    .filter(e => e.date > todayISO || (e.date === todayISO && e.time > nowTime))
    .sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const nextEv = allEvs[0];
  const fmtNext = nextEv ? (nextEv.date === todayISO ? `TODAY ${nextEv.time}` : `${new Date(nextEv.date+'T12:00').toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase()} ${nextEv.time}`) : null;

  const hour = now.getHours();
  const suggestions = useMemo(() => {
    const u = loadUsage();
    const base = [];
    if (hour < 10) base.push('Morning briefing', "What's on today?", 'Weather + commute');
    else if (hour < 14) base.push("What's next on my schedule?", 'Market update', 'Middle East news');
    else if (hour < 19) base.push('Remaining today', 'Portfolio check', 'Plan tomorrow');
    else base.push('Summary of today', 'Plan tomorrow', 'Log: idea…');
    const recent = (u.queries || []).slice(0, 2);
    return [...new Set([...base, ...recent])].slice(0, 5);
  }, [hour]);

  return (
    <div className="ch-w">
      <div className="ch-m">
        <div className="sx" style={{ display:'flex', gap:6 }}>
          {!raceDone && (
            <div className="hud hud-red glow-red" style={{ minWidth:90, padding:'8px 10px', flexShrink:0 }}>
              <div style={{ fontFamily:'var(--mn)', fontSize:7, color:'var(--t3)', letterSpacing:'.12em', fontWeight:700 }}>MARATHON</div>
              <div style={{ fontFamily:'var(--hd)', fontSize:24, fontWeight:600, color:'var(--gold)', lineHeight:1 }}>{dtr}</div>
              <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--t3)', marginTop:2 }}>DAYS</div>
            </div>
          )}
          {nextEv && (
            <div className="hud" style={{ minWidth:130, padding:'8px 10px', flexShrink:0, borderColor:'var(--bdrGold)' }}>
              <div style={{ fontFamily:'var(--mn)', fontSize:7, color:'var(--gold)', letterSpacing:'.1em', fontWeight:700 }}>NEXT · {fmtNext}</div>
              <div style={{ fontSize:12, marginTop:2, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{nextEv.title}</div>
            </div>
          )}
          <WeatherChip/>
          <button onClick={clearChatHistory} style={{ background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:10, padding:'8px 10px', flexShrink:0, cursor:'pointer', display:'flex', alignItems:'center', gap:5, fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:600 }}>
            <IEraser size={11} color="var(--t3)" sw={1.5}/> CLEAR
          </button>
        </div>

        {msgs.map((m, i) => (
          <div key={m.id || i} style={{ marginLeft:m.r==='u'?32:0, marginRight:m.r==='a'?16:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
              <span style={{ fontFamily:'var(--hd)', fontSize:10, letterSpacing:'.15em', textTransform:'uppercase', color:m.r==='u'?'var(--red)':'var(--gold)', fontWeight:700 }}>
                {m.r==='u'?'You':'Jarvis'}
              </span>
              <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{m.ts}</span>
              {m.r==='a' && m.provider && (
                <span style={{ fontFamily:'var(--mn)', fontSize:7, color:m.provider==='groq'?'var(--cyan)':m.provider==='gemini'?'var(--blue)':'var(--t4)', letterSpacing:'.08em', fontWeight:700, padding:'1px 4px', border:`1px solid ${m.provider==='groq'?'rgba(34,211,238,0.25)':m.provider==='gemini'?'rgba(59,130,246,0.25)':'var(--bdr)'}`, borderRadius:3, opacity:0.8 }} title={m.model || m.provider}>
                  {m.provider==='groq' ? (m.model?.includes('8b') ? 'GROQ·8B' : 'GROQ·70B') : m.provider==='gemini' ? 'GEMINI' : m.provider.toUpperCase()}
                </span>
              )}
              {m.failed && <button onClick={retry} style={{ background:'none', border:'1px solid var(--bdr2)', borderRadius:5, padding:'1px 6px', cursor:'pointer', fontFamily:'var(--mn)', fontSize:8, color:'var(--redHot)', fontWeight:700, letterSpacing:'.08em' }}>RETRY</button>}
            </div>
            <div style={{ fontSize:14, lineHeight:1.65, color:m.r==='u'?'var(--t)':'var(--t2)', whiteSpace:'pre-wrap', wordBreak:'break-word' }}>{m.t}</div>
            {m.sources && m.sources.length > 0 && (
              <div style={{ marginTop:6, display:'flex', flexWrap:'wrap', gap:2 }}>
                {m.sources.map((s, j) => (
                  <a key={j} href={s.url} target="_blank" rel="noopener noreferrer" className="src-link" onClick={()=>haptic.tick()}>
                    <IExternalLink size={9} color="var(--blue)" sw={2}/>
                    {s.title?.length > 25 ? s.title.slice(0,25)+'…' : (s.title || 'Source')}
                  </a>
                ))}
              </div>
            )}
            {m.r === 'a' && i > 0 && !m.failed && (
              <button className={`save-btn ${savedMsgs[i] ? 'saved' : ''}`} onClick={() => saveToBrain(m.t, i)}>
                {savedMsgs[i] ? <><ICheck size={9} color="var(--gn)" sw={2}/> Saved</> : <><ISave size={9} color="var(--t3)" sw={1.5}/> Save to Brain</>}
              </button>
            )}
          </div>
        ))}
        {ld && <div style={{ marginRight:32 }}>
          <span style={{ fontFamily:'var(--hd)', fontSize:10, letterSpacing:'.15em', textTransform:'uppercase', color:'var(--gold)', fontWeight:700 }}>Jarvis</span>
          <div className="thinking" style={{ marginTop:6 }}>
            <div className="thinking-rings"/>
            <span className="thinking-text">Processing</span>
          </div>
        </div>}
        <div ref={er}/>
      </div>

      <div className="ch-i">
        <div className="pls sx">
          {suggestions.map((p,i) => (
            <button key={i} className="pl" onClick={()=>{ haptic.tick(); setInp(p); inputRef.current?.focus(); }}>{p}</button>
          ))}
        </div>
        <div className="cf">
          <input ref={inputRef} value={inp} onChange={e=>setInp(e.target.value)}
            onKeyDown={e => { if (e.key==='Enter') { e.preventDefault(); send(); } }}
            placeholder={voice.listening ? 'Listening…' : 'Talk to Jarvis…'}
            enterKeyHint="send" autoComplete="off" autoCorrect="on"/>
          {voice.supported && (
            <button className={`mic${voice.listening?' on':''}`} onClick={() => voice.listening ? voice.stop() : voice.start()} aria-label="Voice input">
              <IMic size={18} color={voice.listening?'var(--redHot)':'var(--t3)'} sw={1.75}/>
            </button>
          )}
          <button className="sb" onClick={send} disabled={!inp.trim()||ld} aria-label="Send">
            <ISend size={18} color={inp.trim()&&!ld?'var(--gold)':'var(--t4)'} sw={1.75}/>
          </button>
        </div>
      </div>
    </div>
  );
}
// ═══════════════════════════════════════════════════════════════
// BRIEF TAB — action surface (Phase B)
// Layout: greeting → urgency banner → today's priorities (tasks)
//   → quick capture → urgent mail → today's events → ambient cards
// The first four sections are about acting; the rest is ambient context.
// ═══════════════════════════════════════════════════════════════
function BriefTab({ gr, dtr, raceDone, gEvents, gToken, urgency, setTab }) {
  const [w, setW] = useState(sto.getJSON('j_weather', null));
  const [fx, setFx] = useState(sto.getJSON('j_fx_cache', null));
  const [prices, setPrices] = useState(loadPriceCache());

  // Live tasks (subscribes to bus changes via useStore)
  const tasks = useStore('j_tasks', loadTasks);
  const localEvs = useStore('j_events', loadEvents);

  // Mail data — read from caches; updates when MailTab refreshes them
  const mailCache = useStore('j_mail_cache', () => sto.getJSON('j_mail_cache', {}));
  const mailClass = useStore('j_mail_class', () => sto.getJSON('j_mail_class', {}));

  useEffect(() => { fetchWeather().then(d => d && setW(d)); }, []);
  useEffect(() => { fetchFX().then(d => d && setFx(d)); }, []);
  useEffect(() => {
    const key = sto.get('j_ak');
    if (!key) return;
    const pf = loadPortfolio();
    Promise.all(pf.map(p => p.symbol ? fetchPrice(p.symbol, key) : null))
      .then(() => setPrices(loadPriceCache()));
  }, []);

  const today = new Date().toISOString().slice(0,10);

  // ─── Today's priorities (top tasks) ─────────────────────────
  const openTasks = useMemo(
    () => tasks.filter(isOpen).sort(sortByUrgency),
    [tasks]
  );
  const topTasks = openTasks.slice(0, 5);
  const recentlyDone = useMemo(
    () => tasks.filter(t => t.status === 'done' && t.doneAt && (Date.now() - t.doneAt) < 86400000).slice(0, 3),
    [tasks]
  );

  // ─── Today's events (Google + local, today only, sorted) ────
  const todayEvs = useMemo(
    () => [...localEvs, ...gEvents]
      .filter(e => e.date === today)
      .sort((a,b)=>(a.time||'00:00').localeCompare(b.time||'00:00')),
    [localEvs, gEvents, today]
  );

  // ─── Urgent unread mail (top 3) ─────────────────────────────
  const urgentMail = useMemo(() => {
    const ids = Object.keys(mailCache).filter(id =>
      mailClass[id]?.priority === 'urgent' && mailCache[id]?.unread
    );
    return ids
      .map(id => ({ ...mailCache[id], cls: mailClass[id] }))
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .slice(0, 3);
  }, [mailCache, mailClass]);

  // ─── Quick capture handling ─────────────────────────────────
  const [qc, setQc] = useState('');
  const [qcBusy, setQcBusy] = useState(false);
  // Phase F: voice in Brief, auto-submits via the same submit handler
  const qcVoice = useVoice((txt) => {
    const text = txt?.trim();
    if (!text) return;
    setQc(text);
    haptic.tap();
    submitQuickCapture(text);
  });
  const submitQuickCapture = async (textOverride) => {
    const text = (typeof textOverride === 'string' ? textOverride : qc).trim();
    if (!text || qcBusy) return;
    setQcBusy(true);
    try {
      // Heuristic: if the text contains a time/date hint, route to AI
      // for proper EVENT/TASK parsing. Otherwise create an instant
      // "due today, medium priority" task. Both paths feel native.
      const timeHint = /\b(today|tonight|tomorrow|monday|tuesday|wednesday|thursday|friday|saturday|sunday|next|this week|in \d|aujourd'?hui|demain|lundi|mardi|mercredi|jeudi|vendredi|samedi|dimanche|prochain|cette semaine|\d{1,2}[h:]\d{0,2}|\d{1,2}\s?(am|pm)|\d{1,2}h\d{0,2})\b/i;
      const isComplex = timeHint.test(text) || /remind|schedule|meeting|appointment|rappelle|rendez-vous/i.test(text) || text.length > 80;

      if (!isComplex) {
        addTask({ title: text, priority: 'med', due: today, source: 'brief' });
        haptic.success();
        toast('Task added — due today', 'gn');
        setQc('');
      } else {
        // AI route — parse it through getSYS so events vs tasks are decided correctly
        const sysMsg = { r: 'a', t: getSYS() };
        const userMsg = { r: 'u', t: text };
        const { text: reply } = await callAI([sysMsg, userMsg], { needsSearch: false });
        if (!reply) throw new Error('No response');
        const events = parseEvents(reply);
        const newTasks = parseTasks(reply);
        const notes = parseNotes(reply);
        events.forEach(e => { const id = addEvent(e); if (id) scheduleEventReminder({ ...e, id }); });
        newTasks.forEach(t => addTask({ ...t, source: 'brief' }));
        notes.forEach(n => addBrainItem(n));
        const tot = events.length + newTasks.length + notes.length;
        if (tot === 0) {
          // AI didn't extract anything structured — fall back to plain task
          addTask({ title: text, priority: 'med', due: today, source: 'brief' });
          haptic.success();
          toast('Task added — due today', 'gn');
        } else {
          haptic.success();
          toast(`${tot} item${tot>1?'s':''} added`, 'gn');
        }
        setQc('');
      }
    } catch {
      // Network/AI failure — create the task anyway so input never feels lost
      addTask({ title: text, priority: 'med', due: today, source: 'brief' });
      haptic.warn();
      toast('Saved as plain task (AI offline)', 'gold');
      setQc('');
    } finally {
      setQcBusy(false);
    }
  };

  // ─── Banner copy ────────────────────────────────────────────
  let banner;
  if (urgency.overdueCount > 0) {
    banner = { tone: 'red', text: `Sir, ${urgency.overdueCount} overdue task${urgency.overdueCount>1?'s':''}` + (urgency.urgentMailCount ? ` · ${urgency.urgentMailCount} urgent mail` : '') };
  } else if (urgency.urgentMailCount > 0) {
    banner = { tone: 'red', text: `${urgency.urgentMailCount} urgent mail${urgency.urgentMailCount>1?'s':''} need your attention` };
  } else if (urgency.dueTodayCount > 0) {
    banner = { tone: 'gold', text: `${urgency.dueTodayCount} task${urgency.dueTodayCount>1?'s':''} due today` };
  } else if (openTasks.length === 0 && todayEvs.length === 0) {
    banner = { tone: 'gn', text: 'All clear, sir. Nothing outstanding.' };
  } else {
    banner = { tone: 'gold', text: `${openTasks.length} open task${openTasks.length>1?'s':''} on the board` };
  }

  const pf = loadPortfolio();

  return (
    <div style={{ padding:'22px 14px 18px' }} className="fade">
      <div style={{ marginBottom:18 }}>
        <div style={{ fontFamily:'var(--display)', fontSize:34, fontWeight:300, lineHeight:1.05, letterSpacing:'-0.01em' }}>
          <span style={{ color:'var(--t2)' }}>{gr},</span>{' '}
          <span style={{ color:'var(--gold)', fontStyle:'italic', fontWeight:400 }}>Sir.</span>
        </div>
        <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--ice)', letterSpacing:'.18em', marginTop:8, fontWeight:600, display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--ice)', boxShadow:'0 0 6px var(--ice)', animation:'pg 2s infinite' }}/>
          LIVE · {new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'}).toUpperCase()}
        </div>
      </div>

      {/* ── URGENCY BANNER ── */}
      <div className={`urg-banner tone-${banner.tone}`}>
        <span className="urg-banner-dot"/>
        <span style={{ flex:1 }}>{banner.text}</span>
      </div>

      {/* ── TODAY'S PRIORITIES (tasks) ── */}
      <div className="b-sec">
        <div className="b-sec-h">
          <div className="b-sec-t"><IZap size={11} color="var(--gold)" sw={2}/> Today's priorities</div>
          <span className="b-sec-c">{openTasks.length} OPEN · {recentlyDone.length} DONE 24H</span>
        </div>
        {topTasks.length === 0 ? (
          <div className="b-sec-empty">Nothing to do, sir. Add something below.</div>
        ) : (
          topTasks.map(t => <MTaskRow key={t.id} task={t}/>)
        )}
        {openTasks.length > topTasks.length && (
          <div style={{ textAlign:'center', marginTop:6, fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:600, letterSpacing:'.08em' }}>
            +{openTasks.length - topTasks.length} more open task{openTasks.length - topTasks.length > 1 ? 's' : ''}
          </div>
        )}

        {/* ── QUICK CAPTURE ── */}
        <div className="qc-wrap" style={{ marginTop:10 }}>
          <input
            className="qc-input"
            value={qc}
            onChange={e => setQc(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') submitQuickCapture(); }}
            placeholder={qcVoice.listening ? 'Listening…' : 'Quick capture — task, event, or anything…'}
            disabled={qcBusy}
          />
          {qcVoice.supported && (
            <button
              className={`qc-mic${qcVoice.listening?' on':''}`}
              onClick={() => qcVoice.listening ? qcVoice.stop() : qcVoice.start()}
              aria-label="Voice input"
              disabled={qcBusy}>
              <IMic size={16} color={qcVoice.listening?'var(--redHot)':'var(--t3)'} sw={1.75}/>
            </button>
          )}
          <button className="qc-go" onClick={() => submitQuickCapture()} disabled={!qc.trim() || qcBusy} aria-label="Add">
            {qcBusy ? <div className="dp"><span/><span/><span/></div> : <IPlus size={16} color="#1a0e08" sw={3}/>}
          </button>
        </div>
      </div>

      {/* ── WEATHER (Phase F.2: lifted up from below the fold) ── */}
      <div className="hud hud-red-bdr scan glow-red" style={{ padding:16, marginBottom:14, position:'relative' }}>
        <div className="particles"><span/><span/><span/><span/><span/></div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', position:'relative', zIndex:1 }}>
          <div>
            <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', letterSpacing:'.16em', fontWeight:700 }}>{(w?.city || 'LOCATION').toUpperCase()} · LIVE</div>
            <div style={{ fontFamily:'var(--display)', fontSize:52, fontWeight:300, lineHeight:0.95, marginTop:6, color:'var(--hi)', letterSpacing:'-0.02em' }}>
              {w ? <>{w.temp}<span style={{ color:'var(--ice)', fontSize:36, fontWeight:400 }}>°</span></> : '—°'}
            </div>
            <div style={{ fontSize:12, color:'var(--t2)', marginTop:6, fontFamily:'var(--bd)', fontStyle:'italic' }}>{w?`${w.desc} · feels ${w.feels}°`:'Connecting…'}</div>
            {w && <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--ice)', marginTop:4, fontWeight:500, letterSpacing:'.04em' }}>
              <span style={{ color:'var(--t4)' }}>H</span> {w.high}°
              <span style={{ color:'var(--t5)', margin:'0 6px' }}>·</span>
              <span style={{ color:'var(--t4)' }}>L</span> {w.low}°
              <span style={{ color:'var(--t5)', margin:'0 6px' }}>·</span>
              <span style={{ color:'var(--t4)' }}>WIND</span> {w.wind}<span style={{ color:'var(--t4)' }}>km/h</span>
            </div>}
            {w && w.rainProb > 30 && <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--redHot)', marginTop:5, fontWeight:600, letterSpacing:'.04em' }}>☔ RAIN 12H · <span style={{ color:'var(--ice)' }}>{w.rainProb}%</span></div>}
          </div>
          {w && (w.code <= 1 ? <ISun size={36} color="var(--gold)" sw={1.3}/> : (w.code >= 51 && w.code <= 82) ? <IRain size={36} color="var(--blue)" sw={1.3}/> : <ICloud size={36} color="var(--t2)" sw={1.3}/>)}
        </div>
      </div>

      {/* ── URGENT MAIL ── */}
      {urgentMail.length > 0 && (
        <div className="b-sec">
          <div className="b-sec-h">
            <div className="b-sec-t" style={{ color:'var(--redHot)' }}><IMail size={11} color="var(--redHot)" sw={2}/> Urgent mail</div>
            <button onClick={() => setTab && setTab('mail')} style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:6, padding:'3px 8px', fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', cursor:'pointer', fontWeight:600, letterSpacing:'.06em' }}>VIEW ALL</button>
          </div>
          {urgentMail.map(m => (
            <div key={m.id} className="bm-row" onClick={() => setTab && setTab('mail')}>
              <div style={{ flex:1, minWidth:0 }}>
                <div className="bm-from">{(m.from || '').replace(/<.*$/,'').replace(/"/g,'').trim().slice(0, 32) || 'unknown'}</div>
                <div className="bm-subj" style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.subject}</div>
                {m.cls?.highlight && <div className="bm-hi">{m.cls.highlight}</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── TODAY'S EVENTS ── */}
      <div className="b-sec">
        <div className="b-sec-h">
          <div className="b-sec-t"><ICal size={11} color="var(--gold)" sw={2}/> Today's schedule</div>
          <span className="b-sec-c">{todayEvs.length} EVENT{todayEvs.length!==1?'S':''}</span>
        </div>
        {todayEvs.length === 0 ? (
          <div className="b-sec-empty">{gToken ? 'No events today.' : 'Connect Google Calendar in ⚙️ for live events.'}</div>
        ) : todayEvs.map((e, i) => (
          <div key={i} className="be-row">
            <span className="be-time">{e.time === '00:00' ? '──' : e.time}</span>
            <span className="be-title" style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{e.title}</span>
            <span className="be-src" style={{ color: e.src === 'google' ? 'var(--gn)' : 'var(--gold)' }}>{e.src === 'google' ? 'GCAL' : 'JRV'}</span>
          </div>
        ))}
      </div>

      {/* Markets / FX / News continue below the fold (Phase F.2: weather lifted up) */}
      <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--gold)', marginBottom:7, display:'flex', alignItems:'center', gap:6 }}>
        Markets <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--gn)', display:'inline-block', boxShadow:'0 0 6px var(--gn)', animation:'pg 2s infinite' }}/>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, marginBottom:12 }}>
        {pf.slice(0,4).map((p, i) => {
          const pr = prices[p.symbol];
          const up = pr && pr.change >= 0;
          return (
            <div key={i} className="hud" style={{ padding:'12px 12px 11px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:700, letterSpacing:'.10em' }}>{p.symbol.split('.')[0]}</span>
                {pr && (up ? <IUp size={11} color="var(--gn)" sw={2.5}/> : <IDn size={11} color="var(--redHot)" sw={2.5}/>)}
              </div>
              <div style={{ fontFamily:'var(--mn)', fontSize:16, marginTop:5, fontWeight:600, color:pr?'var(--ice)':'var(--t4)', letterSpacing:'-0.01em' }}>
                {pr ? pr.price.toFixed(2) : '—'}
              </div>
              <div style={{ fontFamily:'var(--mn)', fontSize:10, color:pr?(up?'var(--gn)':'var(--redHot)'):'var(--t4)', fontWeight:600, marginTop:1 }}>
                {pr ? `${up?'+':''}${pr.changePct.toFixed(2)}%` : '──'}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--red)', marginBottom:7, display:'flex', alignItems:'center', gap:6 }}>
        Live FX <span style={{ width:5, height:5, borderRadius:'50%', background:fx?'var(--gn)':'var(--t4)', display:'inline-block', boxShadow:fx?'0 0 6px var(--gn)':'none', animation:fx?'pg 2s infinite':'none' }}/>
      </div>
      <div className="hud" style={{ padding:0, overflow:'hidden', marginBottom:8 }}>
        {fx ? [
          { p:'CHF / EUR', r:fx.chfEur, label:'Salary' },
          { p:'CHF / USD', r:fx.chfUsd, label:'Dollar' },
          { p:'USD / EUR', r:fx.usdEur, label:'SPY' },
        ].map((f, i, a) => (
          <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 16px', borderBottom:i<a.length-1?'1px solid rgba(232,154,58,0.06)':'none' }}>
            <div>
              <div style={{ fontFamily:'var(--mn)', fontSize:11, color:'var(--t2)', fontWeight:600, letterSpacing:'.04em' }}>{f.p}</div>
              <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--t4)', letterSpacing:'.08em', marginTop:1 }}>{f.label}</div>
            </div>
            <div style={{ fontFamily:'var(--mn)', fontSize:17, color:'var(--ice)', fontWeight:600, letterSpacing:'-0.01em' }}>{f.r.toFixed(4)}</div>
          </div>
        )) : (
          <div style={{ padding:'14px', display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
            <div className="dp"><span/><span/><span/></div>
            <span style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t4)' }}>Fetching FX rates…</span>
          </div>
        )}
      </div>
      {fx && <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--t4)', textAlign:'right', marginBottom:14, letterSpacing:'.08em' }}>UPDATED <span style={{ color:'var(--ice)' }}>{new Date(fx.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span></div>}

      <BriefNewsSection/>
    </div>
  );
}

// ─── Task row component used by Brief and TasksTab ──
// Supports two optional modes:
//   - bulkMode: when true, tap selects/deselects instead of marking done
//   - onLongPress: when set, holding the row 500ms triggers edit/select
function TaskRow({ task, bulkMode = false, selected = false, onSelect, onLongPress }) {
  const [confirmDel, setConfirmDel] = useState(false);
  const [pressing, setPressing] = useState(false);
  const pressTimer = useRef(null);
  const pressTriggered = useRef(false);

  const overdue = isOverdue(task);
  const today = isDueToday(task);
  const dueLabel = (() => {
    if (!task.due) return '';
    const d = new Date(task.due + 'T00:00');
    const now = new Date(); now.setHours(0,0,0,0);
    const diff = Math.round((d - now) / 864e5);
    if (diff === 0) return 'today' + (task.dueTime ? ' ' + task.dueTime : '');
    if (diff === 1) return 'tomorrow' + (task.dueTime ? ' ' + task.dueTime : '');
    if (diff === -1) return 'yesterday';
    if (diff < 0) return `${-diff}d overdue`;
    if (diff < 7) return d.toLocaleDateString('en-GB', { weekday: 'short' }).toLowerCase() + (task.dueTime ? ' ' + task.dueTime : '');
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  })();

  const toggle = () => {
    if (bulkMode) { onSelect && onSelect(task.id); haptic.tick(); return; }
    if (task.status === 'done') { uncompleteTask(task.id); haptic.tick(); }
    else { completeTask(task.id); haptic.success(); toast('Done · ' + task.title.slice(0,32), 'gn'); }
  };
  const snoozeOneDay = (e) => {
    e?.stopPropagation();
    const t = new Date(); t.setDate(t.getDate() + 1); t.setHours(9, 0, 0, 0);
    snoozeTask(task.id, t.toISOString());
    haptic.tick(); toast('Snoozed until tomorrow 9am', 'gold');
  };
  const del = (e) => {
    e?.stopPropagation();
    if (!confirmDel) { setConfirmDel(true); setTimeout(() => setConfirmDel(false), 3000); return; }
    deleteTask(task.id); haptic.warn(); toast('Task deleted', 'gold');
  };

  // Long-press handlers — only enabled when onLongPress callback is provided
  const handlePressStart = () => {
    if (!onLongPress) return;
    pressTriggered.current = false;
    setPressing(true);
    pressTimer.current = setTimeout(() => {
      pressTriggered.current = true;
      setPressing(false);
      haptic.warn();
      onLongPress(task.id);
    }, 500);
  };
  const handlePressEnd = () => {
    setPressing(false);
    if (pressTimer.current) { clearTimeout(pressTimer.current); pressTimer.current = null; }
  };
  const handleClick = () => {
    // Avoid firing tap-to-toggle if the long-press already triggered
    if (pressTriggered.current) { pressTriggered.current = false; return; }
    if (bulkMode) toggle();
  };

  const cls = [
    'tk-row',
    `prio-${task.priority}`,
    overdue ? 'is-overdue' : '',
    task.status === 'done' ? 'is-done' : '',
    bulkMode ? 'in-bulk' : '',
    selected ? 'bulk-selected' : '',
    pressing ? 'pressing' : '',
  ].filter(Boolean).join(' ');

  return (
    <div className={cls}
      onClick={bulkMode ? handleClick : undefined}
      onPointerDown={handlePressStart}
      onPointerUp={handlePressEnd}
      onPointerLeave={handlePressEnd}
      onPointerCancel={handlePressEnd}
    >
      <button className={`tk-check${task.status==='done'?' checked':''}${selected?' checked':''}`} onClick={(e) => { e.stopPropagation(); toggle(); }} aria-label={bulkMode ? (selected?'Deselect':'Select') : (task.status==='done'?'Mark open':'Mark done')}>
        {(task.status === 'done' || selected) && <ICheck size={13} color="#fff" sw={3}/>}
      </button>
      <div className="tk-body">
        <div className="tk-title">{task.title}</div>
        <div className="tk-meta">
          <span className={`tk-prio p-${task.priority}`}>{task.priority}</span>
          {dueLabel && <span className={`tk-due${overdue?' is-overdue':today?' is-today':''}`}>{dueLabel}</span>}
          {task.source && task.source.startsWith('mail:') && <span className="tk-snooze">from email</span>}
          {task.status === 'snoozed' && <span className="tk-snooze">snoozed</span>}
        </div>
      </div>
      {!bulkMode && (
        <div className="tk-actions">
          {task.status === 'open' && (
            <button className="tk-act" onClick={snoozeOneDay} aria-label="Snooze 1 day" title="Snooze 1 day">
              <IClose size={12} color="currentColor" sw={1.5}/>
            </button>
          )}
          <button className={`tk-act${confirmDel?' danger':''}`} onClick={del} aria-label="Delete" title={confirmDel?'Tap again to confirm':'Delete'}>
            <ITrash size={12} color="currentColor" sw={1.5}/>
          </button>
        </div>
      )}
    </div>
  );
}
const MTaskRow = React.memo(TaskRow);

// ═══════════════════════════════════════════════════════════════
// TASK EDIT — inline editor used when adding a new task or
// editing an existing one. No modal; expands in-place.
// ═══════════════════════════════════════════════════════════════
function TaskEdit({ task, onSave, onCancel }) {
  const isNew = !task?.id;
  const [title, setTitle] = useState(task?.title || '');
  const [notes, setNotes] = useState(task?.notes || '');
  const [priority, setPriority] = useState(task?.priority || 'med');
  const [due, setDue] = useState(task?.due || todayISO());
  const [dueTime, setDueTime] = useState(task?.dueTime || '');
  // Phase F — recurrence
  const [recur, setRecur] = useState(task?.recur || null);
  const setRecurType = (type) => {
    if (!type) { setRecur(null); return; }
    setRecur({
      type,
      days: recur?.days || (type === 'weekly' ? ['mon'] : []),
      times: recur?.times || (dueTime ? [dueTime] : []),
      endDate: recur?.endDate || null,
    });
  };
  const toggleRecurDay = (d) => {
    if (!recur) return;
    const days = recur.days?.includes(d) ? recur.days.filter(x => x !== d) : [...(recur.days || []), d];
    setRecur({ ...recur, days });
  };
  const updateRecurTime = (i, val) => {
    if (!recur) return;
    const times = [...(recur.times || [])];
    times[i] = val;
    setRecur({ ...recur, times });
  };
  const addRecurTime = () => {
    if (!recur) return;
    setRecur({ ...recur, times: [...(recur.times || []), '08:00'] });
  };
  const removeRecurTime = (i) => {
    if (!recur) return;
    setRecur({ ...recur, times: (recur.times || []).filter((_, j) => j !== i) });
  };
  const titleRef = useRef(null);

  useEffect(() => {
    // Focus the title input when the editor opens, but don't yank
    // scroll on mobile — passive focus only
    if (titleRef.current && isNew) {
      try { titleRef.current.focus({ preventScroll: true }); } catch {}
    }
  }, []);

  const setDueRel = (days) => {
    const d = new Date();
    d.setDate(d.getDate() + days);
    setDue(d.toISOString().slice(0, 10));
  };

  const save = () => {
    if (!title.trim()) { haptic.warn(); return; }
    // Phase F: clean up recur — drop empty times, drop empty days for weekly
    let cleanRecur = recur;
    if (cleanRecur) {
      const cleanedTimes = (cleanRecur.times || []).filter(t => t && /^\d{2}:\d{2}$/.test(t));
      cleanRecur = { ...cleanRecur, times: cleanedTimes };
      if (cleanRecur.type === 'weekly' && (!cleanRecur.days || cleanRecur.days.length === 0)) {
        cleanRecur.days = ['mon'];
      }
    }
    onSave({
      title: title.trim(),
      notes: notes.trim(),
      priority,
      due,
      dueTime: dueTime || null,
      recur: cleanRecur,
    });
  };

  return (
    <div className="tt-edit">
      <div className="tt-edit-row">
        <div className="tt-edit-l">Title</div>
        <input ref={titleRef} className="tt-edit-input" value={title}
          onChange={e => setTitle(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); save(); } }}
          placeholder="What needs doing, sir?" maxLength={200}/>
      </div>
      <div className="tt-edit-row">
        <div className="tt-edit-l">Priority</div>
        <div className="tt-edit-prio">
          {['high', 'med', 'low'].map(p => (
            <button key={p} className={priority === p ? `on-${p}` : ''} onClick={() => { setPriority(p); haptic.tick(); }}>
              {p}
            </button>
          ))}
        </div>
      </div>
      <div className="tt-edit-row">
        <div className="tt-edit-l">Due</div>
        <div className="tt-edit-due-row">
          <input className="tt-edit-input" type="date" value={due} onChange={e => setDue(e.target.value)}/>
          <input className="tt-edit-input" type="time" value={dueTime} onChange={e => setDueTime(e.target.value)} placeholder="optional"/>
        </div>
        <div className="tt-edit-quick">
          <button onClick={() => setDueRel(0)}>Today</button>
          <button onClick={() => setDueRel(1)}>Tomorrow</button>
          <button onClick={() => setDueRel(7)}>+1 week</button>
          <button onClick={() => setDueTime('')}>Clear time</button>
        </div>
      </div>
      <div className="tt-edit-row">
        <div className="tt-edit-l">Notes <span style={{ color:'var(--t4)', fontWeight:400 }}>(optional)</span></div>
        <textarea className="tt-edit-textarea" value={notes}
          onChange={e => setNotes(e.target.value)}
          placeholder="Anything else worth remembering…" rows={2} maxLength={1000}/>
      </div>
      {/* Phase F — recurrence */}
      <div className="tt-edit-row">
        <div className="tt-edit-l">Repeat</div>
        <div className="tt-edit-prio" style={{ flexWrap:'wrap' }}>
          {[
            { v: null,        l: 'Once' },
            { v: 'daily',     l: 'Daily' },
            { v: 'weekdays',  l: 'Weekdays' },
            { v: 'weekly',    l: 'Weekly' },
            { v: 'monthly',   l: 'Monthly' },
          ].map(o => {
            const active = (recur?.type ?? null) === o.v;
            return (
              <button key={o.l}
                className={active ? 'on-med' : ''}
                onClick={() => { setRecurType(o.v); haptic.tick(); }}>
                {o.l}
              </button>
            );
          })}
        </div>
      </div>
      {recur?.type === 'weekly' && (
        <div className="tt-edit-row">
          <div className="tt-edit-l">Days</div>
          <div className="tt-edit-prio" style={{ flexWrap:'wrap' }}>
            {['mon','tue','wed','thu','fri','sat','sun'].map(d => (
              <button key={d}
                className={recur.days?.includes(d) ? 'on-med' : ''}
                onClick={() => { toggleRecurDay(d); haptic.tick(); }}>
                {d.toUpperCase()}
              </button>
            ))}
          </div>
        </div>
      )}
      {recur && (
        <div className="tt-edit-row">
          <div className="tt-edit-l">Times <span style={{ color:'var(--t4)', fontWeight:400 }}>(0+ per day)</span></div>
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {(recur.times || []).map((t, i) => (
              <div key={i} style={{ display:'flex', gap:6, alignItems:'center' }}>
                <input className="tt-edit-input" type="time" value={t}
                  style={{ maxWidth:140 }}
                  onChange={e => updateRecurTime(i, e.target.value)}/>
                <button onClick={() => { removeRecurTime(i); haptic.tick(); }}
                  style={{ background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:6, padding:'6px 10px', color:'var(--t3)', cursor:'pointer', fontFamily:'var(--mn)', fontSize:11 }}>×</button>
              </div>
            ))}
            <button onClick={() => { addRecurTime(); haptic.tick(); }}
              style={{ background:'var(--bg3)', border:'1px dashed var(--bdr)', borderRadius:6, padding:'6px 10px', color:'var(--t3)', cursor:'pointer', fontFamily:'var(--mn)', fontSize:10, fontWeight:600, letterSpacing:'.06em', alignSelf:'flex-start' }}>
              + ADD TIME
            </button>
          </div>
        </div>
      )}
      <div className="tt-edit-actions">
        <button className="tt-edit-cancel" onClick={onCancel}>Cancel</button>
        <button className="tt-edit-save" onClick={save}>{isNew ? 'Add task' : 'Save changes'}</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TASKS TAB — Phase C centerpiece.
// Filter chips · sort · group · search · bulk select · inline edit · FAB
// ═══════════════════════════════════════════════════════════════
const TASKS_VIEW_KEY = 'j_tasks_view';
const loadView = () => sto.getJSON(TASKS_VIEW_KEY, {
  filter: 'open',           // all | open | overdue | today | week | done | snoozed
  sort: 'urgency',          // urgency | due | priority | created | title
  group: false,
});
const saveView = (v) => sto.setJSON(TASKS_VIEW_KEY, v);

function TasksTab({ urgency }) {
  const tasks = useStore('j_tasks', loadTasks);
  const [view, setView] = useState(loadView);
  const [search, setSearch] = useState('');
  const [searchOpen, setSearchOpen] = useState(false);
  const [showSort, setShowSort] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [creating, setCreating] = useState(false);
  const [bulkMode, setBulkMode] = useState(false);
  const [selected, setSelected] = useState(new Set());
  const sortBtnRef = useRef(null);

  // Persist view changes
  useEffect(() => { saveView(view); }, [view]);

  // Close sort menu when clicking outside
  useEffect(() => {
    if (!showSort) return;
    const onClick = (e) => {
      if (sortBtnRef.current && !sortBtnRef.current.contains(e.target)) setShowSort(false);
    };
    setTimeout(() => document.addEventListener('click', onClick), 0);
    return () => document.removeEventListener('click', onClick);
  }, [showSort]);

  // ─── Stats — same shape as urgency, recomputed locally for instant filter feedback
  const stats = useMemo(() => {
    const open = tasks.filter(isOpen);
    const todayStr = todayISO();
    return {
      open: open.length,
      overdue: open.filter(isOverdue).length,
      today: open.filter(isDueToday).length,
      doneWeek: tasks.filter(t => t.status === 'done' && t.doneAt && (Date.now() - t.doneAt) < 7*864e5).length,
    };
  }, [tasks]);

  // ─── Filter
  const filteredTasks = useMemo(() => {
    const q = search.trim().toLowerCase();
    let list = tasks;
    if (view.filter === 'open') list = list.filter(isOpen);
    else if (view.filter === 'overdue') list = list.filter(isOverdue);
    else if (view.filter === 'today') list = list.filter(t => isOpen(t) && isDueToday(t));
    else if (view.filter === 'week') {
      const wkEnd = new Date(); wkEnd.setDate(wkEnd.getDate() + 7);
      const wkEndISO = wkEnd.toISOString().slice(0, 10);
      list = list.filter(t => isOpen(t) && t.due <= wkEndISO);
    }
    else if (view.filter === 'done') list = list.filter(t => t.status === 'done');
    else if (view.filter === 'snoozed') list = list.filter(t => t.status === 'snoozed');
    if (q) list = list.filter(t =>
      (t.title || '').toLowerCase().includes(q) ||
      (t.notes || '').toLowerCase().includes(q)
    );
    return list;
  }, [tasks, view.filter, search]);

  // ─── Sort
  const sortedTasks = useMemo(() => {
    const list = [...filteredTasks];
    if (view.sort === 'urgency') list.sort(sortByUrgency);
    else if (view.sort === 'due') list.sort((a, b) => (a.due || '9999').localeCompare(b.due || '9999'));
    else if (view.sort === 'priority') list.sort((a, b) => priorityWeight(a.priority) - priorityWeight(b.priority));
    else if (view.sort === 'created') list.sort((a, b) => b.createdAt - a.createdAt);
    else if (view.sort === 'title') list.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
    return list;
  }, [filteredTasks, view.sort]);

  // ─── Group view computation
  const grouped = useMemo(() => {
    if (!view.group) return null;
    const today = todayISO();
    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
    const tomorrowStr = tomorrow.toISOString().slice(0, 10);
    const wkEnd = new Date(); wkEnd.setDate(wkEnd.getDate() + 7);
    const wkEndStr = wkEnd.toISOString().slice(0, 10);
    const groups = {
      overdue:  { label: 'Overdue', alert: true,  tasks: [] },
      today:    { label: 'Today',     alert: false, tasks: [] },
      tomorrow: { label: 'Tomorrow',  alert: false, tasks: [] },
      week:     { label: 'This week', alert: false, tasks: [] },
      later:    { label: 'Later',     alert: false, tasks: [] },
      none:     { label: 'No date',   alert: false, tasks: [] },
    };
    sortedTasks.forEach(t => {
      if (!t.due) groups.none.tasks.push(t);
      else if (isOpen(t) && t.due < today) groups.overdue.tasks.push(t);
      else if (t.due === today) groups.today.tasks.push(t);
      else if (t.due === tomorrowStr) groups.tomorrow.tasks.push(t);
      else if (t.due <= wkEndStr) groups.week.tasks.push(t);
      else groups.later.tasks.push(t);
    });
    return groups;
  }, [sortedTasks, view.group]);

  // ─── Bulk select handlers
  const toggleSelect = (id) => {
    setSelected(s => {
      const next = new Set(s);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };
  const enterBulk = (id) => {
    setBulkMode(true);
    if (id) setSelected(new Set([id]));
  };
  const exitBulk = () => { setBulkMode(false); setSelected(new Set()); };
  const bulkComplete = () => {
    selected.forEach(id => completeTask(id));
    haptic.success();
    toast(`${selected.size} marked done`, 'gn');
    exitBulk();
  };
  const bulkSnooze = () => {
    const t = new Date(); t.setDate(t.getDate() + 1); t.setHours(9, 0, 0, 0);
    selected.forEach(id => snoozeTask(id, t.toISOString()));
    haptic.tick();
    toast(`${selected.size} snoozed to tomorrow`, 'gold');
    exitBulk();
  };
  const bulkDelete = () => {
    selected.forEach(id => deleteTask(id));
    haptic.warn();
    toast(`${selected.size} deleted`, 'gold');
    exitBulk();
  };
  const bulkPriority = (p) => {
    selected.forEach(id => updateTask(id, { priority: p }));
    haptic.success();
    toast(`${selected.size} → ${p} priority`, 'gold');
    exitBulk();
  };

  // ─── Edit / create handlers
  const handleSaveNew = (data) => {
    addTask({ ...data, source: 'manual' });
    haptic.success();
    toast('Task added', 'gn');
    setCreating(false);
  };
  const handleSaveEdit = (data) => {
    updateTask(editingId, data);
    haptic.success();
    toast('Task updated', 'gn');
    setEditingId(null);
  };

  const filters = [
    { k: 'open',    l: 'Open',     n: stats.open },
    { k: 'overdue', l: 'Overdue',  n: stats.overdue },
    { k: 'today',   l: 'Today',    n: stats.today },
    { k: 'week',    l: 'Week',     n: tasks.filter(t => isOpen(t) && t.due <= new Date(Date.now()+7*864e5).toISOString().slice(0,10)).length },
    { k: 'snoozed', l: 'Snoozed',  n: tasks.filter(t => t.status === 'snoozed').length },
    { k: 'done',    l: 'Done',     n: tasks.filter(t => t.status === 'done').length },
    { k: 'all',     l: 'All',      n: tasks.length },
  ];
  const sortOptions = [
    { k: 'urgency',  l: 'Urgency (smart)' },
    { k: 'due',      l: 'Due date' },
    { k: 'priority', l: 'Priority' },
    { k: 'created',  l: 'Recently added' },
    { k: 'title',    l: 'Title (A→Z)' },
  ];

  const renderTask = (t) => {
    if (editingId === t.id) {
      return (
        <TaskEdit key={t.id} task={t}
          onSave={handleSaveEdit}
          onCancel={() => setEditingId(null)}
        />
      );
    }
    return (
      <MTaskRow key={t.id} task={t}
        bulkMode={bulkMode}
        selected={selected.has(t.id)}
        onSelect={toggleSelect}
        onLongPress={(id) => {
          if (bulkMode) toggleSelect(id);
          else setEditingId(id);
        }}
      />
    );
  };

  return (
    <div style={{ padding: '18px 14px 100px', position: 'relative', minHeight: 'calc(100vh - 140px)' }} className="fade">
      {/* ─── Header ─── */}
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontFamily: 'var(--hd)', fontSize: 26, fontWeight: 400 }}>
          <span style={{ color: 'var(--t2)' }}>Tasks</span> <span style={{ color: 'var(--gold)' }}>Centre</span>
        </div>
        <div style={{ fontFamily: 'var(--mn)', fontSize: 9, color: 'var(--t3)', letterSpacing: '.12em', marginTop: 3, fontWeight: 500 }}>
          {tasks.length} TOTAL · {stats.open} OPEN{stats.overdue > 0 ? ` · ${stats.overdue} OVERDUE` : ''}
        </div>
      </div>

      {/* ─── Sticky controls ─── */}
      <div className="tt-controls">
        {/* Stat strip */}
        <div className="tt-stats">
          <div className={`tt-stat${view.filter==='open'?' active':''}`} onClick={() => { setView({...view, filter:'open'}); haptic.tick(); }}>
            <div className="tt-stat-n">{stats.open}</div>
            <div className="tt-stat-l">Open</div>
          </div>
          <div className={`tt-stat${stats.overdue>0?' alert':''}${view.filter==='overdue'?' active':''}`} onClick={() => { setView({...view, filter:'overdue'}); haptic.tick(); }}>
            <div className="tt-stat-n">{stats.overdue}</div>
            <div className="tt-stat-l">Overdue</div>
          </div>
          <div className={`tt-stat${view.filter==='today'?' active':''}`} onClick={() => { setView({...view, filter:'today'}); haptic.tick(); }}>
            <div className="tt-stat-n">{stats.today}</div>
            <div className="tt-stat-l">Today</div>
          </div>
          <div className={`tt-stat${view.filter==='done'?' active':''}`} onClick={() => { setView({...view, filter:'done'}); haptic.tick(); }}>
            <div className="tt-stat-n">{stats.doneWeek}</div>
            <div className="tt-stat-l">Done 7d</div>
          </div>
        </div>

        {/* Filter chips */}
        <div className="tt-chips">
          {filters.map(f => (
            <button key={f.k} className={`tt-chip${view.filter===f.k?' on':''}`} onClick={() => { setView({...view, filter:f.k}); haptic.tick(); }}>
              {f.l}
              <span className="tt-chip-n">{f.n}</span>
            </button>
          ))}
        </div>

        {/* Tools row: search + group + sort */}
        <div className="tt-tools">
          <div className="tt-search">
            <ISearch size={13} color="var(--t3)" sw={2}/>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search tasks…"/>
            {search && (
              <button onClick={() => setSearch('')} style={{ background:'none', border:'none', color:'var(--t3)', cursor:'pointer', padding:0, display:'flex' }}>
                <IClose size={12} color="currentColor" sw={2}/>
              </button>
            )}
          </div>
          <button className={`tt-tool-btn${view.group?' on':''}`} onClick={() => { setView({...view, group:!view.group}); haptic.tick(); }} aria-label="Group" title="Toggle group view">
            <IFilter size={14} color="currentColor" sw={1.75}/>
          </button>
          <div ref={sortBtnRef} style={{ position:'relative' }}>
            <button className="tt-tool-btn" onClick={(e) => { e.stopPropagation(); setShowSort(s => !s); haptic.tick(); }} aria-label="Sort" title="Sort">
              <ISort size={14} color="currentColor" sw={2}/>
            </button>
            {showSort && (
              <div className="tt-sort-menu">
                {sortOptions.map(s => (
                  <div key={s.k} className={`tt-sort-item${view.sort===s.k?' on':''}`} onClick={() => { setView({...view, sort:s.k}); setShowSort(false); haptic.tick(); }}>
                    <span style={{ width:6, height:6, borderRadius:'50%', background: view.sort===s.k ? 'var(--gold)' : 'var(--bdr)' }}/>
                    {s.l}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ─── Inline create panel ─── */}
      {creating && (
        <TaskEdit
          onSave={handleSaveNew}
          onCancel={() => setCreating(false)}
        />
      )}

      {/* ─── Task list ─── */}
      {sortedTasks.length === 0 ? (
        <div className="tt-empty">
          <div className="tt-empty-i"><IList size={36} color="var(--t3)" sw={1.2}/></div>
          <div className="tt-empty-t">
            {search ? 'No matches' : view.filter === 'overdue' ? 'No overdue tasks' : view.filter === 'done' ? 'Nothing done yet' : 'Inbox zero on this filter'}
          </div>
          <div className="tt-empty-s">
            {search ? 'Try a different query, sir.' : view.filter === 'open' ? 'Tap + to add the first one.' : 'Switch filter or add a task.'}
          </div>
        </div>
      ) : view.group && grouped ? (
        Object.entries(grouped).map(([k, g]) => g.tasks.length === 0 ? null : (
          <div key={k}>
            <div className={`tt-group${g.alert ? ' alert' : ''}`}>
              <span className="tt-group-l">{g.label}</span>
              <span className="tt-group-c">{g.tasks.length}</span>
              <span className="tt-group-line"/>
            </div>
            {g.tasks.map(renderTask)}
          </div>
        ))
      ) : (
        sortedTasks.map(renderTask)
      )}

      {/* ─── Floating add button (hidden in bulk mode) ─── */}
      {!bulkMode && !creating && (
        <button className="tt-fab" onClick={() => { setCreating(true); haptic.tap(); }} aria-label="Add task">
          <IPlus size={24} color="#1a0e08" sw={2.75}/>
        </button>
      )}

      {/* ─── Bulk action bar ─── */}
      {bulkMode && (
        <div className="tt-bulk-bar">
          <div className="tt-bulk-count">{selected.size} selected</div>
          <button className="tt-bulk-act" onClick={bulkComplete} disabled={selected.size === 0} title="Mark done">
            <ICheck size={11} color="currentColor" sw={2.5}/> Done
          </button>
          <button className="tt-bulk-act" onClick={bulkSnooze} disabled={selected.size === 0} title="Snooze">
            <IClose size={11} color="currentColor" sw={2}/> Snooze
          </button>
          <button className="tt-bulk-act danger" onClick={bulkDelete} disabled={selected.size === 0} title="Delete">
            <ITrash size={11} color="currentColor" sw={2}/> Del
          </button>
          <button className="tt-bulk-close" onClick={exitBulk} aria-label="Cancel bulk">
            <IClose size={14} color="var(--t2)" sw={2}/>
          </button>
        </div>
      )}

      {/* ─── Long-press hint when there are tasks but no edit/bulk yet ─── */}
      {sortedTasks.length > 0 && !bulkMode && !editingId && !creating && (
        <div style={{ marginTop: 18, padding: '10px 14px', textAlign: 'center', fontFamily: 'var(--mn)', fontSize: 9, color: 'var(--t4)', fontStyle: 'italic', letterSpacing: '.04em', borderTop: '1px dashed var(--bdr)', paddingTop: 14 }}>
          Long-press a task to edit · Tap + to add new
        </div>
      )}

      {/* Quick bulk-mode entry button below the controls if any selected */}
      {!bulkMode && sortedTasks.length > 1 && (
        <div style={{ marginTop: 10, textAlign: 'center' }}>
          <button onClick={() => { setBulkMode(true); haptic.tap(); }}
            style={{ background: 'transparent', border: '1px dashed var(--bdr)', borderRadius: 13, padding: '5px 12px', color: 'var(--t3)', fontFamily: 'var(--mn)', fontSize: 9.5, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', cursor: 'pointer' }}>
            Bulk select mode
          </button>
        </div>
      )}
    </div>
  );
}

// MORE SHEET — overflow menu accessible from header
// Used to keep the bottom nav clean while still surfacing tabs that
// are visited rarely (currently: Brain).
// ═══════════════════════════════════════════════════════════════
function MoreSheet({ close, moreTabs, currentTab, onPickTab }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') close(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [close]);
  return (
    <div className="more-sheet" onClick={e => e.target === e.currentTarget && close()}>
      <div className="more-panel">
        {moreTabs.map(({ id, I, l }) => (
          <div key={id} className={`more-item${currentTab === id ? ' on' : ''}`} onClick={() => onPickTab(id)}>
            <I size={16} color={currentTab === id ? 'var(--gold)' : 'var(--t2)'} sw={1.75}/>
            <span>{l}</span>
          </div>
        ))}
        <div className="more-divider"/>
        <div className="more-item" onClick={close}>
          <IClose size={14} color="var(--t3)" sw={2}/>
          <span style={{ color: 'var(--t3)' }}>Close</span>
        </div>
      </div>
    </div>
  );
}

    { id: 'business', label: 'Markets' },
    { id: 'technology', label: 'Tech' },
    { id: 'search:middle east israel gaza', label: 'Middle East' },
    { id: 'science', label: 'Science' },
    { id: 'search:ukraine russia war', label: 'Ukraine' },
    { id: 'search:switzerland geneva', label: 'Swiss' },
  ];
  const cacheKeyFor = (c) => `j_news_${c.startsWith('search:') ? c.replace('search:', '') : c}`;
  const [cat, setCat] = useState('general');
  // Seed news synchronously from cache so there's no flash of "NO ARTICLES"
  // when the tab first mounts. If no cache, null → loading spinner instead.
  const [news, setNews] = useState(() => sto.getJSON(cacheKeyFor('general'), null));
  const [loading, setLoading] = useState(false);
  const hasKey = !!sto.get('j_nk');

  const loadNews = async (category, force = false) => {
    // Instantly seed UI from cache for this category (no flash when swapping tabs/cats)
    const pre = sto.getJSON(cacheKeyFor(category), null);
    if (pre) setNews(pre);
    setLoading(true);
    const result = category.startsWith('search:')
      ? await fetchNews(null, category.replace('search:', ''), force)
      : await fetchNews(category, null, force);
    // Never overwrite good articles with an empty/error result.
    // If the fetch returned nothing useful but we had articles, keep them
    // and attach a stale warning so Felix knows the refresh didn't land.
    setNews(prev => {
      if (result.articles?.length > 0) return result;
      if (prev?.articles?.length > 0)  return { ...prev, err: result.err, staleWarn: true };
      return result;
    });
    setLoading(false);
  };

  useEffect(() => { if (hasKey) loadNews(cat); }, [cat]);

  const ago = (iso) => {
    const d = (Date.now() - new Date(iso).getTime()) / 60000;
    if (d < 60) return Math.round(d) + 'm ago';

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
        <div>
          <div style={{ fontFamily:'var(--display)', fontSize:30, fontWeight:300, letterSpacing:'-0.01em' }}>
            <span style={{ color:'var(--t2)' }}>News</span> <span style={{ color:'var(--blue)' }}>Feed</span>

        </div>
        <button onClick={() => { haptic.tick(); loadNews(cat, true); }} aria-label="Refresh"
          style={{ background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:8, width:34, height:34, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IRefresh size={14} color={loading?'var(--t4)':'var(--blue)'} sw={2}/>
        </button>
      </div>

      <div className="sx" style={{ display:'flex', gap:5, paddingBottom:12 }}>
        {categories.map((c) => (
          <button key={c.id} className="pl" onClick={()=>{ haptic.tick(); setCat(c.id); }}
            style={cat===c.id ? { borderColor:'var(--blue)', color:'var(--blue)', background:'rgba(59,130,246,0.07)' } : {}}>
            {c.label}
          </button>
        ))}
      </div>

      {loading && !news ? (
        <div style={{ textAlign:'center', padding:40 }}>
          <div className="dp"><span/><span/><span/></div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t4)', marginTop:10 }}>Scanning feeds…</div>
        </div>
      ) : news?.articles?.length > 0 ? (
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {news.staleWarn && (
            <div className="news-stale">

          {news.articles[0] && (

              <div className="hud news-card glow-red" style={{ overflow:'hidden' }}>

                  <div style={{ width:'100%', height:160, background:`url(${news.articles[0].image}) center/cover`, position:'relative' }}>
                    <div style={{ position:'absolute', inset:0, background:'linear-gradient(transparent 40%, var(--bg2))' }}/>
