// ═══════════════════════════════════════════════════════════════
// STORAGE — in-memory fallback + reactive event bus
// ═══════════════════════════════════════════════════════════════
const _mem = {};
const sto = {
  get: (k) => { try { return localStorage.getItem(k); } catch { return _mem[k] ?? null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch { _mem[k] = v; } },
  del: (k) => { try { localStorage.removeItem(k); } catch { delete _mem[k]; } },
  getJSON: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  setJSON: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch { _mem[k] = JSON.stringify(v); } bus.emit(k); },
};

const listeners = {};
const bus = {
  on: (key, fn) => { (listeners[key] = listeners[key] || new Set()).add(fn); return () => listeners[key]?.delete(fn); },
  emit: (key) => { listeners[key]?.forEach(fn => { try { fn(); } catch {} }); },
};

const useStore = (key, loader) => {
  const [val, setVal] = useState(loader);
  useEffect(() => bus.on(key, () => setVal(loader())), [key]);
  useEffect(() => {
    const onStorage = (e) => { if (e.key === key) setVal(loader()); };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, [key]);
  return val;
};

// ═══════════════════════════════════════════════════════════════
// TAG PARSING — brace-walking parser (handles arrays inside JSON)
// ═══════════════════════════════════════════════════════════════
const extractTag = (text, tagName) => {
  const results = [];
  const re = new RegExp(`\\[\\[${tagName}:`, 'g');
  let m;
  while ((m = re.exec(text)) !== null) {
    const start = m.index + m[0].length;
    let depth = 0, i = start, inStr = false, esc = false, started = false;
    for (; i < text.length; i++) {
      const c = text[i];
      if (esc) { esc = false; continue; }
      if (c === '\\') { esc = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c === '{') { depth++; started = true; }
      else if (c === '}') { depth--; if (started && depth === 0) { i++; break; } }
    }
    if (depth === 0 && text.slice(i, i+2) === ']]') {
      try { results.push(JSON.parse(text.slice(start, i))); } catch {}
    }
  }
  return results;
};
const parseEvents = (text) => extractTag(text, 'EVENT');
const parseNotes = (text) => extractTag(text, 'NOTE');

const stripTags = (text) => {
  let out = '', i = 0;
  while (i < text.length) {
    const mEv = text.indexOf('[[EVENT:', i);
    const mNt = text.indexOf('[[NOTE:', i);
    const next = (mEv !== -1 && (mNt === -1 || mEv < mNt)) ? { idx: mEv, len: 8 } :
                 (mNt !== -1) ? { idx: mNt, len: 7 } : null;
    if (!next) { out += text.slice(i); break; }
    out += text.slice(i, next.idx);
    let j = next.idx + next.len, depth = 0, inStr = false, esc = false, started = false;
    for (; j < text.length; j++) {
      const c = text[j];
      if (esc) { esc = false; continue; }
      if (c === '\\') { esc = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c === '{') { depth++; started = true; }
      else if (c === '}') { depth--; if (started && depth === 0) { j++; break; } }
    }
    if (text.slice(j, j+2) === ']]') j += 2;
    i = j;
  }
  return out.replace(/\n{3,}/g, '\n\n').trim();
};

const fetchGCal = async (token) => {
  const past = new Date(Date.now() - 30 * 864e5).toISOString();
  const end = new Date(Date.now() + 90 * 864e5).toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(past)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime&maxResults=250`;
  try {
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { sto.del('j_gtoken'); sto.del('j_gtoken_exp'); return { events: [], expired: true }; }
    if (!res.ok) return { events: [], expired: false };
    const d = await res.json();
    const events = (d.items || []).map(ev => ({
      id: 'g_' + ev.id,
      title: ev.summary || '(No title)',
      date: (ev.start.dateTime || ev.start.date || '').slice(0, 10),
      time: ev.start.dateTime ? ev.start.dateTime.slice(11, 16) : '00:00',
      endTime: ev.end?.dateTime ? ev.end.dateTime.slice(11, 16) : '',
      notes: ev.location || (ev.description ? ev.description.slice(0, 80) : ''),
      src: 'google'
    }));
    return { events, expired: false };
  } catch { return { events: [], expired: false }; }
};

// ═══════════════════════════════════════════════════════════════
const fetchPrice = async (symbol, key, force = false) => {
  const cache = loadPriceCache();
  const cached = cache[symbol];
  if (!force && cached && Date.now() - cached.ts < CACHE_TTL) return cached;
  try {
    const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${encodeURIComponent(symbol)}&apikey=${key}`);
    const d = await res.json();
    const q = d['Global Quote'];
    if (!q || !q['05. price']) return cached || null;
    const priceData = {
      price: parseFloat(q['05. price']),
      change: parseFloat(q['09. change']) || 0,
      changePct: parseFloat((q['10. change percent'] || '0').replace('%','')) || 0,
      ts: Date.now()
    };
    cache[symbol] = priceData;
    savePriceCache(cache);
    return priceData;
  } catch { return cached || null; }
};

// ═══════════════════════════════════════════════════════════════
// GEMINI — with retry
// ═══════════════════════════════════════════════════════════════
const callGemini = async (key, messages, useSearch = false, attempt = 1) => {
  const body = {
    contents: messages.map(m => ({ role: m.r === 'u' ? 'user' : 'model', parts: [{ text: m.t }] })),
    generationConfig: { maxOutputTokens: 2048, temperature: 0.7 }
  };
  if (useSearch) body.tools = [{ google_search: {} }];
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const d = await res.json();
    if (!res.ok) {
      if (res.status >= 500 && attempt < 2) {
        await new Promise(r => setTimeout(r, 800));
        return callGemini(key, messages, useSearch, attempt + 1);
      }
      return { text: `⚠ ${d.error?.message || 'API error ' + res.status}`, sources: [] };
    }
    let sources = [];
    try {
      const gm = d.candidates?.[0]?.groundingMetadata;
      if (gm?.groundingChunks) {
        sources = gm.groundingChunks.filter(c => c.web?.uri)
          .map(c => ({ title: c.web.title || new URL(c.web.uri).hostname, url: c.web.uri }))
          .slice(0, 6);
      }
      if (sources.length === 0 && gm?.searchEntryPoint?.renderedContent) {
        const urls = [...(gm.searchEntryPoint.renderedContent.matchAll(/href="([^"]+)"/g))];
        sources = urls.map(m => { try { return { title: new URL(m[1]).hostname, url: m[1] }; } catch { return null; } }).filter(Boolean).slice(0, 4);
      }
    } catch {}
    const text = d.candidates?.[0]?.content?.parts?.map(p => p.text).filter(Boolean).join('') || 'No response.';
    return { text, sources };
  } catch (e) {
    if (attempt < 2) {
      await new Promise(r => setTimeout(r, 600));
      return callGemini(key, messages, useSearch, attempt + 1);
    }
    return { text: '⚠ Connection failed, sir. Check your network.', sources: [] };
  }
};

const getSYS = () => {
  const today = new Date();
  const todayStr = today.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const todayISO = today.toISOString().slice(0, 10);
  const hour = today.getHours();
  const tod = hour < 5 ? 'late night' : hour < 11 ? 'morning' : hour < 14 ? 'midday' : hour < 18 ? 'afternoon' : hour < 22 ? 'evening' : 'night';
  const tomorrowISO = new Date(today.getTime() + 864e5).toISOString().slice(0, 10);

  const brain = loadBrain().slice(0, 20);
  const brainContext = brain.length
    ? '\n\nRecent Brain entries (things Felix asked you to remember):\n' + brain.map(b => `- ${b.title}${b.comment ? ' — ' + b.comment : ''}`).join('\n')
    : '';

  const evs = loadEvents();
  const now = Date.now();
  const upcoming = evs.filter(e => {
    const t = new Date(e.date + 'T' + (e.time || '00:00')).getTime();
    return t >= now && t < now + 7 * 864e5;
  }).slice(0, 5);
  const upcomingStr = upcoming.length
    ? '\n\nUpcoming next 7 days: ' + upcoming.map(e => `${e.date} ${e.time} ${e.title}`).join('; ')
    : '';

  const w = sto.getJSON('j_weather', null);
  const weatherStr = w ? `\nCurrent Geneva weather: ${w.temp}°C (${w.desc}), rain next 12h: ${w.rainProb}%.` : '';

  return `You are J.A.R.V.I.S. — Felix's personal AI assistant. Modeled after Tony Stark's AI: intelligent, dry British wit, unflappably competent. Address him as "sir" occasionally, not in every message.

RESPONSE STYLE: Thorough, helpful, conversational. For simple questions, be concise (1–3 sentences). For complex topics (news, market analysis, technical), give detailed responses with context and actionable takeaways. Don't artificially limit length.

Today is ${todayStr} (${todayISO}). It is currently ${tod} in Geneva.${weatherStr}

Felix: Network financial analyst at MSC Air Cargo, Geneva. French resident, Massongy 74140. Engaged to Mélanie. Commutes ~45min Massongy → Chêne-Bougerie (leaves 7:45am / 5:45pm). Investments: Accenture, World ETF, SP500 ETF, Europe ETF, gold. PEA + assurance vie. Watches CHF/EUR/USD, fuel prices. Marathon Nov 8 2026, Lake Maggiore. Follows Middle East news closely. Tends to forget things and is actively working to become more structured — help him stay on top of things.${brainContext}${upcomingStr}

CRITICAL — STRUCTURED ACTIONS (the app parses these silently):

When Felix mentions anything with a date/time (meeting, dinner, appointment, reminder, task, call), append at the END of your response EXACTLY:
[[EVENT:{"title":"Short title","date":"YYYY-MM-DD","time":"HH:MM","notes":"optional"}]]

Example: "dinner tomorrow at 8pm" on ${todayISO} → append [[EVENT:{"title":"Dinner","date":"${tomorrowISO}","time":"20:00","notes":""}]]

When Felix says "remember"/"log"/"note"/"save" — OR mentions something worth remembering — append:
[[NOTE:{"title":"Short summary","tags":["tag1","tag2"],"comment":"optional context"}]]

AUTO-MEMORY: even without "remember", save when Felix:
- mentions someone told/shared/recommended something
- shares an idea, insight, plan, decision
- mentions Mélanie said/asked something
- discusses changes in work/investments/projects
- mentions new info about people

Do NOT save trivial exchanges. Only save things with future value.

Rules:
- "tonight" = today. "tomorrow" = today+1. "next Monday" = upcoming Monday.
- If no time given, use "00:00".
- Confirm in natural language BEFORE the tag.
- ALWAYS include the tag when appropriate — the system depends on it.
- Never mention or display the tags themselves.
- One reply can contain multiple tags.`;
};

// ═══════════════════════════════════════════════════════════════
// NOTIFICATIONS / REMINDERS
// ═══════════════════════════════════════════════════════════════
const scheduleLocalNotifications = async () => {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  const reg = await navigator.serviceWorker.ready;
  const now = new Date();
  const t7am = new Date(now); t7am.setHours(7, 0, 0, 0);
  const t7pm = new Date(now); t7pm.setHours(19, 0, 0, 0);
  const tom7am = new Date(t7am); tom7am.setDate(tom7am.getDate() + 1);

  const morning = (now < t7am ? t7am : tom7am).getTime() - now.getTime();
  const evening = now < t7pm ? t7pm.getTime() - now.getTime() : -1;

  const w = sto.getJSON('j_weather', null);
  const upcoming = loadEvents().filter(e => e.date === now.toISOString().slice(0,10)).length;
  const morningBody = [
    w ? `${w.temp}°C · ${w.desc}` : null,
    upcoming ? `${upcoming} event${upcoming>1?'s':''} today` : null,
    'Briefing ready.'
  ].filter(Boolean).join(' · ');

  reg.active?.postMessage({
    type: 'SCHEDULE_NOTIFICATIONS',
    morning, evening,
    briefingData: {
      morning: morningBody,
      evening: 'Evening summary ready, sir. Review today and plan tomorrow.'
    }
  });
};

const scheduleReminder = async (ev) => {
  if (!('serviceWorker' in navigator) || Notification.permission !== 'granted') return;
  const when = new Date(ev.date + 'T' + (ev.time || '09:00')).getTime();
  const delay = when - Date.now() - 10 * 60 * 1000;
  if (delay <= 0 || delay > 14 * 864e5) return;
  const reg = await navigator.serviceWorker.ready;
  reg.active?.postMessage({
    type: 'SCHEDULE_REMINDER',
    id: ev.id, delay,
    title: 'J.A.R.V.I.S. · ' + ev.title,
    body: `In 10 min${ev.time && ev.time !== '00:00' ? ' at ' + ev.time : ''}${ev.notes ? ' · ' + ev.notes : ''}`
  });
};

const haptic = {
  tap: () => { try { navigator.vibrate?.(8); } catch {} },
  tick: () => { try { navigator.vibrate?.(4); } catch {} },
  success: () => { try { navigator.vibrate?.([12, 40, 12]); } catch {} },
  warn: () => { try { navigator.vibrate?.([40, 30, 40]); } catch {} },
};

const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
const useVoice = (onResult) => {
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);
  const start = useCallback(() => {
    if (!SpeechRec) return false;
    try {
      const r = new SpeechRec();
      r.lang = navigator.language || 'en-GB';
      r.interimResults = false;
      r.maxAlternatives = 1;
      r.continuous = false;
      r.onresult = (e) => { const txt = e.results?.[0]?.[0]?.transcript; if (txt) onResult(txt); };
      r.onerror = () => setListening(false);
      r.onend = () => setListening(false);
      r.start();
      recRef.current = r;
      setListening(true);
      haptic.tick();
      return true;
    } catch { setListening(false); return false; }
  }, [onResult]);
  const stop = useCallback(() => { try { recRef.current?.stop(); } catch {} setListening(false); }, []);
  return { listening, start, stop, supported: !!SpeechRec };
};

const toastBus = { listeners: new Set() };
const toast = (msg, kind = 'gold') => { toastBus.listeners.forEach(fn => fn({ id: uid(), msg, kind, at: Date.now() })); };

// BOOT SEQUENCE
// ═══════════════════════════════════════════════════════════════
function Boot({ onDone }) {
  const [leaving, setLeaving] = useState(false);
  useEffect(() => {
    const t1 = setTimeout(() => setLeaving(true), 2500);
    const t2 = setTimeout(() => onDone(), 2900);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [onDone]);
  const skip = () => { setLeaving(true); setTimeout(onDone, 300); };
  const greeting = (() => {
    const h = new Date().getHours();
    return h < 5 ? 'STANDING BY, SIR' : h < 12 ? 'GOOD MORNING, SIR' : h < 18 ? 'GOOD AFTERNOON, SIR' : 'GOOD EVENING, SIR';
  })();
  return (
    <div className={`boot${leaving ? ' out' : ''}`} onClick={skip}>
      <div className="boot-lines"/>
      <div className="boot-reactor"><div className="boot-core"/></div>
      <div className="boot-text">J.A.R.V.I.S.</div>
      <div className="boot-sub">SYSTEMS ONLINE</div>
      <div className="boot-ready">{greeting}</div>
      <div className="boot-skip">TAP TO CONTINUE</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TOAST HOST
// ═══════════════════════════════════════════════════════════════
function ToastHost() {
  const [items, setItems] = useState([]);
  useEffect(() => {
    const add = (t) => {
      setItems(prev => [...prev, t]);
      setTimeout(() => setItems(prev => prev.map(p => p.id === t.id ? { ...p, leaving: true } : p)), 2400);
      setTimeout(() => setItems(prev => prev.filter(p => p.id !== t.id)), 2800);
    };
    toastBus.listeners.add(add);
    return () => toastBus.listeners.delete(add);
  }, []);
  return (
    <div className="toast-stack">
      {items.map(t => (
        <div key={t.id} className={`toast ${t.kind}${t.leaving?' leave':''}`}>
          {t.kind === 'gn' ? <ICheck size={12} color="var(--gn)" sw={2.5}/> :
           t.kind === 'red' ? <IZap size={12} color="var(--redHot)" sw={2}/> :
           <IZap size={12} color="var(--gold)" sw={2}/>}
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

// Weather chip used in chat strip
function WeatherChip() {
  const [w, setW] = useState(sto.getJSON('j_weather', null));
  useEffect(() => {
    fetchWeather().then(d => d && setW(d));
    const iv = setInterval(()=>fetchWeather().then(d => d && setW(d)), WX_CACHE_TTL);
    return () => clearInterval(iv);
  }, []);
  if (!w) return null;
  const Icon = w.code <= 1 ? ISun : (w.code >= 51 && w.code <= 82) ? IRain : ICloud;
  return (
    <div className="hud" style={{ minWidth:84, padding:'8px 10px', flexShrink:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:4 }}>
        <Icon size={10} color="var(--gold)" sw={1.75}/>

      </div>
      <div style={{ fontFamily:'var(--hd)', fontSize:22, fontWeight:300, lineHeight:1, marginTop:2 }}>{w.temp}°</div>
      <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--t3)', marginTop:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{w.desc}</div>

  );
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════
function Jarvis() {
  const initialTab = (() => {
    try {
      const p = new URLSearchParams(location.search).get('tab');
      const valid = ['chat','home','news','finance','calendar','brain','marathon'];
      return valid.includes(p) ? p : 'chat';
    } catch { return 'chat'; }
  })();

  const [booted, setBooted] = useState(sessionStorage.getItem('j_booted') === '1');
  const [tab, setTabState] = useState(initialTab);
  const [time, setTime] = useState(new Date());
  const [showSet, setShowSet] = useState(false);
  const [hasKey, setHasKey] = useState(!!sto.get('j_gk'));
  const [gToken, setGToken] = useState(null);
  const [gEvents, setGEvents] = useState([]);
  const [online, setOnline] = useState(navigator.onLine);
  const tokenRef = useRef(null);

  const setTab = useCallback((t) => { haptic.tap(); bumpTab(t); setTabState(t); }, []);

  useEffect(() => { const t = setInterval(() => setTime(new Date()), 30000); return () => clearInterval(t); }, []);

  useEffect(() => {
    const on = () => { setOnline(true); toast('Network online', 'gn'); };
    const off = () => { setOnline(false); toast('Network offline', 'red'); };
    window.addEventListener('online', on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);

  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  }, []);

  useEffect(() => { if (booted) { try { sessionStorage.setItem('j_booted', '1'); } catch {} } }, [booted]);

  // Google OAuth
  useEffect(() => {
    const savedToken = sto.get('j_gtoken');
    const savedExp = parseInt(sto.get('j_gtoken_exp') || '0');
    if (savedToken && Date.now() < savedExp) setGToken(savedToken);

    const init = () => {
      if (window.google?.accounts?.oauth2) {
        tokenRef.current = window.google.accounts.oauth2.initTokenClient({
          client_id: GCID, scope: GSCOPE,
          callback: (resp) => {
            if (resp.access_token) {
              setGToken(resp.access_token);
              sto.set('j_gtoken', resp.access_token);
              sto.set('j_gtoken_exp', String(Date.now() + (resp.expires_in || 3600) * 1000));
              toast('Google Calendar linked', 'gn');
              haptic.success();
            }
          }
        });
        if (!savedToken || Date.now() >= savedExp) {
          try { tokenRef.current.requestAccessToken({ prompt: '' }); } catch {}
        }
      }
    };
    const iv = setInterval(() => { if (window.google) { init(); clearInterval(iv); } }, 500);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (!gToken) { setGEvents([]); return; }
    const run = () => fetchGCal(gToken).then(({ events, expired }) => {
      if (expired) { setGToken(null); toast('Google session expired — tap ⚙️ to re-link', 'red'); }
      else setGEvents(events);
    });
    run();
    const iv = setInterval(run, 5 * 60000);
    return () => clearInterval(iv);
  }, [gToken]);

  useEffect(() => { scheduleLocalNotifications(); }, []);

  const signIn = () => tokenRef.current?.requestAccessToken({ prompt: 'consent' });
  const signOut = () => {
    if (gToken) try { window.google?.accounts?.oauth2?.revoke(gToken); } catch {}
    setGToken(null);
    sto.del('j_gtoken');
    sto.del('j_gtoken_exp');
    toast('Google disconnected', 'gold');
  };

  const raceDate = new Date('2026-11-08T00:00:00');
  const rawDtr = Math.ceil((raceDate - time) / 864e5);
  const dtr = Math.max(rawDtr, 0);
  const raceDone = rawDtr <= 0;

  const h = time.getHours();
  const gr = h < 5 ? 'Late night' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';

  const tabs = [
    { id:'chat', I:IChat, l:'Chat' },
    { id:'home', I:IHome, l:'Brief' },
    { id:'news', I:INews, l:'News' },
    { id:'finance', I:ITrend, l:'Fin' },
    { id:'calendar', I:ICal, l:'Cal' },
    { id:'brain', I:IBrain, l:'Brain' },
    { id:'marathon', I:IRun, l:'Run' },
  ];

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape' && showSet) setShowSet(false); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showSet]);

  if (!booted) {
    return (<><style>{CSS}</style><Boot onDone={() => setBooted(true)}/></>);
  }

  return (
    <div className="app">
      <style>{CSS}</style>
      <div className="hud-frame"><span/><span/><span/><span/></div>

      <header className="hdr">
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div className="reactor" aria-hidden="true"/>
          <div>
            <div className="hdr-t">Jarvis</div>
            <div className="hdr-sub">
              {time.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })} · {time.toTimeString().slice(0,5)}
            </div>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', display:'flex', alignItems:'center', gap:4, fontWeight:500 }}>
            <span style={{ width:5, height:5, borderRadius:'50%', background: !online ? 'var(--redHot)' : hasKey ? 'var(--gn)' : 'var(--warn)', boxShadow:`0 0 6px ${!online?'var(--redHot)':hasKey?'var(--gn)':'var(--warn)'}`, animation:'pg 2s infinite' }}/>
            {!online ? 'OFFLINE' : hasKey ? 'ONLINE' : 'STANDBY'}
          </div>
          <button onClick={()=>{ haptic.tap(); setShowSet(true); }} aria-label="Settings"
            style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:8, padding:6, cursor:'pointer', display:'flex', position:'relative' }}>
            <IGear size={14} color="var(--gold)" sw={1.5}/>
            {!hasKey && <div style={{ position:'absolute', top:-2, right:-2, width:6, height:6, background:'var(--gold)', borderRadius:'50%', boxShadow:'0 0 6px var(--gold)', animation:'pg 2s infinite' }}/>}
          </button>
        </div>
      </header>

      <div className="content fade" key={tab}>
        {tab==='chat' && <ChatTab gr={gr} dtr={dtr} raceDone={raceDone} gEvents={gEvents}/>}
        {tab==='home' && <BriefTab gr={gr} dtr={dtr} raceDone={raceDone} gEvents={gEvents} gToken={gToken}/>}
        {tab==='news' && <NewsTab/>}
        {tab==='finance' && <FinTab/>}
        {tab==='calendar' && <CalTab gToken={gToken} gEvents={gEvents}/>}
        {tab==='brain' && <BrainTab/>}
        {tab==='marathon' && <RunTab days={dtr} raceDone={raceDone} gEvents={gEvents} gToken={gToken}/>}
      </div>

      <nav className="nav">
        <div className="nav-in">
          {tabs.map(({id, I, l}) => (
            <button key={id} className={`nb${tab===id?' on':''}`} onClick={()=>setTab(id)} aria-label={l}>
              <I size={15} color={tab===id?'var(--gold)':'var(--t4)'} sw={tab===id?2:1.5}/>
              <span className="nl" style={{ color:tab===id?'var(--gold)':'var(--t4)' }}>{l}</span>
            </button>
          ))}
        </div>
      </nav>

      {showSet && <SetPanel
        close={()=>{ setShowSet(false); setHasKey(!!sto.get('j_gk')); }}
        gToken={gToken} onSignIn={signIn} onSignOut={signOut}
      />}

      <ToastHost/>
    </div>
  );
}

function SetPanel({ close, gToken, onSignIn, onSignOut }) {

  const [ak, setAk] = useState(sto.get('j_ak') || '');

  const [sn, setSn] = useState(false);
  const [ok, setOk] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [notifPerm, setNotifPerm] = useState(typeof Notification !== 'undefined' ? Notification.permission : 'default');

  const save = () => {
    if (gk.trim()) sto.set('j_gk', gk.trim()); else sto.del('j_gk');
    if (ak.trim()) sto.set('j_ak', ak.trim()); else sto.del('j_ak');
    if (nk.trim()) sto.set('j_nk', nk.trim()); else sto.del('j_nk');
    setOk(true);
    haptic.success();
    toast('Configuration saved', 'gn');
    setTimeout(() => { setOk(false); close(); }, 900);
  };

  const requestNotif = async () => {
    if (!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    setNotifPerm(perm);
    if (perm === 'granted') {
      scheduleLocalNotifications();
      haptic.success();
      try { new Notification('Jarvis activated', { body: 'Briefings scheduled for 7:00 and 19:00, sir.', icon: 'jarvis-icon.svg' }); } catch {}
    }
  };

  const exportData = () => {
    const data = {
      version: 3,
      exportedAt: new Date().toISOString(),
      events: loadEvents(),
      brain: loadBrain(),
      portfolio: loadPortfolio(),
      chat: loadChat(),
      usage: loadUsage(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `jarvis-backup-${new Date().toISOString().slice(0,10)}.json`;

              <IBell size={14} color="var(--warn)" sw={1.75}/>
              <span style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--warn)', fontWeight:700 }}>NOTIFICATIONS ACTIVE</span>

              <div style={{ fontSize:11, color:'var(--t3)', marginTop:4 }}>Enable in your browser's site settings.</div>

            </button>

          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:6 }}>

        <button onClick={save} className="svb"

          {ok ? <><ICheck size={16} color="#fff" sw={2.5}/> Systems Updated</> : 'Save Configuration'}

      </div>
    </div>
  );
}

// CHAT TAB — voice input, persistent, retry, clear
// ═══════════════════════════════════════════════════════════════
function ChatTab({ gr, dtr, raceDone, gEvents }) {
  const loadInitial = () => {
    const saved = loadChat();
    if (saved.length) return saved;
    return [{ r:'a', t:`${gr}, sir. All systems operational. How may I assist?`, ts:new Date().toTimeString().slice(0,5), sources:[], id: uid() }];
  };
  const [msgs, setMsgs] = useState(loadInitial);
  const [inp, setInp] = useState('');
  const [ld, setLd] = useState(false);
  const [savedMsgs, setSavedMsgs] = useState({});
  const er = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { saveChat(msgs); }, [msgs]);
  useEffect(() => { er.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs, ld]);
  useEffect(() => { setTimeout(() => inputRef.current?.focus({ preventScroll: true }), 100); }, []);

  const voice = useVoice((txt) => { setInp(prev => (prev ? prev + ' ' : '') + txt); haptic.tick(); });

  const saveToBrain = (msgText, idx) => {
    addBrainItem({
      title: msgText.length > 100 ? msgText.slice(0, 100) + '…' : msgText,
      tags: ['chat', 'saved'],
      comment: 'Saved from chat conversation'
    });
    setSavedMsgs(prev => ({ ...prev, [idx]: true }));
    haptic.success();
    toast('Saved to Brain', 'gn');
  };

  const sendFromText = async (text, base) => {
    const ts = new Date().toTimeString().slice(0,5);
    const userMsg = { r:'u', t:text.trim(), ts, sources:[], id: uid() };
    const next = [...base, userMsg];
    setMsgs(next); setLd(true);
    logQuery(text.trim());

    const key = sto.get('j_gk');
    if (!key) {
      setMsgs([...next, { r:'a', t:"No Gemini key detected, sir. Tap the ⚙️ gear icon to configure.", ts:new Date().toTimeString().slice(0,5), sources:[], id: uid() }]);
      setLd(false); return;
    }

    const wantsNews = /\b(news|latest|update|happen|happening|breaking|market|middle east|today|recent|war|conflict|election|price|rate|economy|stock|geopolit|actualit)/i.test(text);

    try {
      const history = next.slice(-20).map(m => ({ r: m.r, t: m.t }));
      const sysMsg = { r:'a', t: getSYS() };
      const convo = [sysMsg, ...history];
      const { text: reply, sources } = await callGemini(key, convo, wantsNews);

      const events = parseEvents(reply);
      const notes = parseNotes(reply);
      events.forEach(e => { const id = addEvent(e); if (id) scheduleReminder({ ...e, id }); });
      notes.forEach(n => addBrainItem(n));

      let confirm = '';
      if (events.length) confirm += `\n\n✓ ${events.length} event${events.length>1?'s':''} added to calendar`;
      if (notes.length) confirm += `\n✓ ${notes.length} note${notes.length>1?'s':''} saved to Brain`;
      if (events.length || notes.length) { haptic.success(); toast(`${events.length+notes.length} item${(events.length+notes.length)>1?'s':''} logged`, 'gn'); }

      setMsgs([...next, { r:'a', t:stripTags(reply) + confirm, ts:new Date().toTimeString().slice(0,5), sources, id: uid() }]);
    } catch (e) {
      haptic.warn();
      setMsgs([...next, { r:'a', t:'⚠ Connection lost, sir. Tap retry to try again.', ts:new Date().toTimeString().slice(0,5), sources:[], failed: true, id: uid() }]);
    }
    setLd(false);
  };

  const send = () => {
    if (!inp.trim() || ld) return;
    const text = inp.trim();
    setInp('');
    haptic.tap();
    sendFromText(text, msgs);
  };

  const retry = () => {
    const lastUserIdx = [...msgs].reverse().findIndex(m => m.r === 'u');
    if (lastUserIdx === -1) return;
    const idx = msgs.length - 1 - lastUserIdx;
    const q = msgs[idx].t;
    const base = msgs.slice(0, idx);
    setMsgs(base);
    setTimeout(() => sendFromText(q, base), 100);
  };

  const clearChatHistory = () => {
    clearChat();
    setMsgs([{ r:'a', t:`${gr}, sir. Ready when you are.`, ts:new Date().toTimeString().slice(0,5), sources:[], id: uid() }]);
    haptic.tick();
    toast('Chat cleared', 'gold');
  };

  const now = new Date();
  const todayISO = now.toISOString().slice(0,10);
  const nowTime = now.toTimeString().slice(0,5);
  const localEvs = useStore('j_events', loadEvents);
  const allEvs = [...localEvs, ...gEvents]
    .filter(e => e.date > todayISO || (e.date === todayISO && e.time > nowTime))
    .sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const nextEv = allEvs[0];
  const fmtNext = nextEv ? (nextEv.date === todayISO ? `TODAY ${nextEv.time}` : `${new Date(nextEv.date+'T12:00').toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase()} ${nextEv.time}`) : null;

  const hour = now.getHours();
  const suggestions = useMemo(() => {
    const u = loadUsage();
    const base = [];
    if (hour < 10) base.push('Morning briefing', "What's on today?", 'Weather + commute');
    else if (hour < 14) base.push("What's next on my schedule?", 'Market update', 'Middle East news');
    else if (hour < 19) base.push('Remaining today', 'Portfolio check', 'Plan tomorrow');
    else base.push('Summary of today', 'Plan tomorrow', 'Log: idea…');
    const recent = (u.queries || []).slice(0, 2);
    return [...new Set([...base, ...recent])].slice(0, 5);
  }, [hour]);

  return (
    <div className="ch-w">
      <div className="ch-m">
        <div className="sx" style={{ display:'flex', gap:6 }}>
          {!raceDone && (
            <div className="hud hud-red glow-red" style={{ minWidth:90, padding:'8px 10px', flexShrink:0 }}>
              <div style={{ fontFamily:'var(--mn)', fontSize:7, color:'var(--t3)', letterSpacing:'.12em', fontWeight:700 }}>MARATHON</div>
              <div style={{ fontFamily:'var(--hd)', fontSize:24, fontWeight:600, color:'var(--gold)', lineHeight:1 }}>{dtr}</div>
              <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--t3)', marginTop:2 }}>DAYS</div>
            </div>
          )}
          {nextEv && (
            <div className="hud" style={{ minWidth:130, padding:'8px 10px', flexShrink:0, borderColor:'var(--bdrGold)' }}>
              <div style={{ fontFamily:'var(--mn)', fontSize:7, color:'var(--gold)', letterSpacing:'.1em', fontWeight:700 }}>NEXT · {fmtNext}</div>
              <div style={{ fontSize:12, marginTop:2, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{nextEv.title}</div>
            </div>
          )}
          <WeatherChip/>
          <button onClick={clearChatHistory} style={{ background:'var(--bg3)', border:'1px solid var(--bdr)', borderRadius:10, padding:'8px 10px', flexShrink:0, cursor:'pointer', display:'flex', alignItems:'center', gap:5, fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:600 }}>
            <IEraser size={11} color="var(--t3)" sw={1.5}/> CLEAR
          </button>
        </div>

        {msgs.map((m, i) => (
          <div key={m.id || i} style={{ marginLeft:m.r==='u'?32:0, marginRight:m.r==='a'?16:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
              <span style={{ fontFamily:'var(--hd)', fontSize:10, letterSpacing:'.15em', textTransform:'uppercase', color:m.r==='u'?'var(--red)':'var(--gold)', fontWeight:700 }}>
                {m.r==='u'?'You':'Jarvis'}
              </span>
              <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{m.ts}</span>
              {m.failed && <button onClick={retry} style={{ background:'none', border:'1px solid var(--bdr2)', borderRadius:5, padding:'1px 6px', cursor:'pointer', fontFamily:'var(--mn)', fontSize:8, color:'var(--redHot)', fontWeight:700, letterSpacing:'.08em' }}>RETRY</button>}
            </div>
            <div style={{ fontSize:14, lineHeight:1.65, color:m.r==='u'?'var(--t)':'var(--t2)', whiteSpace:'pre-wrap', wordBreak:'break-word' }}>{m.t}</div>
            {m.sources && m.sources.length > 0 && (
              <div style={{ marginTop:6, display:'flex', flexWrap:'wrap', gap:2 }}>
                {m.sources.map((s, j) => (
                  <a key={j} href={s.url} target="_blank" rel="noopener noreferrer" className="src-link" onClick={()=>haptic.tick()}>
                    <IExternalLink size={9} color="var(--blue)" sw={2}/>
                    {s.title?.length > 25 ? s.title.slice(0,25)+'…' : (s.title || 'Source')}
                  </a>
                ))}
              </div>
            )}
            {m.r === 'a' && i > 0 && !m.failed && (
              <button className={`save-btn ${savedMsgs[i] ? 'saved' : ''}`} onClick={() => saveToBrain(m.t, i)}>
                {savedMsgs[i] ? <><ICheck size={9} color="var(--gn)" sw={2}/> Saved</> : <><ISave size={9} color="var(--t3)" sw={1.5}/> Save to Brain</>}
              </button>
            )}
          </div>
        ))}
        {ld && <div style={{ marginRight:32 }}>
          <span style={{ fontFamily:'var(--hd)', fontSize:10, letterSpacing:'.15em', textTransform:'uppercase', color:'var(--gold)', fontWeight:700 }}>Jarvis</span>
          <div className="dp" style={{ marginTop:5 }}><span/><span/><span/></div>
        </div>}
        <div ref={er}/>
      </div>

      <div className="ch-i">
        <div className="pls sx">
          {suggestions.map((p,i) => (
            <button key={i} className="pl" onClick={()=>{ haptic.tick(); setInp(p); inputRef.current?.focus(); }}>{p}</button>
          ))}
        </div>
        <div className="cf">
          <input ref={inputRef} value={inp} onChange={e=>setInp(e.target.value)}
            onKeyDown={e => { if (e.key==='Enter') { e.preventDefault(); send(); } }}
            placeholder={voice.listening ? 'Listening…' : 'Talk to Jarvis…'}
            enterKeyHint="send" autoComplete="off" autoCorrect="on"/>
          {voice.supported && (
            <button className={`mic${voice.listening?' on':''}`} onClick={() => voice.listening ? voice.stop() : voice.start()} aria-label="Voice input">
              <IMic size={18} color={voice.listening?'var(--redHot)':'var(--t3)'} sw={1.75}/>
            </button>
          )}
          <button className="sb" onClick={send} disabled={!inp.trim()||ld} aria-label="Send">
            <ISend size={18} color={inp.trim()&&!ld?'var(--gold)':'var(--t4)'} sw={1.75}/>
          </button>
        </div>
      </div>
    </div>
  );
}

// BRIEF TAB — helmet HUD dashboard
// ═══════════════════════════════════════════════════════════════
function BriefTab({ gr, dtr, raceDone, gEvents, gToken }) {
  const [w, setW] = useState(sto.getJSON('j_weather', null));
  const [fx, setFx] = useState(sto.getJSON('j_fx_cache', null));
  const [prices, setPrices] = useState(loadPriceCache());

  useEffect(() => { fetchWeather().then(d => d && setW(d)); }, []);
  useEffect(() => { fetchFX().then(d => d && setFx(d)); }, []);
  useEffect(() => {
    const key = sto.get('j_ak');
    if (!key) return;
    const pf = loadPortfolio();
    Promise.all(pf.map(p => p.symbol ? fetchPrice(p.symbol, key) : null))
      .then(() => setPrices(loadPriceCache()));
  }, []);

  const localEvs = useStore('j_events', loadEvents);
  const today = new Date().toISOString().slice(0,10);
  const todayEvs = [...localEvs, ...gEvents]
    .filter(e => e.date === today)
    .sort((a,b)=>a.time.localeCompare(b.time));
  const pf = loadPortfolio();

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ marginBottom:18 }}>
        <div style={{ fontFamily:'var(--hd)', fontSize:28, fontWeight:400 }}>
          <span style={{ color:'var(--t2)' }}>{gr},</span> <span style={{ color:'var(--gold)' }}>Sir.</span>
        </div>
        <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', marginTop:4, fontWeight:500 }}>ALL SYSTEMS NOMINAL · LIVE BRIEFING</div>
      </div>

      <div className="hud hud-red-bdr scan glow-red" style={{ padding:16, marginBottom:12 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div>
            <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', letterSpacing:'.12em', fontWeight:700 }}>GENEVA · LIVE</div>
            <div style={{ fontFamily:'var(--hd)', fontSize:44, fontWeight:300, lineHeight:1, marginTop:4 }}>{w?`${w.temp}°`:'--°'}</div>
            <div style={{ fontSize:12, color:'var(--t2)', marginTop:3 }}>{w?`${w.desc} · feels ${w.feels}°`:'Connecting…'}</div>
            {w && <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t3)', marginTop:2 }}>H {w.high}° · L {w.low}° · Wind {w.wind} km/h</div>}
            {w && w.rainProb > 30 && <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--redHot)', marginTop:4, fontWeight:600 }}>☔ Rain (12h): {w.rainProb}%</div>}
          </div>
          {w && (w.code <= 1 ? <ISun size={40} color="var(--gold)" sw={1.3}/> : (w.code >= 51 && w.code <= 82) ? <IRain size={40} color="var(--blue)" sw={1.3}/> : <ICloud size={40} color="var(--t2)" sw={1.3}/>)}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:12, paddingTop:10, borderTop:'1px solid var(--bdr)', fontSize:11, color:'var(--t3)' }}>
          <IPin size={11} color="var(--t3)" sw={1.5}/> Massongy → Chêne-Bougerie · ~47 min standard
        </div>
      </div>

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--red)', marginBottom:7, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span>Today's Schedule</span>
        <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:400 }}>{todayEvs.length} ITEM{todayEvs.length!==1?'S':''}</span>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:4, marginBottom:16 }}>
        {todayEvs.length === 0 ? (
          <div className="hud" style={{ padding:'12px 14px', fontSize:11, color:'var(--t4)', textAlign:'center' }}>
            {gToken ? 'No events today' : 'Connect Google Calendar or add via chat'}
          </div>
        ) : todayEvs.map((e, i) => (
          <div key={i} className="hud" style={{ padding:'9px 11px', display:'flex', alignItems:'center', gap:9 }}>
            <div style={{ width:3, height:22, borderRadius:2, background:e.src==='google'?'var(--gn)':'var(--gold)', flexShrink:0 }}/>

            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:13, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', fontWeight:500 }}>{e.title}</div>
              {e.notes && <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', marginTop:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{e.notes}</div>}
            </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, marginBottom:8 }}>
        {pf.slice(0,4).map((p, i) => {
          const pr = prices[p.symbol];

            <div key={i} className="hud" style={{ padding:10 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:700 }}>{p.symbol.split('.')[0]}</span>
                {pr && (up ? <IUp size={10} color="var(--gn)"/> : <IDn size={10} color="var(--redHot)"/>)}
              </div>
              <div style={{ fontFamily:'var(--mn)', fontSize:14, marginTop:3, fontWeight:500 }}>
                {pr ? pr.price.toFixed(2) : '—'}
              </div>
              <div style={{ fontFamily:'var(--mn)', fontSize:10, color:pr?(up?'var(--gn)':'var(--redHot)'):'var(--t4)', fontWeight:500 }}>
                {pr ? `${up?'+':''}${pr.changePct.toFixed(2)}%` : '──'}
              </div>
            </div>
          );

function BriefNewsSection() {
  const [news, setNews] = useState(null);

  useEffect(() => { if (hasKey) fetchNews('general').then(setNews); }, []);
  const ago = (iso) => {
    const d = (Date.now() - new Date(iso).getTime()) / 60000;
    if (d < 60) return Math.round(d) + 'm';
    if (d < 1440) return Math.round(d/60) + 'h';
    return Math.round(d/1440) + 'd';
  };
  if (!hasKey) return null;

    <div>
      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--blue)', marginBottom:8, display:'flex', alignItems:'center', gap:6 }}>

                  <div style={{ fontSize:12, fontWeight:500, lineHeight:1.3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{a.title}</div>
                  <div style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--t4)', marginTop:2 }}>{a.source?.name} · {ago(a.publishedAt)} ago</div>

function FinTab() {
  const [pf, setPf] = useState(loadPortfolio());
  const [prices, setPrices] = useState(loadPriceCache());
  const [fx, setFx] = useState(sto.getJSON('j_fx_cache', null));
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [loading, setLoading] = useState(false);

  const refresh = async () => {
    const key = sto.get('j_ak');
    if (!key) { toast('Add Alpha Vantage key in ⚙️', 'red'); return; }
    setLoading(true);
    for (const p of pf) {
      if (p.symbol) await fetchPrice(p.symbol, key, true);
    }
    setPrices(loadPriceCache());
    setLoading(false);
    toast('Prices refreshed', 'gn');
    haptic.tick();
  };

  useEffect(() => {
    const key = sto.get('j_ak');
    if (!key) return;
    (async () => {
      for (const p of pf) {
        if (p.symbol) await fetchPrice(p.symbol, key);
      }
      setPrices(loadPriceCache());
    })();
    fetchFX().then(d => d && setFx(d));
  }, []);

  const saveHolding = (h) => {
    const newPf = h.id ? pf.map(x => x.id === h.id ? h : x) : [...pf, { ...h, id: uid() }];
    setPf(newPf); savePortfolio(newPf); setEditing(null); setAdding(false);
    toast(h.id ? 'Holding updated' : 'Holding added', 'gn');
    haptic.success();
  };
  const delHolding = (id) => {
    const newPf = pf.filter(x => x.id !== id);
    setPf(newPf); savePortfolio(newPf); setEditing(null);
    toast('Holding removed', 'gold');
    haptic.tick();
  };

  const lines = pf.map(p => {
    const pr = prices[p.symbol];
    const value = pr ? p.units * pr.price : p.units * p.costBasis;
    const cost = p.units * p.costBasis;
    const gain = value - cost;
    const gainPct = cost > 0 ? (gain / cost * 100) : 0;
    return { ...p, live: !!pr, price: pr?.price || p.costBasis, value, cost, gain, gainPct };
  });
  const totalVal = lines.reduce((s, x) => s + x.value, 0);
  const totalCost = lines.reduce((s, x) => s + x.cost, 0);
  const totalGain = totalVal - totalCost;
  const totalPct = totalCost > 0 ? (totalGain / totalCost * 100) : 0;
  const maxVal = Math.max(...lines.map(l => l.value), 1);
  const hasKey = !!sto.get('j_ak');

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ marginBottom:16, display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>

            €{totalVal.toLocaleString('fr-FR', { maximumFractionDigits:0 })}
          </div>
          {totalCost > 0 && (
            <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:4 }}>
              <span style={{ fontFamily:'var(--mn)', fontSize:12, color:totalGain>=0?'var(--gn)':'var(--redHot)', fontWeight:500 }}>
                {totalGain>=0?'+':''}€{totalGain.toLocaleString('fr-FR', { maximumFractionDigits:0 })}
              </span>
              <span style={{ fontFamily:'var(--mn)', fontSize:10, color:totalGain>=0?'var(--gn)':'var(--redHot)' }}>
                {totalGain>=0?'+':''}{totalPct.toFixed(1)}%
              </span>
            </div>
          )}
        </div>
        <button onClick={refresh} disabled={loading || !hasKey} aria-label="Refresh prices"
          style={{ background:'var(--bg3)', border:'1px solid var(--bdrGold)', borderRadius:8, width:36, height:36, cursor:hasKey?'pointer':'not-allowed', display:'flex', alignItems:'center', justifyContent:'center', opacity:hasKey?1:0.5 }}>
          <IRefresh size={15} color={loading?'var(--t4)':'var(--gold)'} sw={2}/>
        </button>
      </div>

      {!hasKey && (
        <div className="hud hud-red-bdr" style={{ padding:12, marginBottom:14 }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--redHot)', fontWeight:700, letterSpacing:'.1em' }}>NO PRICE FEED</div>
          <div style={{ fontSize:11, color:'var(--t2)', marginTop:4 }}>Add Alpha Vantage key in ⚙️ to enable live prices.</div>
        </div>
      )}

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--gold)', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span>Holdings</span>
        <button onClick={()=>{ haptic.tick(); setAdding(true); }} style={{ background:'none', border:'1px solid var(--bdrGold)', borderRadius:6, padding:'4px 8px', cursor:'pointer', display:'flex', alignItems:'center', gap:3, fontFamily:'var(--hd)', fontSize:10, color:'var(--gold)', fontWeight:600, letterSpacing:'.08em' }}>

      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:5, marginBottom:16 }}>
          {lines.map((x, i) => (
            <div key={i} onClick={()=>{ haptic.tick(); setEditing(x); }} className="hud" style={{ padding:'10px 12px', cursor:'pointer' }}>
              <div style={{ display:'flex', justifyContent:'space-between' }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:500 }}>{x.name}</div>
                  <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', marginTop:2 }}>
                    {x.symbol} · {x.units} units {x.live && <span style={{ color:'var(--gn)' }}>· LIVE</span>}
                  </div>
                </div>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontFamily:'var(--mn)', fontSize:13, fontWeight:500 }}>€{x.value.toLocaleString('fr-FR', { maximumFractionDigits:0 })}</div>

                      {x.gain>=0?'+':''}{x.gainPct.toFixed(1)}%
                    </div>
                  )}
                </div>
              </div>
              <div className="bf" style={{ marginTop:6 }}><div className="bff" style={{ width:`${(x.value/maxVal)*100}%` }}/></div>

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--red)', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center' }}>

            <div style={{ fontFamily:'var(--mn)', fontSize:14, color:'var(--gold)', fontWeight:500 }}>{f.r.toFixed(4)}</div>
          </div>
        )) : <div style={{ padding:14, fontFamily:'var(--mn)', fontSize:10, color:'var(--t4)' }}>Loading FX rates…</div>}

  );
}

  const save = () => {

  return (
    <div className="hud hud-gold-bdr glow-gold" style={{ padding:14, marginBottom:12 }}>

          <input className="ipt" value={units} onChange={e=>setUnits(e.target.value)} placeholder="Units" type="number" step="any" inputMode="decimal"/>

        </div>
      </div>
      <div style={{ display:'flex', gap:6, marginTop:10 }}>
        <button onClick={save} style={{ flex:1, padding:10, background:'linear-gradient(135deg, var(--gold), var(--red))', border:'none', borderRadius:8, color:'#fff', fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.1em', cursor:'pointer' }}>SAVE</button>

      </div>

  );
}

// CALENDAR TAB
// ═══════════════════════════════════════════════════════════════
function CalTab({ gToken, gEvents }) {
  const localEvs = useStore('j_events', loadEvents);
  const [weekOffset, setWeekOffset] = useState(0);
  const [selectedDate, setSelectedDate] = useState(new Date().toISOString().slice(0,10));

  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() + weekOffset * 7);
  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    return d.toISOString().slice(0, 10);
  });

  const allEvs = [...localEvs, ...gEvents].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const evsByDate = {};
  allEvs.forEach(e => { if (!evsByDate[e.date]) evsByDate[e.date] = []; evsByDate[e.date].push(e); });

  const selectedEvs = evsByDate[selectedDate] || [];
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const jumpToToday = () => { haptic.tick(); setWeekOffset(0); setSelectedDate(todayStr); };

  const removeEv = (id) => {
    if (typeof id === 'string' && id.startsWith('g_')) return;
    deleteEvent(id);
    haptic.tick();
    toast('Event removed', 'gold');
  };

  const monthLabel = (() => {
    const first = new Date(days[0] + 'T12:00');
    const last = new Date(days[6] + 'T12:00');
    if (first.getMonth() === last.getMonth()) {
      return first.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' }).toUpperCase();
    }
    return `${first.toLocaleDateString('en-GB', { month: 'short' })} – ${last.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' })}`.toUpperCase();
  })();

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
        <div>
          <div style={{ fontFamily:'var(--hd)', fontSize:26, fontWeight:400 }}>
            <span style={{ color:'var(--t2)' }}>Calendar</span>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', marginTop:3 }}>{monthLabel}</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          {weekOffset !== 0 && (
            <button onClick={jumpToToday} style={{ background:'none', border:'1px solid var(--bdrGold)', borderRadius:6, padding:'4px 10px', cursor:'pointer', fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', fontWeight:600 }}>TODAY</button>
          )}
          <div style={{ fontFamily:'var(--mn)', fontSize:8, color:gToken?'var(--gn)':'var(--t4)', display:'flex', alignItems:'center', gap:3, fontWeight:700 }}>
            <span style={{ width:5, height:5, borderRadius:'50%', background:gToken?'var(--gn)':'var(--t4)', boxShadow:gToken?'0 0 4px var(--gn)':'none' }}/>
            {gToken ? 'SYNC' : 'LOCAL'}
          </div>
        </div>
      </div>

      <div style={{ display:'flex', alignItems:'center', gap:4, marginBottom:12 }}>
        <button onClick={()=>{ haptic.tick(); setWeekOffset(weekOffset-1); }} aria-label="Previous week"
          style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:8, width:32, height:32, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IChevL size={14} color="var(--t2)" sw={2}/>
        </button>
        <div style={{ flex:1, display:'flex', gap:3, overflow:'hidden' }}>
          {days.map((date) => {
            const d = new Date(date + 'T12:00');
            const isToday = date === todayStr;
            const isSelected = date === selectedDate;
            const hasEvs = !!evsByDate[date];
            return (
              <div key={date}
                className={`cal-day${isToday?' today':''}${isSelected?' selected':''} ${hasEvs?'has-events':''}`}
                onClick={() => { haptic.tick(); setSelectedDate(date); }}
                style={{ flex:1 }}>
                <div style={{ fontFamily:'var(--mn)', fontSize:8, color:isSelected?'var(--red)':isToday?'var(--gold)':'var(--t4)', fontWeight:700 }}>
                  {dayNames[d.getDay()].toUpperCase()}
                </div>
                <div style={{ fontFamily:'var(--hd)', fontSize:18, fontWeight:isSelected?700:400, color:isSelected?'var(--t)':isToday?'var(--gold)':'var(--t2)', marginTop:2 }}>
                  {d.getDate()}
                </div>
              </div>
            );
          })}
        </div>
        <button onClick={()=>{ haptic.tick(); setWeekOffset(weekOffset+1); }} aria-label="Next week"
          style={{ background:'none', border:'1px solid var(--bdr)', borderRadius:8, width:32, height:32, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <IChevR size={14} color="var(--t2)" sw={2}/>
        </button>
      </div>

      <div style={{ display:'flex', gap:8, marginBottom:14 }}>
        <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:9, fontFamily:'var(--mn)', color:'var(--gold)', fontWeight:600 }}>
          <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--gold)' }}/>Jarvis ({localEvs.length})
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:9, fontFamily:'var(--mn)', color:'var(--gn)', fontWeight:600 }}>
          <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--gn)' }}/>Google ({gEvents.length})
        </div>
      </div>

      <div style={{ fontFamily:'var(--mn)', fontSize:9, color:selectedDate===todayStr?'var(--gold)':'var(--t3)', letterSpacing:'.12em', marginBottom:8, fontWeight:700 }}>
        {selectedDate === todayStr ? 'TODAY · ' : ''}{new Date(selectedDate+'T12:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}).toUpperCase()}
        <span style={{ color:'var(--t4)', fontWeight:400 }}> · {selectedEvs.length} event{selectedEvs.length!==1?'s':''}</span>
      </div>

      {selectedEvs.length === 0 ? (
        <div className="hud" style={{ padding:20, textAlign:'center' }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t3)', letterSpacing:'.1em' }}>NO EVENTS</div>
          <div style={{ fontSize:11, color:'var(--t4)', marginTop:6 }}>Ask Jarvis to schedule something</div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
          {selectedEvs.map((e, j) => (
            <div key={j} className="hud" style={{ padding:'10px 12px', display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:3, height:28, borderRadius:2, background:e.src==='google'?'var(--gn)':'var(--gold)', flexShrink:0 }}/>
              <span style={{ fontFamily:'var(--mn)', fontSize:11, color:'var(--t3)', width:40, flexShrink:0, fontWeight:500 }}>{e.time==='00:00'?'All day':e.time}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:500 }}>{e.title}</div>
                {e.endTime && e.time !== '00:00' && <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:1 }}>→ {e.endTime}</div>}
                {e.notes && <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', marginTop:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{e.notes}</div>}
              </div>
              {e.src !== 'google' && (
                <button onClick={()=>removeEv(e.id)} aria-label="Delete event" style={{ background:'none', border:'none', cursor:'pointer', padding:4, display:'flex' }}>
                  <ITrash size={11} color="var(--t4)" sw={1.75}/>
                </button>
              )}
            </div>
          ))}
        </div>
      )}

      {(() => {
        const upcomingDates = Object.keys(evsByDate).filter(d => d > selectedDate).sort().slice(0, 5);
        if (upcomingDates.length === 0) return null;
        return (
          <div style={{ marginTop:18 }}>
            <div style={{ fontFamily:'var(--hd)', fontSize:11, fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--red)', marginBottom:8 }}>Upcoming</div>
            {upcomingDates.map((date, i) => (
              <div key={i} onClick={() => { haptic.tick(); setSelectedDate(date); const diff = Math.floor((new Date(date+'T12:00') - new Date(todayStr+'T12:00')) / (7 * 864e5)); setWeekOffset(diff); }}
                className="hud" style={{ padding:'8px 12px', marginBottom:4, cursor:'pointer', display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', fontWeight:700, width:60, flexShrink:0 }}>
                  {new Date(date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric'}).toUpperCase()}
                </div>
                <div style={{ fontSize:12, color:'var(--t2)', flex:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                  {evsByDate[date].map(e => e.title).join(' · ')}
                </div>
                <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{evsByDate[date].length}</span>
              </div>
            ))}
          </div>
        );
      })()}
    </div>
  );
}
// ═══════════════════════════════════════════════════════════════
// BRAIN TAB
// ═══════════════════════════════════════════════════════════════
function BrainTab() {
  const items = useStore('j_brain', loadBrain);
  const [search, setSearch] = useState('');
  const [tagFilter, setTagFilter] = useState('all');

  const allTags = useMemo(() => {
    const tc = {};
    items.forEach(i => (i.tags || []).forEach(t => { tc[t] = (tc[t] || 0) + 1; }));
    return Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0, 10).map(([t])=>t);
  }, [items]);

  const filtered = items.filter(i => {
    const q = search.toLowerCase().trim();
    const matchQ = !q || i.title?.toLowerCase().includes(q) || i.comment?.toLowerCase().includes(q) || (i.tags||[]).some(t=>t.toLowerCase().includes(q));
    const matchT = tagFilter === 'all' || (i.tags || []).includes(tagFilter);
    return matchQ && matchT;
  });

  const del = (id) => { deleteBrainItem(id); haptic.tick(); toast('Deleted', 'gold'); };

  const fmtDate = (iso) => {
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 60000;
    if (diff < 60) return Math.round(diff) + 'm ago';
    if (diff < 1440) return Math.round(diff/60) + 'h ago';
    if (diff < 10080) return Math.round(diff/1440) + 'd ago';
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  };

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ marginBottom:14, display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style={{ fontFamily:'var(--hd)', fontSize:26, fontWeight:400 }}>
            <span style={{ color:'var(--t2)' }}>Second</span> <span style={{ color:'var(--gold)' }}>Brain</span>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', marginTop:3, fontWeight:500 }}>
            {items.length} ENTR{items.length===1?'Y':'IES'} · AUTO-LOGGED FROM CHAT
          </div>
        </div>
        <IBrain size={26} color="var(--gold)" sw={1.3}/>
      </div>

      <input className="ipt" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search entries…" style={{ marginBottom:10, padding:'10px 12px', fontSize:12 }}/>

      {allTags.length > 0 && (
        <div className="sx" style={{ display:'flex', gap:5, marginBottom:12, paddingBottom:6 }}>
          <button className="pl" onClick={()=>{ haptic.tick(); setTagFilter('all'); }}
            style={tagFilter==='all' ? { borderColor:'var(--gold)', color:'var(--gold)', background:'rgba(255,180,0,0.07)' } : {}}>
            All
          </button>
          {allTags.slice(0, 8).map(t => (
            <button key={t} className="pl" onClick={()=>{ haptic.tick(); setTagFilter(t); }}
              style={tagFilter===t ? { borderColor:'var(--gold)', color:'var(--gold)', background:'rgba(255,180,0,0.07)' } : {}}>
              #{t}
            </button>
          ))}
        </div>
      )}

      {filtered.length === 0 ? (
        <div className="hud hud-gold-bdr" style={{ padding:18, textAlign:'center', marginTop:8 }}>
          <IBrain size={26} color="var(--gold)" sw={1.3}/>
          <div style={{ fontSize:13, color:'var(--t2)', marginTop:10, marginBottom:4, fontWeight:500 }}>
            {items.length === 0 ? 'Your brain is empty' : 'No matches'}
          </div>
          <div style={{ fontSize:11, color:'var(--t3)', lineHeight:1.5 }}>
            {items.length === 0 ? 'Tell Jarvis things to remember.' : 'Try different keywords or filters.'}
          </div>
          {items.length === 0 && (
            <div style={{ marginTop:12, padding:10, background:'var(--bg)', borderRadius:8, textAlign:'left' }}>
              <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', letterSpacing:'.1em', fontWeight:700, marginBottom:6 }}>EXAMPLES</div>
              <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t3)', lineHeight:1.7 }}>
                "Log: read great article on RL agents"<br/>
                "Remember: Christian suggested using pandas"<br/>
                "Note: try fasted morning runs"<br/>
                "Mélanie wants to visit Italy in May"
              </div>
            </div>
          )}
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
          {filtered.map((it) => (
            <div key={it.id} className="hud" style={{ padding:'10px 12px' }}>
              <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:500, lineHeight:1.4 }}>{it.title}</div>
                  {it.comment && <div style={{ fontSize:11, color:'var(--t3)', marginTop:4, lineHeight:1.4 }}>{it.comment}</div>}
                  <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:6, flexWrap:'wrap' }}>
                    <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)' }}>{fmtDate(it.ts)}</span>
                    {(it.tags || []).map((t, j) => (
                      <span key={j} className="tag">#{t}</span>
                    ))}
                  </div>
                </div>
                <button onClick={()=>del(it.id)} aria-label="Delete" style={{ background:'none', border:'none', cursor:'pointer', padding:4, display:'flex' }}>
                  <ITrash size={12} color="var(--t4)" sw={1.75}/>
                </button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// MARATHON / RUN TAB — Lake Maggiore Nov 8 2026
// ═══════════════════════════════════════════════════════════════
function RunTab({ days, raceDone, gEvents, gToken }) {
  const RUN_KEYWORDS = ['run','running','km','tempo','easy','long run','interval','trail','garmin','training','jog','course','sortie','cardio','workout','race','10k','5k','half','marathon'];
  const isRun = (ev) => {
    const txt = (ev.title + ' ' + (ev.notes || '')).toLowerCase();
    return RUN_KEYWORDS.some(k => txt.includes(k));
  };

  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const weekAhead = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    return d.toISOString().slice(0, 10);
  });

  const localEvs = useStore('j_events', loadEvents);
  const allEvs = [...localEvs, ...gEvents].filter(isRun).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const thisWeekRuns = allEvs.filter(e => weekAhead.includes(e.date));
  const upcoming = allEvs.filter(e => e.date >= todayStr).slice(0, 10);
  const nextRun = upcoming[0];

  const raceDate = new Date('2026-11-08T00:00:00');
  const startTraining = new Date(raceDate); startTraining.setDate(raceDate.getDate() - 112);
  const weeksTotal = Math.max(Math.floor((raceDate - startTraining) / (7 * 864e5)), 1);
  const weeksDone = Math.min(Math.max(Math.floor((today - startTraining) / (7 * 864e5)), 0), weeksTotal);
  const trainingProgress = Math.min(Math.max((weeksDone / weeksTotal) * 100, 0), 100);

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const evsByDate = {};
  thisWeekRuns.forEach(e => { if (!evsByDate[e.date]) evsByDate[e.date] = []; evsByDate[e.date].push(e); });

  return (
    <div style={{ padding:'18px 14px' }} className="fade">
      <div style={{ marginBottom:14, display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style={{ fontFamily:'var(--hd)', fontSize:26, fontWeight:400 }}>
            <span style={{ color:'var(--t2)' }}>Marathon</span> <span style={{ color:'var(--red)' }}>Mission</span>
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', letterSpacing:'.12em', marginTop:3, fontWeight:500 }}>LAKE MAGGIORE · 08 NOV 2026</div>
        </div>
        <IRun size={26} color="var(--red)" sw={1.3}/>
      </div>

      {raceDone ? (
        <div className="hud hud-gold-bdr glow-gold scan" style={{ padding:20, marginBottom:14, textAlign:'center' }}>
          <div style={{ fontFamily:'var(--hd)', fontSize:36, fontWeight:300, background:'linear-gradient(135deg, var(--gold), var(--red))', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }}>
            COMPLETED
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--gold)', marginTop:8, letterSpacing:'.15em', fontWeight:700 }}>MISSION ACCOMPLISHED, SIR</div>
        </div>
      ) : (
        <div className="hud hud-red-bdr glow-red scan" style={{ padding:18, marginBottom:14, textAlign:'center' }}>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', letterSpacing:'.15em', marginBottom:6, fontWeight:700 }}>COUNTDOWN</div>
          <div style={{ fontFamily:'var(--hd)', fontSize:72, fontWeight:300, lineHeight:1, color:'var(--gold)', textShadow:'0 0 24px rgba(255,180,0,0.35)' }}>{days}</div>
          <div style={{ fontFamily:'var(--hd)', fontSize:13, color:'var(--t2)', letterSpacing:'.2em', marginTop:4, fontWeight:600 }}>
            DAY{days!==1?'S':''} REMAINING
          </div>
          <div style={{ marginTop:12, padding:'8px 12px', background:'var(--bg)', borderRadius:8 }}>
            <div style={{ display:'flex', justifyContent:'space-between', fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', marginBottom:4, fontWeight:500 }}>
              <span>TRAINING PROGRESS</span>
              <span style={{ color:'var(--gold)', fontWeight:700 }}>WEEK {weeksDone} / {weeksTotal}</span>
            </div>
            <div className="bf"><div className="bff" style={{ width:`${trainingProgress}%` }}/></div>
          </div>
        </div>
      )}

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--gold)', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span>This Week</span>
        <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', fontWeight:400 }}>{thisWeekRuns.length} RUN{thisWeekRuns.length!==1?'S':''}</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:3, marginBottom:16 }}>
        {weekAhead.map((date) => {
          const d = new Date(date + 'T12:00');
          const hasRun = !!evsByDate[date];
          const isToday = date === todayStr;
          return (
            <div key={date} className={`wk${isToday?' td':''}${hasRun?' dn':''}`}>
              <div style={{ fontFamily:'var(--mn)', fontSize:7, color:isToday?'var(--gold)':'var(--t4)', fontWeight:700, letterSpacing:'.05em' }}>
                {dayNames[d.getDay()].toUpperCase()}
              </div>
              <div style={{ fontFamily:'var(--hd)', fontSize:14, fontWeight:600, color:hasRun?'var(--gn)':isToday?'var(--gold)':'var(--t2)', marginTop:2 }}>
                {d.getDate()}
              </div>
              {hasRun && <div style={{ width:4, height:4, borderRadius:'50%', background:'var(--gn)', margin:'3px auto 0', boxShadow:'0 0 4px var(--gn)' }}/>}
            </div>
          );
        })}
      </div>

      {nextRun && (
        <div className="hud hud-gold-bdr glow-gold" style={{ padding:12, marginBottom:14 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
            <IFlame size={12} color="var(--gold)" sw={1.75}/>
            <span style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--gold)', letterSpacing:'.12em', fontWeight:700 }}>NEXT RUN</span>
          </div>
          <div style={{ fontSize:14, fontWeight:500 }}>{nextRun.title}</div>
          <div style={{ fontFamily:'var(--mn)', fontSize:10, color:'var(--t3)', marginTop:3 }}>
            {nextRun.date === todayStr ? 'TODAY' : new Date(nextRun.date + 'T12:00').toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'short' }).toUpperCase()}
            {nextRun.time !== '00:00' && ` · ${nextRun.time}`}
          </div>
        </div>
      )}

      <div style={{ fontFamily:'var(--hd)', fontSize:12, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--red)', marginBottom:8 }}>Upcoming Runs</div>

      {upcoming.length === 0 ? (
        <div className="hud" style={{ padding:14, textAlign:'center' }}>
          <div style={{ fontSize:12, color:'var(--t3)', marginBottom:4 }}>
            {gToken ? 'No runs scheduled' : 'Connect Google Calendar to sync Garmin'}
          </div>
          <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t4)', lineHeight:1.5 }}>
            Runs are detected from your calendar by keywords:<br/>
            run · km · tempo · long run · interval · training
          </div>
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
          {upcoming.map((e, i) => (
            <div key={i} className="hud" style={{ padding:'10px 12px', display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:3, height:28, borderRadius:2, background:e.src==='google'?'var(--gn)':'var(--red)', flexShrink:0 }}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{e.title}</div>
                <div style={{ fontFamily:'var(--mn)', fontSize:9, color:'var(--t3)', marginTop:2 }}>
                  {e.date === todayStr ? 'TODAY' : new Date(e.date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}).toUpperCase()}
                  {e.time !== '00:00' && ` · ${e.time}`}
                </div>
              </div>
              {e.src === 'google' && <span style={{ fontFamily:'var(--mn)', fontSize:8, color:'var(--gn)', fontWeight:700, letterSpacing:'.08em' }}>GCAL</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
// ═══════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(<Jarvis/>);
</script>
