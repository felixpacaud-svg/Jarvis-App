<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0e0c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jarvis" />
  <title>Jarvis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0f0e0c;--bg2:#16140f;--bg3:#1a1815;
      --border:#1f1c18;--border2:#2a2623;
      --text:#f5f1ea;--text2:#e5ddd0;--text3:#a8a39c;--text4:#8a8580;--text5:#6a6560;
      --gold:#d4a574;--green:#6b9e73;--red:#c67b7b;
      --serif:'Fraunces',serif;--sans:'Instrument Sans',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    html,body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100%;overflow:hidden}
    #root{height:100%}
    .app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
    .serif{font-family:var(--serif);font-optical-sizing:auto}
    .mono{font-family:var(--mono)}
    .label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text4)}
    .tab-content{flex:1;overflow-y:auto;padding-bottom:80px}
    .tab-content::-webkit-scrollbar{display:none}
    .scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .scrollx::-webkit-scrollbar{display:none}
    .header{padding:14px 20px 12px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;background:rgba(15,14,12,.95);backdrop-filter:blur(12px);flex-shrink:0}
    .logo{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#8b6f47);display:flex;align-items:center;justify-content:center}
    .logo span{font-family:var(--serif);color:var(--bg);font-weight:600;font-size:15px;font-style:italic}
    .notif-dot{width:7px;height:7px;background:var(--gold);border-radius:50%;position:absolute;top:-2px;right:-2px}
    .nav{border-top:1px solid var(--border2);background:rgba(15,14,12,.95);backdrop-filter:blur(12px);flex-shrink:0;box-shadow:0 -8px 20px -10px rgba(212,165,116,.2)}
    .nav-inner{display:flex;align-items:center;justify-content:space-around;padding:10px 4px 14px}
    .nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;background:none;border:none;cursor:pointer;padding:4px 0}
    .nav-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;transition:color .2s}
    .nav-btn.active .nav-label{color:var(--gold)}
    .nav-btn:not(.active) .nav-label{color:var(--text5)}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px}
    .card-gold{background:linear-gradient(135deg,#1a1512,#16110e);border:1px solid #3a2e28;border-radius:14px}
    .card-hero{background:linear-gradient(135deg,var(--bg3),var(--bg));border:1px solid var(--border2);border-radius:16px}
    .px5{padding-left:20px;padding-right:20px}
    .space-y4>*+*{margin-top:16px}
    .space-y3>*+*{margin-top:12px}
    .space-y2>*+*{margin-top:8px}
    .fade-in{animation:fadeIn .35s ease-out}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .up{color:var(--green)}.dn{color:var(--red)}.gold{color:var(--gold)}.muted{color:var(--text4)}
    .event-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);border-radius:10px;border:1px solid var(--border)}
    .mkt-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;flex:1;min-width:0}
    .chat-wrap{display:flex;flex-direction:column;height:calc(100dvh - 140px)}
    .chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px}
    .chat-msgs::-webkit-scrollbar{display:none}
    .chat-input-area{padding:12px 16px 16px;border-top:1px solid var(--border);flex-shrink:0}
    .pills-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
    .pills-row::-webkit-scrollbar{display:none}
    .pill{white-space:nowrap;font-size:11px;padding:6px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;color:var(--text3);cursor:pointer;font-family:var(--sans)}
    .chat-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:12px 16px;margin-top:8px}
    .chat-row input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px}
    .chat-row input::placeholder{color:var(--text5)}
    .send-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;padding:0}
    .dot-pulse span{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;margin:0 2px;animation:pulse 1.4s ease-in-out infinite}
    .dot-pulse span:nth-child(2){animation-delay:.2s}
    .dot-pulse span:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
    .holding-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
    .holding-fill{height:100%;background:rgba(212,165,116,.6);border-radius:2px}
    .fx-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
    .fx-row:last-child{border-bottom:none}
    .cal-event{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:8px;border:1px solid var(--border)}
    .cal-dot{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0}
    .tag-pill{font-size:10px;font-family:var(--mono);color:var(--text4);background:var(--border);padding:3px 8px;border-radius:4px}
    .brain-item{background:var(--bg2);border-radius:14px;padding:14px;border:1px solid var(--border)}
    .brain-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .filter-pill{font-size:11px;font-family:var(--mono);padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text3);white-space:nowrap;cursor:pointer}
    .filter-pill.active{background:rgba(212,165,116,.1);border-color:rgba(212,165,116,.4);color:var(--gold)}
    .week-day{border-radius:10px;padding:6px 4px;text-align:center;border:1px solid var(--border);background:var(--bg2)}
    .week-day.today{border-color:var(--gold);background:rgba(212,165,116,.05)}
    .week-day.done{border-color:rgba(107,158,115,.4);background:rgba(107,158,115,.05)}
    .stat-card{background:var(--bg2);border-radius:14px;padding:14px;border:1px solid var(--border)}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

const Svg=({children,size=18,color="currentColor",sw=1.75})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{display:'block'}}>{children}</svg>
);
const IcoHome=({size,color,sw})=><Svg size={size} color={color} sw={sw}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></Svg>;
const IcoChat=({size,color,sw})=><Svg size={size} color={color} sw={sw}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></Svg>;
const IcoTrend=({size,color,sw})=><Svg size={size} color={color} sw={sw}><polyline points="23,6 13.5,15.5 8.5,10.5 1,18"/><polyline points="17,6 23,6 23,12"/></Svg>;
const IcoCal=({size,color,sw})=><Svg size={size} color={color} sw={sw}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Svg>;
const IcoBrain=({size,color,sw})=><Svg size={size} color={color} sw={sw}><path d="M9.5 2A2.5 2.5 0 007 4.5A2.5 2.5 0 004.5 7a2.5 2.5 0 000 5A2.5 2.5 0 007 14.5 2.5 2.5 0 009.5 17H11v5h2v-5h1.5A2.5 2.5 0 0017 14.5 2.5 2.5 0 0019.5 12a2.5 2.5 0 000-5A2.5 2.5 0 0017 4.5 2.5 2.5 0 0014.5 2z"/></Svg>;
const IcoRun=({size,color,sw})=><Svg size={size} color={color} sw={sw}><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></Svg>;
const IcoSend=({size=16,color,sw})=><Svg size={size} color={color} sw={sw}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></Svg>;
const IcoBell=({size=16,color,sw})=><Svg size={size} color={color} sw={sw}><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></Svg>;
const IcoUp=({size=13,color})=><Svg size={size} color={color} sw={2}><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7,7 17,7 17,17"/></Svg>;
const IcoDn=({size=13,color})=><Svg size={size} color={color} sw={2}><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17,7 17,17 7,17"/></Svg>;
const IcoSearch=({size,color,sw})=><Svg size={size} color={color} sw={sw}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Svg>;
const IcoBook=({size,color,sw})=><Svg size={size} color={color} sw={sw}><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></Svg>;
const IcoHash=({size,color,sw})=><Svg size={size} color={color} sw={sw}><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></Svg>;
const IcoZap=({size,color,sw})=><Svg size={size} color={color} sw={sw}><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></Svg>;
const IcoUser=({size,color,sw})=><Svg size={size} color={color} sw={sw}><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></Svg>;
const IcoFlame=({size,color,sw})=><Svg size={size} color={color} sw={sw}><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 3z"/></Svg>;
const IcoCloud=({size,color,sw})=><Svg size={size} color={color} sw={sw}><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/></Svg>;
const IcoPin=({size,color,sw})=><Svg size={size} color={color} sw={sw}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></Svg>;
const IcoPlus=({size,color,sw})=><Svg size={size} color={color} sw={sw}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Svg>;

function Jarvis(){
  const[tab,setTab]=useState('home');
  const[time,setTime]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),30000);return()=>clearInterval(t)},[]);
  const marathon=new Date('2026-11-08');
  const days=Math.ceil((marathon-time)/(1000*60*60*24));
  const h=time.getHours();
  const greeting=h<5?'Late night':h<12?'Good morning':h<18?'Good afternoon':'Good evening';
  const tabs=[
    {id:'home',label:'Home',A:IcoHome},{id:'chat',label:'Chat',A:IcoChat},
    {id:'finance',label:'Finance',A:IcoTrend},{id:'calendar',label:'Cal',A:IcoCal},
    {id:'brain',label:'Brain',A:IcoBrain},{id:'marathon',label:'Run',A:IcoRun},
  ];
  return(
    <div className="app">
      <header className="header">
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <div className="logo"><span>J</span></div>
          <div>
            <div className="serif" style={{fontSize:'18px',fontStyle:'italic',lineHeight:1}}>Jarvis</div>
            <div className="mono" style={{fontSize:'10px',color:'var(--text4)',marginTop:'2px',textTransform:'uppercase',letterSpacing:'.08em'}}>
              {time.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}
            </div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'14px'}}>
          <span className="mono" style={{fontSize:'12px',color:'var(--text4)'}}>{time.toTimeString().slice(0,5)}</span>
          <div style={{position:'relative'}}><IcoBell size={16} color="var(--text4)"/><div className="notif-dot"/></div>
        </div>
      </header>
      <div className="tab-content fade-in" key={tab}>
        {tab==='home'&&<HomeTab greeting={greeting} days={days}/>}
        {tab==='chat'&&<ChatTab/>}
        {tab==='finance'&&<FinanceTab/>}
        {tab==='calendar'&&<CalendarTab/>}
        {tab==='brain'&&<BrainTab/>}
        {tab==='marathon'&&<MarathonTab days={days}/>}
      </div>
      <nav className="nav">
        <div className="nav-inner">
          {tabs.map(({id,label,A})=>(
            <button key={id} className={`nav-btn${tab===id?' active':''}`} onClick={()=>setTab(id)}>
              <A size={16} color={tab===id?'var(--gold)':'var(--text5)'} sw={tab===id?2.5:1.75}/>
              <span className="nav-label">{label}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

function HomeTab({greeting,days}){
  const events=[
    {t:'09:30',title:'Monthly P&L review',sub:'Teams · Thomas',c:'#d4a574'},
    {t:'12:30',title:'Lunch break',sub:'',c:'#8a8580'},
    {t:'15:00',title:'Fuel hedging strategy',sub:'Conf. room B',c:'#d4a574'},
    {t:'19:00',title:'Easy run · 8km',sub:'Garmin',c:'#6b9e73'},
  ];
  const mkts=[
    {sym:'ACN',p:'342.18',chg:'+1.24%',up:true},
    {sym:'IWDA',p:'98.42',chg:'+0.62%',up:true},
    {sym:'SPY',p:'612.80',chg:'-0.31%',up:false},
    {sym:'XAU',p:'2,782',chg:'+0.88%',up:true},
  ];
  const news=[
    {tag:'MIDDLE EAST',src:'Reuters',ago:'28m',title:'Lebanon ceasefire enters second phase as Israeli forces withdraw from southern villages'},
    {tag:'MARKETS',src:'Bloomberg',ago:'1h',title:'Fed signals hold on rates as inflation prints hotter than expected'},
    {tag:'SWITZERLAND',src:'FT',ago:'2h',title:'SNB sees CHF strength moderating through Q2'},
  ];
  return(
    <div className="px5 space-y4" style={{paddingTop:'24px',paddingBottom:'24px'}}>
      <div>
        <div className="label" style={{marginBottom:'4px'}}>Morning briefing</div>
        <div className="serif" style={{fontSize:'30px',lineHeight:1.2}}>
          <span style={{fontStyle:'italic',fontWeight:300}}>{greeting},</span><br/>
          <span style={{color:'var(--gold)'}}>Felix.</span>
        </div>
      </div>
      <div className="card-hero" style={{padding:'18px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,right:0,width:'80px',height:'80px',background:'var(--gold)',opacity:.04,borderRadius:'50%',filter:'blur(20px)'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'14px'}}>
          <div>
            <div className="label">Geneva · Today</div>
            <div style={{display:'flex',alignItems:'baseline',gap:'8px',marginTop:'4px'}}>
              <span className="serif" style={{fontSize:'38px',fontWeight:300}}>8°</span>
              <span style={{color:'var(--text4)',fontSize:'13px'}}>feels 5°</span>
            </div>
            <div style={{color:'var(--text3)',fontSize:'12px',marginTop:'2px'}}>Overcast · rain after 16:00</div>
          </div>
          <IcoCloud size={28} color="var(--text4)" sw={1.25}/>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'6px',paddingTop:'12px',borderTop:'1px solid var(--border2)',fontSize:'12px',color:'var(--text3)'}}>
          <IcoPin size={12} color="var(--text4)" sw={1.5}/>Route clear · ~47 min to Chêne-Bougerie
        </div>
      </div>
      <div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
          <span className="serif" style={{fontSize:'18px',fontStyle:'italic'}}>Today</span>
          <span className="label">{events.length} items</span>
        </div>
        <div className="space-y2">
          {events.map((e,i)=>(
            <div key={i} className="event-item">
              <span className="mono" style={{fontSize:'11px',color:'var(--text3)',width:'38px',flexShrink:0}}>{e.t}</span>
              <div style={{width:'1px',alignSelf:'stretch',background:'var(--border2)'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'13px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{e.title}</div>
                {e.sub&&<div style={{fontSize:'11px',color:'var(--text4)',marginTop:'1px'}}>{e.sub}</div>}
              </div>
              <div style={{width:'6px',height:'6px',borderRadius:'50%',background:e.c,flexShrink:0}}/>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
          <span className="serif" style={{fontSize:'18px',fontStyle:'italic'}}>Markets</span>
          <span className="label" style={{color:'var(--gold)',display:'flex',alignItems:'center',gap:'4px'}}>
            <span style={{width:'6px',height:'6px',background:'var(--gold)',borderRadius:'50%',display:'inline-block'}}/> Live
          </span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
          {mkts.map((m,i)=>(
            <div key={i} className="mkt-card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}}>
                <span className="mono" style={{fontSize:'10px',color:'var(--text4)'}}>{m.sym}</span>
                {m.up?<IcoUp size={12} color="var(--green)"/>:<IcoDn size={12} color="var(--red)"/>}
              </div>
              <div className="mono" style={{fontSize:'16px'}}>{m.p}</div>
              <div className={`mono ${m.up?'up':'dn'}`} style={{fontSize:'11px',marginTop:'1px'}}>{m.chg}</div>
            </div>
          ))}
        </div>
        <div className="card" style={{marginTop:'8px',padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <span className="mono" style={{fontSize:'10px',color:'var(--text4)'}}>CHF/EUR</span>
            <span className="mono" style={{fontSize:'13px'}}>1.042</span>
            <span className="mono up" style={{fontSize:'10px'}}>+0.12%</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <span className="mono" style={{fontSize:'10px',color:'var(--text4)'}}>USD/EUR</span>
            <span className="mono" style={{fontSize:'13px'}}>0.921</span>
          </div>
        </div>
      </div>
      <div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
          <span className="serif" style={{fontSize:'18px',fontStyle:'italic'}}>What's moving</span>
        </div>
        <div className="card" style={{padding:'4px 0'}}>
          {news.map((n,i)=>(
            <div key={i} style={{padding:'12px 16px',borderBottom:i<news.length-1?'1px solid var(--border)':'none'}}>
              <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'5px'}}>
                <span className="mono" style={{fontSize:'9px',letterSpacing:'.12em',color:'var(--gold)',textTransform:'uppercase'}}>{n.tag}</span>
                <span className="mono" style={{fontSize:'9px',color:'var(--text5)'}}>· {n.src} · {n.ago} ago</span>
              </div>
              <div style={{fontSize:'13px',lineHeight:'1.45'}}>{n.title}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card-gold" style={{padding:'16px 18px'}}>
        <div className="label" style={{color:'var(--gold)',marginBottom:'10px'}}>From Mélanie</div>

Felix: Network financial analyst, MSC Air Cargo Geneva. French resident, Massongy 74140. Engaged to Mélanie, commute together by car ~45min to Chêne-Bougerie Switzerland, leave 7:45am/5:45pm. Investments: Accenture, World ETF, SP500 ETF, Europe ETF, gold. PEA + assurance vie, ~€12k savings. Watches CHF/EUR/USD, fuel prices. Marathon: Nov 8 2026 Lake Maggiore. Follows Middle East news, global events. Tends to forget things especially what Mélanie tells him. Sees psychologist every 2-3 weeks.

Help him: schedule events, log notes/ideas, set reminders, finance/news questions, track what Mélanie says, draft messages, summarise. No preamble. No lists unless essential.`;

function ChatTab(){
  const[msgs,setMsgs]=useState([{role:'assistant',content:"Morning Felix. Briefing's ready. What's on your mind?",ts:'07:02'}]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);
  const send=async()=>{
    if(!input.trim()||loading)return;
    const ts=new Date().toTimeString().slice(0,5);
    const um={role:'user',content:input.trim(),ts};
    const next=[...msgs,um];
    setMsgs(next);setInput('');setLoading(true);
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:SYSTEM,messages:next.map(m=>({role:m.role,content:m.content}))})
      });
      const d=await r.json();
      setMsgs([...next,{role:'assistant',content:d.content?.[0]?.text||'No response.',ts:new Date().toTimeString().slice(0,5)}]);
    }catch(e){
      setMsgs([...next,{role:'assistant',content:'Connection error. Try again.',ts:'--:--'}]);
    }
    setLoading(false);
  };
  return(
    <div className="chat-wrap">
      <div style={{padding:'14px 20px 10px',borderBottom:'1px solid var(--border)'}}>
        <div className="label">Conversation</div>
        <div className="serif" style={{fontSize:'18px',fontStyle:'italic',marginTop:'2px'}}>Tell me anything</div>
      </div>
      <div className="chat-msgs">
        {msgs.map((m,i)=>(
          <div key={i} style={{marginLeft:m.role==='user'?'32px':0,marginRight:m.role==='assistant'?'32px':0}}>
            <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'4px'}}>
              <span className="mono" style={{fontSize:'10px',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text4)'}}>{m.role==='user'?'You':'Jarvis'}</span>
              <span className="mono" style={{fontSize:'10px',color:'var(--text5)'}}>{m.ts}</span>
            </div>
            <div style={{fontSize:'14px',lineHeight:'1.55',color:m.role==='user'?'var(--text)':'var(--text2)'}}>{m.content}</div>
          </div>
        ))}
        {loading&&(
          <div style={{marginRight:'32px'}}>
            <div className="mono" style={{fontSize:'10px',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text4)',marginBottom:'6px'}}>Jarvis</div>
            <div className="dot-pulse"><span/><span/><span/></div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      <div className="chat-input-area">
        <div className="pills-row">
          {['Meeting Thursday 3pm','How is Accenture?','Middle East news','Log this idea'].map((p,i)=>(
            <button key={i} className="pill" onClick={()=>setInput(p)}>{p}</button>
          ))}
        </div>
        <div className="chat-row">
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Schedule, log, ask, remind…"/>
          <button className="send-btn" onClick={send} disabled={!input.trim()||loading}>
            <IcoSend size={16} color={input.trim()&&!loading?'var(--gold)':'var(--border2)'}/>
          </button>
        </div>
      </div>
    </div>
  );
}
