<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2a0a10"/>
      <stop offset="100%" stop-color="#0a0507"/>
    </radialGradient>

    <!-- Gold gradient for J -->
    <linearGradient id="jGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd447"/>
      <stop offset="50%" stop-color="#ffb400"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd447"/>
      <stop offset="50%" stop-color="#ffb400"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>

    <!-- Inner glow -->
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e63946" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e63946" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowGold" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffb400" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffb400" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#ffb400" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Diagonal accent lines (Iron Man HUD feel) -->
  <g opacity="0.08" stroke="#e63946" stroke-width="1">
    <line x1="0" y1="180" x2="180" y2="0"/>
    <line x1="332" y1="512" x2="512" y2="332"/>
  </g>

  <!-- Red atmospheric glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glowRed)"/>
  <!-- Gold top glow -->
  <ellipse cx="256" cy="180" rx="160" ry="120" fill="url(#glowGold)"/>

  <!-- Outer ring (gold-red) -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="url(#ringGrad)" stroke-width="3.5" opacity="0.9" filter="url(#goldGlow)"/>

  <!-- Secondary ring (thinner, red) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.35"/>

  <!-- HUD tick marks on outer ring -->
  <g stroke="url(#ringGrad)" stroke-width="4" opacity="0.85">
    <!-- Top -->
    <line x1="256" y1="36" x2="256" y2="66" filter="url(#goldGlow)"/>
    <!-- Bottom -->
    <line x1="256" y1="446" x2="256" y2="476" filter="url(#goldGlow)"/>
    <!-- Left -->
    <line x1="36" y1="256" x2="66" y2="256" filter="url(#goldGlow)"/>
    <!-- Right -->
    <line x1="446" y1="256" x2="476" y2="256" filter="url(#goldGlow)"/>
  </g>

  <!-- Smaller tick marks at 45° -->
  <g stroke="#ffb400" stroke-width="2.5" opacity="0.5">
    <line x1="104" y1="104" x2="118" y2="118"/>
    <line x1="408" y1="104" x2="394" y2="118"/>
    <line x1="104" y1="408" x2="118" y2="394"/>
    <line x1="408" y1="408" x2="394" y2="394"/>
  </g>

  <!-- Inner circle panel -->
  <circle cx="256" cy="256" r="170" fill="#160608" opacity="0.8"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#ffb400" stroke-width="1" opacity="0.2"/>

  <!-- Arc segments (HUD decorative) -->
  <!-- Top-left arc segment -->
  <path d="M 130 180 A 145 145 0 0 1 180 130" fill="none" stroke="#e63946" stroke-width="4" stroke-linecap="round" opacity="0.6" filter="url(#redGlow)"/>
  <!-- Top-right arc segment -->
  <path d="M 332 130 A 145 145 0 0 1 382 180" fill="none" stroke="#e63946" stroke-width="4" stroke-linecap="round" opacity="0.6" filter="url(#redGlow)"/>
  <!-- Bottom-left arc segment -->
  <path d="M 130 332 A 145 145 0 0 0 180 382" fill="none" stroke="#ffb400" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <!-- Bottom-right arc segment -->
  <path d="M 332 382 A 145 145 0 0 0 382 332" fill="none" stroke="#ffb400" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

  <!-- J letterform — main glyph -->
  <!-- The J: vertical bar + bottom hook -->
  <text
    x="256"
    y="318"
    text-anchor="middle"
    font-family="'Rajdhani', 'Arial Narrow', sans-serif"
    font-weight="700"
    font-size="220"
    letter-spacing="-8"
    fill="url(#jGrad)"
    filter="url(#softGlow)"
    style="font-style: normal;"
  >J</text>

  <!-- Scanline shimmer across J -->
  <rect x="108" y="240" width="300" height="3" fill="url(#ringGrad)" opacity="0.22" rx="2"/>

  <!-- Bottom status dots -->
  <g opacity="0.85">
    <circle cx="220" cy="428" r="5" fill="#ffb400" filter="url(#goldGlow)"/>
    <circle cx="256" cy="428" r="5" fill="#e63946" filter="url(#redGlow)"/>
    <circle cx="292" cy="428" r="5" fill="#ffb400" filter="url(#goldGlow)"/>
  </g>

  <!-- Top status bar -->
  <rect x="196" y="82" width="120" height="4" rx="2" fill="url(#ringGrad)" opacity="0.6" filter="url(#goldGlow)"/>

  <!-- Corner accent diamonds -->
  <g fill="#ffb400" opacity="0.55">
    <polygon points="256,58 262,68 256,78 250,68" filter="url(#goldGlow)"/>
  </g>
  <g fill="#e63946" opacity="0.55">
    <polygon points="256,434 262,444 256,454 250,444" filter="url(#redGlow)"/>
  </g>
</svg>
